<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AutoCVApply">
    <rect width="64" height="64" fill="#fafaf8"/>
    <g transform="translate(32 32) rotate(-4) translate(-22 -22)" filter="url(#stamp-shadow)">
        <rect
            width="44"
            height="44"
            fill="#ffffff"
            stroke="#c8102e"
            stroke-width="2.5"
        />
        <text
            x="22"
            y="29"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#c8102e"
            font-family="DM Sans, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
            font-size="15"
            font-weight="700"
            letter-spacing="-0.06em"
        >CV</text>
    </g>
    <defs>
        <filter id="stamp-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="2" stdDeviation="0" flood-color="rgb(200 16 46)" flood-opacity="0.2"/>
        </filter>
    </defs>
</svg>
