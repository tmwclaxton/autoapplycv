<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Software Engineer at Found By Few</title>
</head>
<body>
    <main class="scaffold-layout__main">
        <div class="job-view-layout jobs-details-top-card">
            <section class="jobs-unified-top-card">
                <h1 class="job-details-jobs-unified-top-card__job-title">Software Engineer</h1>
                <p class="job-details-jobs-unified-top-card__company-name">Found By Few</p>
                <div class="jobs-unified-top-card__buttons">
                    <button
                        type="button"
                        class="jobs-save-button artdeco-button artdeco-button--2"
                        aria-label="Save Software Engineer at Found By Few"
                        style="display: inline-block; position: absolute; width: 80px; height: 40px;"
                    >
                        Save
                    </button>
                    <button
                        type="button"
                        class="jobs-apply-button artdeco-button artdeco-button--3 artdeco-button--primary"
                        aria-label="Easy Apply to Software Engineer at Found By Few"
                        style="display: inline-block; position: absolute; width: 120px; height: 40px;"
                    >
                        Easy Apply
                    </button>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
