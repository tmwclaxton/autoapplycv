<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>LinkedIn - Cookie consent</title>
</head>
<body>
<div class="jobs-details">
    <h1>Software Engineer</h1>
    <p>Acme Labs</p>
    <button
        type="button"
        class="jobs-apply-button artdeco-button artdeco-button--2"
        aria-label="Easy Apply to Software Engineer at Acme Labs"
        style="display: inline-block; position: absolute; width: 120px; height: 40px;"
    >
        Easy Apply
    </button>
</div>
<div
    data-test-global-alert="0"
    class="artdeco-global-alert artdeco-global-alert--cookie_consent"
    style="position: fixed; inset: auto 0 0 0; z-index: 10000; display: block; background: #fff; padding: 24px; border-top: 1px solid #ccc;"
>
    <h1>LinkedIn respects your privacy</h1>
    <p>We use cookies to improve your experience.</p>
    <button
        data-test-global-alert-action="0"
        type="button"
        class="artdeco-button artdeco-button--2 artdeco-button--primary"
    >
        Accept
    </button>
    <button
        data-test-global-alert-action="1"
        type="button"
        class="artdeco-button artdeco-button--2 artdeco-button--secondary"
    >
        Reject
    </button>
</div>
</body>
</html>
