<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex 10000</title></head>
<body>
<main><h1>Mixed complex 10000</h1><form action="/apply" method="post">
<label for="mix-name-10000">Applicant name (10000)</label>
<input type="text" id="mix-name-10000" name="mix-name-10000" autocomplete="name">
<label for="mix-email-10000">Application email (10000)</label>
<input type="email" id="mix-email-10000" name="mix-email-10000" autocomplete="email">
<label for="mix-phone-10000">Telephone (10000)</label>
<input type="tel" id="mix-phone-10000" name="mix-phone-10000" autocomplete="tel">

<div class="field-row">
<span id="listbox-h-10000-lbl">Current city (10000)</span>
<button type="button" class="custom-dropdown-trigger" role="combobox" aria-expanded="false" aria-controls="listbox-h-10000" aria-labelledby="listbox-h-10000-lbl" data-reveal="#listbox-h-10000">Select current city (10000)</button>
<div role="listbox" id="listbox-h-10000" aria-labelledby="listbox-h-10000-lbl" hidden style="display:none">
<div role="option" data-value="remote">Remote</div><div role="option" data-value="dublin">Dublin</div><div role="option" data-value="berlin">Berlin</div><div role="option" data-value="hybrid">Hybrid</div>
</div>
</div>
<button type="button" data-reveal="#modal-10000" aria-haspopup="dialog" aria-controls="modal-10000">Add details</button>
<div id="modal-10000" role="dialog" hidden style="display:none">
<label for="modal-loc-10000">Personal website (10000)</label>
<input type="url" id="modal-loc-10000" name="modal-loc-10000">
</div>
<div class="file-row"><label for="file-upload-10000">Attach resume (optional)</label><input type="file" id="file-upload-10000" name="file-upload-10000" accept=".pdf,.doc"></div></form></main>
</body>
</html>
