<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Teamtailor apply 20015</title></head>
<body>

<main class="careers-page"><h1 class="job-title">Apply — Role 20015</h1>
<form class="apply-form" action="/apply" method="post" data-teamtailor-form="application">
<section class="form-section" data-section="personal">

<div class="form-group"><label class="form-label" for="tt-name-20015">Full name (20015)</label>
</div><input class="form-control" type="text" id="tt-name-20015" name="tt-name-20015" autocomplete="name">
<div class="form-group"><label class="form-label" for="tt-email-20015">Work email (20015)</label>
</div><input class="form-control" type="email" id="tt-email-20015" name="tt-email-20015" autocomplete="email">
<div class="form-group"><label class="form-label" for="tt-phone-20015">Telephone (20015)</label>
</div><input class="form-control" type="tel" id="tt-phone-20015" name="tt-phone-20015" autocomplete="tel">
</section>
<section class="form-section" data-section="questions">
<div class="field-row"><label for="cover-letter-20015-20015">Cover letter (20015)</label><textarea id="cover-letter-20015-20015" name="cover-letter-20015-20015" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-20015-20015">Work location (20015)</label><select id="work-location-20015-20015" name="work-location-20015-20015"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (20015)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
</section>
<div class="file-row"><label for="file-20015">Attach resume (optional)</label><input type="file" id="file-20015" name="file-20015" accept=".pdf,.doc"></div>
<button type="submit" class="btn btn-primary">Submit application</button>
</form></main>
</body>
</html>
