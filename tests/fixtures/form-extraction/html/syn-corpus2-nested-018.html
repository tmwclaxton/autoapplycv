<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nested fieldsets 20358</title></head>
<body>
<main><h1>Nested fieldsets 20358</h1><form action="/apply" method="post">
<fieldset><legend>Personal details</legend>
<label for="ns-name-20358">Your name (20358)</label>
<input type="text" id="ns-name-20358" name="ns-name-20358" autocomplete="name">
<label for="ns-email-20358">Contact email (20358)</label>
<input type="email" id="ns-email-20358" name="ns-email-20358" autocomplete="email">
<label for="ns-phone-20358">Phone number (20358)</label>
<input type="tel" id="ns-phone-20358" name="ns-phone-20358" autocomplete="tel"></fieldset>
<fieldset><legend>Preferences</legend><div class="field-row"><label for="work-location-20358-20358">Work location (20358)</label><select id="work-location-20358-20358" name="work-location-20358-20358"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="london">London</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option></select></div></fieldset>
<fieldset><legend>Additional</legend><div class="field-row"><label for="tell-us-about-yourself-20358">Tell us about yourself (20358)</label><textarea id="tell-us-about-yourself-20358" name="tell-us-about-yourself-20358" rows="4" maxlength="400"></textarea></div></fieldset></form></main>
</body>
</html>
