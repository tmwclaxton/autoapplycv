<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50079</title></head>
<body>
<main><h1>Long complex apply 50079</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50079">Preferred name (50079)</label>
<input type="text" id="long-name-50079" name="long-name-50079" autocomplete="name">
<label for="long-email-50079">Personal email (50079)</label>
<input type="email" id="long-email-50079" name="long-email-50079" autocomplete="email">
<label for="long-phone-50079">Phone number (50079)</label>
<input type="tel" id="long-phone-50079" name="long-phone-50079" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50079">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50079" name="linkedin-profile-url-50079" ></div>
<div class="field-row"><label for="current-employer-50079">Current employer</label><input type="text" id="current-employer-50079" name="current-employer-50079" ></div>
<div class="field-row"><label for="current-job-title-50079">Current job title</label><input type="text" id="current-job-title-50079" name="current-job-title-50079" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="motivation-statement-50079-5">Motivation statement (50079)</label><textarea id="motivation-statement-50079-5" name="motivation-statement-50079-5" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="work-location-50079-50079">Work location (50079)</label><select id="work-location-50079-50079" name="work-location-50079-50079"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Work authorization status (50079)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50079)</legend><label for="willing-to-relocate-5007-0"><input type="radio" id="willing-to-relocate-5007-0" name="willing-to-relocate-5007" value="yes"> Yes</label><label for="willing-to-relocate-5007-1"><input type="radio" id="willing-to-relocate-5007-1" name="willing-to-relocate-5007" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50079-50">Desired base salary (50079)</label><input type="number" id="desired-base-salary-50079-50" name="desired-base-salary-50079-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50079-50">Earliest start date (50079)</label><input type="date" id="earliest-start-date-50079-50" name="earliest-start-date-50079-50" ></div>
<div class="field-row"><label for="application-source-50079-500">Application source (50079)</label><select id="application-source-50079-500" name="application-source-50079-500"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="other">Other</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Primary expertise (50079)</legend><label for="primary-expertise-50079--cb-0"><input type="checkbox" id="primary-expertise-50079--cb-0" name="primary-expertise-50079-[]" value="rust"> Rust</label><label for="primary-expertise-50079--cb-1"><input type="checkbox" id="primary-expertise-50079--cb-1" name="primary-expertise-50079-[]" value="sql"> SQL</label><label for="primary-expertise-50079--cb-2"><input type="checkbox" id="primary-expertise-50079--cb-2" name="primary-expertise-50079-[]" value="laravel"> Laravel</label><label for="primary-expertise-50079--cb-3"><input type="checkbox" id="primary-expertise-50079--cb-3" name="primary-expertise-50079-[]" value="python"> Python</label><label for="primary-expertise-50079--cb-4"><input type="checkbox" id="primary-expertise-50079--cb-4" name="primary-expertise-50079-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50079--cb-5"><input type="checkbox" id="primary-expertise-50079--cb-5" name="primary-expertise-50079-[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50079">Attach resume (50079)</label><input type="file" id="file-50079" name="file-50079" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
