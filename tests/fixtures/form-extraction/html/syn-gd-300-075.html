<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Review - DevOps Engineer</title></head>
<body>
<form data-testid="indeed-apply-form">

<h1 data-testid="review-heading">Review your application</h1>
<p data-testid="review-summary">You are applying for <strong>DevOps Engineer</strong> at <strong>Pied Piper</strong> via Glassdoor Easy Apply.</p>
<div data-testid="input-ia-field-300075-confirm-email-address">
<label for="ia-field-300075-confirm-email-address" data-testid="ia-field-300075-confirm-email-address-label"><span data-testid="safe-markup">Confirm email address</span></label>
<input type="email" id="ia-field-300075-confirm-email-address" name="ia-field-300075-confirm-email-address" data-testid="ia-field-300075-confirm-email-address-input" required>
</div>
<div data-testid="input-ia-field-300075-confirm-phone-number">
<label for="ia-field-300075-confirm-phone-number" data-testid="ia-field-300075-confirm-phone-number-label"><span data-testid="safe-markup">Confirm phone number</span></label>
<input type="tel" id="ia-field-300075-confirm-phone-number" name="ia-field-300075-confirm-phone-number" data-testid="ia-field-300075-confirm-phone-number-input" required>
</div>
<div data-testid="input-ia-textarea-300075-final-comments-for-the-r">
<label for="ia-textarea-300075-final-comments-for-the-r" data-testid="ia-textarea-300075-final-comments-for-the-r-label"><span data-testid="safe-markup">Final comments for the recruiter (optional)</span></label>
<textarea rows="3" id="ia-textarea-300075-final-comments-for-the-r" name="ia-textarea-300075-final-comments-for-the-r" data-testid="ia-textarea-300075-final-comments-for-the-r-input"></textarea>
</div>
<div data-testid="input-ia-select-300075-preferred-contact-method">
<label for="ia-select-300075-preferred-contact-method" data-testid="ia-select-300075-preferred-contact-method-label"><span data-testid="safe-markup">Preferred contact method</span></label>
<select id="ia-select-300075-preferred-contact-method" name="ia-select-300075-preferred-contact-method" data-testid="ia-select-300075-preferred-contact-method-input">
<option value="">Select an option</option><option value="email">Email</option><option value="phone">Phone</option><option value="either">Either</option>
</select>
</div>
<fieldset data-testid="input-ia-radio-300075-i-certify-that-the-i" role="radiogroup">
<legend data-testid="ia-radio-300075-i-certify-that-the-i-label"><span data-testid="safe-markup">I certify that the information provided is accurate</span></legend>
<label for="ia-radio-300075-i-certify-that-the-i-0"><input type="radio" id="ia-radio-300075-i-certify-that-the-i-0" name="ia-radio-300075-i-certify-that-the-i" value="i-agree" data-testid="ia-radio-300075-i-certify-that-the-i-0"> I agree</label>
</fieldset>
<button type="submit" data-testid="indeed-apply-submit"><span>Submit your application</span></button>
</form>
</body>
</html>
