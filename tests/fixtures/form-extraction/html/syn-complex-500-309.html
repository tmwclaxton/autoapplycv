<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50309</title></head>
<body>
<main><h1>Long complex apply 50309</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50309">Applicant name (50309)</label>
<input type="text" id="long-name-50309" name="long-name-50309" autocomplete="name">
<label for="long-email-50309">Personal email (50309)</label>
<input type="email" id="long-email-50309" name="long-email-50309" autocomplete="email">
<label for="long-phone-50309">Telephone (50309)</label>
<input type="tel" id="long-phone-50309" name="long-phone-50309" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50309">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50309" name="linkedin-profile-url-50309" ></div>
<div class="field-row"><label for="current-employer-50309">Current employer</label><input type="text" id="current-employer-50309" name="current-employer-50309" ></div>
<div class="field-row"><label for="current-job-title-50309">Current job title</label><input type="text" id="current-job-title-50309" name="current-job-title-50309" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="motivation-statement-50309-5">Motivation statement (50309)</label><textarea id="motivation-statement-50309-5" name="motivation-statement-50309-5" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="preferred-location-50309-503">Preferred location (50309)</label><select id="preferred-location-50309-503" name="preferred-location-50309-503"><option value="">Choose one…</option><option value="new-york">New York</option><option value="berlin">Berlin</option><option value="london">London</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Work authorization status (50309)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50309)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50309-50309">Expected salary (50309)</label><input type="number" id="expected-salary-50309-50309" name="expected-salary-50309-50309" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50309-50">Earliest start date (50309)</label><input type="date" id="earliest-start-date-50309-50" name="earliest-start-date-50309-50" ></div>
<div class="field-row"><label for="referral-source-50309-50309">Referral source (50309)</label><select id="referral-source-50309-50309" name="referral-source-50309-50309"><option value="">Choose one…</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="other">Other</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Core competencies (50309)</legend><label for="core-competencies-50309--cb-0"><input type="checkbox" id="core-competencies-50309--cb-0" name="core-competencies-50309-[]" value="rust"> Rust</label><label for="core-competencies-50309--cb-1"><input type="checkbox" id="core-competencies-50309--cb-1" name="core-competencies-50309-[]" value="typescript"> TypeScript</label><label for="core-competencies-50309--cb-2"><input type="checkbox" id="core-competencies-50309--cb-2" name="core-competencies-50309-[]" value="react"> React</label><label for="core-competencies-50309--cb-3"><input type="checkbox" id="core-competencies-50309--cb-3" name="core-competencies-50309-[]" value="laravel"> Laravel</label><label for="core-competencies-50309--cb-4"><input type="checkbox" id="core-competencies-50309--cb-4" name="core-competencies-50309-[]" value="go"> Go</label><label for="core-competencies-50309--cb-5"><input type="checkbox" id="core-competencies-50309--cb-5" name="core-competencies-50309-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50309">Attach resume (50309)</label><input type="file" id="file-50309" name="file-50309" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
