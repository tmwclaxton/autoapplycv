<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters complex apply 50254</title></head>
<body>

<main data-sr-application="true"><h1>Apply 50254</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">
<h2>Contact information</h2>

<label for="sr-name-50254">Legal name (50254)</label>
<input type="text" id="sr-name-50254" name="sr-name-50254" autocomplete="name">
<label for="sr-email-50254">Work email (50254)</label>
<input type="email" id="sr-email-50254" name="sr-email-50254" autocomplete="email">
<label for="sr-phone-50254">Contact number (50254)</label>
<input type="tel" id="sr-phone-50254" name="sr-phone-50254" autocomplete="tel">
</section>
<section class="sr-section" data-section="experience">
<h2>Experience and motivation</h2>
<div class="field-row"><label for="tell-us-about-yourself-50254">Tell us about yourself (50254)</label><textarea id="tell-us-about-yourself-50254" name="tell-us-about-yourself-50254" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-samples-link-50254-5025">Work samples link (50254)</label><input type="url" id="work-samples-link-50254-5025" name="work-samples-link-50254-5025" ></div>
</section>
<section class="sr-section" data-section="preferences">
<h2>Preferences</h2>
<div class="field-row"><label for="current-city-50254-50254">Current city (50254)</label><select id="current-city-50254-50254" name="current-city-50254-50254"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="london">London</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50254)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50254-50">Salary expectations (50254)</label><input type="number" id="salary-expectations-50254-50" name="salary-expectations-50254-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50254-50254">Available from (50254)</label><input type="date" id="available-from-50254-50254" name="available-from-50254-50254" ></div>
<fieldset><legend>Key skills (50254)</legend><label for="key-skills-50254-50254-cb-0"><input type="checkbox" id="key-skills-50254-50254-cb-0" name="key-skills-50254-50254[]" value="go"> Go</label><label for="key-skills-50254-50254-cb-1"><input type="checkbox" id="key-skills-50254-50254-cb-1" name="key-skills-50254-50254[]" value="typescript"> TypeScript</label><label for="key-skills-50254-50254-cb-2"><input type="checkbox" id="key-skills-50254-50254-cb-2" name="key-skills-50254-50254[]" value="react"> React</label><label for="key-skills-50254-50254-cb-3"><input type="checkbox" id="key-skills-50254-50254-cb-3" name="key-skills-50254-50254[]" value="rust"> Rust</label></fieldset>
</section>
<section class="sr-section" data-section="documents">
<h2>Documents</h2>
<div class="file-row"><label for="file-50254">Attach resume (50254)</label><input type="file" id="file-50254" name="file-50254" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
