<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50237</title></head>
<body>
<main><h1>Conditional complex apply 50237</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50237">
<p id="step1-label-50237">Step 1 - Contact</p>

<label for="cond-name-50237">Applicant name (50237)</label>
<input type="text" id="cond-name-50237" name="cond-name-50237" autocomplete="name">
<label for="cond-email-50237">Email address (50237)</label>
<input type="email" id="cond-email-50237" name="cond-email-50237" autocomplete="email">
<label for="cond-phone-50237">Phone number (50237)</label>
<input type="tel" id="cond-phone-50237" name="cond-phone-50237" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50237">
<p id="step2-label-50237">Step 2 - Preferences</p>
<div class="field-row"><label for="work-location-50237-50237">Work location (50237)</label><select id="work-location-50237-50237" name="work-location-50237-50237"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="remote">Remote</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Relocation preference (50237)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="earliest-start-date-50237-50">Earliest start date (50237)</label><input type="date" id="earliest-start-date-50237-50" name="earliest-start-date-50237-50" ></div>
<fieldset><legend>Key skills (50237)</legend><label for="key-skills-50237-50237-cb-0"><input type="checkbox" id="key-skills-50237-50237-cb-0" name="key-skills-50237-50237[]" value="react"> React</label><label for="key-skills-50237-50237-cb-1"><input type="checkbox" id="key-skills-50237-50237-cb-1" name="key-skills-50237-50237[]" value="rust"> Rust</label><label for="key-skills-50237-50237-cb-2"><input type="checkbox" id="key-skills-50237-50237-cb-2" name="key-skills-50237-50237[]" value="typescript"> TypeScript</label><label for="key-skills-50237-50237-cb-3"><input type="checkbox" id="key-skills-50237-50237-cb-3" name="key-skills-50237-50237[]" value="javascript"> JavaScript</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50237">
<p id="step3-label-50237">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50237" data-reveal="#reveal-50237">Show follow-up questions</button>
<div id="reveal-50237" hidden style="display:none"><div class="field-row"><label for="why-this-role-50237-50237">Why this role? (50237)</label><textarea id="why-this-role-50237-50237" name="why-this-role-50237-50237" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="personal-website-50237-50237">Personal website (50237)</label><input type="url" id="personal-website-50237-50237" name="personal-website-50237-50237" ></div>
<div class="field-row"><label for="salary-expectations-50237-50">Salary expectations (50237)</label><input type="number" id="salary-expectations-50237-50" name="salary-expectations-50237-50" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50237">Attach resume (50237)</label><input type="file" id="file-50237" name="file-50237" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
