<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Svelte apply 3</title></head>
<body>
<main><h1>Svelte apply 3</h1><form action="/apply" method="post">
<div class="svelte-0034 application">
<div class="field svelte-0034"><label class="svelte-0034" for="sv-name">Applicant name</label><input class="svelte-0034" id="sv-name" name="sv-name" type="text" bind:value={name}></div>
<div class="field svelte-0034"><label class="svelte-0034" for="sv-email">Contact email</label><input class="svelte-0034" id="sv-email" name="sv-email" type="email" bind:value={email}></div>
<div class="field svelte-0034"><label class="svelte-0034" for="sv-phone">Contact number</label><input class="svelte-0034" id="sv-phone" name="sv-phone" type="tel" bind:value={phone}></div>
<div class="field-row"><label for="tell-us-about-yourself">Tell us about yourself</label><textarea id="tell-us-about-yourself" name="tell-us-about-yourself" rows="4" maxlength="350" class="svelte-0034"></textarea></div>
<fieldset><legend>Relocation preference</legend><label for="relocation-preference-0"><input type="radio" id="relocation-preference-0" name="relocation-preference" value="yes"> Yes</label><label for="relocation-preference-1"><input type="radio" id="relocation-preference-1" name="relocation-preference" value="no"> No</label></fieldset>
</div></form></main>
</body>
</html>
