<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nested fieldsets 20345</title></head>
<body>
<main><h1>Nested fieldsets 20345</h1><form action="/apply" method="post">
<fieldset><legend>Personal details</legend>
<label for="ns-name-20345">Legal name (20345)</label>
<input type="text" id="ns-name-20345" name="ns-name-20345" autocomplete="name">
<label for="ns-email-20345">Personal email (20345)</label>
<input type="email" id="ns-email-20345" name="ns-email-20345" autocomplete="email">
<label for="ns-phone-20345">Phone number (20345)</label>
<input type="tel" id="ns-phone-20345" name="ns-phone-20345" autocomplete="tel"></fieldset>
<fieldset><legend>Preferences</legend><div class="field-row"><label for="current-city-20345-20345">Current city (20345)</label><select id="current-city-20345-20345" name="current-city-20345-20345"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div></fieldset>
<fieldset><legend>Additional</legend><div class="field-row"><label for="cover-letter-20345-20345">Cover letter (20345)</label><textarea id="cover-letter-20345-20345" name="cover-letter-20345-20345" rows="4" maxlength="400"></textarea></div></fieldset></form></main>
</body>
</html>
