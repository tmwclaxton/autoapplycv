<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday-style apply 3</title></head>
<body>
<main><h1>Workday-style apply 3</h1><form action="/apply" method="post">
<div data-automation-id="applyFlowPrimaryPage">
<div data-testid="input-q_applicant-name" class="ia-Questions-item">
<div data-testid="input-q_applicant-name-label"><span data-testid="safe-markup">Applicant name</span></div>
<input data-testid="input-q_applicant-name-input" type="text" name="input-q_applicant-name">
</div>
<div data-testid="input-q_contact-email" class="ia-Questions-item">
<div data-testid="input-q_contact-email-label"><span data-testid="safe-markup">Contact email</span></div>
<input data-testid="input-q_contact-email-input" type="email" name="input-q_contact-email">
</div>
<div data-testid="input-q_contact-number" class="ia-Questions-item">
<div data-testid="input-q_contact-number-label"><span data-testid="safe-markup">Contact number</span></div>
<input data-testid="input-q_contact-number-input" type="tel" name="input-q_contact-number">
</div>
<div data-testid="input-q_tell-us-about-" class="ia-Questions-item">
<div data-testid="input-q_tell-us-about--label"><span data-testid="safe-markup">Tell us about yourself</span></div>
<textarea data-testid="input-q_tell-us-about--input" name="input-q_tell-us-about-" rows="4" maxlength="600"></textarea>
</div>
<button type="button">Save and continue</button>
</div></form></main>
</body>
</html>
