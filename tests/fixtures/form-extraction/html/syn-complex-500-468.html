<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50468</title></head>
<body>
<main><h1>Mixed complex apply 50468</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50468">Legal name (50468)</label>
<input type="text" id="mix-name-50468" name="mix-name-50468" autocomplete="name">
<label for="mix-email-50468">Personal email (50468)</label>
<input type="email" id="mix-email-50468" name="mix-email-50468" autocomplete="email">
<label for="mix-phone-50468">Phone number (50468)</label>
<input type="tel" id="mix-phone-50468" name="mix-phone-50468" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50468">Tell us about yourself (50468)</label><textarea id="tell-us-about-yourself-50468" name="tell-us-about-yourself-50468" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50468-50468">Current city (50468)</label><select id="current-city-50468-50468" name="current-city-50468-50468"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="remote">Remote</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Work authorization status (50468)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50468)</legend><label for="willing-to-relocate-5046-0"><input type="radio" id="willing-to-relocate-5046-0" name="willing-to-relocate-5046" value="yes"> Yes</label><label for="willing-to-relocate-5046-1"><input type="radio" id="willing-to-relocate-5046-1" name="willing-to-relocate-5046" value="no"> No</label><label for="willing-to-relocate-5046-2"><input type="radio" id="willing-to-relocate-5046-2" name="willing-to-relocate-5046" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50468-50">Desired base salary (50468)</label><input type="number" id="desired-base-salary-50468-50" name="desired-base-salary-50468-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50468-50468">Available from (50468)</label><input type="date" id="available-from-50468-50468" name="available-from-50468-50468" ></div>
<div class="field-row"><label for="application-source-50468-504">Application source (50468)</label><select id="application-source-50468-504" name="application-source-50468-504"><option value="">Choose one…</option><option value="conference">Conference</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option></select></div>
<fieldset><legend>Primary expertise (50468)</legend><label for="primary-expertise-50468--cb-0"><input type="checkbox" id="primary-expertise-50468--cb-0" name="primary-expertise-50468-[]" value="react"> React</label><label for="primary-expertise-50468--cb-1"><input type="checkbox" id="primary-expertise-50468--cb-1" name="primary-expertise-50468-[]" value="sql"> SQL</label><label for="primary-expertise-50468--cb-2"><input type="checkbox" id="primary-expertise-50468--cb-2" name="primary-expertise-50468-[]" value="python"> Python</label><label for="primary-expertise-50468--cb-3"><input type="checkbox" id="primary-expertise-50468--cb-3" name="primary-expertise-50468-[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50468">Attach resume (50468)</label><input type="file" id="file-50468" name="file-50468" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50468-5046">Work samples link (50468)</label><input type="url" id="work-samples-link-50468-5046" name="work-samples-link-50468-5046" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
