<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Svelte apply 4</title></head>
<body>
<main><h1>Svelte apply 4</h1><form action="/apply" method="post">
<div class="svelte-0051 application">
<div class="field svelte-0051"><label class="svelte-0051" for="sv-name">Your name</label><input class="svelte-0051" id="sv-name" name="sv-name" type="text" bind:value={name}></div>
<div class="field svelte-0051"><label class="svelte-0051" for="sv-email">Personal email</label><input class="svelte-0051" id="sv-email" name="sv-email" type="email" bind:value={email}></div>
<div class="field svelte-0051"><label class="svelte-0051" for="sv-phone">Telephone</label><input class="svelte-0051" id="sv-phone" name="sv-phone" type="tel" bind:value={phone}></div>
<div class="field-row"><label for="motivation-statement">Motivation statement</label><textarea id="motivation-statement" name="motivation-statement" rows="4" maxlength="350" class="svelte-0051"></textarea></div>
<div class="field-row"><label for="work-location">Work location</label><select id="work-location" name="work-location" ><option value="">Choose one…</option><option value="london">London</option><option value="berlin">Berlin</option><option value="remote">Remote</option></select></div>
</div></form></main>
</body>
</html>
