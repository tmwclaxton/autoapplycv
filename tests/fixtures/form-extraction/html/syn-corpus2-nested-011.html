<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nested fieldsets 20351</title></head>
<body>
<main><h1>Nested fieldsets 20351</h1><form action="/apply" method="post">
<fieldset><legend>Personal details</legend>
<label for="ns-name-20351">Preferred name (20351)</label>
<input type="text" id="ns-name-20351" name="ns-name-20351" autocomplete="name">
<label for="ns-email-20351">Work email (20351)</label>
<input type="email" id="ns-email-20351" name="ns-email-20351" autocomplete="email">
<label for="ns-phone-20351">Contact number (20351)</label>
<input type="tel" id="ns-phone-20351" name="ns-phone-20351" autocomplete="tel"></fieldset>
<fieldset><legend>Preferences</legend><div class="field-row"><label for="preferred-location-20351-203">Preferred location (20351)</label><select id="preferred-location-20351-203" name="preferred-location-20351-203"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="london">London</option></select></div></fieldset>
<fieldset><legend>Additional</legend><div class="field-row"><label for="motivation-statement-20351-2">Motivation statement (20351)</label><textarea id="motivation-statement-20351-2" name="motivation-statement-20351-2" rows="4" maxlength="400"></textarea></div></fieldset></form></main>
</body>
</html>
