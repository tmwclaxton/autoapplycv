<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Collapsed custom dropdown</title></head>
<body>
<main><h1>Collapsed custom dropdown</h1><form action="/apply" method="post">
<label for="ix-name-2">Applicant name</label>
<input type="text" id="ix-name-2" name="ix-name-2">
<label for="ix-email-2">Contact email</label>
<input type="email" id="ix-email-2" name="ix-email-2">
<label for="ix-phone-2">Contact number</label>
<input type="tel" id="ix-phone-2" name="ix-phone-2">
<div class="field-row">
<span id="listbox-hidden-2-lbl">Office preference</span>
<button type="button" class="custom-dropdown-trigger" role="combobox" aria-expanded="false" aria-controls="listbox-hidden-2" aria-labelledby="listbox-hidden-2-lbl" data-reveal="#listbox-hidden-2">Select office preference</button>
<div role="listbox" id="listbox-hidden-2" aria-labelledby="listbox-hidden-2-lbl" hidden style="display:none">
<div role="option" data-value="london">London</div>
<div role="option" data-value="remote">Remote</div>
<div role="option" data-value="hybrid">Hybrid</div>
<div role="option" data-value="berlin">Berlin</div>
</div>
</div></form></main>
</body>
</html>
