<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50226</title></head>
<body>
<main><h1>Wizard complex apply 50226</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50226">
<h2 id="wizard-contact-50226">Contact information</h2>

<label for="wiz-name-50226">Legal name (50226)</label>
<input type="text" id="wiz-name-50226" name="wiz-name-50226" autocomplete="name">
<label for="wiz-email-50226">Email address (50226)</label>
<input type="email" id="wiz-email-50226" name="wiz-email-50226" autocomplete="email">
<label for="wiz-phone-50226">Phone number (50226)</label>
<input type="tel" id="wiz-phone-50226" name="wiz-phone-50226" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50226">
<h2 id="wizard-screen-50226">Screening questions</h2>
<div class="field-row"><label for="tell-us-about-yourself-50226">Tell us about yourself (50226)</label><textarea id="tell-us-about-yourself-50226" name="tell-us-about-yourself-50226" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="work-location-50226-50226">Work location (50226)</label><select id="work-location-50226-50226" name="work-location-50226-50226"><option value="">Choose one…</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50226)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50226-50">Salary expectations (50226)</label><input type="number" id="salary-expectations-50226-50" name="salary-expectations-50226-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50226-50">Earliest start date (50226)</label><input type="date" id="earliest-start-date-50226-50" name="earliest-start-date-50226-50" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50226">
<h2 id="wizard-docs-50226">Documents and skills</h2>
<fieldset><legend>Technical skills (50226)</legend><label for="technical-skills-50226-5-cb-0"><input type="checkbox" id="technical-skills-50226-5-cb-0" name="technical-skills-50226-5[]" value="sql"> SQL</label><label for="technical-skills-50226-5-cb-1"><input type="checkbox" id="technical-skills-50226-5-cb-1" name="technical-skills-50226-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50226-5-cb-2"><input type="checkbox" id="technical-skills-50226-5-cb-2" name="technical-skills-50226-5[]" value="python"> Python</label><label for="technical-skills-50226-5-cb-3"><input type="checkbox" id="technical-skills-50226-5-cb-3" name="technical-skills-50226-5[]" value="rust"> Rust</label><label for="technical-skills-50226-5-cb-4"><input type="checkbox" id="technical-skills-50226-5-cb-4" name="technical-skills-50226-5[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50226">Attach resume (50226)</label><input type="file" id="file-50226" name="file-50226" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="referral-source-50226-50226">Referral source (50226)</label><select id="referral-source-50226-50226" name="referral-source-50226-50226"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="other">Other</option><option value="company-site">Company site</option><option value="referral">Referral</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
