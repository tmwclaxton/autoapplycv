<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50370</title></head>
<body>
<main><h1>Mixed complex apply 50370</h1><form action="/apply" method="post">
<section class="mixed-contact">

<div class="field-row"><label for="desired-base-salary-50370-50">Desired base salary (50370)</label><input type="number" id="desired-base-salary-50370-50" name="desired-base-salary-50370-50" min="0" step="1000" placeholder="Annual amount"></div>

<div class="file-row"><label for="file-50370">Attach resume (50370)</label><input type="file" id="file-50370" name="file-50370" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50370-50370">GitHub profile (50370)</label><input type="url" id="github-profile-50370-50370" name="github-profile-50370-50370" ></div>

<section class="mixed-consent">

</section>
</form></main>
</body>
</html>
