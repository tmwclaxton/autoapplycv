<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50016</title></head>
<body>
<main><h1>Wizard complex apply 50016</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50016">
<h2 id="wizard-contact-50016">Contact information</h2>

<label for="wiz-name-50016">Preferred name (50016)</label>
<input type="text" id="wiz-name-50016" name="wiz-name-50016" autocomplete="name">
<label for="wiz-email-50016">Work email (50016)</label>
<input type="email" id="wiz-email-50016" name="wiz-email-50016" autocomplete="email">
<label for="wiz-phone-50016">Contact number (50016)</label>
<input type="tel" id="wiz-phone-50016" name="wiz-phone-50016" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50016">
<h2 id="wizard-screen-50016">Screening questions</h2>
<div class="field-row"><label for="personal-statement-50016-500">Personal statement (50016)</label><textarea id="personal-statement-50016-500" name="personal-statement-50016-500" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="preferred-location-50016-500">Preferred location (50016)</label><select id="preferred-location-50016-500" name="preferred-location-50016-500"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50016)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50016-50">Desired base salary (50016)</label><input type="number" id="desired-base-salary-50016-50" name="desired-base-salary-50016-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50016-500">When can you start? (50016)</label><input type="date" id="when-can-you-start-50016-500" name="when-can-you-start-50016-500" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50016">
<h2 id="wizard-docs-50016">Documents and skills</h2>
<fieldset><legend>Key skills (50016)</legend><label for="key-skills-50016-50016-cb-0"><input type="checkbox" id="key-skills-50016-50016-cb-0" name="key-skills-50016-50016[]" value="laravel"> Laravel</label><label for="key-skills-50016-50016-cb-1"><input type="checkbox" id="key-skills-50016-50016-cb-1" name="key-skills-50016-50016[]" value="go"> Go</label><label for="key-skills-50016-50016-cb-2"><input type="checkbox" id="key-skills-50016-50016-cb-2" name="key-skills-50016-50016[]" value="python"> Python</label><label for="key-skills-50016-50016-cb-3"><input type="checkbox" id="key-skills-50016-50016-cb-3" name="key-skills-50016-50016[]" value="typescript"> TypeScript</label><label for="key-skills-50016-50016-cb-4"><input type="checkbox" id="key-skills-50016-50016-cb-4" name="key-skills-50016-50016[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50016">Attach resume (50016)</label><input type="file" id="file-50016" name="file-50016" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50016)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="conference">Conference</option><option value="company-site">Company site</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
