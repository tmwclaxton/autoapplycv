<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9903</title></head>
<body>
<main><h1>Grid layout 9903</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9903">Preferred name (9903)</label><span class="helper">Required</span><input id="grid-name-9903" name="grid-name-9903" type="text"></div>
<div><label for="grid-email-9903">Primary email (9903)</label><span class="helper">Required</span><input id="grid-email-9903" name="grid-email-9903" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9903">Telephone (9903)</label><input id="grid-phone-9903" name="grid-phone-9903" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="tell-us-about-yourself-9903-">Tell us about yourself (9903)</label><textarea id="tell-us-about-yourself-9903-" name="tell-us-about-yourself-9903-" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Willing to relocate? (9903)</legend><label for="willing-to-relocate-9903-0"><input type="radio" id="willing-to-relocate-9903-0" name="willing-to-relocate-9903" value="yes"> Yes</label><label for="willing-to-relocate-9903-1"><input type="radio" id="willing-to-relocate-9903-1" name="willing-to-relocate-9903" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
