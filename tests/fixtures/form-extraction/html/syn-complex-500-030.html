<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50030</title></head>
<body>
<main><h1>Mixed complex apply 50030</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50030">Your name (50030)</label>
<input type="text" id="mix-name-50030" name="mix-name-50030" autocomplete="name">
<label for="mix-email-50030">Work email (50030)</label>
<input type="email" id="mix-email-50030" name="mix-email-50030" autocomplete="email">
<label for="mix-phone-50030">Phone number (50030)</label>
<input type="tel" id="mix-phone-50030" name="mix-phone-50030" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="personal-statement-50030-500">Personal statement (50030)</label><textarea id="personal-statement-50030-500" name="personal-statement-50030-500" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50030-50030">Current city (50030)</label><select id="current-city-50030-50030" name="current-city-50030-50030"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="london">London</option><option value="dublin">Dublin</option><option value="new-york">New York</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50030)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50030)</legend><label for="open-to-relocation-50030-0"><input type="radio" id="open-to-relocation-50030-0" name="open-to-relocation-50030" value="yes"> Yes</label><label for="open-to-relocation-50030-1"><input type="radio" id="open-to-relocation-50030-1" name="open-to-relocation-50030" value="no"> No</label><label for="open-to-relocation-50030-2"><input type="radio" id="open-to-relocation-50030-2" name="open-to-relocation-50030" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50030-50">Desired base salary (50030)</label><input type="number" id="desired-base-salary-50030-50" name="desired-base-salary-50030-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50030-">Start date preference (50030)</label><input type="date" id="start-date-preference-50030-" name="start-date-preference-50030-" ></div>
<div class="field-row"><label for="application-source-50030-500">Application source (50030)</label><select id="application-source-50030-500" name="application-source-50030-500"><option value="">Choose one…</option><option value="other">Other</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="linkedin">LinkedIn</option></select></div>
<fieldset><legend>Core competencies (50030)</legend><label for="core-competencies-50030--cb-0"><input type="checkbox" id="core-competencies-50030--cb-0" name="core-competencies-50030-[]" value="typescript"> TypeScript</label><label for="core-competencies-50030--cb-1"><input type="checkbox" id="core-competencies-50030--cb-1" name="core-competencies-50030-[]" value="python"> Python</label><label for="core-competencies-50030--cb-2"><input type="checkbox" id="core-competencies-50030--cb-2" name="core-competencies-50030-[]" value="sql"> SQL</label><label for="core-competencies-50030--cb-3"><input type="checkbox" id="core-competencies-50030--cb-3" name="core-competencies-50030-[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50030">Attach resume (50030)</label><input type="file" id="file-50030" name="file-50030" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50030-50030">Personal website (50030)</label><input type="url" id="personal-website-50030-50030" name="personal-website-50030-50030" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
