<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9920</title></head>
<body>
<main><h1>Grid layout 9920</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9920">Complete name (9920)</label><span class="helper">Required</span><input id="grid-name-9920" name="grid-name-9920" type="text"></div>
<div><label for="grid-email-9920">Primary email (9920)</label><span class="helper">Required</span><input id="grid-email-9920" name="grid-email-9920" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9920">Cell phone (9920)</label><input id="grid-phone-9920" name="grid-phone-9920" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="tell-us-about-yourself-9920-">Tell us about yourself (9920)</label><textarea id="tell-us-about-yourself-9920-" name="tell-us-about-yourself-9920-" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Relocation preference (9920)</legend><label for="relocation-preference-99-0"><input type="radio" id="relocation-preference-99-0" name="relocation-preference-99" value="yes"> Yes</label><label for="relocation-preference-99-1"><input type="radio" id="relocation-preference-99-1" name="relocation-preference-99" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
