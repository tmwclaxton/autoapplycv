<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday Application 9</title></head>
<body>
<main>
<h1>Workday Application 9</h1>
<form action="/apply" method="post">
<div data-testid="input-q_applicant-name" class="ia-Questions-item">
<div data-testid="input-q_applicant-name-label"><span data-testid="safe-markup">Applicant name</span></div>
<input data-testid="input-q_applicant-name-input" type="text" name="input-q_applicant-name">
</div>
<div data-testid="input-q_work-email" class="ia-Questions-item">
<div data-testid="input-q_work-email-label"><span data-testid="safe-markup">Work email</span></div>
<input data-testid="input-q_work-email-input" type="email" name="input-q_work-email">
</div>
<div data-testid="input-q_cover-letter" class="ia-Questions-item">
<div data-testid="input-q_cover-letter-label"><span data-testid="safe-markup">Cover letter</span></div>
<textarea data-testid="input-q_cover-letter-input" name="input-q_cover-letter" rows="4" maxlength="500"></textarea>
</div>
<div data-testid="input-q_years-in-this-fi" class="ia-Questions-item">
<div data-testid="input-q_years-in-this-fi-label"><span data-testid="safe-markup">Years in this field</span></div>
<input data-testid="input-q_years-in-this-fi-input" type="number" name="input-q_years-in-this-fi">
</div>
<button type="button">Save and continue</button>

</form>
</main>
</body>
</html>
