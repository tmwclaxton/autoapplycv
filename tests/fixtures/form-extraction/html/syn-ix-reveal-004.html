<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Disclosure panel</title></head>
<body>
<main><h1>Disclosure panel</h1><form action="/apply" method="post">
<label for="ix-name-26">Applicant name</label>
<input type="text" id="ix-name-26" name="ix-name-26">
<label for="ix-email-26">Contact email</label>
<input type="email" id="ix-email-26" name="ix-email-26">
<label for="ix-phone-26">Contact number</label>
<input type="tel" id="ix-phone-26" name="ix-phone-26">
<button type="button" id="disclosure-26" aria-expanded="false" aria-controls="disclosure-panel-26" data-reveal="#disclosure-panel-26">Show voluntary disclosures</button>
<div id="disclosure-panel-26" hidden style="display:none">
<label for="disclosure-text-26">Voluntary disclosure</label>
<textarea id="disclosure-text-26" name="disclosure-text-26" rows="3"></textarea>
</div></form></main>
</body>
</html>
