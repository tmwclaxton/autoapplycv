<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday complex apply 50305</title></head>
<body>
<main><h1>Workday complex apply 50305</h1><form action="/apply" method="post">
<div data-automation-id="applyFlowPrimaryPage">
<section data-automation-id="contactSection">
<h2>Contact information</h2>
<div data-testid="input-q_preferred-name" class="ia-Questions-item"><div data-testid="input-q_preferred-name-label"><span data-testid="safe-markup">Preferred name (50305)</span></div><input data-testid="input-q_preferred-name-input" type="text" name="input-q_preferred-name-50305"></div>
<div data-testid="input-q_contact-email-" class="ia-Questions-item"><div data-testid="input-q_contact-email--label"><span data-testid="safe-markup">Contact email (50305)</span></div><input data-testid="input-q_contact-email--input" type="email" name="input-q_contact-email--50305"></div>
<div data-testid="input-q_contact-number" class="ia-Questions-item"><div data-testid="input-q_contact-number-label"><span data-testid="safe-markup">Contact number (50305)</span></div><input data-testid="input-q_contact-number-input" type="tel" name="input-q_contact-number-50305"></div>
</section>
<section data-automation-id="questionSection">
<h2>Questions</h2>
<div data-testid="input-q_cover-letter" class="ia-Questions-item"><div data-testid="input-q_motivation-sta-label"><span data-testid="safe-markup">Cover letter (50305)</span></div><textarea data-testid="input-q_why-this-role-input" name="wd-cover-50305" rows="4" maxlength="600"></textarea></div>
<div class="ia-Questions-item"><label for="work-location-50305-50305">Work location (50305)</label><select id="work-location-50305-50305" name="work-location-50305-50305"><option value="">Choose one…</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Open to relocation? (50305)</legend><label for="open-to-relocation-50305-0"><input type="radio" id="open-to-relocation-50305-0" name="open-to-relocation-50305" value="yes"> Yes</label><label for="open-to-relocation-50305-1"><input type="radio" id="open-to-relocation-50305-1" name="open-to-relocation-50305" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50305-50">Salary expectations (50305)</label><input type="number" id="salary-expectations-50305-50" name="salary-expectations-50305-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50305-503">When can you start? (50305)</label><input type="date" id="when-can-you-start-50305-503" name="when-can-you-start-50305-503" ></div>
<fieldset><legend>Core competencies (50305)</legend><label for="core-competencies-50305--cb-0"><input type="checkbox" id="core-competencies-50305--cb-0" name="core-competencies-50305-[]" value="laravel"> Laravel</label><label for="core-competencies-50305--cb-1"><input type="checkbox" id="core-competencies-50305--cb-1" name="core-competencies-50305-[]" value="javascript"> JavaScript</label><label for="core-competencies-50305--cb-2"><input type="checkbox" id="core-competencies-50305--cb-2" name="core-competencies-50305-[]" value="rust"> Rust</label><label for="core-competencies-50305--cb-3"><input type="checkbox" id="core-competencies-50305--cb-3" name="core-competencies-50305-[]" value="react"> React</label></fieldset>
<div class="field-row"><label for="application-source-50305-503">Application source (50305)</label><select id="application-source-50305-503" name="application-source-50305-503"><option value="">Choose one…</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="conference">Conference</option></select></div>
<div class="file-row"><label for="file-50305">Attach resume (50305)</label><input type="file" id="file-50305" name="file-50305" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Save and continue</button>
</div></form></main>
</body>
</html>
