<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9216</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9216</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Full name (9216)</mat-label><label for="ang-name-9216">Full name (9216)</label><input matInput id="ang-name-9216" name="ang-name-9216" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Application email (9216)</mat-label><label for="ang-email-9216">Application email (9216)</label><input matInput id="ang-email-9216" name="ang-email-9216" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Mobile number (9216)</mat-label><label for="ang-phone-9216">Mobile number (9216)</label><input matInput id="ang-phone-9216" name="ang-phone-9216" type="tel"></mat-form-field>
<div class="field-row"><label for="personal-statement-9216-9216">Personal statement (9216)</label><textarea id="personal-statement-9216-9216" name="personal-statement-9216-9216" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-9216-9216">Work location (9216)</label><select id="work-location-9216-9216" name="work-location-9216-9216"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="london">London</option><option value="manchester">Manchester</option><option value="remote">Remote</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
