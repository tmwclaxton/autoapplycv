<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>BambooHR apply 20054</title></head>
<body>
<main><h1>BambooHR apply 20054</h1><form action="/apply" method="post">
<div class="BambooHR-ATS-Form" data-bamboohr-application="true">
<div class="field-group">
<label class="field-label" for="bb-name-20054">Full name (20054)</label>
<input class="field-input" type="text" id="bb-name-20054" name="bb-name-20054" autocomplete="name">
<label class="field-label" for="bb-email-20054">Email address (20054)</label>
<input class="field-input" type="email" id="bb-email-20054" name="bb-email-20054" autocomplete="email">
<label class="field-label" for="bb-phone-20054">Telephone (20054)</label>
<input class="field-input" type="tel" id="bb-phone-20054" name="bb-phone-20054" autocomplete="tel"></div>
<div class="field-row"><label for="motivation-statement-20054-2">Motivation statement (20054)</label><textarea id="motivation-statement-20054-2" name="motivation-statement-20054-2" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="application-source-20054-200">Application source (20054)</label><select id="application-source-20054-200" name="application-source-20054-200"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="job-board">Job board</option></select></div>
<div class="file-row"><label for="file-20054">Attach resume (optional)</label><input type="file" id="file-20054" name="file-20054" accept=".pdf,.doc"></div>

</div></form></main>
</body>
</html>
