<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9170</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9170</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Your name (9170)</mat-label><label for="ang-name-9170">Your name (9170)</label><input matInput id="ang-name-9170" name="ang-name-9170" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Primary email (9170)</mat-label><label for="ang-email-9170">Primary email (9170)</label><input matInput id="ang-email-9170" name="ang-email-9170" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Mobile number (9170)</mat-label><label for="ang-phone-9170">Mobile number (9170)</label><input matInput id="ang-phone-9170" name="ang-phone-9170" type="tel"></mat-form-field>
<div class="field-row"><label for="cover-letter-9170-9170">Cover letter (9170)</label><textarea id="cover-letter-9170-9170" name="cover-letter-9170-9170" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-9170-9170">Office preference (9170)</label><select id="office-preference-9170-9170" name="office-preference-9170-9170"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="london">London</option><option value="remote">Remote</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
