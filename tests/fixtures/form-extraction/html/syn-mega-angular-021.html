<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9181</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9181</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Applicant name (9181)</mat-label><label for="ang-name-9181">Applicant name (9181)</label><input matInput id="ang-name-9181" name="ang-name-9181" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Email address (9181)</mat-label><label for="ang-email-9181">Email address (9181)</label><input matInput id="ang-email-9181" name="ang-email-9181" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Phone number (9181)</mat-label><label for="ang-phone-9181">Phone number (9181)</label><input matInput id="ang-phone-9181" name="ang-phone-9181" type="tel"></mat-form-field>
<div class="field-row"><label for="personal-statement-9181-9181">Personal statement (9181)</label><textarea id="personal-statement-9181-9181" name="personal-statement-9181-9181" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-9181-9181">Work location (9181)</label><select id="work-location-9181-9181" name="work-location-9181-9181"><option value="">Choose one…</option><option value="london">London</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
