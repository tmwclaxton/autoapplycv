<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50137</title></head>
<body>
<main><h1>Conditional complex apply 50137</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50137">
<p id="step1-label-50137">Step 1 - Contact</p>

<label for="cond-name-50137">Legal name (50137)</label>
<input type="text" id="cond-name-50137" name="cond-name-50137" autocomplete="name">
<label for="cond-email-50137">Work email (50137)</label>
<input type="email" id="cond-email-50137" name="cond-email-50137" autocomplete="email">
<label for="cond-phone-50137">Contact number (50137)</label>
<input type="tel" id="cond-phone-50137" name="cond-phone-50137" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50137">
<p id="step2-label-50137">Step 2 - Preferences</p>
<div class="field-row"><label for="work-location-50137-50137">Work location (50137)</label><select id="work-location-50137-50137" name="work-location-50137-50137"><option value="">Choose one…</option><option value="remote">Remote</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option><option value="london">London</option></select></div>
<fieldset><legend>Willing to relocate? (50137)</legend><label for="willing-to-relocate-5013-0"><input type="radio" id="willing-to-relocate-5013-0" name="willing-to-relocate-5013" value="yes"> Yes</label><label for="willing-to-relocate-5013-1"><input type="radio" id="willing-to-relocate-5013-1" name="willing-to-relocate-5013" value="no"> No</label><label for="willing-to-relocate-5013-2"><input type="radio" id="willing-to-relocate-5013-2" name="willing-to-relocate-5013" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="available-from-50137-50137">Available from (50137)</label><input type="date" id="available-from-50137-50137" name="available-from-50137-50137" ></div>
<fieldset><legend>Core competencies (50137)</legend><label for="core-competencies-50137--cb-0"><input type="checkbox" id="core-competencies-50137--cb-0" name="core-competencies-50137-[]" value="python"> Python</label><label for="core-competencies-50137--cb-1"><input type="checkbox" id="core-competencies-50137--cb-1" name="core-competencies-50137-[]" value="javascript"> JavaScript</label><label for="core-competencies-50137--cb-2"><input type="checkbox" id="core-competencies-50137--cb-2" name="core-competencies-50137-[]" value="go"> Go</label><label for="core-competencies-50137--cb-3"><input type="checkbox" id="core-competencies-50137--cb-3" name="core-competencies-50137-[]" value="typescript"> TypeScript</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50137">
<p id="step3-label-50137">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50137" data-reveal="#reveal-50137">Show follow-up questions</button>
<div id="reveal-50137" hidden style="display:none"><div class="field-row"><label for="tell-us-about-yourself-50137">Tell us about yourself (50137)</label><textarea id="tell-us-about-yourself-50137" name="tell-us-about-yourself-50137" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="personal-website-50137-50137">Personal website (50137)</label><input type="url" id="personal-website-50137-50137" name="personal-website-50137-50137" ></div>
<div class="field-row"><label for="compensation-requirement-501">Compensation requirement (50137)</label><input type="number" id="compensation-requirement-501" name="compensation-requirement-501" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50137">Attach resume (50137)</label><input type="file" id="file-50137" name="file-50137" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
