<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50057</title></head>
<body>
<main><h1>Conditional complex apply 50057</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50057">
<p id="step1-label-50057">Step 1 - Contact</p>

<label for="cond-name-50057">Full name (50057)</label>
<input type="text" id="cond-name-50057" name="cond-name-50057" autocomplete="name">
<label for="cond-email-50057">Work email (50057)</label>
<input type="email" id="cond-email-50057" name="cond-email-50057" autocomplete="email">
<label for="cond-phone-50057">Phone number (50057)</label>
<input type="tel" id="cond-phone-50057" name="cond-phone-50057" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50057">
<p id="step2-label-50057">Step 2 - Preferences</p>
<div class="field-row"><label for="current-city-50057-50057">Current city (50057)</label><select id="current-city-50057-50057" name="current-city-50057-50057"><option value="">Choose one…</option><option value="remote">Remote</option><option value="london">London</option><option value="berlin">Berlin</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Open to relocation? (50057)</legend><label for="open-to-relocation-50057-0"><input type="radio" id="open-to-relocation-50057-0" name="open-to-relocation-50057" value="yes"> Yes</label><label for="open-to-relocation-50057-1"><input type="radio" id="open-to-relocation-50057-1" name="open-to-relocation-50057" value="no"> No</label><label for="open-to-relocation-50057-2"><input type="radio" id="open-to-relocation-50057-2" name="open-to-relocation-50057" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="when-can-you-start-50057-500">When can you start? (50057)</label><input type="date" id="when-can-you-start-50057-500" name="when-can-you-start-50057-500" ></div>
<fieldset><legend>Core competencies (50057)</legend><label for="core-competencies-50057--cb-0"><input type="checkbox" id="core-competencies-50057--cb-0" name="core-competencies-50057-[]" value="typescript"> TypeScript</label><label for="core-competencies-50057--cb-1"><input type="checkbox" id="core-competencies-50057--cb-1" name="core-competencies-50057-[]" value="laravel"> Laravel</label><label for="core-competencies-50057--cb-2"><input type="checkbox" id="core-competencies-50057--cb-2" name="core-competencies-50057-[]" value="react"> React</label><label for="core-competencies-50057--cb-3"><input type="checkbox" id="core-competencies-50057--cb-3" name="core-competencies-50057-[]" value="rust"> Rust</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50057">
<p id="step3-label-50057">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50057" data-reveal="#reveal-50057">Show follow-up questions</button>
<div id="reveal-50057" hidden style="display:none"><div class="field-row"><label for="why-this-role-50057-50057">Why this role? (50057)</label><textarea id="why-this-role-50057-50057" name="why-this-role-50057-50057" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="portfolio-url-50057-50057">Portfolio URL (50057)</label><input type="url" id="portfolio-url-50057-50057" name="portfolio-url-50057-50057" ></div>
<div class="field-row"><label for="compensation-requirement-500">Compensation requirement (50057)</label><input type="number" id="compensation-requirement-500" name="compensation-requirement-500" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50057">Attach resume (50057)</label><input type="file" id="file-50057" name="file-50057" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
