<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50418</title></head>
<body>
<main><h1>Mixed complex apply 50418</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50418">Preferred name (50418)</label>
<input type="text" id="mix-name-50418" name="mix-name-50418" autocomplete="name">
<label for="mix-email-50418">Contact email (50418)</label>
<input type="email" id="mix-email-50418" name="mix-email-50418" autocomplete="email">
<label for="mix-phone-50418">Mobile number (50418)</label>
<input type="tel" id="mix-phone-50418" name="mix-phone-50418" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50418-50418">Cover letter (50418)</label><textarea id="cover-letter-50418-50418" name="cover-letter-50418-50418" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50418-50418">Current city (50418)</label><select id="current-city-50418-50418" name="current-city-50418-50418"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50418)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50418)</legend><label for="willing-to-relocate-5041-0"><input type="radio" id="willing-to-relocate-5041-0" name="willing-to-relocate-5041" value="yes"> Yes</label><label for="willing-to-relocate-5041-1"><input type="radio" id="willing-to-relocate-5041-1" name="willing-to-relocate-5041" value="no"> No</label><label for="willing-to-relocate-5041-2"><input type="radio" id="willing-to-relocate-5041-2" name="willing-to-relocate-5041" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-504">Compensation requirement (50418)</label><input type="number" id="compensation-requirement-504" name="compensation-requirement-504" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50418-504">When can you start? (50418)</label><input type="date" id="when-can-you-start-50418-504" name="when-can-you-start-50418-504" ></div>
<div class="field-row"><label for="application-source-50418-504">Application source (50418)</label><select id="application-source-50418-504" name="application-source-50418-504"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="other">Other</option><option value="conference">Conference</option><option value="job-board">Job board</option></select></div>
<fieldset><legend>Core competencies (50418)</legend><label for="core-competencies-50418--cb-0"><input type="checkbox" id="core-competencies-50418--cb-0" name="core-competencies-50418-[]" value="python"> Python</label><label for="core-competencies-50418--cb-1"><input type="checkbox" id="core-competencies-50418--cb-1" name="core-competencies-50418-[]" value="sql"> SQL</label><label for="core-competencies-50418--cb-2"><input type="checkbox" id="core-competencies-50418--cb-2" name="core-competencies-50418-[]" value="typescript"> TypeScript</label><label for="core-competencies-50418--cb-3"><input type="checkbox" id="core-competencies-50418--cb-3" name="core-competencies-50418-[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50418">Attach resume (50418)</label><input type="file" id="file-50418" name="file-50418" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50418-50418">GitHub profile (50418)</label><input type="url" id="github-profile-50418-50418" name="github-profile-50418-50418" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
