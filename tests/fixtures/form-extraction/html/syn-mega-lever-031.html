<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Lever-style 9471</title></head>
<body>
<main><h1>Lever-style 9471</h1><form action="/apply" method="post">
<div class="application-form">
<div class="application-field"><label class="application-label">Applicant name (9471)</label><input name="lever-name-9471" type="text" id="lever-name-9471"></div>
<div class="application-field"><label class="application-label">Application email (9471)</label><input name="lever-email-9471" type="email" id="lever-email-9471"></div>
<div class="application-field"><label class="application-label">Mobile number (9471)</label><input name="lever-phone-9471" type="tel" id="lever-phone-9471"></div>
<div class="application-field"><label class="application-label">Motivation statement (9471)</label><textarea name="lever-cover-9471" id="lever-cover-9471" rows="4" maxlength="500"></textarea></div>
<div class="file-row"><label for="file-upload-9471">Attach resume (optional)</label><input type="file" id="file-upload-9471" name="file-upload-9471" accept=".pdf,.doc"></div>
<button type="button">Submit application</button>
</div></form></main>
</body>
</html>
