<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50189</title></head>
<body>
<main><h1>Long complex apply 50189</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50189">Preferred name (50189)</label>
<input type="text" id="long-name-50189" name="long-name-50189" autocomplete="name">
<label for="long-email-50189">Work email (50189)</label>
<input type="email" id="long-email-50189" name="long-email-50189" autocomplete="email">
<label for="long-phone-50189">Mobile number (50189)</label>
<input type="tel" id="long-phone-50189" name="long-phone-50189" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50189">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50189" name="linkedin-profile-url-50189" ></div>
<div class="field-row"><label for="current-employer-50189">Current employer</label><input type="text" id="current-employer-50189" name="current-employer-50189" ></div>
<div class="field-row"><label for="current-job-title-50189">Current job title</label><input type="text" id="current-job-title-50189" name="current-job-title-50189" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="why-this-role-50189-50189">Why this role? (50189)</label><textarea id="why-this-role-50189-50189" name="why-this-role-50189-50189" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="current-city-50189-50189">Current city (50189)</label><select id="current-city-50189-50189" name="current-city-50189-50189"><option value="">Choose one…</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Work authorization status (50189)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50189)</legend><label for="willing-to-relocate-5018-0"><input type="radio" id="willing-to-relocate-5018-0" name="willing-to-relocate-5018" value="yes"> Yes</label><label for="willing-to-relocate-5018-1"><input type="radio" id="willing-to-relocate-5018-1" name="willing-to-relocate-5018" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50189-50">Salary expectations (50189)</label><input type="number" id="salary-expectations-50189-50" name="salary-expectations-50189-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50189-501">When can you start? (50189)</label><input type="date" id="when-can-you-start-50189-501" name="when-can-you-start-50189-501" ></div>
<div class="field-row"><label for="application-source-50189-501">Application source (50189)</label><select id="application-source-50189-501" name="application-source-50189-501"><option value="">Choose one…</option><option value="conference">Conference</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Primary expertise (50189)</legend><label for="primary-expertise-50189--cb-0"><input type="checkbox" id="primary-expertise-50189--cb-0" name="primary-expertise-50189-[]" value="go"> Go</label><label for="primary-expertise-50189--cb-1"><input type="checkbox" id="primary-expertise-50189--cb-1" name="primary-expertise-50189-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50189--cb-2"><input type="checkbox" id="primary-expertise-50189--cb-2" name="primary-expertise-50189-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50189--cb-3"><input type="checkbox" id="primary-expertise-50189--cb-3" name="primary-expertise-50189-[]" value="sql"> SQL</label><label for="primary-expertise-50189--cb-4"><input type="checkbox" id="primary-expertise-50189--cb-4" name="primary-expertise-50189-[]" value="rust"> Rust</label><label for="primary-expertise-50189--cb-5"><input type="checkbox" id="primary-expertise-50189--cb-5" name="primary-expertise-50189-[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50189">Attach resume (50189)</label><input type="file" id="file-50189" name="file-50189" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
