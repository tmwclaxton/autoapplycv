<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50318</title></head>
<body>
<main><h1>Mixed complex apply 50318</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50318">Applicant name (50318)</label>
<input type="text" id="mix-name-50318" name="mix-name-50318" autocomplete="name">
<label for="mix-email-50318">Work email (50318)</label>
<input type="email" id="mix-email-50318" name="mix-email-50318" autocomplete="email">
<label for="mix-phone-50318">Phone number (50318)</label>
<input type="tel" id="mix-phone-50318" name="mix-phone-50318" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="motivation-statement-50318-5">Motivation statement (50318)</label><textarea id="motivation-statement-50318-5" name="motivation-statement-50318-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50318-50318">Current city (50318)</label><select id="current-city-50318-50318" name="current-city-50318-50318"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Work authorization status (50318)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50318)</legend><label for="open-to-relocation-50318-0"><input type="radio" id="open-to-relocation-50318-0" name="open-to-relocation-50318" value="yes"> Yes</label><label for="open-to-relocation-50318-1"><input type="radio" id="open-to-relocation-50318-1" name="open-to-relocation-50318" value="no"> No</label><label for="open-to-relocation-50318-2"><input type="radio" id="open-to-relocation-50318-2" name="open-to-relocation-50318" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50318-50318">Expected salary (50318)</label><input type="number" id="expected-salary-50318-50318" name="expected-salary-50318-50318" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50318-50318">Available from (50318)</label><input type="date" id="available-from-50318-50318" name="available-from-50318-50318" ></div>
<div class="field-row"><label for="application-source-50318-503">Application source (50318)</label><select id="application-source-50318-503" name="application-source-50318-503"><option value="">Choose one…</option><option value="conference">Conference</option><option value="other">Other</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option></select></div>
<fieldset><legend>Key skills (50318)</legend><label for="key-skills-50318-50318-cb-0"><input type="checkbox" id="key-skills-50318-50318-cb-0" name="key-skills-50318-50318[]" value="python"> Python</label><label for="key-skills-50318-50318-cb-1"><input type="checkbox" id="key-skills-50318-50318-cb-1" name="key-skills-50318-50318[]" value="sql"> SQL</label><label for="key-skills-50318-50318-cb-2"><input type="checkbox" id="key-skills-50318-50318-cb-2" name="key-skills-50318-50318[]" value="react"> React</label><label for="key-skills-50318-50318-cb-3"><input type="checkbox" id="key-skills-50318-50318-cb-3" name="key-skills-50318-50318[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50318">Attach resume (50318)</label><input type="file" id="file-50318" name="file-50318" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50318-50318">Portfolio URL (50318)</label><input type="url" id="portfolio-url-50318-50318" name="portfolio-url-50318-50318" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
