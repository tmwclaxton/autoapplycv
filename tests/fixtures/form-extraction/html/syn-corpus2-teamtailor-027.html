<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Teamtailor apply 20027</title></head>
<body>

<main class="careers-page"><h1 class="job-title">Apply — Role 20027</h1>
<form class="apply-form" action="/apply" method="post" data-teamtailor-form="application">
<section class="form-section" data-section="personal">

<div class="form-group"><label class="form-label" for="tt-name-20027">Applicant name (20027)</label>
</div><input class="form-control" type="text" id="tt-name-20027" name="tt-name-20027" autocomplete="name">
<div class="form-group"><label class="form-label" for="tt-email-20027">Contact email (20027)</label>
</div><input class="form-control" type="email" id="tt-email-20027" name="tt-email-20027" autocomplete="email">
<div class="form-group"><label class="form-label" for="tt-phone-20027">Phone number (20027)</label>
</div><input class="form-control" type="tel" id="tt-phone-20027" name="tt-phone-20027" autocomplete="tel">
</section>
<section class="form-section" data-section="questions">
<div class="field-row"><label for="cover-letter-20027-20027">Cover letter (20027)</label><textarea id="cover-letter-20027-20027" name="cover-letter-20027-20027" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-20027-2002">Office preference (20027)</label><select id="office-preference-20027-2002" name="office-preference-20027-2002"><option value="">Choose one…</option><option value="london">London</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (20027)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
</section>
<div class="file-row"><label for="file-20027">Attach resume (optional)</label><input type="file" id="file-20027" name="file-20027" accept=".pdf,.doc"></div>
<button type="submit" class="btn btn-primary">Submit application</button>
</form></main>
</body>
</html>
