<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50060</title></head>
<body>
<main><h1>Mixed complex apply 50060</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50060">Full name (50060)</label>
<input type="text" id="mix-name-50060" name="mix-name-50060" autocomplete="name">
<label for="mix-email-50060">Work email (50060)</label>
<input type="email" id="mix-email-50060" name="mix-email-50060" autocomplete="email">
<label for="mix-phone-50060">Contact number (50060)</label>
<input type="tel" id="mix-phone-50060" name="mix-phone-50060" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50060-50060">Cover letter (50060)</label><textarea id="cover-letter-50060-50060" name="cover-letter-50060-50060" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50060-50060">Current city (50060)</label><select id="current-city-50060-50060" name="current-city-50060-50060"><option value="">Choose one…</option><option value="london">London</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50060)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50060)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50060-50060">Expected salary (50060)</label><input type="number" id="expected-salary-50060-50060" name="expected-salary-50060-50060" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50060-">Start date preference (50060)</label><input type="date" id="start-date-preference-50060-" name="start-date-preference-50060-" ></div>
<div class="field-row"><label for="referral-source-50060-50060">Referral source (50060)</label><select id="referral-source-50060-50060" name="referral-source-50060-50060"><option value="">Choose one…</option><option value="conference">Conference</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="other">Other</option></select></div>
<fieldset><legend>Primary expertise (50060)</legend><label for="primary-expertise-50060--cb-0"><input type="checkbox" id="primary-expertise-50060--cb-0" name="primary-expertise-50060-[]" value="laravel"> Laravel</label><label for="primary-expertise-50060--cb-1"><input type="checkbox" id="primary-expertise-50060--cb-1" name="primary-expertise-50060-[]" value="rust"> Rust</label><label for="primary-expertise-50060--cb-2"><input type="checkbox" id="primary-expertise-50060--cb-2" name="primary-expertise-50060-[]" value="python"> Python</label><label for="primary-expertise-50060--cb-3"><input type="checkbox" id="primary-expertise-50060--cb-3" name="primary-expertise-50060-[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50060">Attach resume (50060)</label><input type="file" id="file-50060" name="file-50060" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50060-50060">Portfolio URL (50060)</label><input type="url" id="portfolio-url-50060-50060" name="portfolio-url-50060-50060" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
