<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Visible custom dropdown</title></head>
<body>
<main><h1>Visible custom dropdown</h1><form action="/apply" method="post">
<label for="ix-name-0">Full name</label>
<input type="text" id="ix-name-0" name="ix-name-0">
<label for="ix-email-0">Email address</label>
<input type="email" id="ix-email-0" name="ix-email-0">
<label for="ix-phone-0">Phone number</label>
<input type="tel" id="ix-phone-0" name="ix-phone-0">
<div class="field-row">
<span id="listbox-0-lbl">Preferred location</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-0" aria-labelledby="listbox-0-lbl" tabindex="0">Preferred location</div>
<div role="listbox" id="listbox-0" aria-labelledby="listbox-0-lbl">
<div role="option" data-value="london">London</div>
<div role="option" data-value="remote">Remote</div>
<div role="option" data-value="hybrid">Hybrid</div>
<div role="option" data-value="manchester">Manchester</div>
</div>
</div></form></main>
</body>
</html>
