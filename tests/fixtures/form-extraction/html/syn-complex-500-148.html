<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50148</title></head>
<body>
<main><h1>Mixed complex apply 50148</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50148">Preferred name (50148)</label>
<input type="text" id="mix-name-50148" name="mix-name-50148" autocomplete="name">
<label for="mix-email-50148">Email address (50148)</label>
<input type="email" id="mix-email-50148" name="mix-email-50148" autocomplete="email">
<label for="mix-phone-50148">Mobile number (50148)</label>
<input type="tel" id="mix-phone-50148" name="mix-phone-50148" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50148-50148">Cover letter (50148)</label><textarea id="cover-letter-50148-50148" name="cover-letter-50148-50148" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50148-50148">Current city (50148)</label><select id="current-city-50148-50148" name="current-city-50148-50148"><option value="">Choose one…</option><option value="remote">Remote</option><option value="london">London</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50148)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50148)</legend><label for="willing-to-relocate-5014-0"><input type="radio" id="willing-to-relocate-5014-0" name="willing-to-relocate-5014" value="yes"> Yes</label><label for="willing-to-relocate-5014-1"><input type="radio" id="willing-to-relocate-5014-1" name="willing-to-relocate-5014" value="no"> No</label><label for="willing-to-relocate-5014-2"><input type="radio" id="willing-to-relocate-5014-2" name="willing-to-relocate-5014" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-501">Compensation requirement (50148)</label><input type="number" id="compensation-requirement-501" name="compensation-requirement-501" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50148-">Start date preference (50148)</label><input type="date" id="start-date-preference-50148-" name="start-date-preference-50148-" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50148)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="linkedin">LinkedIn</option></select></div>
<fieldset><legend>Key skills (50148)</legend><label for="key-skills-50148-50148-cb-0"><input type="checkbox" id="key-skills-50148-50148-cb-0" name="key-skills-50148-50148[]" value="typescript"> TypeScript</label><label for="key-skills-50148-50148-cb-1"><input type="checkbox" id="key-skills-50148-50148-cb-1" name="key-skills-50148-50148[]" value="react"> React</label><label for="key-skills-50148-50148-cb-2"><input type="checkbox" id="key-skills-50148-50148-cb-2" name="key-skills-50148-50148[]" value="go"> Go</label><label for="key-skills-50148-50148-cb-3"><input type="checkbox" id="key-skills-50148-50148-cb-3" name="key-skills-50148-50148[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50148">Attach resume (50148)</label><input type="file" id="file-50148" name="file-50148" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50148-50148">Personal website (50148)</label><input type="url" id="personal-website-50148-50148" name="personal-website-50148-50148" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
