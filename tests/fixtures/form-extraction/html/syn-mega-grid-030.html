<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9930</title></head>
<body>
<main><h1>Grid layout 9930</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9930">Full name (9930)</label><span class="helper">Required</span><input id="grid-name-9930" name="grid-name-9930" type="text"></div>
<div><label for="grid-email-9930">Personal email (9930)</label><span class="helper">Required</span><input id="grid-email-9930" name="grid-email-9930" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9930">Phone number (9930)</label><input id="grid-phone-9930" name="grid-phone-9930" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="cover-letter-9930-9930">Cover letter (9930)</label><textarea id="cover-letter-9930-9930" name="cover-letter-9930-9930" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Open to relocation? (9930)</legend><label for="open-to-relocation-9930--0"><input type="radio" id="open-to-relocation-9930--0" name="open-to-relocation-9930-" value="yes"> Yes</label><label for="open-to-relocation-9930--1"><input type="radio" id="open-to-relocation-9930--1" name="open-to-relocation-9930-" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
