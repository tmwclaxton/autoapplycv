<!DOCTYPE html>
<html lang="en-GB">
<head><meta charset="utf-8"><title>Apply - Full Stack Engineer</title></head>
<body>
<div id="__next">
<nav class="navbar" data-qa="navBar"><a href="/">Reed.co.uk</a></nav>
<main><form data-qa="application-form" action="/jobs/apply/submit" method="post">
<h1 data-qa="application-step-title">Your details</h1>

<div class="form-group" data-qa="field-first-name-571000221">
<label for="first-name-571000221" data-qa="field-first-name-571000221-label">First name</label>
<input type="text" id="first-name-571000221" name="first-name-571000221" data-qa="field-first-name-571000221-input" required autocomplete="given-name">
</div>
<div class="form-group" data-qa="field-last-name-571000221">
<label for="last-name-571000221" data-qa="field-last-name-571000221-label">Last name</label>
<input type="text" id="last-name-571000221" name="last-name-571000221" data-qa="field-last-name-571000221-input" required autocomplete="family-name">
</div>
<div class="form-group" data-qa="field-email-address-571000221">
<label for="email-address-571000221" data-qa="field-email-address-571000221-label">Email address</label>
<input type="email" id="email-address-571000221" name="email-address-571000221" data-qa="field-email-address-571000221-input" required autocomplete="email">
</div>
<div class="form-group" data-qa="field-phone-number-571000221">
<label for="phone-number-571000221" data-qa="field-phone-number-571000221-label">Phone number</label>
<input type="tel" id="phone-number-571000221" name="phone-number-571000221" data-qa="field-phone-number-571000221-input" required autocomplete="tel">
</div>
<div class="form-group" data-qa="field-postcode-571000221">
<label for="postcode-571000221" data-qa="field-postcode-571000221-label">Postcode</label>
<input type="text" id="postcode-571000221" name="postcode-571000221" data-qa="field-postcode-571000221-input" autocomplete="postal-code">
</div>
<div class="form-group" data-qa="field-town-or-city-571000221">
<label for="town-or-city-571000221" data-qa="field-town-or-city-571000221-label">Town or city</label>
<input type="text" id="town-or-city-571000221" name="town-or-city-571000221" data-qa="field-town-or-city-571000221-input" autocomplete="address-level2">
</div>
<div class="form-group" data-qa="field-country-of-residence-571000221">
<label for="country-of-residence-571000221" data-qa="field-country-of-residence-571000221-label">Country of residence</label>
<select id="country-of-residence-571000221" name="country-of-residence-571000221" data-qa="field-country-of-residence-571000221-input">
<option value="">Please select</option><option value="united-kingdom">United Kingdom</option><option value="ireland">Ireland</option><option value="france">France</option><option value="germany">Germany</option><option value="other">Other</option>
</select>
</div>

<div data-qa="application-actions"><button type="button" data-qa="continue-button" class="btn btn-primary">Save and continue</button></div>
</form></main>
<footer data-qa="pageFooter"><p>Reed synthetic corpus fixture</p></footer>
</div>
</body>
</html>
