<!DOCTYPE html>
<html lang="en-GB">
<head><meta charset="utf-8"><title>Apply - Business Analyst</title></head>
<body>
<div id="app-root" data-genesis-element="BASE">
<header data-testid="header-container" data-genesis-element="BASE">
<a data-testid="logo" href="/">Totaljobs</a>
</header>
<main data-genesis-element="BASE"><form data-testid="application-form" data-at="application-form" data-genesis-element="FORM" action="/job/application" method="post">
<h1 data-testid="application-step-title" data-genesis-element="TEXT">Eligibility and compliance</h1>

<fieldset data-testid="fieldset-do-you-hold-a-valid-uk-work-" data-genesis-element="BASE">
<legend data-testid="application-step-subtitle">Do you hold a valid UK work permit?</legend>
<label for="do-you-hold-a-valid-uk-work--0"><input type="radio" id="do-you-hold-a-valid-uk-work--0" name="do-you-hold-a-valid-uk-work-" value="yes" data-testid="radio-do-you-hold-a-valid-uk-work--0"> Yes</label><label for="do-you-hold-a-valid-uk-work--1"><input type="radio" id="do-you-hold-a-valid-uk-work--1" name="do-you-hold-a-valid-uk-work-" value="no" data-testid="radio-do-you-hold-a-valid-uk-work--1"> No</label>
</fieldset>
<fieldset data-testid="fieldset-have-you-ever-worked-for-thi" data-genesis-element="BASE">
<legend data-testid="application-step-subtitle">Have you ever worked for this company before?</legend>
<label for="have-you-ever-worked-for-thi-0"><input type="radio" id="have-you-ever-worked-for-thi-0" name="have-you-ever-worked-for-thi" value="yes" data-testid="radio-have-you-ever-worked-for-thi-0"> Yes</label><label for="have-you-ever-worked-for-thi-1"><input type="radio" id="have-you-ever-worked-for-thi-1" name="have-you-ever-worked-for-thi" value="no" data-testid="radio-have-you-ever-worked-for-thi-1"> No</label>
</fieldset>
<fieldset data-testid="fieldset-are-you-subject-to-any-non-c" data-genesis-element="BASE">
<legend data-testid="application-step-subtitle">Are you subject to any non-compete agreements?</legend>
<label for="are-you-subject-to-any-non-c-0"><input type="radio" id="are-you-subject-to-any-non-c-0" name="are-you-subject-to-any-non-c" value="yes" data-testid="radio-are-you-subject-to-any-non-c-0"> Yes</label><label for="are-you-subject-to-any-non-c-1"><input type="radio" id="are-you-subject-to-any-non-c-1" name="are-you-subject-to-any-non-c" value="no" data-testid="radio-are-you-subject-to-any-non-c-1"> No</label><label for="are-you-subject-to-any-non-c-2"><input type="radio" id="are-you-subject-to-any-non-c-2" name="are-you-subject-to-any-non-c" value="not-applicable" data-testid="radio-are-you-subject-to-any-non-c-2"> Not applicable</label>
</fieldset>
<div class="res-field" data-genesis-element="BASE" data-testid="field-if-you-answered-yes-to-non-compe">
<label for="if-you-answered-yes-to-non-compe">If you answered yes to non-compete, please explain</label>
<textarea id="if-you-answered-yes-to-non-compe" name="if-you-answered-yes-to-non-compe" rows="3" data-testid="field-if-you-answered-yes-to-non-compe-input" maxlength="400"></textarea>
</div>
<div class="res-field" data-genesis-element="BASE" data-testid="field-security-clearance-level-if-any-">
<label for="security-clearance-level-if-any-" data-testid="field-security-clearance-level-if-any--label">Security clearance level (if any)</label>
<input type="text" id="security-clearance-level-if-any-" name="security-clearance-level-if-any-" data-testid="field-security-clearance-level-if-any--input" >
</div>
<div class="res-field" data-genesis-element="BASE" data-testid="field-preferred-start-date-month-60237">
<label for="preferred-start-date-month-60237">Preferred start date month</label>
<select id="preferred-start-date-month-60237" name="preferred-start-date-month-60237" data-testid="field-preferred-start-date-month-60237-input">
<option value="">Please select</option><option value="january">January</option><option value="february">February</option><option value="march">March</option><option value="april">April</option><option value="may">May</option><option value="june">June</option><option value="july">July</option><option value="august">August</option><option value="september">September</option><option value="october">October</option><option value="november">November</option><option value="december">December</option>
</select>
</div>
<div class="res-field" data-genesis-element="BASE" data-testid="field-earliest-start-date-60237">
<label for="earliest-start-date-60237" data-testid="field-earliest-start-date-60237-label">Earliest start date</label>
<input type="date" id="earliest-start-date-60237" name="earliest-start-date-60237" data-testid="field-earliest-start-date-60237-input" >
</div>

<div data-at="application-actions"><button type="button" data-testid="continue-button" data-genesis-element="BUTTON">Save and continue</button></div>
</form></main>
<footer data-genesis-element="PAGE_FOOTER"><p>Totaljobs synthetic corpus fixture</p></footer>
</div>
</body>
</html>
