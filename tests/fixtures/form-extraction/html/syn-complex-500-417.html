<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50417</title></head>
<body>
<main><h1>Conditional complex apply 50417</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50417">
<p id="step1-label-50417">Step 1 - Contact</p>

<label for="cond-name-50417">Legal name (50417)</label>
<input type="text" id="cond-name-50417" name="cond-name-50417" autocomplete="name">
<label for="cond-email-50417">Work email (50417)</label>
<input type="email" id="cond-email-50417" name="cond-email-50417" autocomplete="email">
<label for="cond-phone-50417">Telephone (50417)</label>
<input type="tel" id="cond-phone-50417" name="cond-phone-50417" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50417">
<p id="step2-label-50417">Step 2 - Preferences</p>
<div class="field-row"><label for="current-city-50417-50417">Current city (50417)</label><select id="current-city-50417-50417" name="current-city-50417-50417"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="london">London</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Open to relocation? (50417)</legend><label for="open-to-relocation-50417-0"><input type="radio" id="open-to-relocation-50417-0" name="open-to-relocation-50417" value="yes"> Yes</label><label for="open-to-relocation-50417-1"><input type="radio" id="open-to-relocation-50417-1" name="open-to-relocation-50417" value="no"> No</label><label for="open-to-relocation-50417-2"><input type="radio" id="open-to-relocation-50417-2" name="open-to-relocation-50417" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="when-can-you-start-50417-504">When can you start? (50417)</label><input type="date" id="when-can-you-start-50417-504" name="when-can-you-start-50417-504" ></div>
<fieldset><legend>Core competencies (50417)</legend><label for="core-competencies-50417--cb-0"><input type="checkbox" id="core-competencies-50417--cb-0" name="core-competencies-50417-[]" value="javascript"> JavaScript</label><label for="core-competencies-50417--cb-1"><input type="checkbox" id="core-competencies-50417--cb-1" name="core-competencies-50417-[]" value="sql"> SQL</label><label for="core-competencies-50417--cb-2"><input type="checkbox" id="core-competencies-50417--cb-2" name="core-competencies-50417-[]" value="laravel"> Laravel</label><label for="core-competencies-50417--cb-3"><input type="checkbox" id="core-competencies-50417--cb-3" name="core-competencies-50417-[]" value="react"> React</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50417">
<p id="step3-label-50417">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50417" data-reveal="#reveal-50417">Show follow-up questions</button>
<div id="reveal-50417" hidden style="display:none"><div class="field-row"><label for="tell-us-about-yourself-50417">Tell us about yourself (50417)</label><textarea id="tell-us-about-yourself-50417" name="tell-us-about-yourself-50417" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="work-samples-link-50417-5041">Work samples link (50417)</label><input type="url" id="work-samples-link-50417-5041" name="work-samples-link-50417-5041" ></div>
<div class="field-row"><label for="desired-base-salary-50417-50">Desired base salary (50417)</label><input type="number" id="desired-base-salary-50417-50" name="desired-base-salary-50417-50" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50417">Attach resume (50417)</label><input type="file" id="file-50417" name="file-50417" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
