<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday complex apply 50345</title></head>
<body>
<main><h1>Workday complex apply 50345</h1><form action="/apply" method="post">

<div class="file-row"><label for="file-50345">Attach resume (50345)</label><input type="file" id="file-50345" name="file-50345" accept=".pdf,.doc,.docx"></div>
</section>

</div></form></main>
