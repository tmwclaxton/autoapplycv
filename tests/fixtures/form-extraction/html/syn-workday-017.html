<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday Application 12</title></head>
<body>
<main>
<h1>Workday Application 12</h1>
<form action="/apply" method="post">
<div data-testid="input-q_legal-name" class="ia-Questions-item">
<div data-testid="input-q_legal-name-label"><span data-testid="safe-markup">Legal name</span></div>
<input data-testid="input-q_legal-name-input" type="text" name="input-q_legal-name">
</div>
<div data-testid="input-q_email" class="ia-Questions-item">
<div data-testid="input-q_email-label"><span data-testid="safe-markup">Email</span></div>
<input data-testid="input-q_email-input" type="email" name="input-q_email">
</div>
<div data-testid="input-q_motivation-state" class="ia-Questions-item">
<div data-testid="input-q_motivation-state-label"><span data-testid="safe-markup">Motivation statement</span></div>
<textarea data-testid="input-q_motivation-state-input" name="input-q_motivation-state" rows="4" maxlength="500"></textarea>
</div>
<div data-testid="input-q_years-in-this-fi" class="ia-Questions-item">
<div data-testid="input-q_years-in-this-fi-label"><span data-testid="safe-markup">Years in this field</span></div>
<input data-testid="input-q_years-in-this-fi-input" type="number" name="input-q_years-in-this-fi">
</div>
<button type="button">Save and continue</button>

</form>
</main>
</body>
</html>
