<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50266</title></head>
<body>
<main><h1>Wizard complex apply 50266</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50266">
<h2 id="wizard-contact-50266">Contact information</h2>

<label for="wiz-name-50266">Applicant name (50266)</label>
<input type="text" id="wiz-name-50266" name="wiz-name-50266" autocomplete="name">
<label for="wiz-email-50266">Email address (50266)</label>
<input type="email" id="wiz-email-50266" name="wiz-email-50266" autocomplete="email">
<label for="wiz-phone-50266">Telephone (50266)</label>
<input type="tel" id="wiz-phone-50266" name="wiz-phone-50266" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50266">
<h2 id="wizard-screen-50266">Screening questions</h2>
<div class="field-row"><label for="personal-statement-50266-502">Personal statement (50266)</label><textarea id="personal-statement-50266-502" name="personal-statement-50266-502" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="work-location-50266-50266">Work location (50266)</label><select id="work-location-50266-50266" name="work-location-50266-50266"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50266)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-502">Compensation requirement (50266)</label><input type="number" id="compensation-requirement-502" name="compensation-requirement-502" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50266-50266">Available from (50266)</label><input type="date" id="available-from-50266-50266" name="available-from-50266-50266" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50266">
<h2 id="wizard-docs-50266">Documents and skills</h2>
<fieldset><legend>Key skills (50266)</legend><label for="key-skills-50266-50266-cb-0"><input type="checkbox" id="key-skills-50266-50266-cb-0" name="key-skills-50266-50266[]" value="go"> Go</label><label for="key-skills-50266-50266-cb-1"><input type="checkbox" id="key-skills-50266-50266-cb-1" name="key-skills-50266-50266[]" value="rust"> Rust</label><label for="key-skills-50266-50266-cb-2"><input type="checkbox" id="key-skills-50266-50266-cb-2" name="key-skills-50266-50266[]" value="laravel"> Laravel</label><label for="key-skills-50266-50266-cb-3"><input type="checkbox" id="key-skills-50266-50266-cb-3" name="key-skills-50266-50266[]" value="sql"> SQL</label><label for="key-skills-50266-50266-cb-4"><input type="checkbox" id="key-skills-50266-50266-cb-4" name="key-skills-50266-50266[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50266">Attach resume (50266)</label><input type="file" id="file-50266" name="file-50266" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="application-source-50266-502">Application source (50266)</label><select id="application-source-50266-502" name="application-source-50266-502"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="referral">Referral</option><option value="conference">Conference</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
