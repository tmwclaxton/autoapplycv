<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9220</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9220</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Preferred name (9220)</mat-label><label for="ang-name-9220">Preferred name (9220)</label><input matInput id="ang-name-9220" name="ang-name-9220" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Personal email (9220)</mat-label><label for="ang-email-9220">Personal email (9220)</label><input matInput id="ang-email-9220" name="ang-email-9220" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Direct line (9220)</mat-label><label for="ang-phone-9220">Direct line (9220)</label><input matInput id="ang-phone-9220" name="ang-phone-9220" type="tel"></mat-form-field>
<div class="field-row"><label for="cover-letter-9220-9220">Cover letter (9220)</label><textarea id="cover-letter-9220-9220" name="cover-letter-9220-9220" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-9220-9220">Current city (9220)</label><select id="current-city-9220-9220" name="current-city-9220-9220"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
