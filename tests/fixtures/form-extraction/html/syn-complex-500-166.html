<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50166</title></head>
<body>
<main><h1>Wizard complex apply 50166</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50166">
<h2 id="wizard-contact-50166">Contact information</h2>

<label for="wiz-name-50166">Your name (50166)</label>
<input type="text" id="wiz-name-50166" name="wiz-name-50166" autocomplete="name">
<label for="wiz-email-50166">Personal email (50166)</label>
<input type="email" id="wiz-email-50166" name="wiz-email-50166" autocomplete="email">
<label for="wiz-phone-50166">Mobile number (50166)</label>
<input type="tel" id="wiz-phone-50166" name="wiz-phone-50166" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50166">
<h2 id="wizard-screen-50166">Screening questions</h2>
<div class="field-row"><label for="tell-us-about-yourself-50166">Tell us about yourself (50166)</label><textarea id="tell-us-about-yourself-50166" name="tell-us-about-yourself-50166" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="office-preference-50166-5016">Office preference (50166)</label><select id="office-preference-50166-5016" name="office-preference-50166-5016"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Work authorization status (50166)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-501">Compensation requirement (50166)</label><input type="number" id="compensation-requirement-501" name="compensation-requirement-501" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50166-50">Earliest start date (50166)</label><input type="date" id="earliest-start-date-50166-50" name="earliest-start-date-50166-50" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50166">
<h2 id="wizard-docs-50166">Documents and skills</h2>
<fieldset><legend>Core competencies (50166)</legend><label for="core-competencies-50166--cb-0"><input type="checkbox" id="core-competencies-50166--cb-0" name="core-competencies-50166-[]" value="sql"> SQL</label><label for="core-competencies-50166--cb-1"><input type="checkbox" id="core-competencies-50166--cb-1" name="core-competencies-50166-[]" value="laravel"> Laravel</label><label for="core-competencies-50166--cb-2"><input type="checkbox" id="core-competencies-50166--cb-2" name="core-competencies-50166-[]" value="go"> Go</label><label for="core-competencies-50166--cb-3"><input type="checkbox" id="core-competencies-50166--cb-3" name="core-competencies-50166-[]" value="python"> Python</label><label for="core-competencies-50166--cb-4"><input type="checkbox" id="core-competencies-50166--cb-4" name="core-competencies-50166-[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50166">Attach resume (50166)</label><input type="file" id="file-50166" name="file-50166" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="referral-source-50166-50166">Referral source (50166)</label><select id="referral-source-50166-50166" name="referral-source-50166-50166"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="referral">Referral</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
