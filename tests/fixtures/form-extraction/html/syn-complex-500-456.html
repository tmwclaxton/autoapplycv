<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50456</title></head>
<body>
<main><h1>Wizard complex apply 50456</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50456">
<h2 id="wizard-contact-50456">Contact information</h2>

<input type="text" id="wiz-name-50456" name="wiz-name-50456" autocomplete="name">
<label for="wiz-email-50456">Work email (50456)</label>
<input type="email" id="wiz-email-50456" name="wiz-email-50456" autocomplete="email">

<input type="tel" id="wiz-phone-50456" name="wiz-phone-50456" autocomplete="tel">

<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50456">

<fieldset><legend>Do you require visa sponsorship? (50456)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50456-50">Desired base salary (50456)</label><input type="number" id="desired-base-salary-50456-50" name="desired-base-salary-50456-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50456-">Start date preference (50456)</label><input type="date" id="start-date-preference-50456-" name="start-date-preference-50456-" ></div>

<h2 id="wizard-docs-50456">Documents and skills</h2>

<div class="file-row"><label for="file-50456">Attach resume (50456)</label><input type="file" id="file-50456" name="file-50456" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="referral-source-50456-50456">Referral source (50456)</label><select id="referral-source-50456-50456" name="referral-source-50456-50456"><option value="">Choose one…</option><option value="other">Other</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
