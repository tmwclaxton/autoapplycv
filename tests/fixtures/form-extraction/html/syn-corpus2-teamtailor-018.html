<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Teamtailor apply 20018</title></head>
<body>

<main class="careers-page"><h1 class="job-title">Apply — Role 20018</h1>
<form class="apply-form" action="/apply" method="post" data-teamtailor-form="application">
<section class="form-section" data-section="personal">

<div class="form-group"><label class="form-label" for="tt-name-20018">Legal name (20018)</label>
</div><input class="form-control" type="text" id="tt-name-20018" name="tt-name-20018" autocomplete="name">
<div class="form-group"><label class="form-label" for="tt-email-20018">Email address (20018)</label>
</div><input class="form-control" type="email" id="tt-email-20018" name="tt-email-20018" autocomplete="email">
<div class="form-group"><label class="form-label" for="tt-phone-20018">Phone number (20018)</label>
</div><input class="form-control" type="tel" id="tt-phone-20018" name="tt-phone-20018" autocomplete="tel">
</section>
<section class="form-section" data-section="questions">
<div class="field-row"><label for="cover-letter-20018-20018">Cover letter (20018)</label><textarea id="cover-letter-20018-20018" name="cover-letter-20018-20018" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-20018-20018">Work location (20018)</label><select id="work-location-20018-20018" name="work-location-20018-20018"><option value="">Choose one…</option><option value="remote">Remote</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (20018)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
</section>
<div class="file-row"><label for="file-20018">Attach resume (optional)</label><input type="file" id="file-20018" name="file-20018" accept=".pdf,.doc"></div>
<button type="submit" class="btn btn-primary">Submit application</button>
</form></main>
</body>
</html>
