<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50008</title></head>
<body>
<main><h1>Mixed complex apply 50008</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50008">Legal name (50008)</label>
<input type="text" id="mix-name-50008" name="mix-name-50008" autocomplete="name">
<label for="mix-email-50008">Work email (50008)</label>
<input type="email" id="mix-email-50008" name="mix-email-50008" autocomplete="email">
<label for="mix-phone-50008">Contact number (50008)</label>
<input type="tel" id="mix-phone-50008" name="mix-phone-50008" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="why-this-role-50008-50008">Why this role? (50008)</label><textarea id="why-this-role-50008-50008" name="why-this-role-50008-50008" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50008-500">Preferred location (50008)</label><select id="preferred-location-50008-500" name="preferred-location-50008-500"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="london">London</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50008)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50008)</legend><label for="open-to-relocation-50008-0"><input type="radio" id="open-to-relocation-50008-0" name="open-to-relocation-50008" value="yes"> Yes</label><label for="open-to-relocation-50008-1"><input type="radio" id="open-to-relocation-50008-1" name="open-to-relocation-50008" value="no"> No</label><label for="open-to-relocation-50008-2"><input type="radio" id="open-to-relocation-50008-2" name="open-to-relocation-50008" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50008-50">Desired base salary (50008)</label><input type="number" id="desired-base-salary-50008-50" name="desired-base-salary-50008-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50008-50">Earliest start date (50008)</label><input type="date" id="earliest-start-date-50008-50" name="earliest-start-date-50008-50" ></div>
<div class="field-row"><label for="application-source-50008-500">Application source (50008)</label><select id="application-source-50008-500" name="application-source-50008-500"><option value="">Choose one…</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="referral">Referral</option><option value="other">Other</option></select></div>
<fieldset><legend>Technical skills (50008)</legend><label for="technical-skills-50008-5-cb-0"><input type="checkbox" id="technical-skills-50008-5-cb-0" name="technical-skills-50008-5[]" value="sql"> SQL</label><label for="technical-skills-50008-5-cb-1"><input type="checkbox" id="technical-skills-50008-5-cb-1" name="technical-skills-50008-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50008-5-cb-2"><input type="checkbox" id="technical-skills-50008-5-cb-2" name="technical-skills-50008-5[]" value="python"> Python</label><label for="technical-skills-50008-5-cb-3"><input type="checkbox" id="technical-skills-50008-5-cb-3" name="technical-skills-50008-5[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50008">Attach resume (50008)</label><input type="file" id="file-50008" name="file-50008" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50008-50008">Portfolio URL (50008)</label><input type="url" id="portfolio-url-50008-50008" name="portfolio-url-50008-50008" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
