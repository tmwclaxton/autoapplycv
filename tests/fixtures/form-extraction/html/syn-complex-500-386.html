<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50386</title></head>
<body>
<main><h1>Wizard complex apply 50386</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50386">
<h2 id="wizard-contact-50386">Contact information</h2>

<label for="wiz-name-50386">Applicant name (50386)</label>
<input type="text" id="wiz-name-50386" name="wiz-name-50386" autocomplete="name">
<label for="wiz-email-50386">Contact email (50386)</label>
<input type="email" id="wiz-email-50386" name="wiz-email-50386" autocomplete="email">
<label for="wiz-phone-50386">Phone number (50386)</label>
<input type="tel" id="wiz-phone-50386" name="wiz-phone-50386" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50386">
<h2 id="wizard-screen-50386">Screening questions</h2>
<div class="field-row"><label for="personal-statement-50386-503">Personal statement (50386)</label><textarea id="personal-statement-50386-503" name="personal-statement-50386-503" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="work-location-50386-50386">Work location (50386)</label><select id="work-location-50386-50386" name="work-location-50386-50386"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="london">London</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50386)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50386-50">Desired base salary (50386)</label><input type="number" id="desired-base-salary-50386-50" name="desired-base-salary-50386-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50386-">Start date preference (50386)</label><input type="date" id="start-date-preference-50386-" name="start-date-preference-50386-" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50386">
<h2 id="wizard-docs-50386">Documents and skills</h2>
<fieldset><legend>Core competencies (50386)</legend><label for="core-competencies-50386--cb-0"><input type="checkbox" id="core-competencies-50386--cb-0" name="core-competencies-50386-[]" value="react"> React</label><label for="core-competencies-50386--cb-1"><input type="checkbox" id="core-competencies-50386--cb-1" name="core-competencies-50386-[]" value="rust"> Rust</label><label for="core-competencies-50386--cb-2"><input type="checkbox" id="core-competencies-50386--cb-2" name="core-competencies-50386-[]" value="sql"> SQL</label><label for="core-competencies-50386--cb-3"><input type="checkbox" id="core-competencies-50386--cb-3" name="core-competencies-50386-[]" value="laravel"> Laravel</label><label for="core-competencies-50386--cb-4"><input type="checkbox" id="core-competencies-50386--cb-4" name="core-competencies-50386-[]" value="go"> Go</label></fieldset>
<div class="file-row"><label for="file-50386">Attach resume (50386)</label><input type="file" id="file-50386" name="file-50386" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="referral-source-50386-50386">Referral source (50386)</label><select id="referral-source-50386-50386" name="referral-source-50386-50386"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
