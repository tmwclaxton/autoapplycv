<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50179</title></head>
<body>
<main><h1>Long complex apply 50179</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50179">Full name (50179)</label>
<input type="text" id="long-name-50179" name="long-name-50179" autocomplete="name">
<label for="long-email-50179">Contact email (50179)</label>
<input type="email" id="long-email-50179" name="long-email-50179" autocomplete="email">
<label for="long-phone-50179">Mobile number (50179)</label>
<input type="tel" id="long-phone-50179" name="long-phone-50179" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50179">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50179" name="linkedin-profile-url-50179" ></div>
<div class="field-row"><label for="current-employer-50179">Current employer</label><input type="text" id="current-employer-50179" name="current-employer-50179" ></div>
<div class="field-row"><label for="current-job-title-50179">Current job title</label><input type="text" id="current-job-title-50179" name="current-job-title-50179" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="cover-letter-50179-50179">Cover letter (50179)</label><textarea id="cover-letter-50179-50179" name="cover-letter-50179-50179" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="preferred-location-50179-501">Preferred location (50179)</label><select id="preferred-location-50179-501" name="preferred-location-50179-501"><option value="">Choose one…</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Work authorization status (50179)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50179)</legend><label for="willing-to-relocate-5017-0"><input type="radio" id="willing-to-relocate-5017-0" name="willing-to-relocate-5017" value="yes"> Yes</label><label for="willing-to-relocate-5017-1"><input type="radio" id="willing-to-relocate-5017-1" name="willing-to-relocate-5017" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50179-50179">Expected salary (50179)</label><input type="number" id="expected-salary-50179-50179" name="expected-salary-50179-50179" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50179-50">Earliest start date (50179)</label><input type="date" id="earliest-start-date-50179-50" name="earliest-start-date-50179-50" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50179)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="other">Other</option><option value="conference">Conference</option><option value="company-site">Company site</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Core competencies (50179)</legend><label for="core-competencies-50179--cb-0"><input type="checkbox" id="core-competencies-50179--cb-0" name="core-competencies-50179-[]" value="react"> React</label><label for="core-competencies-50179--cb-1"><input type="checkbox" id="core-competencies-50179--cb-1" name="core-competencies-50179-[]" value="javascript"> JavaScript</label><label for="core-competencies-50179--cb-2"><input type="checkbox" id="core-competencies-50179--cb-2" name="core-competencies-50179-[]" value="go"> Go</label><label for="core-competencies-50179--cb-3"><input type="checkbox" id="core-competencies-50179--cb-3" name="core-competencies-50179-[]" value="sql"> SQL</label><label for="core-competencies-50179--cb-4"><input type="checkbox" id="core-competencies-50179--cb-4" name="core-competencies-50179-[]" value="typescript"> TypeScript</label><label for="core-competencies-50179--cb-5"><input type="checkbox" id="core-competencies-50179--cb-5" name="core-competencies-50179-[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50179">Attach resume (50179)</label><input type="file" id="file-50179" name="file-50179" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
