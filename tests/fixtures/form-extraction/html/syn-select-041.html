<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Select Application 2</title></head>
<body>
<main>
<h1>Select Application 2</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="legal-name">Legal name</label><input type="text" id="legal-name" name="legal-name" ></div>
<div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" ></div>
<div class="form-group"><label for="country-of-residence">Country of residence</label><select id="country-of-residence" name="country-of-residence"><option value="">Select…</option><option value="united-kingdom">United Kingdom</option><option value="ireland">Ireland</option><option value="united-states">United States</option><option value="germany">Germany</option><option value="france">France</option></select></div>
<div class="form-group"><label for="referral-source">Referral source</label><select id="referral-source" name="referral-source"><option value="">Select…</option><option value="linkedin">LinkedIn</option><option value="company-website">Company website</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="other">Other</option></select></div>

</form>
</main>
</body>
</html>
