<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday Application 6</title></head>
<body>
<main>
<h1>Workday Application 6</h1>
<form action="/apply" method="post">
<div data-testid="input-q_full-name" class="ia-Questions-item">
<div data-testid="input-q_full-name-label"><span data-testid="safe-markup">Full name</span></div>
<input data-testid="input-q_full-name-input" type="text" name="input-q_full-name">
</div>
<div data-testid="input-q_email-address" class="ia-Questions-item">
<div data-testid="input-q_email-address-label"><span data-testid="safe-markup">Email address</span></div>
<input data-testid="input-q_email-address-input" type="email" name="input-q_email-address">
</div>
<div data-testid="input-q_why-do-you-want-" class="ia-Questions-item">
<div data-testid="input-q_why-do-you-want--label"><span data-testid="safe-markup">Why do you want this role?</span></div>
<textarea data-testid="input-q_why-do-you-want--input" name="input-q_why-do-you-want-" rows="4" maxlength="500"></textarea>
</div>
<div data-testid="input-q_years-in-this-fi" class="ia-Questions-item">
<div data-testid="input-q_years-in-this-fi-label"><span data-testid="safe-markup">Years in this field</span></div>
<input data-testid="input-q_years-in-this-fi-input" type="number" name="input-q_years-in-this-fi">
</div>
<button type="button">Save and continue</button>

</form>
</main>
</body>
</html>
