<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50449</title></head>
<body>
<main><h1>Long complex apply 50449</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50449">Preferred name (50449)</label>
<input type="text" id="long-name-50449" name="long-name-50449" autocomplete="name">
<label for="long-email-50449">Contact email (50449)</label>
<input type="email" id="long-email-50449" name="long-email-50449" autocomplete="email">
<label for="long-phone-50449">Contact number (50449)</label>
<input type="tel" id="long-phone-50449" name="long-phone-50449" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50449">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50449" name="linkedin-profile-url-50449" ></div>
<div class="field-row"><label for="current-employer-50449">Current employer</label><input type="text" id="current-employer-50449" name="current-employer-50449" ></div>
<div class="field-row"><label for="current-job-title-50449">Current job title</label><input type="text" id="current-job-title-50449" name="current-job-title-50449" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="why-this-role-50449-50449">Why this role? (50449)</label><textarea id="why-this-role-50449-50449" name="why-this-role-50449-50449" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="preferred-location-50449-504">Preferred location (50449)</label><select id="preferred-location-50449-504" name="preferred-location-50449-504"><option value="">Choose one…</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50449)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50449)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50449-50449">Expected salary (50449)</label><input type="number" id="expected-salary-50449-50449" name="expected-salary-50449-50449" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50449-50">Earliest start date (50449)</label><input type="date" id="earliest-start-date-50449-50" name="earliest-start-date-50449-50" ></div>
<div class="field-row"><label for="referral-source-50449-50449">Referral source (50449)</label><select id="referral-source-50449-50449" name="referral-source-50449-50449"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="other">Other</option><option value="conference">Conference</option><option value="company-site">Company site</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Key skills (50449)</legend><label for="key-skills-50449-50449-cb-0"><input type="checkbox" id="key-skills-50449-50449-cb-0" name="key-skills-50449-50449[]" value="go"> Go</label><label for="key-skills-50449-50449-cb-1"><input type="checkbox" id="key-skills-50449-50449-cb-1" name="key-skills-50449-50449[]" value="rust"> Rust</label><label for="key-skills-50449-50449-cb-2"><input type="checkbox" id="key-skills-50449-50449-cb-2" name="key-skills-50449-50449[]" value="laravel"> Laravel</label><label for="key-skills-50449-50449-cb-3"><input type="checkbox" id="key-skills-50449-50449-cb-3" name="key-skills-50449-50449[]" value="python"> Python</label><label for="key-skills-50449-50449-cb-4"><input type="checkbox" id="key-skills-50449-50449-cb-4" name="key-skills-50449-50449[]" value="javascript"> JavaScript</label><label for="key-skills-50449-50449-cb-5"><input type="checkbox" id="key-skills-50449-50449-cb-5" name="key-skills-50449-50449[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50449">Attach resume (50449)</label><input type="file" id="file-50449" name="file-50449" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
