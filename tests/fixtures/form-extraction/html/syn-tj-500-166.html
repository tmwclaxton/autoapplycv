<head><meta charset="utf-8"><title>Apply - Cloud Architect</title></head>

<div class="res-field" data-genesis-element="BASE" data-testid="field-first-name-60166">

<input type="text" id="first-name-60166" name="first-name-60166" data-testid="field-first-name-60166-input" required>
</div>
<div class="res-field" data-genesis-element="BASE" data-testid="field-last-name-60166">
<label for="last-name-60166" data-testid="field-last-name-60166-label">Last name</label>
<input type="text" id="last-name-60166" name="last-name-60166" data-testid="field-last-name-60166-input" required>

<div class="res-field" data-genesis-element="BASE" data-testid="field-email-60166">

<div class="res-field" data-genesis-element="BASE" data-testid="field-phone-60166">

<option value="">Please select</option><option value="employed">Employed</option><option value="self-employed">Self-employed</option><option value="unemployed">Unemployed</option><option value="student">Student</option>
</select>
