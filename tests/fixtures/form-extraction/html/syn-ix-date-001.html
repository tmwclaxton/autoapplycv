<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Date picker popover</title></head>
<body>
<main><h1>Date picker popover</h1><form action="/apply" method="post">
<label for="ix-name-10">Applicant name</label>
<input type="text" id="ix-name-10" name="ix-name-10">
<label for="ix-email-10">Contact email</label>
<input type="email" id="ix-email-10" name="ix-email-10">
<label for="ix-phone-10">Contact number</label>
<input type="tel" id="ix-phone-10" name="ix-phone-10">
<label for="date-trigger-10">Start date preference</label>
<button type="button" id="date-trigger-10" aria-haspopup="dialog" aria-controls="date-panel-10" data-reveal="#date-panel-10">Choose date</button>
<div id="date-panel-10" role="dialog" hidden style="display:none" aria-label="Start date preference">
<label for="date-input-10">Start date preference</label>
<input type="date" id="date-input-10" name="date-input-10">
</div></form></main>
</body>
</html>
