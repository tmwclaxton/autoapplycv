<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50320</title></head>
<body>
<main><h1>Mixed complex apply 50320</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50320">Your name (50320)</label>
<input type="text" id="mix-name-50320" name="mix-name-50320" autocomplete="name">
<label for="mix-email-50320">Work email (50320)</label>
<input type="email" id="mix-email-50320" name="mix-email-50320" autocomplete="email">
<label for="mix-phone-50320">Contact number (50320)</label>
<input type="tel" id="mix-phone-50320" name="mix-phone-50320" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="personal-statement-50320-503">Personal statement (50320)</label><textarea id="personal-statement-50320-503" name="personal-statement-50320-503" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50320-50320">Current city (50320)</label><select id="current-city-50320-50320" name="current-city-50320-50320"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option><option value="manchester">Manchester</option><option value="london">London</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50320)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50320)</legend><label for="willing-to-relocate-5032-0"><input type="radio" id="willing-to-relocate-5032-0" name="willing-to-relocate-5032" value="yes"> Yes</label><label for="willing-to-relocate-5032-1"><input type="radio" id="willing-to-relocate-5032-1" name="willing-to-relocate-5032" value="no"> No</label><label for="willing-to-relocate-5032-2"><input type="radio" id="willing-to-relocate-5032-2" name="willing-to-relocate-5032" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-503">Compensation requirement (50320)</label><input type="number" id="compensation-requirement-503" name="compensation-requirement-503" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50320-50">Earliest start date (50320)</label><input type="date" id="earliest-start-date-50320-50" name="earliest-start-date-50320-50" ></div>
<div class="field-row"><label for="referral-source-50320-50320">Referral source (50320)</label><select id="referral-source-50320-50320" name="referral-source-50320-50320"><option value="">Choose one…</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="other">Other</option><option value="job-board">Job board</option></select></div>
<fieldset><legend>Technical skills (50320)</legend><label for="technical-skills-50320-5-cb-0"><input type="checkbox" id="technical-skills-50320-5-cb-0" name="technical-skills-50320-5[]" value="rust"> Rust</label><label for="technical-skills-50320-5-cb-1"><input type="checkbox" id="technical-skills-50320-5-cb-1" name="technical-skills-50320-5[]" value="sql"> SQL</label><label for="technical-skills-50320-5-cb-2"><input type="checkbox" id="technical-skills-50320-5-cb-2" name="technical-skills-50320-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50320-5-cb-3"><input type="checkbox" id="technical-skills-50320-5-cb-3" name="technical-skills-50320-5[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50320">Attach resume (50320)</label><input type="file" id="file-50320" name="file-50320" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50320-5032">Work samples link (50320)</label><input type="url" id="work-samples-link-50320-5032" name="work-samples-link-50320-5032" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
