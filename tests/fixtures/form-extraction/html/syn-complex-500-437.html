<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50437</title></head>
<body>
<main><h1>Conditional complex apply 50437</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50437">
<p id="step1-label-50437">Step 1 - Contact</p>

<label for="cond-name-50437">Legal name (50437)</label>
<input type="text" id="cond-name-50437" name="cond-name-50437" autocomplete="name">
<label for="cond-email-50437">Contact email (50437)</label>
<input type="email" id="cond-email-50437" name="cond-email-50437" autocomplete="email">
<label for="cond-phone-50437">Contact number (50437)</label>
<input type="tel" id="cond-phone-50437" name="cond-phone-50437" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50437">
<p id="step2-label-50437">Step 2 - Preferences</p>
<div class="field-row"><label for="office-preference-50437-5043">Office preference (50437)</label><select id="office-preference-50437-5043" name="office-preference-50437-5043"><option value="">Choose one…</option><option value="london">London</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Open to relocation? (50437)</legend><label for="open-to-relocation-50437-0"><input type="radio" id="open-to-relocation-50437-0" name="open-to-relocation-50437" value="yes"> Yes</label><label for="open-to-relocation-50437-1"><input type="radio" id="open-to-relocation-50437-1" name="open-to-relocation-50437" value="no"> No</label><label for="open-to-relocation-50437-2"><input type="radio" id="open-to-relocation-50437-2" name="open-to-relocation-50437" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="available-from-50437-50437">Available from (50437)</label><input type="date" id="available-from-50437-50437" name="available-from-50437-50437" ></div>
<fieldset><legend>Key skills (50437)</legend><label for="key-skills-50437-50437-cb-0"><input type="checkbox" id="key-skills-50437-50437-cb-0" name="key-skills-50437-50437[]" value="sql"> SQL</label><label for="key-skills-50437-50437-cb-1"><input type="checkbox" id="key-skills-50437-50437-cb-1" name="key-skills-50437-50437[]" value="javascript"> JavaScript</label><label for="key-skills-50437-50437-cb-2"><input type="checkbox" id="key-skills-50437-50437-cb-2" name="key-skills-50437-50437[]" value="laravel"> Laravel</label><label for="key-skills-50437-50437-cb-3"><input type="checkbox" id="key-skills-50437-50437-cb-3" name="key-skills-50437-50437[]" value="react"> React</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50437">
<p id="step3-label-50437">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50437" data-reveal="#reveal-50437">Show follow-up questions</button>
<div id="reveal-50437" hidden style="display:none"><div class="field-row"><label for="personal-statement-50437-504">Personal statement (50437)</label><textarea id="personal-statement-50437-504" name="personal-statement-50437-504" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="personal-website-50437-50437">Personal website (50437)</label><input type="url" id="personal-website-50437-50437" name="personal-website-50437-50437" ></div>
<div class="field-row"><label for="desired-base-salary-50437-50">Desired base salary (50437)</label><input type="number" id="desired-base-salary-50437-50" name="desired-base-salary-50437-50" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50437">Attach resume (50437)</label><input type="file" id="file-50437" name="file-50437" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
