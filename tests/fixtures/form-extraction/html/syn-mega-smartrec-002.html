<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9532</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9532</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9532">Full name (9532)</label>
<input type="text" id="sr-name-9532" name="sr-name-9532" autocomplete="name">
<label for="sr-email-9532">Application email (9532)</label>
<input type="email" id="sr-email-9532" name="sr-email-9532" autocomplete="email">
<label for="sr-phone-9532">Mobile number (9532)</label>
<input type="tel" id="sr-phone-9532" name="sr-phone-9532" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="tell-us-about-yourself-9532-">Tell us about yourself (9532)</label><textarea id="tell-us-about-yourself-9532-" name="tell-us-about-yourself-9532-" rows="4" maxlength="500"></textarea></div>

<div class="field-row">
<span id="listbox-9532-lbl">Preferred location (9532)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9532" aria-labelledby="listbox-9532-lbl" tabindex="0">Preferred location (9532)</div>
<div role="listbox" id="listbox-9532" aria-labelledby="listbox-9532-lbl">
<div role="option" data-value="berlin">Berlin</div><div role="option" data-value="dublin">Dublin</div><div role="option" data-value="remote">Remote</div><div role="option" data-value="london">London</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
