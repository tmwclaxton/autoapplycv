<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Prefilled Application 9</title></head>
<body>
<main>
<h1>Prefilled Application 9</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="prefilled-name">Full name</label><input type="text" id="prefilled-name" name="prefilled-name" value="Alex Morgan"></div>
<div class="form-group"><label for="work-email">Work email</label><input type="email" id="work-email" name="work-email" ></div>
<div class="form-group"><label for="contact-number">Contact number</label><input type="tel" id="contact-number" name="contact-number" ></div>
<div class="form-group"><label for="cover-letter">Cover letter</label><textarea id="cover-letter" name="cover-letter" rows="4" maxlength="400"></textarea></div>

</form>
</main>
</body>
</html>
