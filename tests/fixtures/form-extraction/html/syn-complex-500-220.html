<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50220</title></head>
<body>
<main><h1>Mixed complex apply 50220</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50220">Full name (50220)</label>
<input type="text" id="mix-name-50220" name="mix-name-50220" autocomplete="name">
<label for="mix-email-50220">Personal email (50220)</label>
<input type="email" id="mix-email-50220" name="mix-email-50220" autocomplete="email">
<label for="mix-phone-50220">Telephone (50220)</label>
<input type="tel" id="mix-phone-50220" name="mix-phone-50220" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="motivation-statement-50220-5">Motivation statement (50220)</label><textarea id="motivation-statement-50220-5" name="motivation-statement-50220-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-50220-5022">Office preference (50220)</label><select id="office-preference-50220-5022" name="office-preference-50220-5022"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="london">London</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50220)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50220)</legend><label for="willing-to-relocate-5022-0"><input type="radio" id="willing-to-relocate-5022-0" name="willing-to-relocate-5022" value="yes"> Yes</label><label for="willing-to-relocate-5022-1"><input type="radio" id="willing-to-relocate-5022-1" name="willing-to-relocate-5022" value="no"> No</label><label for="willing-to-relocate-5022-2"><input type="radio" id="willing-to-relocate-5022-2" name="willing-to-relocate-5022" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-502">Compensation requirement (50220)</label><input type="number" id="compensation-requirement-502" name="compensation-requirement-502" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50220-">Start date preference (50220)</label><input type="date" id="start-date-preference-50220-" name="start-date-preference-50220-" ></div>
<div class="field-row"><label for="referral-source-50220-50220">Referral source (50220)</label><select id="referral-source-50220-50220" name="referral-source-50220-50220"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option><option value="other">Other</option><option value="job-board">Job board</option></select></div>
<fieldset><legend>Primary expertise (50220)</legend><label for="primary-expertise-50220--cb-0"><input type="checkbox" id="primary-expertise-50220--cb-0" name="primary-expertise-50220-[]" value="laravel"> Laravel</label><label for="primary-expertise-50220--cb-1"><input type="checkbox" id="primary-expertise-50220--cb-1" name="primary-expertise-50220-[]" value="rust"> Rust</label><label for="primary-expertise-50220--cb-2"><input type="checkbox" id="primary-expertise-50220--cb-2" name="primary-expertise-50220-[]" value="react"> React</label><label for="primary-expertise-50220--cb-3"><input type="checkbox" id="primary-expertise-50220--cb-3" name="primary-expertise-50220-[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50220">Attach resume (50220)</label><input type="file" id="file-50220" name="file-50220" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50220-50220">Portfolio URL (50220)</label><input type="url" id="portfolio-url-50220-50220" name="portfolio-url-50220-50220" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
