<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50289</title></head>
<body>
<main><h1>Long complex apply 50289</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50289">Your name (50289)</label>
<input type="text" id="long-name-50289" name="long-name-50289" autocomplete="name">
<label for="long-email-50289">Work email (50289)</label>
<input type="email" id="long-email-50289" name="long-email-50289" autocomplete="email">
<label for="long-phone-50289">Phone number (50289)</label>
<input type="tel" id="long-phone-50289" name="long-phone-50289" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50289">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50289" name="linkedin-profile-url-50289" ></div>
<div class="field-row"><label for="current-employer-50289">Current employer</label><input type="text" id="current-employer-50289" name="current-employer-50289" ></div>
<div class="field-row"><label for="current-job-title-50289">Current job title</label><input type="text" id="current-job-title-50289" name="current-job-title-50289" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="why-this-role-50289-50289">Why this role? (50289)</label><textarea id="why-this-role-50289-50289" name="why-this-role-50289-50289" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="work-location-50289-50289">Work location (50289)</label><select id="work-location-50289-50289" name="work-location-50289-50289"><option value="">Choose one…</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Work authorization status (50289)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50289)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50289-50">Salary expectations (50289)</label><input type="number" id="salary-expectations-50289-50" name="salary-expectations-50289-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50289-">Start date preference (50289)</label><input type="date" id="start-date-preference-50289-" name="start-date-preference-50289-" ></div>
<div class="field-row"><label for="referral-source-50289-50289">Referral source (50289)</label><select id="referral-source-50289-50289" name="referral-source-50289-50289"><option value="">Choose one…</option><option value="other">Other</option><option value="conference">Conference</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Key skills (50289)</legend><label for="key-skills-50289-50289-cb-0"><input type="checkbox" id="key-skills-50289-50289-cb-0" name="key-skills-50289-50289[]" value="rust"> Rust</label><label for="key-skills-50289-50289-cb-1"><input type="checkbox" id="key-skills-50289-50289-cb-1" name="key-skills-50289-50289[]" value="react"> React</label><label for="key-skills-50289-50289-cb-2"><input type="checkbox" id="key-skills-50289-50289-cb-2" name="key-skills-50289-50289[]" value="python"> Python</label><label for="key-skills-50289-50289-cb-3"><input type="checkbox" id="key-skills-50289-50289-cb-3" name="key-skills-50289-50289[]" value="typescript"> TypeScript</label><label for="key-skills-50289-50289-cb-4"><input type="checkbox" id="key-skills-50289-50289-cb-4" name="key-skills-50289-50289[]" value="laravel"> Laravel</label><label for="key-skills-50289-50289-cb-5"><input type="checkbox" id="key-skills-50289-50289-cb-5" name="key-skills-50289-50289[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50289">Attach resume (50289)</label><input type="file" id="file-50289" name="file-50289" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
