<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50488</title></head>
<body>
<main><h1>Mixed complex apply 50488</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50488">Preferred name (50488)</label>
<input type="text" id="mix-name-50488" name="mix-name-50488" autocomplete="name">
<label for="mix-email-50488">Email address (50488)</label>
<input type="email" id="mix-email-50488" name="mix-email-50488" autocomplete="email">
<label for="mix-phone-50488">Telephone (50488)</label>
<input type="tel" id="mix-phone-50488" name="mix-phone-50488" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="personal-statement-50488-504">Personal statement (50488)</label><textarea id="personal-statement-50488-504" name="personal-statement-50488-504" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-50488-5048">Office preference (50488)</label><select id="office-preference-50488-5048" name="office-preference-50488-5048"><option value="">Choose one…</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Work authorization status (50488)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50488)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-504">Compensation requirement (50488)</label><input type="number" id="compensation-requirement-504" name="compensation-requirement-504" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50488-50">Earliest start date (50488)</label><input type="date" id="earliest-start-date-50488-50" name="earliest-start-date-50488-50" ></div>
<div class="field-row"><label for="referral-source-50488-50488">Referral source (50488)</label><select id="referral-source-50488-50488" name="referral-source-50488-50488"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="company-site">Company site</option></select></div>
<fieldset><legend>Technical skills (50488)</legend><label for="technical-skills-50488-5-cb-0"><input type="checkbox" id="technical-skills-50488-5-cb-0" name="technical-skills-50488-5[]" value="go"> Go</label><label for="technical-skills-50488-5-cb-1"><input type="checkbox" id="technical-skills-50488-5-cb-1" name="technical-skills-50488-5[]" value="react"> React</label><label for="technical-skills-50488-5-cb-2"><input type="checkbox" id="technical-skills-50488-5-cb-2" name="technical-skills-50488-5[]" value="laravel"> Laravel</label><label for="technical-skills-50488-5-cb-3"><input type="checkbox" id="technical-skills-50488-5-cb-3" name="technical-skills-50488-5[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50488">Attach resume (50488)</label><input type="file" id="file-50488" name="file-50488" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50488-50488">Personal website (50488)</label><input type="url" id="personal-website-50488-50488" name="personal-website-50488-50488" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
