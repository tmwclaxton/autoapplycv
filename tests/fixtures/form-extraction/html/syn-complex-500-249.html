<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50249</title></head>
<body>
<main><h1>Long complex apply 50249</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50249">Applicant name (50249)</label>
<input type="text" id="long-name-50249" name="long-name-50249" autocomplete="name">
<label for="long-email-50249">Email address (50249)</label>
<input type="email" id="long-email-50249" name="long-email-50249" autocomplete="email">
<label for="long-phone-50249">Phone number (50249)</label>
<input type="tel" id="long-phone-50249" name="long-phone-50249" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50249">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50249" name="linkedin-profile-url-50249" ></div>
<div class="field-row"><label for="current-employer-50249">Current employer</label><input type="text" id="current-employer-50249" name="current-employer-50249" ></div>
<div class="field-row"><label for="current-job-title-50249">Current job title</label><input type="text" id="current-job-title-50249" name="current-job-title-50249" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="motivation-statement-50249-5">Motivation statement (50249)</label><textarea id="motivation-statement-50249-5" name="motivation-statement-50249-5" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="preferred-location-50249-502">Preferred location (50249)</label><select id="preferred-location-50249-502" name="preferred-location-50249-502"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="london">London</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50249)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50249)</legend><label for="open-to-relocation-50249-0"><input type="radio" id="open-to-relocation-50249-0" name="open-to-relocation-50249" value="yes"> Yes</label><label for="open-to-relocation-50249-1"><input type="radio" id="open-to-relocation-50249-1" name="open-to-relocation-50249" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50249-50">Salary expectations (50249)</label><input type="number" id="salary-expectations-50249-50" name="salary-expectations-50249-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50249-502">When can you start? (50249)</label><input type="date" id="when-can-you-start-50249-502" name="when-can-you-start-50249-502" ></div>
<div class="field-row"><label for="application-source-50249-502">Application source (50249)</label><select id="application-source-50249-502" name="application-source-50249-502"><option value="">Choose one…</option><option value="other">Other</option><option value="referral">Referral</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="job-board">Job board</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Primary expertise (50249)</legend><label for="primary-expertise-50249--cb-0"><input type="checkbox" id="primary-expertise-50249--cb-0" name="primary-expertise-50249-[]" value="sql"> SQL</label><label for="primary-expertise-50249--cb-1"><input type="checkbox" id="primary-expertise-50249--cb-1" name="primary-expertise-50249-[]" value="go"> Go</label><label for="primary-expertise-50249--cb-2"><input type="checkbox" id="primary-expertise-50249--cb-2" name="primary-expertise-50249-[]" value="rust"> Rust</label><label for="primary-expertise-50249--cb-3"><input type="checkbox" id="primary-expertise-50249--cb-3" name="primary-expertise-50249-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50249--cb-4"><input type="checkbox" id="primary-expertise-50249--cb-4" name="primary-expertise-50249-[]" value="laravel"> Laravel</label><label for="primary-expertise-50249--cb-5"><input type="checkbox" id="primary-expertise-50249--cb-5" name="primary-expertise-50249-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50249">Attach resume (50249)</label><input type="file" id="file-50249" name="file-50249" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
