<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50177</title></head>
<body>
<main><h1>Conditional complex apply 50177</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50177">
<p id="step1-label-50177">Step 1 - Contact</p>

<label for="cond-name-50177">Applicant name (50177)</label>
<input type="text" id="cond-name-50177" name="cond-name-50177" autocomplete="name">
<label for="cond-email-50177">Work email (50177)</label>
<input type="email" id="cond-email-50177" name="cond-email-50177" autocomplete="email">
<label for="cond-phone-50177">Phone number (50177)</label>
<input type="tel" id="cond-phone-50177" name="cond-phone-50177" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50177">
<p id="step2-label-50177">Step 2 - Preferences</p>
<div class="field-row"><label for="work-location-50177-50177">Work location (50177)</label><select id="work-location-50177-50177" name="work-location-50177-50177"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Open to relocation? (50177)</legend><label for="open-to-relocation-50177-0"><input type="radio" id="open-to-relocation-50177-0" name="open-to-relocation-50177" value="yes"> Yes</label><label for="open-to-relocation-50177-1"><input type="radio" id="open-to-relocation-50177-1" name="open-to-relocation-50177" value="no"> No</label><label for="open-to-relocation-50177-2"><input type="radio" id="open-to-relocation-50177-2" name="open-to-relocation-50177" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="when-can-you-start-50177-501">When can you start? (50177)</label><input type="date" id="when-can-you-start-50177-501" name="when-can-you-start-50177-501" ></div>
<fieldset><legend>Core competencies (50177)</legend><label for="core-competencies-50177--cb-0"><input type="checkbox" id="core-competencies-50177--cb-0" name="core-competencies-50177-[]" value="laravel"> Laravel</label><label for="core-competencies-50177--cb-1"><input type="checkbox" id="core-competencies-50177--cb-1" name="core-competencies-50177-[]" value="javascript"> JavaScript</label><label for="core-competencies-50177--cb-2"><input type="checkbox" id="core-competencies-50177--cb-2" name="core-competencies-50177-[]" value="python"> Python</label><label for="core-competencies-50177--cb-3"><input type="checkbox" id="core-competencies-50177--cb-3" name="core-competencies-50177-[]" value="react"> React</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50177">
<p id="step3-label-50177">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50177" data-reveal="#reveal-50177">Show follow-up questions</button>
<div id="reveal-50177" hidden style="display:none"><div class="field-row"><label for="personal-statement-50177-501">Personal statement (50177)</label><textarea id="personal-statement-50177-501" name="personal-statement-50177-501" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="portfolio-url-50177-50177">Portfolio URL (50177)</label><input type="url" id="portfolio-url-50177-50177" name="portfolio-url-50177-50177" ></div>
<div class="field-row"><label for="salary-expectations-50177-50">Salary expectations (50177)</label><input type="number" id="salary-expectations-50177-50" name="salary-expectations-50177-50" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50177">Attach resume (50177)</label><input type="file" id="file-50177" name="file-50177" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
