<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50236</title></head>
<body>
<main><h1>Wizard complex apply 50236</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50236">
<h2 id="wizard-contact-50236">Contact information</h2>

<label for="wiz-name-50236">Preferred name (50236)</label>
<input type="text" id="wiz-name-50236" name="wiz-name-50236" autocomplete="name">
<label for="wiz-email-50236">Email address (50236)</label>
<input type="email" id="wiz-email-50236" name="wiz-email-50236" autocomplete="email">
<label for="wiz-phone-50236">Mobile number (50236)</label>
<input type="tel" id="wiz-phone-50236" name="wiz-phone-50236" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50236">
<h2 id="wizard-screen-50236">Screening questions</h2>
<div class="field-row"><label for="tell-us-about-yourself-50236">Tell us about yourself (50236)</label><textarea id="tell-us-about-yourself-50236" name="tell-us-about-yourself-50236" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="current-city-50236-50236">Current city (50236)</label><select id="current-city-50236-50236" name="current-city-50236-50236"><option value="">Choose one…</option><option value="london">London</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Work authorization status (50236)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50236-50">Desired base salary (50236)</label><input type="number" id="desired-base-salary-50236-50" name="desired-base-salary-50236-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50236-502">When can you start? (50236)</label><input type="date" id="when-can-you-start-50236-502" name="when-can-you-start-50236-502" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50236">
<h2 id="wizard-docs-50236">Documents and skills</h2>
<fieldset><legend>Technical skills (50236)</legend><label for="technical-skills-50236-5-cb-0"><input type="checkbox" id="technical-skills-50236-5-cb-0" name="technical-skills-50236-5[]" value="sql"> SQL</label><label for="technical-skills-50236-5-cb-1"><input type="checkbox" id="technical-skills-50236-5-cb-1" name="technical-skills-50236-5[]" value="react"> React</label><label for="technical-skills-50236-5-cb-2"><input type="checkbox" id="technical-skills-50236-5-cb-2" name="technical-skills-50236-5[]" value="laravel"> Laravel</label><label for="technical-skills-50236-5-cb-3"><input type="checkbox" id="technical-skills-50236-5-cb-3" name="technical-skills-50236-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50236-5-cb-4"><input type="checkbox" id="technical-skills-50236-5-cb-4" name="technical-skills-50236-5[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50236">Attach resume (50236)</label><input type="file" id="file-50236" name="file-50236" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="referral-source-50236-50236">Referral source (50236)</label><select id="referral-source-50236-50236" name="referral-source-50236-50236"><option value="">Choose one…</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
