<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50157</title></head>
<body>
<main><h1>Conditional complex apply 50157</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50157">
<p id="step1-label-50157">Step 1 - Contact</p>

<label for="cond-name-50157">Full name (50157)</label>
<input type="text" id="cond-name-50157" name="cond-name-50157" autocomplete="name">
<label for="cond-email-50157">Work email (50157)</label>
<input type="email" id="cond-email-50157" name="cond-email-50157" autocomplete="email">
<label for="cond-phone-50157">Phone number (50157)</label>
<input type="tel" id="cond-phone-50157" name="cond-phone-50157" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50157">
<p id="step2-label-50157">Step 2 - Preferences</p>
<div class="field-row"><label for="current-city-50157-50157">Current city (50157)</label><select id="current-city-50157-50157" name="current-city-50157-50157"><option value="">Choose one…</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="manchester">Manchester</option><option value="london">London</option></select></div>
<fieldset><legend>Willing to relocate? (50157)</legend><label for="willing-to-relocate-5015-0"><input type="radio" id="willing-to-relocate-5015-0" name="willing-to-relocate-5015" value="yes"> Yes</label><label for="willing-to-relocate-5015-1"><input type="radio" id="willing-to-relocate-5015-1" name="willing-to-relocate-5015" value="no"> No</label><label for="willing-to-relocate-5015-2"><input type="radio" id="willing-to-relocate-5015-2" name="willing-to-relocate-5015" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="start-date-preference-50157-">Start date preference (50157)</label><input type="date" id="start-date-preference-50157-" name="start-date-preference-50157-" ></div>
<fieldset><legend>Key skills (50157)</legend><label for="key-skills-50157-50157-cb-0"><input type="checkbox" id="key-skills-50157-50157-cb-0" name="key-skills-50157-50157[]" value="typescript"> TypeScript</label><label for="key-skills-50157-50157-cb-1"><input type="checkbox" id="key-skills-50157-50157-cb-1" name="key-skills-50157-50157[]" value="go"> Go</label><label for="key-skills-50157-50157-cb-2"><input type="checkbox" id="key-skills-50157-50157-cb-2" name="key-skills-50157-50157[]" value="react"> React</label><label for="key-skills-50157-50157-cb-3"><input type="checkbox" id="key-skills-50157-50157-cb-3" name="key-skills-50157-50157[]" value="python"> Python</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50157">
<p id="step3-label-50157">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50157" data-reveal="#reveal-50157">Show follow-up questions</button>
<div id="reveal-50157" hidden style="display:none"><div class="field-row"><label for="cover-letter-50157-50157">Cover letter (50157)</label><textarea id="cover-letter-50157-50157" name="cover-letter-50157-50157" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="work-samples-link-50157-5015">Work samples link (50157)</label><input type="url" id="work-samples-link-50157-5015" name="work-samples-link-50157-5015" ></div>
<div class="field-row"><label for="expected-salary-50157-50157">Expected salary (50157)</label><input type="number" id="expected-salary-50157-50157" name="expected-salary-50157-50157" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50157">Attach resume (50157)</label><input type="file" id="file-50157" name="file-50157" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
