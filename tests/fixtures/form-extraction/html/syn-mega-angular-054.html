<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9214</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9214</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Applicant name (9214)</mat-label><label for="ang-name-9214">Applicant name (9214)</label><input matInput id="ang-name-9214" name="ang-name-9214" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Email address (9214)</mat-label><label for="ang-email-9214">Email address (9214)</label><input matInput id="ang-email-9214" name="ang-email-9214" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Telephone (9214)</mat-label><label for="ang-phone-9214">Telephone (9214)</label><input matInput id="ang-phone-9214" name="ang-phone-9214" type="tel"></mat-form-field>
<div class="field-row"><label for="motivation-statement-9214-92">Motivation statement (9214)</label><textarea id="motivation-statement-9214-92" name="motivation-statement-9214-92" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-9214-9214">Office preference (9214)</label><select id="office-preference-9214-9214" name="office-preference-9214-9214"><option value="">Choose one…</option><option value="london">London</option><option value="remote">Remote</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
