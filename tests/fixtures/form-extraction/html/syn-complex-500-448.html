<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50448</title></head>
<body>
<main><h1>Mixed complex apply 50448</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50448">Applicant name (50448)</label>
<input type="text" id="mix-name-50448" name="mix-name-50448" autocomplete="name">
<label for="mix-email-50448">Email address (50448)</label>
<input type="email" id="mix-email-50448" name="mix-email-50448" autocomplete="email">
<label for="mix-phone-50448">Phone number (50448)</label>
<input type="tel" id="mix-phone-50448" name="mix-phone-50448" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50448">Tell us about yourself (50448)</label><textarea id="tell-us-about-yourself-50448" name="tell-us-about-yourself-50448" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50448-50448">Work location (50448)</label><select id="work-location-50448-50448" name="work-location-50448-50448"><option value="">Choose one…</option><option value="london">London</option><option value="new-york">New York</option><option value="remote">Remote</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50448)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50448)</legend><label for="willing-to-relocate-5044-0"><input type="radio" id="willing-to-relocate-5044-0" name="willing-to-relocate-5044" value="yes"> Yes</label><label for="willing-to-relocate-5044-1"><input type="radio" id="willing-to-relocate-5044-1" name="willing-to-relocate-5044" value="no"> No</label><label for="willing-to-relocate-5044-2"><input type="radio" id="willing-to-relocate-5044-2" name="willing-to-relocate-5044" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50448-50">Desired base salary (50448)</label><input type="number" id="desired-base-salary-50448-50" name="desired-base-salary-50448-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50448-50448">Available from (50448)</label><input type="date" id="available-from-50448-50448" name="available-from-50448-50448" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50448)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="conference">Conference</option></select></div>
<fieldset><legend>Technical skills (50448)</legend><label for="technical-skills-50448-5-cb-0"><input type="checkbox" id="technical-skills-50448-5-cb-0" name="technical-skills-50448-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50448-5-cb-1"><input type="checkbox" id="technical-skills-50448-5-cb-1" name="technical-skills-50448-5[]" value="python"> Python</label><label for="technical-skills-50448-5-cb-2"><input type="checkbox" id="technical-skills-50448-5-cb-2" name="technical-skills-50448-5[]" value="react"> React</label><label for="technical-skills-50448-5-cb-3"><input type="checkbox" id="technical-skills-50448-5-cb-3" name="technical-skills-50448-5[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50448">Attach resume (50448)</label><input type="file" id="file-50448" name="file-50448" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50448-50448">Personal website (50448)</label><input type="url" id="personal-website-50448-50448" name="personal-website-50448-50448" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
