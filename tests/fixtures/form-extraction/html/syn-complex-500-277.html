<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50277</title></head>
<body>
<main><h1>Conditional complex apply 50277</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50277">
<p id="step1-label-50277">Step 1 - Contact</p>

<label for="cond-name-50277">Preferred name (50277)</label>
<input type="text" id="cond-name-50277" name="cond-name-50277" autocomplete="name">
<label for="cond-email-50277">Contact email (50277)</label>
<input type="email" id="cond-email-50277" name="cond-email-50277" autocomplete="email">
<label for="cond-phone-50277">Telephone (50277)</label>
<input type="tel" id="cond-phone-50277" name="cond-phone-50277" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50277">
<p id="step2-label-50277">Step 2 - Preferences</p>
<div class="field-row"><label for="preferred-location-50277-502">Preferred location (50277)</label><select id="preferred-location-50277-502" name="preferred-location-50277-502"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="london">London</option></select></div>
<fieldset><legend>Relocation preference (50277)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="when-can-you-start-50277-502">When can you start? (50277)</label><input type="date" id="when-can-you-start-50277-502" name="when-can-you-start-50277-502" ></div>
<fieldset><legend>Technical skills (50277)</legend><label for="technical-skills-50277-5-cb-0"><input type="checkbox" id="technical-skills-50277-5-cb-0" name="technical-skills-50277-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50277-5-cb-1"><input type="checkbox" id="technical-skills-50277-5-cb-1" name="technical-skills-50277-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50277-5-cb-2"><input type="checkbox" id="technical-skills-50277-5-cb-2" name="technical-skills-50277-5[]" value="python"> Python</label><label for="technical-skills-50277-5-cb-3"><input type="checkbox" id="technical-skills-50277-5-cb-3" name="technical-skills-50277-5[]" value="rust"> Rust</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50277">
<p id="step3-label-50277">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50277" data-reveal="#reveal-50277">Show follow-up questions</button>
<div id="reveal-50277" hidden style="display:none"><div class="field-row"><label for="cover-letter-50277-50277">Cover letter (50277)</label><textarea id="cover-letter-50277-50277" name="cover-letter-50277-50277" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="personal-website-50277-50277">Personal website (50277)</label><input type="url" id="personal-website-50277-50277" name="personal-website-50277-50277" ></div>
<div class="field-row"><label for="expected-salary-50277-50277">Expected salary (50277)</label><input type="number" id="expected-salary-50277-50277" name="expected-salary-50277-50277" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50277">Attach resume (50277)</label><input type="file" id="file-50277" name="file-50277" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
