<!DOCTYPE html>
<html lang="en-GB">
<head><meta charset="utf-8"><title>Apply - Platform Engineer</title></head>
<body>
<div id="app-root" data-genesis-element="BASE">
<header data-testid="header-container" data-genesis-element="BASE">
<a data-testid="logo" href="/">Totaljobs</a>
</header>
<main data-genesis-element="BASE"><form data-testid="application-form" data-at="application-form" data-genesis-element="FORM" action="/job/application" method="post">
<h1 data-testid="application-step-title" data-genesis-element="TEXT">Upload documents</h1>

<div class="res-field" data-testid="field-file-60073">
<label for="file-60073">CV / Resume</label>
<input type="file" id="file-60073" name="file-60073" accept=".pdf,.doc,.docx" data-testid="field-file-60073-input">
</div>
<div class="res-field" data-testid="field-file-60073">
<label for="file-60073">Cover letter (optional)</label>
<input type="file" id="file-60073" name="file-60073" accept=".pdf,.doc,.docx" data-testid="field-file-60073-input">
</div>
<div class="res-field" data-genesis-element="BASE" data-testid="field-portfolio-or-github-url-60073">
<label for="portfolio-or-github-url-60073" data-testid="field-portfolio-or-github-url-60073-label">Portfolio or GitHub URL</label>
<input type="url" id="portfolio-or-github-url-60073" name="portfolio-or-github-url-60073" data-testid="field-portfolio-or-github-url-60073-input" >
</div>
<div class="res-field" data-genesis-element="BASE" data-testid="field-additional-information-60073">
<label for="additional-information-60073">Additional information</label>
<textarea id="additional-information-60073" name="additional-information-60073" rows="4" data-testid="field-additional-information-60073-input" maxlength="500"></textarea>
</div>
<div class="res-field" data-genesis-element="BASE" data-testid="field-years-of-relevant-experience-600">
<label for="years-of-relevant-experience-600">Years of relevant experience</label>
<select id="years-of-relevant-experience-600" name="years-of-relevant-experience-600" data-testid="field-years-of-relevant-experience-600-input">
<option value="">Please select</option><option value="0-1">0-1</option><option value="1-3">1-3</option><option value="3-5">3-5</option><option value="5-10">5-10</option><option value="10">10+</option>
</select>
</div>
<fieldset data-testid="fieldset-may-we-contact-your-current-" data-genesis-element="BASE">
<legend data-testid="application-step-subtitle">May we contact your current employer?</legend>
<label for="may-we-contact-your-current--0"><input type="radio" id="may-we-contact-your-current--0" name="may-we-contact-your-current-" value="yes" data-testid="radio-may-we-contact-your-current--0"> Yes</label><label for="may-we-contact-your-current--1"><input type="radio" id="may-we-contact-your-current--1" name="may-we-contact-your-current-" value="no" data-testid="radio-may-we-contact-your-current--1"> No</label><label for="may-we-contact-your-current--2"><input type="radio" id="may-we-contact-your-current--2" name="may-we-contact-your-current-" value="not-applicable" data-testid="radio-may-we-contact-your-current--2"> Not applicable</label>
</fieldset>
<fieldset data-testid="fieldset-i-confirm-the-information-pr" data-genesis-element="BASE">
<legend data-testid="application-step-subtitle">I confirm the information provided is accurate</legend>
<label for="i-confirm-the-information-pr-0"><input type="radio" id="i-confirm-the-information-pr-0" name="i-confirm-the-information-pr" value="yes" data-testid="radio-i-confirm-the-information-pr-0"> Yes</label>
</fieldset>

<div data-at="application-actions"><button type="button" data-testid="continue-button" data-genesis-element="BUTTON">Continue to review</button></div>
</form></main>
<footer data-genesis-element="PAGE_FOOTER"><p>Totaljobs synthetic corpus fixture</p></footer>
</div>
</body>
</html>
