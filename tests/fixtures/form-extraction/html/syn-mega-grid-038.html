<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9938</title></head>
<body>
<main><h1>Grid layout 9938</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9938">Your name (9938)</label><span class="helper">Required</span><input id="grid-name-9938" name="grid-name-9938" type="text"></div>
<div><label for="grid-email-9938">Contact email (9938)</label><span class="helper">Required</span><input id="grid-email-9938" name="grid-email-9938" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9938">Direct line (9938)</label><input id="grid-phone-9938" name="grid-phone-9938" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="why-this-role-9938-9938">Why this role? (9938)</label><textarea id="why-this-role-9938-9938" name="why-this-role-9938-9938" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Willing to relocate? (9938)</legend><label for="willing-to-relocate-9938-0"><input type="radio" id="willing-to-relocate-9938-0" name="willing-to-relocate-9938" value="yes"> Yes</label><label for="willing-to-relocate-9938-1"><input type="radio" id="willing-to-relocate-9938-1" name="willing-to-relocate-9938" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
