<!DOCTYPE html>
<html lang="en-GB">
<head><meta charset="utf-8"><title>Questions - QA Engineer</title></head>
<body>
<form data-testid="indeed-apply-form">
<h1 data-testid="questions-heading">Answer these questions from the employer</h1>
<div data-testid="input-ia-select-400005-what-is-the-highest-leve">
<label for="ia-select-400005-what-is-the-highest-leve" data-testid="ia-select-400005-what-is-the-highest-leve-label"><span data-testid="safe-markup">What is the highest level of education you have completed?</span></label>
<select id="ia-select-400005-what-is-the-highest-leve" name="ia-select-400005-what-is-the-highest-leve" data-testid="ia-select-400005-what-is-the-highest-leve-input">
<option value="">Select an option</option><option value="gcse">GCSE</option><option value="a-level">A-Level</option><option value="bachelor-s-degree">Bachelor's degree</option><option value="master-s-degree">Master's degree</option><option value="phd">PhD</option><option value="other">Other</option>
</select>
</div>
<div data-testid="input-ia-textarea-400005-why-are-you-interested-i">
<label for="ia-textarea-400005-why-are-you-interested-i" data-testid="ia-textarea-400005-why-are-you-interested-i-label"><span data-testid="safe-markup">Why are you interested in this role?</span></label>
<textarea rows="4" id="ia-textarea-400005-why-are-you-interested-i" name="ia-textarea-400005-why-are-you-interested-i" data-testid="ia-textarea-400005-why-are-you-interested-i-input"></textarea>
</div>
<fieldset data-testid="input-ia-radio-400005-are-you-authorized-t" role="radiogroup">
<legend data-testid="ia-radio-400005-are-you-authorized-t-label"><span data-testid="safe-markup">Are you authorized to work in the United Kingdom?</span></legend>
<label for="ia-radio-400005-are-you-authorized-t-0"><input type="radio" id="ia-radio-400005-are-you-authorized-t-0" name="ia-radio-400005-are-you-authorized-t" value="yes" data-testid="ia-radio-400005-are-you-authorized-t-0"> Yes</label><label for="ia-radio-400005-are-you-authorized-t-1"><input type="radio" id="ia-radio-400005-are-you-authorized-t-1" name="ia-radio-400005-are-you-authorized-t" value="no" data-testid="ia-radio-400005-are-you-authorized-t-1"> No</label>
</fieldset>
<fieldset data-testid="input-ia-radio-400005-will-you-require-spo" role="radiogroup">
<legend data-testid="ia-radio-400005-will-you-require-spo-label"><span data-testid="safe-markup">Will you require sponsorship now or in the future?</span></legend>
<label for="ia-radio-400005-will-you-require-spo-0"><input type="radio" id="ia-radio-400005-will-you-require-spo-0" name="ia-radio-400005-will-you-require-spo" value="yes" data-testid="ia-radio-400005-will-you-require-spo-0"> Yes</label><label for="ia-radio-400005-will-you-require-spo-1"><input type="radio" id="ia-radio-400005-will-you-require-spo-1" name="ia-radio-400005-will-you-require-spo" value="no" data-testid="ia-radio-400005-will-you-require-spo-1"> No</label><label for="ia-radio-400005-will-you-require-spo-2"><input type="radio" id="ia-radio-400005-will-you-require-spo-2" name="ia-radio-400005-will-you-require-spo" value="not-sure" data-testid="ia-radio-400005-will-you-require-spo-2"> Not sure</label>
</fieldset>
<button type="button" data-testid="indeed-apply-continue"><span>Continue</span></button></form>
</body>
</html>
