<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50430</title></head>
<body>
<main><h1>Mixed complex apply 50430</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50430">Preferred name (50430)</label>
<input type="text" id="mix-name-50430" name="mix-name-50430" autocomplete="name">
<label for="mix-email-50430">Contact email (50430)</label>
<input type="email" id="mix-email-50430" name="mix-email-50430" autocomplete="email">
<label for="mix-phone-50430">Mobile number (50430)</label>
<input type="tel" id="mix-phone-50430" name="mix-phone-50430" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50430-50430">Cover letter (50430)</label><textarea id="cover-letter-50430-50430" name="cover-letter-50430-50430" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-50430-5043">Office preference (50430)</label><select id="office-preference-50430-5043" name="office-preference-50430-5043"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Work authorization status (50430)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50430)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50430-50">Salary expectations (50430)</label><input type="number" id="salary-expectations-50430-50" name="salary-expectations-50430-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50430-50430">Available from (50430)</label><input type="date" id="available-from-50430-50430" name="available-from-50430-50430" ></div>
<div class="field-row"><label for="application-source-50430-504">Application source (50430)</label><select id="application-source-50430-504" name="application-source-50430-504"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="conference">Conference</option></select></div>
<fieldset><legend>Key skills (50430)</legend><label for="key-skills-50430-50430-cb-0"><input type="checkbox" id="key-skills-50430-50430-cb-0" name="key-skills-50430-50430[]" value="go"> Go</label><label for="key-skills-50430-50430-cb-1"><input type="checkbox" id="key-skills-50430-50430-cb-1" name="key-skills-50430-50430[]" value="python"> Python</label><label for="key-skills-50430-50430-cb-2"><input type="checkbox" id="key-skills-50430-50430-cb-2" name="key-skills-50430-50430[]" value="react"> React</label><label for="key-skills-50430-50430-cb-3"><input type="checkbox" id="key-skills-50430-50430-cb-3" name="key-skills-50430-50430[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50430">Attach resume (50430)</label><input type="file" id="file-50430" name="file-50430" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50430-50430">Personal website (50430)</label><input type="url" id="personal-website-50430-50430" name="personal-website-50430-50430" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
