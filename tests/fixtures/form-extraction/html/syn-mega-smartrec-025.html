<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9555</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9555</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9555">Your name (9555)</label>
<input type="text" id="sr-name-9555" name="sr-name-9555" autocomplete="name">
<label for="sr-email-9555">Application email (9555)</label>
<input type="email" id="sr-email-9555" name="sr-email-9555" autocomplete="email">
<label for="sr-phone-9555">Contact number (9555)</label>
<input type="tel" id="sr-phone-9555" name="sr-phone-9555" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="personal-statement-9555-9555">Personal statement (9555)</label><textarea id="personal-statement-9555-9555" name="personal-statement-9555-9555" rows="4" maxlength="500"></textarea></div>

<div class="field-row">
<span id="listbox-9555-lbl">Preferred location (9555)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9555" aria-labelledby="listbox-9555-lbl" tabindex="0">Preferred location (9555)</div>
<div role="listbox" id="listbox-9555" aria-labelledby="listbox-9555-lbl">
<div role="option" data-value="berlin">Berlin</div><div role="option" data-value="london">London</div><div role="option" data-value="dublin">Dublin</div><div role="option" data-value="remote">Remote</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
