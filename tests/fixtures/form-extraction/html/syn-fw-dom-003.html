<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional sections 3</title></head>
<body>
<main><h1>Conditional sections 3</h1><form action="/apply" method="post">
<div role="group" aria-labelledby="step1-label"><p id="step1-label">Step 1 — Contact</p>
<label for="cond-name">Applicant name</label><input id="cond-name" name="cond-name" type="text">
<label for="cond-email">Contact email</label><input id="cond-email" name="cond-email" type="email">
<label for="cond-phone">Contact number</label><input id="cond-phone" name="cond-phone" type="tel">
</div>
<div role="region" aria-label="Optional details" style="display:none"><p>Optional portfolio step locked until step 2.</p></div>
<div class="field-row"><label for="where-are-you-based">Where are you based?</label><select id="where-are-you-based" name="where-are-you-based" ><option value="">Choose one…</option><option value="uk">UK</option><option value="eu">EU</option><option value="us">US</option><option value="other">Other</option></select></div></form></main>
</body>
</html>
