<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50208</title></head>
<body>
<main><h1>Mixed complex apply 50208</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50208">Full name (50208)</label>
<input type="text" id="mix-name-50208" name="mix-name-50208" autocomplete="name">
<label for="mix-email-50208">Work email (50208)</label>
<input type="email" id="mix-email-50208" name="mix-email-50208" autocomplete="email">
<label for="mix-phone-50208">Mobile number (50208)</label>
<input type="tel" id="mix-phone-50208" name="mix-phone-50208" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="why-this-role-50208-50208">Why this role? (50208)</label><textarea id="why-this-role-50208-50208" name="why-this-role-50208-50208" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50208-502">Preferred location (50208)</label><select id="preferred-location-50208-502" name="preferred-location-50208-502"><option value="">Choose one…</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Work authorization status (50208)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50208)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-502">Compensation requirement (50208)</label><input type="number" id="compensation-requirement-502" name="compensation-requirement-502" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50208-50208">Available from (50208)</label><input type="date" id="available-from-50208-50208" name="available-from-50208-50208" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50208)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="conference">Conference</option><option value="linkedin">LinkedIn</option></select></div>
<fieldset><legend>Primary expertise (50208)</legend><label for="primary-expertise-50208--cb-0"><input type="checkbox" id="primary-expertise-50208--cb-0" name="primary-expertise-50208-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50208--cb-1"><input type="checkbox" id="primary-expertise-50208--cb-1" name="primary-expertise-50208-[]" value="sql"> SQL</label><label for="primary-expertise-50208--cb-2"><input type="checkbox" id="primary-expertise-50208--cb-2" name="primary-expertise-50208-[]" value="go"> Go</label><label for="primary-expertise-50208--cb-3"><input type="checkbox" id="primary-expertise-50208--cb-3" name="primary-expertise-50208-[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50208">Attach resume (50208)</label><input type="file" id="file-50208" name="file-50208" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50208-5020">Work samples link (50208)</label><input type="url" id="work-samples-link-50208-5020" name="work-samples-link-50208-5020" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
