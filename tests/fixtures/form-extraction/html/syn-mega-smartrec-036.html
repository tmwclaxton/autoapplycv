<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9566</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9566</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9566">Applicant name (9566)</label>
<input type="text" id="sr-name-9566" name="sr-name-9566" autocomplete="name">
<label for="sr-email-9566">Contact email (9566)</label>
<input type="email" id="sr-email-9566" name="sr-email-9566" autocomplete="email">
<label for="sr-phone-9566">Phone number (9566)</label>
<input type="tel" id="sr-phone-9566" name="sr-phone-9566" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="motivation-statement-9566-95">Motivation statement (9566)</label><textarea id="motivation-statement-9566-95" name="motivation-statement-9566-95" rows="4" maxlength="500"></textarea></div>

<div class="field-row">
<span id="listbox-9566-lbl">Office preference (9566)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9566" aria-labelledby="listbox-9566-lbl" tabindex="0">Office preference (9566)</div>
<div role="listbox" id="listbox-9566" aria-labelledby="listbox-9566-lbl">
<div role="option" data-value="london">London</div><div role="option" data-value="hybrid">Hybrid</div><div role="option" data-value="berlin">Berlin</div><div role="option" data-value="remote">Remote</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
