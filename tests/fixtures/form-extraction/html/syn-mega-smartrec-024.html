<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9554</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9554</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9554">Applicant name (9554)</label>
<input type="text" id="sr-name-9554" name="sr-name-9554" autocomplete="name">
<label for="sr-email-9554">Email address (9554)</label>
<input type="email" id="sr-email-9554" name="sr-email-9554" autocomplete="email">
<label for="sr-phone-9554">Contact number (9554)</label>
<input type="tel" id="sr-phone-9554" name="sr-phone-9554" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="personal-statement-9554-9554">Personal statement (9554)</label><textarea id="personal-statement-9554-9554" name="personal-statement-9554-9554" rows="4" maxlength="500"></textarea></div>

<div class="field-row">
<span id="listbox-9554-lbl">Preferred location (9554)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9554" aria-labelledby="listbox-9554-lbl" tabindex="0">Preferred location (9554)</div>
<div role="listbox" id="listbox-9554" aria-labelledby="listbox-9554-lbl">
<div role="option" data-value="berlin">Berlin</div><div role="option" data-value="hybrid">Hybrid</div><div role="option" data-value="manchester">Manchester</div><div role="option" data-value="dublin">Dublin</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
