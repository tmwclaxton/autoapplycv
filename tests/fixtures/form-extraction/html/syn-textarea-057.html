<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Textarea Application 8</title></head>
<body>
<main>
<h1>Textarea Application 8</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="your-name">Your name</label><input type="text" id="your-name" name="your-name" ></div>
<div class="form-group"><label for="contact-email">Contact email</label><input type="email" id="contact-email" name="contact-email" ></div>
<div class="form-group"><label for="motivation-statement">Motivation statement</label><textarea id="motivation-statement" name="motivation-statement" rows="4" maxlength="600"></textarea></div>
<div class="form-group"><label for="describe-a-challenging-p">Describe a challenging project you led</label><textarea id="describe-a-challenging-p" name="describe-a-challenging-p" rows="4" maxlength="800"></textarea></div>

</form>
</main>
</body>
</html>
