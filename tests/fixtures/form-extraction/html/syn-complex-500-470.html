<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50470</title></head>
<body>
<main><h1>Mixed complex apply 50470</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50470">Preferred name (50470)</label>
<input type="text" id="mix-name-50470" name="mix-name-50470" autocomplete="name">
<label for="mix-email-50470">Work email (50470)</label>
<input type="email" id="mix-email-50470" name="mix-email-50470" autocomplete="email">
<label for="mix-phone-50470">Telephone (50470)</label>
<input type="tel" id="mix-phone-50470" name="mix-phone-50470" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="personal-statement-50470-504">Personal statement (50470)</label><textarea id="personal-statement-50470-504" name="personal-statement-50470-504" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50470-50470">Work location (50470)</label><select id="work-location-50470-50470" name="work-location-50470-50470"><option value="">Choose one…</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50470)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50470)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-504">Compensation requirement (50470)</label><input type="number" id="compensation-requirement-504" name="compensation-requirement-504" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50470-50">Earliest start date (50470)</label><input type="date" id="earliest-start-date-50470-50" name="earliest-start-date-50470-50" ></div>
<div class="field-row"><label for="application-source-50470-504">Application source (50470)</label><select id="application-source-50470-504" name="application-source-50470-504"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="other">Other</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Core competencies (50470)</legend><label for="core-competencies-50470--cb-0"><input type="checkbox" id="core-competencies-50470--cb-0" name="core-competencies-50470-[]" value="sql"> SQL</label><label for="core-competencies-50470--cb-1"><input type="checkbox" id="core-competencies-50470--cb-1" name="core-competencies-50470-[]" value="typescript"> TypeScript</label><label for="core-competencies-50470--cb-2"><input type="checkbox" id="core-competencies-50470--cb-2" name="core-competencies-50470-[]" value="javascript"> JavaScript</label><label for="core-competencies-50470--cb-3"><input type="checkbox" id="core-competencies-50470--cb-3" name="core-competencies-50470-[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50470">Attach resume (50470)</label><input type="file" id="file-50470" name="file-50470" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50470-50470">Portfolio URL (50470)</label><input type="url" id="portfolio-url-50470-50470" name="portfolio-url-50470-50470" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
