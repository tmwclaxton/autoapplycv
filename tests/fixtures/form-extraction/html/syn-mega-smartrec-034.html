<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9564</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9564</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9564">Preferred name (9564)</label>
<input type="text" id="sr-name-9564" name="sr-name-9564" autocomplete="name">
<label for="sr-email-9564">Application email (9564)</label>
<input type="email" id="sr-email-9564" name="sr-email-9564" autocomplete="email">
<label for="sr-phone-9564">Mobile number (9564)</label>
<input type="tel" id="sr-phone-9564" name="sr-phone-9564" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="motivation-statement-9564-95">Motivation statement (9564)</label><textarea id="motivation-statement-9564-95" name="motivation-statement-9564-95" rows="4" maxlength="500"></textarea></div>

<div class="field-row">
<span id="listbox-9564-lbl">Preferred location (9564)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9564" aria-labelledby="listbox-9564-lbl" tabindex="0">Preferred location (9564)</div>
<div role="listbox" id="listbox-9564" aria-labelledby="listbox-9564-lbl">
<div role="option" data-value="remote">Remote</div><div role="option" data-value="london">London</div><div role="option" data-value="hybrid">Hybrid</div><div role="option" data-value="berlin">Berlin</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
