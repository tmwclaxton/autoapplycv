<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Greenhouse complex apply 50201</title></head>
<body>
<main><h1>Greenhouse complex apply 50201</h1><form action="/apply" method="post">
<div id="application" class="application--container">
<section class="section" aria-label="Personal information">
<h2>Personal information</h2>

<div class="field"><label id="gh-name-50201-label" for="gh-name-50201">Legal name (50201)</label><input aria-labelledby="gh-name-50201-label" type="text" id="gh-name-50201" name="gh-name-50201" autocomplete="name">

<div class="field-row"><label for="work-location-50201-50201">Work location (50201)</label><select id="work-location-50201-50201" name="work-location-50201-50201"><option value="">Choose one…</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="remote">Remote</option></select></div>

<div class="field-row"><label for="compensation-requirement-502">Compensation requirement (50201)</label><input type="number" id="compensation-requirement-502" name="compensation-requirement-502" min="0" step="1000" placeholder="Annual amount"></div>

<div class="file-row"><label for="file-50201">Attach resume (50201)</label><input type="file" id="file-50201" name="file-50201" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50201-5020">Work samples link (50201)</label><input type="url" id="work-samples-link-50201-5020" name="work-samples-link-50201-5020" ></div>
</section>
<section class="section" aria-label="EEO">

</html>
