<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Vue scoped grid 3</title></head>
<body>
<main><h1>Vue scoped grid 3</h1><form action="/apply" method="post">
<div class="grid-form data-v-002" style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
<div class="col-span-2 data-v-002"><label for="g-name">Applicant name</label><input id="g-name" name="g-name" type="text" data-v-002></div>
<div data-v-002><label for="g-email">Contact email</label><input id="g-email" name="g-email" type="email" data-v-002></div>
<div data-v-002><label for="g-phone">Contact number</label><input id="g-phone" name="g-phone" type="tel" data-v-002></div>
<div class="col-span-2 data-v-002"><div class="field-row"><label for="where-are-you-based">Where are you based?</label><select id="where-are-you-based" name="where-are-you-based" ><option value="">Choose one…</option><option value="london">London</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option></select></div></div>
</div></form></main>
</body>
</html>
