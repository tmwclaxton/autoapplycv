<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50256</title></head>
<body>
<main><h1>Wizard complex apply 50256</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50256">
<h2 id="wizard-contact-50256">Contact information</h2>

<label for="wiz-name-50256">Full name (50256)</label>
<input type="text" id="wiz-name-50256" name="wiz-name-50256" autocomplete="name">
<label for="wiz-email-50256">Contact email (50256)</label>
<input type="email" id="wiz-email-50256" name="wiz-email-50256" autocomplete="email">
<label for="wiz-phone-50256">Phone number (50256)</label>
<input type="tel" id="wiz-phone-50256" name="wiz-phone-50256" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50256">
<h2 id="wizard-screen-50256">Screening questions</h2>
<div class="field-row"><label for="cover-letter-50256-50256">Cover letter (50256)</label><textarea id="cover-letter-50256-50256" name="cover-letter-50256-50256" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="office-preference-50256-5025">Office preference (50256)</label><select id="office-preference-50256-5025" name="office-preference-50256-5025"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50256)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50256-50256">Expected salary (50256)</label><input type="number" id="expected-salary-50256-50256" name="expected-salary-50256-50256" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50256-502">When can you start? (50256)</label><input type="date" id="when-can-you-start-50256-502" name="when-can-you-start-50256-502" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50256">
<h2 id="wizard-docs-50256">Documents and skills</h2>
<fieldset><legend>Technical skills (50256)</legend><label for="technical-skills-50256-5-cb-0"><input type="checkbox" id="technical-skills-50256-5-cb-0" name="technical-skills-50256-5[]" value="react"> React</label><label for="technical-skills-50256-5-cb-1"><input type="checkbox" id="technical-skills-50256-5-cb-1" name="technical-skills-50256-5[]" value="sql"> SQL</label><label for="technical-skills-50256-5-cb-2"><input type="checkbox" id="technical-skills-50256-5-cb-2" name="technical-skills-50256-5[]" value="rust"> Rust</label><label for="technical-skills-50256-5-cb-3"><input type="checkbox" id="technical-skills-50256-5-cb-3" name="technical-skills-50256-5[]" value="go"> Go</label><label for="technical-skills-50256-5-cb-4"><input type="checkbox" id="technical-skills-50256-5-cb-4" name="technical-skills-50256-5[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50256">Attach resume (50256)</label><input type="file" id="file-50256" name="file-50256" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="application-source-50256-502">Application source (50256)</label><select id="application-source-50256-502" name="application-source-50256-502"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option><option value="other">Other</option><option value="referral">Referral</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
