<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50066</title></head>
<body>
<main><h1>Wizard complex apply 50066</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50066">
<h2 id="wizard-contact-50066">Contact information</h2>

<label for="wiz-name-50066">Applicant name (50066)</label>
<input type="text" id="wiz-name-50066" name="wiz-name-50066" autocomplete="name">
<label for="wiz-email-50066">Email address (50066)</label>
<input type="email" id="wiz-email-50066" name="wiz-email-50066" autocomplete="email">
<label for="wiz-phone-50066">Phone number (50066)</label>
<input type="tel" id="wiz-phone-50066" name="wiz-phone-50066" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50066">
<h2 id="wizard-screen-50066">Screening questions</h2>
<div class="field-row"><label for="personal-statement-50066-500">Personal statement (50066)</label><textarea id="personal-statement-50066-500" name="personal-statement-50066-500" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="preferred-location-50066-500">Preferred location (50066)</label><select id="preferred-location-50066-500" name="preferred-location-50066-500"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option><option value="london">London</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Work authorization status (50066)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50066-50">Salary expectations (50066)</label><input type="number" id="salary-expectations-50066-50" name="salary-expectations-50066-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50066-50">Earliest start date (50066)</label><input type="date" id="earliest-start-date-50066-50" name="earliest-start-date-50066-50" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50066">
<h2 id="wizard-docs-50066">Documents and skills</h2>
<fieldset><legend>Key skills (50066)</legend><label for="key-skills-50066-50066-cb-0"><input type="checkbox" id="key-skills-50066-50066-cb-0" name="key-skills-50066-50066[]" value="sql"> SQL</label><label for="key-skills-50066-50066-cb-1"><input type="checkbox" id="key-skills-50066-50066-cb-1" name="key-skills-50066-50066[]" value="typescript"> TypeScript</label><label for="key-skills-50066-50066-cb-2"><input type="checkbox" id="key-skills-50066-50066-cb-2" name="key-skills-50066-50066[]" value="rust"> Rust</label><label for="key-skills-50066-50066-cb-3"><input type="checkbox" id="key-skills-50066-50066-cb-3" name="key-skills-50066-50066[]" value="javascript"> JavaScript</label><label for="key-skills-50066-50066-cb-4"><input type="checkbox" id="key-skills-50066-50066-cb-4" name="key-skills-50066-50066[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50066">Attach resume (50066)</label><input type="file" id="file-50066" name="file-50066" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="application-source-50066-500">Application source (50066)</label><select id="application-source-50066-500" name="application-source-50066-500"><option value="">Choose one…</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="company-site">Company site</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
