ege, moderne Büros und Technik. Außerdem bieten wir Dir eine attraktive Vergütung mit unterschiedlichen Benefits und garantieren Dir einen sicheren und unbefristeten Arbeitsplatz.</p>\n<p>Wir arbeiten mit modernen Cloud- und Container-Technologien wie Docker, Kubernetes, AWS, Azure und GitLab CI/CD. Unser Technologie-Stack basiert auf State-of-the-Art-Technologien wie .Net, Java und Vue.js, um innovative und leistungsfähige Lösungen zu entwickeln.<strong><br></strong><br></p>\n<ul></ul>\n<p><strong>Deine Benefits</strong></p>\n<p>Bei GECKO suchen wir Menschen mit Leidenschaft und Engagement, um in den kommenden Jahren weiter wachsen zu können. Im Gegenzug sind wir gern bereit in unsere Mitarbeiter zu investieren, sowohl bei der Arbeit als auch im täglichen Leben.<em><br></em></p>\n<p><em>Bleib flexibel</em></p>\n<p>Uns ist es nicht wichtig, dass du zu einem festen Zeitpunkt im Büro sitzt. Wir wissen, dass Mitarbeiter am produktivsten sind, wenn sie ihre Arbeitsroutine in Einklang mit dem Privatleben bringen können. Ob im Büro oder im Home Office, bei uns kannst du dir den Tag mit flexiblen Arbeitszeiten so einteilen, dass er zu deinem Leben passt. Dabei unterstützen wir dich mit modernen Kommunikationstools und einer transparenten Arbeitsplanung.</p>\n<p><em>Empfehle und profitiere</em></p>\n<p>Wir sind ständig auf der Suche nach Talenten, die Teil unseres Teams werden möchten. Für Mitarbeiter, die überzeugt sind den perfekten Kandidaten zu kennen, der uns beim Wachsen unterstützen kann und der gut zu uns passt, zahlen wir bei Übernahme eines empfohlenen Mitarbeiters eine Prämie, die sich sehen lassen kann.</p>\n<p><em>Bleib fit</em></p>\n<p>Kennst du das auch? Du steckst gerade mitten im Workflow und ein kleines Hungergefühl stellt sich ein. Dafür haben wir vorgesorgt und stellen kostenlos frisches Obst in den Büros bereit und sorgen mit Getränken, wie z.B. Wasser, Kaffee und Mate dafür, dass auch das Trinken nicht zu kurz kommt. So kannst du dich jederzeit stärken und schon geht’s motiviert weiter.</p>\n<p><em>Arbeiten und Spaß haben</em></p>\n<p>Wer fleißig gearbeitet hat, darf sich natürlich auch belohnen. In den Pausen oder nach Feierabend kannst du dich gern bei uns in den Chillout Areas zum Quatschen mit den Kollegen treffen oder beim Zocken an der Playstation antreten. Team-Events und Mitarbeiterfrühstück gehören bei uns genauso dazu, wie der kleine Plausch in der Küche, denn stärken wir das Wir-Gefühl und wachsen weiter zusammen.<br><br></p>\n\n<p><strong>Bewirb Dich jetzt</strong></p>\n<p>Um für die täglichen Herausforderungen gewappnet zu sein und den Geschäftserfolg nachhaltig zu stärken, glauben wir nicht nur an Expertise und Erfahrung. Wir glauben vor allem auch an den Zusammenhalt unserer Teams und an eine Kultur, die Respekt, Toleranz und ein faires Miteinander fördert. Wenn du ähnlich tickst wie wir, sind wir schon jetzt sehr gespannt darauf dich kennenzulernen.</p>&quot;,&quot;salary_range&quot;:{&quot;currency&quot;:{&quot;name&quot;:&quot;US Dollar&quot;,&quot;symbol&quot;:&quot;$&quot;,&quot;symbolNative&quot;:&quot;$&quot;,&quot;decimalDigits&quot;:2,&quot;rounding&quot;:0,&quot;code&quot;:&quot;USD&quot;,&quot;namePlural&quot;:&quot;US dollars&quot;},&quot;period&quot;:{&quot;id&quot;:&quot;yearly&quot;,&quot;name&quot;:&quot;Yearly&quot;},&quot;display&quot;:&quot;&quot;},&quot;candidate_type&quot;:&quot;all&quot;,&quot;experience&quot;:null,&quot;application_form&quot;:{&quot;name&quot;:&quot;required&quot;,&quot;headline&quot;:&quot;optional&quot;,&quot;summary&quot;:&quot;hidden&quot;,&quot;profile_photo&quot;:&quot;optional&quot;,&quot;address&quot;:&quot;optional&quot;,&quot;email_address&quot;:&quot;required&quot;,&quot;phone_number&quot;:&quot;optional&quot;,&quot;resume&quot;:&quot;required&quot;,&quot;work_history&quot;:&quot;hidden&quot;,&quot;education&quot;:&quot;hidden&quot;,&quot;cover_letter&quot;:&quot;optional&quot;,&quot;questionnaire_in_experience&quot;:true,&quot;gdpr&quot;:&quot;req
