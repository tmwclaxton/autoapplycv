<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9164</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9164</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Preferred name (9164)</mat-label><label for="ang-name-9164">Preferred name (9164)</label><input matInput id="ang-name-9164" name="ang-name-9164" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Work email (9164)</mat-label><label for="ang-email-9164">Work email (9164)</label><input matInput id="ang-email-9164" name="ang-email-9164" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Cell phone (9164)</mat-label><label for="ang-phone-9164">Cell phone (9164)</label><input matInput id="ang-phone-9164" name="ang-phone-9164" type="tel"></mat-form-field>
<div class="field-row"><label for="personal-statement-9164-9164">Personal statement (9164)</label><textarea id="personal-statement-9164-9164" name="personal-statement-9164-9164" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-9164-9164">Office preference (9164)</label><select id="office-preference-9164-9164" name="office-preference-9164-9164"><option value="">Choose one…</option><option value="london">London</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
