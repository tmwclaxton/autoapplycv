<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50477</title></head>
<body>
<main><h1>Conditional complex apply 50477</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50477">
<p id="step1-label-50477">Step 1 - Contact</p>

<label for="cond-name-50477">Your name (50477)</label>
<input type="text" id="cond-name-50477" name="cond-name-50477" autocomplete="name">
<label for="cond-email-50477">Email address (50477)</label>
<input type="email" id="cond-email-50477" name="cond-email-50477" autocomplete="email">
<label for="cond-phone-50477">Telephone (50477)</label>
<input type="tel" id="cond-phone-50477" name="cond-phone-50477" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50477">
<p id="step2-label-50477">Step 2 - Preferences</p>
<div class="field-row"><label for="work-location-50477-50477">Work location (50477)</label><select id="work-location-50477-50477" name="work-location-50477-50477"><option value="">Choose one…</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Willing to relocate? (50477)</legend><label for="willing-to-relocate-5047-0"><input type="radio" id="willing-to-relocate-5047-0" name="willing-to-relocate-5047" value="yes"> Yes</label><label for="willing-to-relocate-5047-1"><input type="radio" id="willing-to-relocate-5047-1" name="willing-to-relocate-5047" value="no"> No</label><label for="willing-to-relocate-5047-2"><input type="radio" id="willing-to-relocate-5047-2" name="willing-to-relocate-5047" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="start-date-preference-50477-">Start date preference (50477)</label><input type="date" id="start-date-preference-50477-" name="start-date-preference-50477-" ></div>
<fieldset><legend>Technical skills (50477)</legend><label for="technical-skills-50477-5-cb-0"><input type="checkbox" id="technical-skills-50477-5-cb-0" name="technical-skills-50477-5[]" value="laravel"> Laravel</label><label for="technical-skills-50477-5-cb-1"><input type="checkbox" id="technical-skills-50477-5-cb-1" name="technical-skills-50477-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50477-5-cb-2"><input type="checkbox" id="technical-skills-50477-5-cb-2" name="technical-skills-50477-5[]" value="python"> Python</label><label for="technical-skills-50477-5-cb-3"><input type="checkbox" id="technical-skills-50477-5-cb-3" name="technical-skills-50477-5[]" value="rust"> Rust</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50477">
<p id="step3-label-50477">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50477" data-reveal="#reveal-50477">Show follow-up questions</button>
<div id="reveal-50477" hidden style="display:none"><div class="field-row"><label for="personal-statement-50477-504">Personal statement (50477)</label><textarea id="personal-statement-50477-504" name="personal-statement-50477-504" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="personal-website-50477-50477">Personal website (50477)</label><input type="url" id="personal-website-50477-50477" name="personal-website-50477-50477" ></div>
<div class="field-row"><label for="desired-base-salary-50477-50">Desired base salary (50477)</label><input type="number" id="desired-base-salary-50477-50" name="desired-base-salary-50477-50" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50477">Attach resume (50477)</label><input type="file" id="file-50477" name="file-50477" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
