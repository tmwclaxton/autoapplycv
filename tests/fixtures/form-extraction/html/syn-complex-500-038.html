<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50038</title></head>
<body>
<main><h1>Mixed complex apply 50038</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50038">Applicant name (50038)</label>
<input type="text" id="mix-name-50038" name="mix-name-50038" autocomplete="name">
<label for="mix-email-50038">Personal email (50038)</label>
<input type="email" id="mix-email-50038" name="mix-email-50038" autocomplete="email">
<label for="mix-phone-50038">Telephone (50038)</label>
<input type="tel" id="mix-phone-50038" name="mix-phone-50038" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50038">Tell us about yourself (50038)</label><textarea id="tell-us-about-yourself-50038" name="tell-us-about-yourself-50038" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50038-50038">Current city (50038)</label><select id="current-city-50038-50038" name="current-city-50038-50038"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="london">London</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50038)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50038)</legend><label for="open-to-relocation-50038-0"><input type="radio" id="open-to-relocation-50038-0" name="open-to-relocation-50038" value="yes"> Yes</label><label for="open-to-relocation-50038-1"><input type="radio" id="open-to-relocation-50038-1" name="open-to-relocation-50038" value="no"> No</label><label for="open-to-relocation-50038-2"><input type="radio" id="open-to-relocation-50038-2" name="open-to-relocation-50038" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50038-50">Desired base salary (50038)</label><input type="number" id="desired-base-salary-50038-50" name="desired-base-salary-50038-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50038-500">When can you start? (50038)</label><input type="date" id="when-can-you-start-50038-500" name="when-can-you-start-50038-500" ></div>
<div class="field-row"><label for="referral-source-50038-50038">Referral source (50038)</label><select id="referral-source-50038-50038" name="referral-source-50038-50038"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="other">Other</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Technical skills (50038)</legend><label for="technical-skills-50038-5-cb-0"><input type="checkbox" id="technical-skills-50038-5-cb-0" name="technical-skills-50038-5[]" value="sql"> SQL</label><label for="technical-skills-50038-5-cb-1"><input type="checkbox" id="technical-skills-50038-5-cb-1" name="technical-skills-50038-5[]" value="python"> Python</label><label for="technical-skills-50038-5-cb-2"><input type="checkbox" id="technical-skills-50038-5-cb-2" name="technical-skills-50038-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50038-5-cb-3"><input type="checkbox" id="technical-skills-50038-5-cb-3" name="technical-skills-50038-5[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50038">Attach resume (50038)</label><input type="file" id="file-50038" name="file-50038" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50038-50038">GitHub profile (50038)</label><input type="url" id="github-profile-50038-50038" name="github-profile-50038-50038" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
