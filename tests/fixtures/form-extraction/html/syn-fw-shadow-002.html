<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Web component apply 2</title></head>
<body>

<main>
<h1>Web component apply 2</h1>
<apply-form-widget data-stage="2">
<form slot="application" action="/apply" method="post">
<section class="wc-host">
<label for="wc-name-1">Legal name</label>
<input id="wc-name-1" name="wc-name-1" type="text">
<label for="wc-email-1">Work email</label>
<input id="wc-email-1" name="wc-email-1" type="email">
<label for="wc-phone-1">Mobile number</label>
<input id="wc-phone-1" name="wc-phone-1" type="tel">
<fieldset><legend>Willing to relocate?</legend><label for="willing-to-relocate-0"><input type="radio" id="willing-to-relocate-0" name="willing-to-relocate" value="yes"> Yes</label><label for="willing-to-relocate-1"><input type="radio" id="willing-to-relocate-1" name="willing-to-relocate" value="no"> No</label></fieldset>
</section>
<button type="button">Continue</button>
</form>
</apply-form-widget>
<job-application-panel>
<div class="panel-inner" role="group" aria-label="Additional questions">
<div class="field-row"><label for="referral-source">Referral source</label><select id="referral-source" name="referral-source" ><option value="">Choose one…</option><option value="website">Website</option><option value="linkedin">LinkedIn</option><option value="friend">Friend</option><option value="other">Other</option></select></div>
</div>
</job-application-panel>
</main>
</body>
</html>
