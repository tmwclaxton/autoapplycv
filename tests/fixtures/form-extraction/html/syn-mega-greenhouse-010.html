<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Greenhouse-style 9400</title></head>
<body>
<main><h1>Greenhouse-style 9400</h1><form action="/apply" method="post">
<div id="application" class="application--container">

<div class="field"><label id="gh-name-9400-label" for="gh-name-9400">Applicant name (9400)</label><input aria-labelledby="gh-name-9400-label" type="text" id="gh-name-9400" name="gh-name-9400" autocomplete="name">
<div class="field"><label id="gh-email-9400-label" for="gh-email-9400">Work email (9400)</label><input aria-labelledby="gh-email-9400-label" type="email" id="gh-email-9400" name="gh-email-9400" autocomplete="email">
<div class="field"><label id="gh-phone-9400-label" for="gh-phone-9400">Phone number (9400)</label><input aria-labelledby="gh-phone-9400-label" type="tel" id="gh-phone-9400" name="gh-phone-9400" autocomplete="tel">
<div class="field-row"><label for="motivation-statement-9400-94">Motivation statement (9400)</label><textarea id="motivation-statement-9400-94" name="motivation-statement-9400-94" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="how-did-you-hear-about-us-94">How did you hear about us? (9400)</label><select id="how-did-you-hear-about-us-94" name="how-did-you-hear-about-us-94"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="other">Other</option></select></div>
<div class="file-row"><label for="file-upload-9400">Attach resume (optional)</label><input type="file" id="file-upload-9400" name="file-upload-9400" accept=".pdf,.doc"></div>
</div></form></main>
</body>
</html>
