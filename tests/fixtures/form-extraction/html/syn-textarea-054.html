<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Textarea Application 5</title></head>
<body>
<main>
<h1>Textarea Application 5</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="name-as-on-cv">Name as on CV</label><input type="text" id="name-as-on-cv" name="name-as-on-cv" ></div>
<div class="form-group"><label for="personal-email">Personal email</label><input type="email" id="personal-email" name="personal-email" ></div>
<div class="form-group"><label for="cover-letter">Cover letter</label><textarea id="cover-letter" name="cover-letter" rows="4" maxlength="450"></textarea></div>
<div class="form-group"><label for="describe-a-challenging-p">Describe a challenging project you led</label><textarea id="describe-a-challenging-p" name="describe-a-challenging-p" rows="4" maxlength="800"></textarea></div>

</form>
</main>
</body>
</html>
