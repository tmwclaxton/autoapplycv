<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Greenhouse-style 9430</title></head>
<body>
<main><h1>Greenhouse-style 9430</h1><form action="/apply" method="post">
<div id="application" class="application--container">

<div class="field"><label id="gh-name-9430-label" for="gh-name-9430">Full name (9430)</label><input aria-labelledby="gh-name-9430-label" type="text" id="gh-name-9430" name="gh-name-9430" autocomplete="name">
<div class="field"><label id="gh-email-9430-label" for="gh-email-9430">Application email (9430)</label><input aria-labelledby="gh-email-9430-label" type="email" id="gh-email-9430" name="gh-email-9430" autocomplete="email">
<div class="field"><label id="gh-phone-9430-label" for="gh-phone-9430">Phone number (9430)</label><input aria-labelledby="gh-phone-9430-label" type="tel" id="gh-phone-9430" name="gh-phone-9430" autocomplete="tel">
<div class="field-row"><label for="motivation-statement-9430-94">Motivation statement (9430)</label><textarea id="motivation-statement-9430-94" name="motivation-statement-9430-94" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="discovery-channel-9430-9430">Discovery channel (9430)</label><select id="discovery-channel-9430-9430" name="discovery-channel-9430-9430"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="other">Other</option></select></div>
<div class="file-row"><label for="file-upload-9430">Attach resume (optional)</label><input type="file" id="file-upload-9430" name="file-upload-9430" accept=".pdf,.doc"></div>
</div></form></main>
</body>
</html>
