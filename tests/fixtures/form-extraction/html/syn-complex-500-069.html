<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50069</title></head>
<body>
<main><h1>Long complex apply 50069</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50069">Your name (50069)</label>
<input type="text" id="long-name-50069" name="long-name-50069" autocomplete="name">
<label for="long-email-50069">Email address (50069)</label>
<input type="email" id="long-email-50069" name="long-email-50069" autocomplete="email">
<label for="long-phone-50069">Telephone (50069)</label>
<input type="tel" id="long-phone-50069" name="long-phone-50069" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50069">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50069" name="linkedin-profile-url-50069" ></div>
<div class="field-row"><label for="current-employer-50069">Current employer</label><input type="text" id="current-employer-50069" name="current-employer-50069" ></div>
<div class="field-row"><label for="current-job-title-50069">Current job title</label><input type="text" id="current-job-title-50069" name="current-job-title-50069" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="cover-letter-50069-50069">Cover letter (50069)</label><textarea id="cover-letter-50069-50069" name="cover-letter-50069-50069" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="preferred-location-50069-500">Preferred location (50069)</label><select id="preferred-location-50069-500" name="preferred-location-50069-500"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50069)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50069)</legend><label for="open-to-relocation-50069-0"><input type="radio" id="open-to-relocation-50069-0" name="open-to-relocation-50069" value="yes"> Yes</label><label for="open-to-relocation-50069-1"><input type="radio" id="open-to-relocation-50069-1" name="open-to-relocation-50069" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50069-50069">Expected salary (50069)</label><input type="number" id="expected-salary-50069-50069" name="expected-salary-50069-50069" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50069-500">When can you start? (50069)</label><input type="date" id="when-can-you-start-50069-500" name="when-can-you-start-50069-500" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50069)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="other">Other</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Primary expertise (50069)</legend><label for="primary-expertise-50069--cb-0"><input type="checkbox" id="primary-expertise-50069--cb-0" name="primary-expertise-50069-[]" value="laravel"> Laravel</label><label for="primary-expertise-50069--cb-1"><input type="checkbox" id="primary-expertise-50069--cb-1" name="primary-expertise-50069-[]" value="python"> Python</label><label for="primary-expertise-50069--cb-2"><input type="checkbox" id="primary-expertise-50069--cb-2" name="primary-expertise-50069-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50069--cb-3"><input type="checkbox" id="primary-expertise-50069--cb-3" name="primary-expertise-50069-[]" value="react"> React</label><label for="primary-expertise-50069--cb-4"><input type="checkbox" id="primary-expertise-50069--cb-4" name="primary-expertise-50069-[]" value="sql"> SQL</label><label for="primary-expertise-50069--cb-5"><input type="checkbox" id="primary-expertise-50069--cb-5" name="primary-expertise-50069-[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50069">Attach resume (50069)</label><input type="file" id="file-50069" name="file-50069" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
