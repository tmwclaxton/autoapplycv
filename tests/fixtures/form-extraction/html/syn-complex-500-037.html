<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50037</title></head>
<body>
<main><h1>Conditional complex apply 50037</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50037">
<p id="step1-label-50037">Step 1 - Contact</p>

<label for="cond-name-50037">Full name (50037)</label>
<input type="text" id="cond-name-50037" name="cond-name-50037" autocomplete="name">
<label for="cond-email-50037">Personal email (50037)</label>
<input type="email" id="cond-email-50037" name="cond-email-50037" autocomplete="email">
<label for="cond-phone-50037">Mobile number (50037)</label>
<input type="tel" id="cond-phone-50037" name="cond-phone-50037" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50037">
<p id="step2-label-50037">Step 2 - Preferences</p>
<div class="field-row"><label for="preferred-location-50037-500">Preferred location (50037)</label><select id="preferred-location-50037-500" name="preferred-location-50037-500"><option value="">Choose one…</option><option value="london">London</option><option value="new-york">New York</option><option value="manchester">Manchester</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Willing to relocate? (50037)</legend><label for="willing-to-relocate-5003-0"><input type="radio" id="willing-to-relocate-5003-0" name="willing-to-relocate-5003" value="yes"> Yes</label><label for="willing-to-relocate-5003-1"><input type="radio" id="willing-to-relocate-5003-1" name="willing-to-relocate-5003" value="no"> No</label><label for="willing-to-relocate-5003-2"><input type="radio" id="willing-to-relocate-5003-2" name="willing-to-relocate-5003" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="when-can-you-start-50037-500">When can you start? (50037)</label><input type="date" id="when-can-you-start-50037-500" name="when-can-you-start-50037-500" ></div>
<fieldset><legend>Primary expertise (50037)</legend><label for="primary-expertise-50037--cb-0"><input type="checkbox" id="primary-expertise-50037--cb-0" name="primary-expertise-50037-[]" value="sql"> SQL</label><label for="primary-expertise-50037--cb-1"><input type="checkbox" id="primary-expertise-50037--cb-1" name="primary-expertise-50037-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50037--cb-2"><input type="checkbox" id="primary-expertise-50037--cb-2" name="primary-expertise-50037-[]" value="laravel"> Laravel</label><label for="primary-expertise-50037--cb-3"><input type="checkbox" id="primary-expertise-50037--cb-3" name="primary-expertise-50037-[]" value="go"> Go</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50037">
<p id="step3-label-50037">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50037" data-reveal="#reveal-50037">Show follow-up questions</button>
<div id="reveal-50037" hidden style="display:none"><div class="field-row"><label for="tell-us-about-yourself-50037">Tell us about yourself (50037)</label><textarea id="tell-us-about-yourself-50037" name="tell-us-about-yourself-50037" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="github-profile-50037-50037">GitHub profile (50037)</label><input type="url" id="github-profile-50037-50037" name="github-profile-50037-50037" ></div>
<div class="field-row"><label for="compensation-requirement-500">Compensation requirement (50037)</label><input type="number" id="compensation-requirement-500" name="compensation-requirement-500" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50037">Attach resume (50037)</label><input type="file" id="file-50037" name="file-50037" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
