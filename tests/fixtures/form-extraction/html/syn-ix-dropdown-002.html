<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>React dropdown visible</title></head>
<body>
<main><h1>React dropdown visible</h1><form action="/apply" method="post">
<label for="ix-name-1">Legal name</label>
<input type="text" id="ix-name-1" name="ix-name-1">
<label for="ix-email-1">Work email</label>
<input type="email" id="ix-email-1" name="ix-email-1">
<label for="ix-phone-1">Mobile number</label>
<input type="tel" id="ix-phone-1" name="ix-phone-1">
<div data-reactroot class="ApplicationForm">
<div class="MuiAutocomplete-root">
<label id="react-listbox-1-lbl">Work location</label>
<div role="combobox" aria-expanded="true" aria-controls="react-listbox-1" aria-labelledby="react-listbox-1-lbl" class="custom-dropdown-trigger" tabindex="0" data-reveal="#react-listbox-1">Work location</div>
<div role="listbox" id="react-listbox-1" aria-labelledby="react-listbox-1-lbl" >
<div role="option">Office</div>
<div role="option">Remote</div>
<div role="option">Hybrid</div>
</div>
</div>
</div></form></main>
</body>
</html>
