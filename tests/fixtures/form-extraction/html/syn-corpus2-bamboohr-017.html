<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>BambooHR apply 20045</title></head>
<body>
<main><h1>BambooHR apply 20045</h1><form action="/apply" method="post">
<div class="BambooHR-ATS-Form" data-bamboohr-application="true">
<div class="field-group">
<label class="field-label" for="bb-name-20045">Legal name (20045)</label>
<input class="field-input" type="text" id="bb-name-20045" name="bb-name-20045" autocomplete="name">
<label class="field-label" for="bb-email-20045">Work email (20045)</label>
<input class="field-input" type="email" id="bb-email-20045" name="bb-email-20045" autocomplete="email">
<label class="field-label" for="bb-phone-20045">Contact number (20045)</label>
<input class="field-input" type="tel" id="bb-phone-20045" name="bb-phone-20045" autocomplete="tel"></div>

</div></form></main>

</html>
