<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Lever complex apply 50112</title></head>
<body>
<main><h1>Lever complex apply 50112</h1><form action="/apply" method="post">
<div class="application-form lever-form">
<section class="application-section" data-section="contact">

<div class="application-field"><label class="application-label">Email address (50112)</label><input name="lv-email-50112" type="email" id="lv-email-50112"></div>

<div class="field-row"><label for="referral-source-50112-50112">Referral source (50112)</label><select id="referral-source-50112-50112" name="referral-source-50112-50112"><option value="">Choose one…</option><option value="other">Other</option><option value="job-board">Job board</option><option value="conference">Conference</option><option value="company-site">Company site</option></select></div>
</section>
<section class="application-section" data-section="documents">
<h2 class="application-heading">Documents</h2>
<div class="file-row"><label for="file-50112">Resume/CV (50112)</label><input type="file" id="file-50112" name="file-50112" accept=".pdf,.doc,.docx"></div>
<div class="file-row"><label for="file-cover-50112">Cover letter file (50112)</label><input type="file" id="file-cover-50112" name="file-cover-50112" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Submit application</button>
</div></form></main>

</html>
