<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Teamtailor apply 20022</title></head>
<body>

<main class="careers-page"><h1 class="job-title">Apply — Role 20022</h1>
<form class="apply-form" action="/apply" method="post" data-teamtailor-form="application">
<section class="form-section" data-section="personal">

<div class="form-group"><label class="form-label" for="tt-name-20022">Full name (20022)</label>
</div><input class="form-control" type="text" id="tt-name-20022" name="tt-name-20022" autocomplete="name">
<div class="form-group"><label class="form-label" for="tt-email-20022">Work email (20022)</label>
</div><input class="form-control" type="email" id="tt-email-20022" name="tt-email-20022" autocomplete="email">
<div class="form-group"><label class="form-label" for="tt-phone-20022">Contact number (20022)</label>
</div><input class="form-control" type="tel" id="tt-phone-20022" name="tt-phone-20022" autocomplete="tel">
</section>
<section class="form-section" data-section="questions">
<div class="field-row"><label for="motivation-statement-20022-2">Motivation statement (20022)</label><textarea id="motivation-statement-20022-2" name="motivation-statement-20022-2" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-20022-20022">Work location (20022)</label><select id="work-location-20022-20022" name="work-location-20022-20022"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option><option value="london">London</option></select></div>
<fieldset><legend>Visa sponsorship needed? (20022)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
</section>
<div class="file-row"><label for="file-20022">Attach resume (optional)</label><input type="file" id="file-20022" name="file-20022" accept=".pdf,.doc"></div>
<button type="submit" class="btn btn-primary">Submit application</button>
</form></main>
</body>
</html>
