<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Multi-step Application 2</title></head>
<body>
<main>
<h1>Multi-step Application 2</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="legal-name">Legal name</label><input type="text" id="legal-name" name="legal-name" ></div>
<div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" ></div>
<div class="form-group"><label for="mobile-number">Mobile number</label><input type="tel" id="mobile-number" name="mobile-number" ></div>
<button type="button">Continue</button>
<button type="button">Next step</button>

</form>
</main>
</body>
</html>
