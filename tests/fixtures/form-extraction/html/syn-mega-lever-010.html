<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Lever-style 9450</title></head>
<body>
<main><h1>Lever-style 9450</h1><form action="/apply" method="post">
<div class="application-form">
<div class="application-field"><label class="application-label">Legal name (9450)</label><input name="lever-name-9450" type="text" id="lever-name-9450"></div>
<div class="application-field"><label class="application-label">Application email (9450)</label><input name="lever-email-9450" type="email" id="lever-email-9450"></div>
<div class="application-field"><label class="application-label">Cell phone (9450)</label><input name="lever-phone-9450" type="tel" id="lever-phone-9450"></div>
<div class="application-field"><label class="application-label">Personal statement (9450)</label><textarea name="lever-cover-9450" id="lever-cover-9450" rows="4" maxlength="500"></textarea></div>
<div class="file-row"><label for="file-upload-9450">Attach resume (optional)</label><input type="file" id="file-upload-9450" name="file-upload-9450" accept=".pdf,.doc"></div>
<button type="button">Submit application</button>
</div></form></main>
</body>
</html>
