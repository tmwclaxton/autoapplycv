<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9922</title></head>
<body>
<main><h1>Grid layout 9922</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9922">Preferred name (9922)</label><span class="helper">Required</span><input id="grid-name-9922" name="grid-name-9922" type="text"></div>
<div><label for="grid-email-9922">Email address (9922)</label><span class="helper">Required</span><input id="grid-email-9922" name="grid-email-9922" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9922">Direct line (9922)</label><input id="grid-phone-9922" name="grid-phone-9922" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="personal-statement-9922-9922">Personal statement (9922)</label><textarea id="personal-statement-9922-9922" name="personal-statement-9922-9922" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Relocation preference (9922)</legend><label for="relocation-preference-99-0"><input type="radio" id="relocation-preference-99-0" name="relocation-preference-99" value="yes"> Yes</label><label for="relocation-preference-99-1"><input type="radio" id="relocation-preference-99-1" name="relocation-preference-99" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
