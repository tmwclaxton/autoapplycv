<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday-style apply 2</title></head>
<body>
<main><h1>Workday-style apply 2</h1><form action="/apply" method="post">
<div data-automation-id="applyFlowPrimaryPage">
<div data-testid="input-q_legal-name" class="ia-Questions-item">
<div data-testid="input-q_legal-name-label"><span data-testid="safe-markup">Legal name</span></div>
<input data-testid="input-q_legal-name-input" type="text" name="input-q_legal-name">
</div>
<div data-testid="input-q_work-email" class="ia-Questions-item">
<div data-testid="input-q_work-email-label"><span data-testid="safe-markup">Work email</span></div>
<input data-testid="input-q_work-email-input" type="email" name="input-q_work-email">
</div>
<div data-testid="input-q_mobile-number" class="ia-Questions-item">
<div data-testid="input-q_mobile-number-label"><span data-testid="safe-markup">Mobile number</span></div>
<input data-testid="input-q_mobile-number-input" type="tel" name="input-q_mobile-number">
</div>
<div data-testid="input-q_why-this-role" class="ia-Questions-item">
<div data-testid="input-q_why-this-role-label"><span data-testid="safe-markup">Why this role?</span></div>
<textarea data-testid="input-q_why-this-role-input" name="input-q_why-this-role" rows="4" maxlength="600"></textarea>
</div>
<button type="button">Save and continue</button>
</div></form></main>
</body>
</html>
