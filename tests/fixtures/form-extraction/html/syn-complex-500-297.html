<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50297</title></head>
<body>
<main><h1>Conditional complex apply 50297</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50297">
<p id="step1-label-50297">Step 1 - Contact</p>

<label for="cond-name-50297">Your name (50297)</label>
<input type="text" id="cond-name-50297" name="cond-name-50297" autocomplete="name">
<label for="cond-email-50297">Personal email (50297)</label>
<input type="email" id="cond-email-50297" name="cond-email-50297" autocomplete="email">
<label for="cond-phone-50297">Mobile number (50297)</label>
<input type="tel" id="cond-phone-50297" name="cond-phone-50297" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50297">
<p id="step2-label-50297">Step 2 - Preferences</p>
<div class="field-row"><label for="preferred-location-50297-502">Preferred location (50297)</label><select id="preferred-location-50297-502" name="preferred-location-50297-502"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Open to relocation? (50297)</legend><label for="open-to-relocation-50297-0"><input type="radio" id="open-to-relocation-50297-0" name="open-to-relocation-50297" value="yes"> Yes</label><label for="open-to-relocation-50297-1"><input type="radio" id="open-to-relocation-50297-1" name="open-to-relocation-50297" value="no"> No</label><label for="open-to-relocation-50297-2"><input type="radio" id="open-to-relocation-50297-2" name="open-to-relocation-50297" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="when-can-you-start-50297-502">When can you start? (50297)</label><input type="date" id="when-can-you-start-50297-502" name="when-can-you-start-50297-502" ></div>
<fieldset><legend>Technical skills (50297)</legend><label for="technical-skills-50297-5-cb-0"><input type="checkbox" id="technical-skills-50297-5-cb-0" name="technical-skills-50297-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50297-5-cb-1"><input type="checkbox" id="technical-skills-50297-5-cb-1" name="technical-skills-50297-5[]" value="rust"> Rust</label><label for="technical-skills-50297-5-cb-2"><input type="checkbox" id="technical-skills-50297-5-cb-2" name="technical-skills-50297-5[]" value="go"> Go</label><label for="technical-skills-50297-5-cb-3"><input type="checkbox" id="technical-skills-50297-5-cb-3" name="technical-skills-50297-5[]" value="react"> React</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50297">
<p id="step3-label-50297">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50297" data-reveal="#reveal-50297">Show follow-up questions</button>
<div id="reveal-50297" hidden style="display:none"><div class="field-row"><label for="why-this-role-50297-50297">Why this role? (50297)</label><textarea id="why-this-role-50297-50297" name="why-this-role-50297-50297" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="github-profile-50297-50297">GitHub profile (50297)</label><input type="url" id="github-profile-50297-50297" name="github-profile-50297-50297" ></div>
<div class="field-row"><label for="compensation-requirement-502">Compensation requirement (50297)</label><input type="number" id="compensation-requirement-502" name="compensation-requirement-502" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50297">Attach resume (50297)</label><input type="file" id="file-50297" name="file-50297" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
