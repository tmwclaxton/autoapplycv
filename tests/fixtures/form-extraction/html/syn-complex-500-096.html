<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50096</title></head>
<body>
<main><h1>Wizard complex apply 50096</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50096">
<h2 id="wizard-contact-50096">Contact information</h2>

<label for="wiz-name-50096">Applicant name (50096)</label>
<input type="text" id="wiz-name-50096" name="wiz-name-50096" autocomplete="name">
<label for="wiz-email-50096">Email address (50096)</label>
<input type="email" id="wiz-email-50096" name="wiz-email-50096" autocomplete="email">
<label for="wiz-phone-50096">Telephone (50096)</label>
<input type="tel" id="wiz-phone-50096" name="wiz-phone-50096" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50096">
<h2 id="wizard-screen-50096">Screening questions</h2>
<div class="field-row"><label for="cover-letter-50096-50096">Cover letter (50096)</label><textarea id="cover-letter-50096-50096" name="cover-letter-50096-50096" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="current-city-50096-50096">Current city (50096)</label><select id="current-city-50096-50096" name="current-city-50096-50096"><option value="">Choose one…</option><option value="new-york">New York</option><option value="dublin">Dublin</option><option value="london">London</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50096)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50096-50">Salary expectations (50096)</label><input type="number" id="salary-expectations-50096-50" name="salary-expectations-50096-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50096-50096">Available from (50096)</label><input type="date" id="available-from-50096-50096" name="available-from-50096-50096" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50096">
<h2 id="wizard-docs-50096">Documents and skills</h2>
<fieldset><legend>Key skills (50096)</legend><label for="key-skills-50096-50096-cb-0"><input type="checkbox" id="key-skills-50096-50096-cb-0" name="key-skills-50096-50096[]" value="react"> React</label><label for="key-skills-50096-50096-cb-1"><input type="checkbox" id="key-skills-50096-50096-cb-1" name="key-skills-50096-50096[]" value="sql"> SQL</label><label for="key-skills-50096-50096-cb-2"><input type="checkbox" id="key-skills-50096-50096-cb-2" name="key-skills-50096-50096[]" value="python"> Python</label><label for="key-skills-50096-50096-cb-3"><input type="checkbox" id="key-skills-50096-50096-cb-3" name="key-skills-50096-50096[]" value="go"> Go</label><label for="key-skills-50096-50096-cb-4"><input type="checkbox" id="key-skills-50096-50096-cb-4" name="key-skills-50096-50096[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50096">Attach resume (50096)</label><input type="file" id="file-50096" name="file-50096" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50096)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="referral">Referral</option><option value="conference">Conference</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
