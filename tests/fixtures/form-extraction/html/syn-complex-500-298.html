<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50298</title></head>
<body>
<main><h1>Mixed complex apply 50298</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50298">Applicant name (50298)</label>
<input type="text" id="mix-name-50298" name="mix-name-50298" autocomplete="name">
<label for="mix-email-50298">Personal email (50298)</label>
<input type="email" id="mix-email-50298" name="mix-email-50298" autocomplete="email">
<label for="mix-phone-50298">Mobile number (50298)</label>
<input type="tel" id="mix-phone-50298" name="mix-phone-50298" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="motivation-statement-50298-5">Motivation statement (50298)</label><textarea id="motivation-statement-50298-5" name="motivation-statement-50298-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50298-502">Preferred location (50298)</label><select id="preferred-location-50298-502" name="preferred-location-50298-502"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Work authorization status (50298)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50298)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50298-50298">Expected salary (50298)</label><input type="number" id="expected-salary-50298-50298" name="expected-salary-50298-50298" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50298-50298">Available from (50298)</label><input type="date" id="available-from-50298-50298" name="available-from-50298-50298" ></div>
<div class="field-row"><label for="referral-source-50298-50298">Referral source (50298)</label><select id="referral-source-50298-50298" name="referral-source-50298-50298"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="other">Other</option></select></div>
<fieldset><legend>Technical skills (50298)</legend><label for="technical-skills-50298-5-cb-0"><input type="checkbox" id="technical-skills-50298-5-cb-0" name="technical-skills-50298-5[]" value="sql"> SQL</label><label for="technical-skills-50298-5-cb-1"><input type="checkbox" id="technical-skills-50298-5-cb-1" name="technical-skills-50298-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50298-5-cb-2"><input type="checkbox" id="technical-skills-50298-5-cb-2" name="technical-skills-50298-5[]" value="python"> Python</label><label for="technical-skills-50298-5-cb-3"><input type="checkbox" id="technical-skills-50298-5-cb-3" name="technical-skills-50298-5[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50298">Attach resume (50298)</label><input type="file" id="file-50298" name="file-50298" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50298-50298">Personal website (50298)</label><input type="url" id="personal-website-50298-50298" name="personal-website-50298-50298" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
