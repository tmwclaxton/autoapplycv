<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Vue apply 4</title></head>
<body>
<main><h1>Vue apply 4</h1><form action="/apply" method="post">
<div id="app" data-v-003>
<div class="application-form data-v-003">
<div class="form-group data-v-003"><label for="vue-name" data-v-003>Your name</label><input data-v-003 type="text" id="vue-name" name="vue-name" v-model="form.name"></div>
<div class="form-group data-v-003"><label for="vue-email" data-v-003>Personal email</label><input data-v-003 type="email" id="vue-email" name="vue-email" v-model="form.email"></div>
<div class="form-group data-v-003"><label for="vue-phone" data-v-003>Telephone</label><input data-v-003 type="tel" id="vue-phone" name="vue-phone" v-model="form.phone"></div>
<div class="field-row"><label for="motivation-statement">Motivation statement</label><textarea id="motivation-statement" name="motivation-statement" rows="4" maxlength="500" data-v-003></textarea></div>
<div class="file-row"><label for="file-upload">Attach resume (optional)</label><input type="file" id="file-upload" name="file-upload" accept=".pdf,.doc"></div>
<button type="button">Save and continue</button>
</div>
</div></form></main>
</body>
</html>
