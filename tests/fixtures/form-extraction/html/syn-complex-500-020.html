<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50020</title></head>
<body>
<main><h1>Mixed complex apply 50020</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50020">Legal name (50020)</label>
<input type="text" id="mix-name-50020" name="mix-name-50020" autocomplete="name">
<label for="mix-email-50020">Email address (50020)</label>
<input type="email" id="mix-email-50020" name="mix-email-50020" autocomplete="email">
<label for="mix-phone-50020">Phone number (50020)</label>
<input type="tel" id="mix-phone-50020" name="mix-phone-50020" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50020">Tell us about yourself (50020)</label><textarea id="tell-us-about-yourself-50020" name="tell-us-about-yourself-50020" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50020-50020">Work location (50020)</label><select id="work-location-50020-50020" name="work-location-50020-50020"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="new-york">New York</option><option value="london">London</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Work authorization status (50020)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50020)</legend><label for="open-to-relocation-50020-0"><input type="radio" id="open-to-relocation-50020-0" name="open-to-relocation-50020" value="yes"> Yes</label><label for="open-to-relocation-50020-1"><input type="radio" id="open-to-relocation-50020-1" name="open-to-relocation-50020" value="no"> No</label><label for="open-to-relocation-50020-2"><input type="radio" id="open-to-relocation-50020-2" name="open-to-relocation-50020" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50020-50">Salary expectations (50020)</label><input type="number" id="salary-expectations-50020-50" name="salary-expectations-50020-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50020-50">Earliest start date (50020)</label><input type="date" id="earliest-start-date-50020-50" name="earliest-start-date-50020-50" ></div>
<div class="field-row"><label for="application-source-50020-500">Application source (50020)</label><select id="application-source-50020-500" name="application-source-50020-500"><option value="">Choose one…</option><option value="conference">Conference</option><option value="other">Other</option><option value="job-board">Job board</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Technical skills (50020)</legend><label for="technical-skills-50020-5-cb-0"><input type="checkbox" id="technical-skills-50020-5-cb-0" name="technical-skills-50020-5[]" value="rust"> Rust</label><label for="technical-skills-50020-5-cb-1"><input type="checkbox" id="technical-skills-50020-5-cb-1" name="technical-skills-50020-5[]" value="python"> Python</label><label for="technical-skills-50020-5-cb-2"><input type="checkbox" id="technical-skills-50020-5-cb-2" name="technical-skills-50020-5[]" value="react"> React</label><label for="technical-skills-50020-5-cb-3"><input type="checkbox" id="technical-skills-50020-5-cb-3" name="technical-skills-50020-5[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50020">Attach resume (50020)</label><input type="file" id="file-50020" name="file-50020" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50020-5002">Work samples link (50020)</label><input type="url" id="work-samples-link-50020-5002" name="work-samples-link-50020-5002" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
