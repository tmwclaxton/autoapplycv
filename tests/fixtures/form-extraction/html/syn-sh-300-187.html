<!DOCTYPE html>
<html lang="en-GB">
<head><meta charset="utf-8"><title>Review - Product Manager</title></head>
<body>
<form data-testid="indeed-apply-form">
<h1 data-testid="review-heading">Review your application</h1>
<p>You are applying for <strong>Product Manager</strong> at <strong>Acme Corp</strong>.</p>
<div data-testid="input-ia-field-400187-confirm-email-address">
<label for="ia-field-400187-confirm-email-address" data-testid="ia-field-400187-confirm-email-address-label"><span data-testid="safe-markup">Confirm email address</span></label>
<input type="email" id="ia-field-400187-confirm-email-address" name="ia-field-400187-confirm-email-address" data-testid="ia-field-400187-confirm-email-address-input" required>
</div>
<div data-testid="input-ia-field-400187-confirm-phone-number">
<label for="ia-field-400187-confirm-phone-number" data-testid="ia-field-400187-confirm-phone-number-label"><span data-testid="safe-markup">Confirm phone number</span></label>
<input type="tel" id="ia-field-400187-confirm-phone-number" name="ia-field-400187-confirm-phone-number" data-testid="ia-field-400187-confirm-phone-number-input" required>
</div>
<div data-testid="input-ia-textarea-400187-final-comments-for-the-r">
<label for="ia-textarea-400187-final-comments-for-the-r" data-testid="ia-textarea-400187-final-comments-for-the-r-label"><span data-testid="safe-markup">Final comments for the recruiter (optional)</span></label>
<textarea rows="3" id="ia-textarea-400187-final-comments-for-the-r" name="ia-textarea-400187-final-comments-for-the-r" data-testid="ia-textarea-400187-final-comments-for-the-r-input"></textarea>
</div>
<fieldset data-testid="input-ia-radio-400187-i-agree-to-the-priva" role="radiogroup">
<legend data-testid="ia-radio-400187-i-agree-to-the-priva-label"><span data-testid="safe-markup">I agree to the privacy policy and terms</span></legend>
<label for="ia-radio-400187-i-agree-to-the-priva-0"><input type="radio" id="ia-radio-400187-i-agree-to-the-priva-0" name="ia-radio-400187-i-agree-to-the-priva" value="i-agree" data-testid="ia-radio-400187-i-agree-to-the-priva-0"> I agree</label>
</fieldset>
<button type="submit" data-testid="indeed-apply-submit"><span>Submit your application</span></button></form>
</body>
</html>
