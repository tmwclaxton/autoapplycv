<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50036</title></head>
<body>
<main><h1>Wizard complex apply 50036</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50036">
<h2 id="wizard-contact-50036">Contact information</h2>

<label for="wiz-name-50036">Full name (50036)</label>
<input type="text" id="wiz-name-50036" name="wiz-name-50036" autocomplete="name">
<label for="wiz-email-50036">Personal email (50036)</label>
<input type="email" id="wiz-email-50036" name="wiz-email-50036" autocomplete="email">
<label for="wiz-phone-50036">Telephone (50036)</label>
<input type="tel" id="wiz-phone-50036" name="wiz-phone-50036" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50036">
<h2 id="wizard-screen-50036">Screening questions</h2>
<div class="field-row"><label for="why-this-role-50036-50036">Why this role? (50036)</label><textarea id="why-this-role-50036-50036" name="why-this-role-50036-50036" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="current-city-50036-50036">Current city (50036)</label><select id="current-city-50036-50036" name="current-city-50036-50036"><option value="">Choose one…</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="london">London</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Work authorization status (50036)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50036-50">Desired base salary (50036)</label><input type="number" id="desired-base-salary-50036-50" name="desired-base-salary-50036-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50036-500">When can you start? (50036)</label><input type="date" id="when-can-you-start-50036-500" name="when-can-you-start-50036-500" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50036">
<h2 id="wizard-docs-50036">Documents and skills</h2>
<fieldset><legend>Technical skills (50036)</legend><label for="technical-skills-50036-5-cb-0"><input type="checkbox" id="technical-skills-50036-5-cb-0" name="technical-skills-50036-5[]" value="laravel"> Laravel</label><label for="technical-skills-50036-5-cb-1"><input type="checkbox" id="technical-skills-50036-5-cb-1" name="technical-skills-50036-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50036-5-cb-2"><input type="checkbox" id="technical-skills-50036-5-cb-2" name="technical-skills-50036-5[]" value="rust"> Rust</label><label for="technical-skills-50036-5-cb-3"><input type="checkbox" id="technical-skills-50036-5-cb-3" name="technical-skills-50036-5[]" value="go"> Go</label><label for="technical-skills-50036-5-cb-4"><input type="checkbox" id="technical-skills-50036-5-cb-4" name="technical-skills-50036-5[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50036">Attach resume (50036)</label><input type="file" id="file-50036" name="file-50036" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50036)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option><option value="other">Other</option><option value="referral">Referral</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
