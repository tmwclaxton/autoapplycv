<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Web component apply 5</title></head>
<body>

<main>

<apply-form-widget data-stage="5">

<section class="wc-host">
<label for="wc-name-4">Full name</label>
<input id="wc-name-4" name="wc-name-4" type="text">

<div class="field-row"><label for="cover-letter">Cover letter</label><textarea id="cover-letter" name="cover-letter" rows="4" maxlength="300" ></textarea></div>

<button type="button">Continue</button>

</apply-form-widget>

</div>
