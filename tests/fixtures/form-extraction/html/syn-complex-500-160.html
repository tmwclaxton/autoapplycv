<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50160</title></head>
<body>
<main><h1>Mixed complex apply 50160</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50160">Your name (50160)</label>
<input type="text" id="mix-name-50160" name="mix-name-50160" autocomplete="name">
<label for="mix-email-50160">Email address (50160)</label>
<input type="email" id="mix-email-50160" name="mix-email-50160" autocomplete="email">
<label for="mix-phone-50160">Mobile number (50160)</label>
<input type="tel" id="mix-phone-50160" name="mix-phone-50160" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="motivation-statement-50160-5">Motivation statement (50160)</label><textarea id="motivation-statement-50160-5" name="motivation-statement-50160-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50160-50160">Current city (50160)</label><select id="current-city-50160-50160" name="current-city-50160-50160"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="remote">Remote</option><option value="london">London</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50160)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50160)</legend><label for="willing-to-relocate-5016-0"><input type="radio" id="willing-to-relocate-5016-0" name="willing-to-relocate-5016" value="yes"> Yes</label><label for="willing-to-relocate-5016-1"><input type="radio" id="willing-to-relocate-5016-1" name="willing-to-relocate-5016" value="no"> No</label><label for="willing-to-relocate-5016-2"><input type="radio" id="willing-to-relocate-5016-2" name="willing-to-relocate-5016" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-501">Compensation requirement (50160)</label><input type="number" id="compensation-requirement-501" name="compensation-requirement-501" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50160-">Start date preference (50160)</label><input type="date" id="start-date-preference-50160-" name="start-date-preference-50160-" ></div>
<div class="field-row"><label for="application-source-50160-501">Application source (50160)</label><select id="application-source-50160-501" name="application-source-50160-501"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="conference">Conference</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Key skills (50160)</legend><label for="key-skills-50160-50160-cb-0"><input type="checkbox" id="key-skills-50160-50160-cb-0" name="key-skills-50160-50160[]" value="react"> React</label><label for="key-skills-50160-50160-cb-1"><input type="checkbox" id="key-skills-50160-50160-cb-1" name="key-skills-50160-50160[]" value="sql"> SQL</label><label for="key-skills-50160-50160-cb-2"><input type="checkbox" id="key-skills-50160-50160-cb-2" name="key-skills-50160-50160[]" value="rust"> Rust</label><label for="key-skills-50160-50160-cb-3"><input type="checkbox" id="key-skills-50160-50160-cb-3" name="key-skills-50160-50160[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50160">Attach resume (50160)</label><input type="file" id="file-50160" name="file-50160" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50160-5016">Work samples link (50160)</label><input type="url" id="work-samples-link-50160-5016" name="work-samples-link-50160-5016" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
