<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50080</title></head>
<body>
<main><h1>Mixed complex apply 50080</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50080">Legal name (50080)</label>
<input type="text" id="mix-name-50080" name="mix-name-50080" autocomplete="name">
<label for="mix-email-50080">Email address (50080)</label>
<input type="email" id="mix-email-50080" name="mix-email-50080" autocomplete="email">
<label for="mix-phone-50080">Telephone (50080)</label>
<input type="tel" id="mix-phone-50080" name="mix-phone-50080" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50080-50080">Cover letter (50080)</label><textarea id="cover-letter-50080-50080" name="cover-letter-50080-50080" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50080-50080">Work location (50080)</label><select id="work-location-50080-50080" name="work-location-50080-50080"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="new-york">New York</option><option value="dublin">Dublin</option><option value="london">London</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50080)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50080)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50080-50080">Expected salary (50080)</label><input type="number" id="expected-salary-50080-50080" name="expected-salary-50080-50080" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50080-50">Earliest start date (50080)</label><input type="date" id="earliest-start-date-50080-50" name="earliest-start-date-50080-50" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50080)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="other">Other</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option></select></div>
<fieldset><legend>Primary expertise (50080)</legend><label for="primary-expertise-50080--cb-0"><input type="checkbox" id="primary-expertise-50080--cb-0" name="primary-expertise-50080-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50080--cb-1"><input type="checkbox" id="primary-expertise-50080--cb-1" name="primary-expertise-50080-[]" value="laravel"> Laravel</label><label for="primary-expertise-50080--cb-2"><input type="checkbox" id="primary-expertise-50080--cb-2" name="primary-expertise-50080-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50080--cb-3"><input type="checkbox" id="primary-expertise-50080--cb-3" name="primary-expertise-50080-[]" value="go"> Go</label></fieldset>
<div class="file-row"><label for="file-50080">Attach resume (50080)</label><input type="file" id="file-50080" name="file-50080" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50080-50080">Personal website (50080)</label><input type="url" id="personal-website-50080-50080" name="personal-website-50080-50080" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
