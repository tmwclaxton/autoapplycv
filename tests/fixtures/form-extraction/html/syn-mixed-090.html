<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed Application 1</title></head>
<body>
<main>
<h1>Mixed Application 1</h1>
<form action="/apply" method="post">
<div data-testid="input-q_full-name" class="ia-Questions-item">
<div data-testid="input-q_full-name-label"><span data-testid="safe-markup">Full name</span></div>
<input data-testid="input-q_full-name-input" type="text" name="input-q_full-name">
</div>
<div class="field"><label id="question_email-address-label" for="question_email-address">Email address</label><input type="email" id="question_email-address" name="question_email-address" aria-labelledby="question_email-address-label"></div>
<div class="form-group"><label for="current-location">Current location</label><select id="current-location" name="current-location"><option value="">Select…</option><option value="london">London</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Do you require visa sponsorship?</legend><label><input type="radio" name="do-you-require-visa-spon" id="do-you-require-visa-spon-0" value="yes"> Yes</label><label><input type="radio" name="do-you-require-visa-spon" id="do-you-require-visa-spon-1" value="no"> No</label></fieldset>
<div class="form-group"><label for="cover-letter">Cover letter</label><textarea id="cover-letter" name="cover-letter" rows="4" maxlength="600"></textarea></div>
<div class="form-group"><label for="upload-cv">Upload CV</label><input type="file" id="upload-cv" name="upload-cv" ></div>
<button type="button">Submit application</button>

</form>
</main>
</body>
</html>
