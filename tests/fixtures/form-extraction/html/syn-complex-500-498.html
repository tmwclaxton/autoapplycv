<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50498</title></head>
<body>
<main><h1>Mixed complex apply 50498</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50498">Applicant name (50498)</label>
<input type="text" id="mix-name-50498" name="mix-name-50498" autocomplete="name">
<label for="mix-email-50498">Contact email (50498)</label>
<input type="email" id="mix-email-50498" name="mix-email-50498" autocomplete="email">
<label for="mix-phone-50498">Phone number (50498)</label>
<input type="tel" id="mix-phone-50498" name="mix-phone-50498" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50498-50498">Cover letter (50498)</label><textarea id="cover-letter-50498-50498" name="cover-letter-50498-50498" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50498-50498">Work location (50498)</label><select id="work-location-50498-50498" name="work-location-50498-50498"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option><option value="london">London</option><option value="remote">Remote</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50498)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50498)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-504">Compensation requirement (50498)</label><input type="number" id="compensation-requirement-504" name="compensation-requirement-504" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50498-50498">Available from (50498)</label><input type="date" id="available-from-50498-50498" name="available-from-50498-50498" ></div>
<div class="field-row"><label for="application-source-50498-504">Application source (50498)</label><select id="application-source-50498-504" name="application-source-50498-504"><option value="">Choose one…</option><option value="other">Other</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="job-board">Job board</option></select></div>
<fieldset><legend>Technical skills (50498)</legend><label for="technical-skills-50498-5-cb-0"><input type="checkbox" id="technical-skills-50498-5-cb-0" name="technical-skills-50498-5[]" value="laravel"> Laravel</label><label for="technical-skills-50498-5-cb-1"><input type="checkbox" id="technical-skills-50498-5-cb-1" name="technical-skills-50498-5[]" value="sql"> SQL</label><label for="technical-skills-50498-5-cb-2"><input type="checkbox" id="technical-skills-50498-5-cb-2" name="technical-skills-50498-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50498-5-cb-3"><input type="checkbox" id="technical-skills-50498-5-cb-3" name="technical-skills-50498-5[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50498">Attach resume (50498)</label><input type="file" id="file-50498" name="file-50498" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50498-50498">Personal website (50498)</label><input type="url" id="personal-website-50498-50498" name="personal-website-50498-50498" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
