<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Vue apply 9001</title></head>
<body>
<main><h1>Vue apply 9001</h1><form action="/apply" method="post">
<div id="app" data-v-9001>
<div class="application-form data-v-9001">

<label for="vue-name-9001">Your name (9001)</label>
<input type="text" id="vue-name-9001" name="vue-name-9001" autocomplete="name">
<label for="vue-email-9001">Contact email (9001)</label>
<input type="email" id="vue-email-9001" name="vue-email-9001" autocomplete="email">
<label for="vue-phone-9001">Contact number (9001)</label>
<input type="tel" id="vue-phone-9001" name="vue-phone-9001" autocomplete="tel">
<div class="field-row"><label for="motivation-statement-9001-90">Motivation statement (9001)</label><textarea id="motivation-statement-9001-90" name="motivation-statement-9001-90" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-9001-9001">Office preference (9001)</label><select id="office-preference-9001-9001" name="office-preference-9001-9001"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option><option value="london">London</option><option value="dublin">Dublin</option></select></div>
<div class="file-row"><label for="file-upload-9001">Attach resume (optional)</label><input type="file" id="file-upload-9001" name="file-upload-9001" accept=".pdf,.doc"></div>
<button type="button">Save and continue</button>
</div>
</div></form></main>
</body>
</html>
