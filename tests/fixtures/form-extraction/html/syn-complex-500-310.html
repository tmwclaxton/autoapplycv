<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50310</title></head>
<body>
<main><h1>Mixed complex apply 50310</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50310">Your name (50310)</label>
<input type="text" id="mix-name-50310" name="mix-name-50310" autocomplete="name">
<label for="mix-email-50310">Personal email (50310)</label>
<input type="email" id="mix-email-50310" name="mix-email-50310" autocomplete="email">
<label for="mix-phone-50310">Telephone (50310)</label>
<input type="tel" id="mix-phone-50310" name="mix-phone-50310" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="why-this-role-50310-50310">Why this role? (50310)</label><textarea id="why-this-role-50310-50310" name="why-this-role-50310-50310" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50310-503">Preferred location (50310)</label><select id="preferred-location-50310-503" name="preferred-location-50310-503"><option value="">Choose one…</option><option value="london">London</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Work authorization status (50310)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50310)</legend><label for="willing-to-relocate-5031-0"><input type="radio" id="willing-to-relocate-5031-0" name="willing-to-relocate-5031" value="yes"> Yes</label><label for="willing-to-relocate-5031-1"><input type="radio" id="willing-to-relocate-5031-1" name="willing-to-relocate-5031" value="no"> No</label><label for="willing-to-relocate-5031-2"><input type="radio" id="willing-to-relocate-5031-2" name="willing-to-relocate-5031" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50310-50310">Expected salary (50310)</label><input type="number" id="expected-salary-50310-50310" name="expected-salary-50310-50310" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50310-503">When can you start? (50310)</label><input type="date" id="when-can-you-start-50310-503" name="when-can-you-start-50310-503" ></div>
<div class="field-row"><label for="referral-source-50310-50310">Referral source (50310)</label><select id="referral-source-50310-50310" name="referral-source-50310-50310"><option value="">Choose one…</option><option value="other">Other</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Key skills (50310)</legend><label for="key-skills-50310-50310-cb-0"><input type="checkbox" id="key-skills-50310-50310-cb-0" name="key-skills-50310-50310[]" value="python"> Python</label><label for="key-skills-50310-50310-cb-1"><input type="checkbox" id="key-skills-50310-50310-cb-1" name="key-skills-50310-50310[]" value="sql"> SQL</label><label for="key-skills-50310-50310-cb-2"><input type="checkbox" id="key-skills-50310-50310-cb-2" name="key-skills-50310-50310[]" value="javascript"> JavaScript</label><label for="key-skills-50310-50310-cb-3"><input type="checkbox" id="key-skills-50310-50310-cb-3" name="key-skills-50310-50310[]" value="go"> Go</label></fieldset>
<div class="file-row"><label for="file-50310">Attach resume (50310)</label><input type="file" id="file-50310" name="file-50310" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50310-50310">GitHub profile (50310)</label><input type="url" id="github-profile-50310-50310" name="github-profile-50310-50310" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
