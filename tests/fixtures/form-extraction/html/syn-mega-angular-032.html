<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9192</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9192</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Full name (9192)</mat-label><label for="ang-name-9192">Full name (9192)</label><input matInput id="ang-name-9192" name="ang-name-9192" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Contact email (9192)</mat-label><label for="ang-email-9192">Contact email (9192)</label><input matInput id="ang-email-9192" name="ang-email-9192" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Mobile number (9192)</mat-label><label for="ang-phone-9192">Mobile number (9192)</label><input matInput id="ang-phone-9192" name="ang-phone-9192" type="tel"></mat-form-field>
<div class="field-row"><label for="cover-letter-9192-9192">Cover letter (9192)</label><textarea id="cover-letter-9192-9192" name="cover-letter-9192-9192" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="where-are-you-based-9192-919">Where are you based? (9192)</label><select id="where-are-you-based-9192-919" name="where-are-you-based-9192-919"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option><option value="london">London</option><option value="manchester">Manchester</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
