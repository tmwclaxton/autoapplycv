<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50419</title></head>
<body>
<main><h1>Long complex apply 50419</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50419">Your name (50419)</label>
<input type="text" id="long-name-50419" name="long-name-50419" autocomplete="name">
<label for="long-email-50419">Contact email (50419)</label>
<input type="email" id="long-email-50419" name="long-email-50419" autocomplete="email">
<label for="long-phone-50419">Telephone (50419)</label>
<input type="tel" id="long-phone-50419" name="long-phone-50419" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50419">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50419" name="linkedin-profile-url-50419" ></div>
<div class="field-row"><label for="current-employer-50419">Current employer</label><input type="text" id="current-employer-50419" name="current-employer-50419" ></div>
<div class="field-row"><label for="current-job-title-50419">Current job title</label><input type="text" id="current-job-title-50419" name="current-job-title-50419" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="personal-statement-50419-504">Personal statement (50419)</label><textarea id="personal-statement-50419-504" name="personal-statement-50419-504" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="preferred-location-50419-504">Preferred location (50419)</label><select id="preferred-location-50419-504" name="preferred-location-50419-504"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Work authorization status (50419)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50419)</legend><label for="open-to-relocation-50419-0"><input type="radio" id="open-to-relocation-50419-0" name="open-to-relocation-50419" value="yes"> Yes</label><label for="open-to-relocation-50419-1"><input type="radio" id="open-to-relocation-50419-1" name="open-to-relocation-50419" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-504">Compensation requirement (50419)</label><input type="number" id="compensation-requirement-504" name="compensation-requirement-504" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50419-50">Earliest start date (50419)</label><input type="date" id="earliest-start-date-50419-50" name="earliest-start-date-50419-50" ></div>
<div class="field-row"><label for="application-source-50419-504">Application source (50419)</label><select id="application-source-50419-504" name="application-source-50419-504"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="conference">Conference</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Core competencies (50419)</legend><label for="core-competencies-50419--cb-0"><input type="checkbox" id="core-competencies-50419--cb-0" name="core-competencies-50419-[]" value="sql"> SQL</label><label for="core-competencies-50419--cb-1"><input type="checkbox" id="core-competencies-50419--cb-1" name="core-competencies-50419-[]" value="rust"> Rust</label><label for="core-competencies-50419--cb-2"><input type="checkbox" id="core-competencies-50419--cb-2" name="core-competencies-50419-[]" value="laravel"> Laravel</label><label for="core-competencies-50419--cb-3"><input type="checkbox" id="core-competencies-50419--cb-3" name="core-competencies-50419-[]" value="react"> React</label><label for="core-competencies-50419--cb-4"><input type="checkbox" id="core-competencies-50419--cb-4" name="core-competencies-50419-[]" value="go"> Go</label><label for="core-competencies-50419--cb-5"><input type="checkbox" id="core-competencies-50419--cb-5" name="core-competencies-50419-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50419">Attach resume (50419)</label><input type="file" id="file-50419" name="file-50419" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
