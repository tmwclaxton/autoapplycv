<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50409</title></head>
<body>
<main><h1>Long complex apply 50409</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50409">Preferred name (50409)</label>
<input type="text" id="long-name-50409" name="long-name-50409" autocomplete="name">
<label for="long-email-50409">Work email (50409)</label>
<input type="email" id="long-email-50409" name="long-email-50409" autocomplete="email">
<label for="long-phone-50409">Mobile number (50409)</label>
<input type="tel" id="long-phone-50409" name="long-phone-50409" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50409">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50409" name="linkedin-profile-url-50409" ></div>
<div class="field-row"><label for="current-employer-50409">Current employer</label><input type="text" id="current-employer-50409" name="current-employer-50409" ></div>
<div class="field-row"><label for="current-job-title-50409">Current job title</label><input type="text" id="current-job-title-50409" name="current-job-title-50409" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="why-this-role-50409-50409">Why this role? (50409)</label><textarea id="why-this-role-50409-50409" name="why-this-role-50409-50409" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="current-city-50409-50409">Current city (50409)</label><select id="current-city-50409-50409" name="current-city-50409-50409"><option value="">Choose one…</option><option value="remote">Remote</option><option value="london">London</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50409)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50409)</legend><label for="willing-to-relocate-5040-0"><input type="radio" id="willing-to-relocate-5040-0" name="willing-to-relocate-5040" value="yes"> Yes</label><label for="willing-to-relocate-5040-1"><input type="radio" id="willing-to-relocate-5040-1" name="willing-to-relocate-5040" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50409-50">Salary expectations (50409)</label><input type="number" id="salary-expectations-50409-50" name="salary-expectations-50409-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50409-504">When can you start? (50409)</label><input type="date" id="when-can-you-start-50409-504" name="when-can-you-start-50409-504" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50409)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="other">Other</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Key skills (50409)</legend><label for="key-skills-50409-50409-cb-0"><input type="checkbox" id="key-skills-50409-50409-cb-0" name="key-skills-50409-50409[]" value="python"> Python</label><label for="key-skills-50409-50409-cb-1"><input type="checkbox" id="key-skills-50409-50409-cb-1" name="key-skills-50409-50409[]" value="typescript"> TypeScript</label><label for="key-skills-50409-50409-cb-2"><input type="checkbox" id="key-skills-50409-50409-cb-2" name="key-skills-50409-50409[]" value="javascript"> JavaScript</label><label for="key-skills-50409-50409-cb-3"><input type="checkbox" id="key-skills-50409-50409-cb-3" name="key-skills-50409-50409[]" value="sql"> SQL</label><label for="key-skills-50409-50409-cb-4"><input type="checkbox" id="key-skills-50409-50409-cb-4" name="key-skills-50409-50409[]" value="rust"> Rust</label><label for="key-skills-50409-50409-cb-5"><input type="checkbox" id="key-skills-50409-50409-cb-5" name="key-skills-50409-50409[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50409">Attach resume (50409)</label><input type="file" id="file-50409" name="file-50409" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
