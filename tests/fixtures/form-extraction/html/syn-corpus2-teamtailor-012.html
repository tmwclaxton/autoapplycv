<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Teamtailor apply 20012</title></head>
<body>

<main class="careers-page"><h1 class="job-title">Apply — Role 20012</h1>
<form class="apply-form" action="/apply" method="post" data-teamtailor-form="application">
<section class="form-section" data-section="personal">

<div class="form-group"><label class="form-label" for="tt-name-20012">Full name (20012)</label>
</div><input class="form-control" type="text" id="tt-name-20012" name="tt-name-20012" autocomplete="name">
<div class="form-group"><label class="form-label" for="tt-email-20012">Personal email (20012)</label>
</div><input class="form-control" type="email" id="tt-email-20012" name="tt-email-20012" autocomplete="email">
<div class="form-group"><label class="form-label" for="tt-phone-20012">Mobile number (20012)</label>
</div><input class="form-control" type="tel" id="tt-phone-20012" name="tt-phone-20012" autocomplete="tel">
</section>
<section class="form-section" data-section="questions">
<div class="field-row"><label for="cover-letter-20012-20012">Cover letter (20012)</label><textarea id="cover-letter-20012-20012" name="cover-letter-20012-20012" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-20012-200">Preferred location (20012)</label><select id="preferred-location-20012-200" name="preferred-location-20012-200"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="london">London</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (20012)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
</section>
<div class="file-row"><label for="file-20012">Attach resume (optional)</label><input type="file" id="file-20012" name="file-20012" accept=".pdf,.doc"></div>
<button type="submit" class="btn btn-primary">Submit application</button>
</form></main>
</body>
</html>
