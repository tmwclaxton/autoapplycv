<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50467</title></head>
<body>
<main><h1>Conditional complex apply 50467</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50467">
<p id="step1-label-50467">Step 1 - Contact</p>

<label for="cond-name-50467">Applicant name (50467)</label>
<input type="text" id="cond-name-50467" name="cond-name-50467" autocomplete="name">
<label for="cond-email-50467">Email address (50467)</label>
<input type="email" id="cond-email-50467" name="cond-email-50467" autocomplete="email">
<label for="cond-phone-50467">Phone number (50467)</label>
<input type="tel" id="cond-phone-50467" name="cond-phone-50467" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50467">
<p id="step2-label-50467">Step 2 - Preferences</p>
<div class="field-row"><label for="office-preference-50467-5046">Office preference (50467)</label><select id="office-preference-50467-5046" name="office-preference-50467-5046"><option value="">Choose one…</option><option value="remote">Remote</option><option value="london">London</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Open to relocation? (50467)</legend><label for="open-to-relocation-50467-0"><input type="radio" id="open-to-relocation-50467-0" name="open-to-relocation-50467" value="yes"> Yes</label><label for="open-to-relocation-50467-1"><input type="radio" id="open-to-relocation-50467-1" name="open-to-relocation-50467" value="no"> No</label><label for="open-to-relocation-50467-2"><input type="radio" id="open-to-relocation-50467-2" name="open-to-relocation-50467" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="when-can-you-start-50467-504">When can you start? (50467)</label><input type="date" id="when-can-you-start-50467-504" name="when-can-you-start-50467-504" ></div>
<fieldset><legend>Key skills (50467)</legend><label for="key-skills-50467-50467-cb-0"><input type="checkbox" id="key-skills-50467-50467-cb-0" name="key-skills-50467-50467[]" value="sql"> SQL</label><label for="key-skills-50467-50467-cb-1"><input type="checkbox" id="key-skills-50467-50467-cb-1" name="key-skills-50467-50467[]" value="rust"> Rust</label><label for="key-skills-50467-50467-cb-2"><input type="checkbox" id="key-skills-50467-50467-cb-2" name="key-skills-50467-50467[]" value="laravel"> Laravel</label><label for="key-skills-50467-50467-cb-3"><input type="checkbox" id="key-skills-50467-50467-cb-3" name="key-skills-50467-50467[]" value="python"> Python</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50467">
<p id="step3-label-50467">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50467" data-reveal="#reveal-50467">Show follow-up questions</button>
<div id="reveal-50467" hidden style="display:none"><div class="field-row"><label for="tell-us-about-yourself-50467">Tell us about yourself (50467)</label><textarea id="tell-us-about-yourself-50467" name="tell-us-about-yourself-50467" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="work-samples-link-50467-5046">Work samples link (50467)</label><input type="url" id="work-samples-link-50467-5046" name="work-samples-link-50467-5046" ></div>
<div class="field-row"><label for="salary-expectations-50467-50">Salary expectations (50467)</label><input type="number" id="salary-expectations-50467-50" name="salary-expectations-50467-50" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50467">Attach resume (50467)</label><input type="file" id="file-50467" name="file-50467" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
