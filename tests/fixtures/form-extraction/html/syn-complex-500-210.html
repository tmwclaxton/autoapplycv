<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50210</title></head>
<body>
<main><h1>Mixed complex apply 50210</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50210">Full name (50210)</label>
<input type="text" id="mix-name-50210" name="mix-name-50210" autocomplete="name">
<label for="mix-email-50210">Email address (50210)</label>
<input type="email" id="mix-email-50210" name="mix-email-50210" autocomplete="email">
<label for="mix-phone-50210">Contact number (50210)</label>
<input type="tel" id="mix-phone-50210" name="mix-phone-50210" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="personal-statement-50210-502">Personal statement (50210)</label><textarea id="personal-statement-50210-502" name="personal-statement-50210-502" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50210-50210">Work location (50210)</label><select id="work-location-50210-50210" name="work-location-50210-50210"><option value="">Choose one…</option><option value="remote">Remote</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50210)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50210)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50210-50">Desired base salary (50210)</label><input type="number" id="desired-base-salary-50210-50" name="desired-base-salary-50210-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50210-">Start date preference (50210)</label><input type="date" id="start-date-preference-50210-" name="start-date-preference-50210-" ></div>
<div class="field-row"><label for="referral-source-50210-50210">Referral source (50210)</label><select id="referral-source-50210-50210" name="referral-source-50210-50210"><option value="">Choose one…</option><option value="referral">Referral</option><option value="conference">Conference</option><option value="other">Other</option><option value="linkedin">LinkedIn</option></select></div>
<fieldset><legend>Core competencies (50210)</legend><label for="core-competencies-50210--cb-0"><input type="checkbox" id="core-competencies-50210--cb-0" name="core-competencies-50210-[]" value="react"> React</label><label for="core-competencies-50210--cb-1"><input type="checkbox" id="core-competencies-50210--cb-1" name="core-competencies-50210-[]" value="python"> Python</label><label for="core-competencies-50210--cb-2"><input type="checkbox" id="core-competencies-50210--cb-2" name="core-competencies-50210-[]" value="rust"> Rust</label><label for="core-competencies-50210--cb-3"><input type="checkbox" id="core-competencies-50210--cb-3" name="core-competencies-50210-[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50210">Attach resume (50210)</label><input type="file" id="file-50210" name="file-50210" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50210-50210">Personal website (50210)</label><input type="url" id="personal-website-50210-50210" name="personal-website-50210-50210" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
