<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50227</title></head>
<body>
<main><h1>Conditional complex apply 50227</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50227">
<p id="step1-label-50227">Step 1 - Contact</p>

<label for="cond-name-50227">Legal name (50227)</label>
<input type="text" id="cond-name-50227" name="cond-name-50227" autocomplete="name">
<label for="cond-email-50227">Contact email (50227)</label>
<input type="email" id="cond-email-50227" name="cond-email-50227" autocomplete="email">
<label for="cond-phone-50227">Phone number (50227)</label>
<input type="tel" id="cond-phone-50227" name="cond-phone-50227" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50227">
<p id="step2-label-50227">Step 2 - Preferences</p>
<div class="field-row"><label for="preferred-location-50227-502">Preferred location (50227)</label><select id="preferred-location-50227-502" name="preferred-location-50227-502"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="new-york">New York</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Relocation preference (50227)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="earliest-start-date-50227-50">Earliest start date (50227)</label><input type="date" id="earliest-start-date-50227-50" name="earliest-start-date-50227-50" ></div>
<fieldset><legend>Technical skills (50227)</legend><label for="technical-skills-50227-5-cb-0"><input type="checkbox" id="technical-skills-50227-5-cb-0" name="technical-skills-50227-5[]" value="laravel"> Laravel</label><label for="technical-skills-50227-5-cb-1"><input type="checkbox" id="technical-skills-50227-5-cb-1" name="technical-skills-50227-5[]" value="go"> Go</label><label for="technical-skills-50227-5-cb-2"><input type="checkbox" id="technical-skills-50227-5-cb-2" name="technical-skills-50227-5[]" value="python"> Python</label><label for="technical-skills-50227-5-cb-3"><input type="checkbox" id="technical-skills-50227-5-cb-3" name="technical-skills-50227-5[]" value="rust"> Rust</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50227">
<p id="step3-label-50227">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50227" data-reveal="#reveal-50227">Show follow-up questions</button>
<div id="reveal-50227" hidden style="display:none"><div class="field-row"><label for="cover-letter-50227-50227">Cover letter (50227)</label><textarea id="cover-letter-50227-50227" name="cover-letter-50227-50227" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="work-samples-link-50227-5022">Work samples link (50227)</label><input type="url" id="work-samples-link-50227-5022" name="work-samples-link-50227-5022" ></div>
<div class="field-row"><label for="expected-salary-50227-50227">Expected salary (50227)</label><input type="number" id="expected-salary-50227-50227" name="expected-salary-50227-50227" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50227">Attach resume (50227)</label><input type="file" id="file-50227" name="file-50227" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
