<!DOCTYPE html>
<html lang="en-GB">
<head><meta charset="utf-8"><title>Apply - Cloud Architect</title></head>
<body>
<div id="__next">
<nav class="navbar" data-qa="navBar"><a href="/">Reed.co.uk</a></nav>
<main><form data-qa="application-form" action="/jobs/apply/submit" method="post">
<h1 data-qa="application-step-title">Apply for Cloud Architect</h1>

<section data-qa="application-form-section">
<h2 data-qa="application-step-subtitle">Contact details</h2>
<div class="form-group" data-qa="field-full-name-571000116">
<label for="full-name-571000116" data-qa="field-full-name-571000116-label">Full name</label>
<input type="text" id="full-name-571000116" name="full-name-571000116" data-qa="field-full-name-571000116-input" required>
</div>
<div class="form-group" data-qa="field-email-address-571000116">
<label for="email-address-571000116" data-qa="field-email-address-571000116-label">Email address</label>
<input type="email" id="email-address-571000116" name="email-address-571000116" data-qa="field-email-address-571000116-input" required>
</div>
<div class="form-group" data-qa="field-mobile-number-571000116">
<label for="mobile-number-571000116" data-qa="field-mobile-number-571000116-label">Mobile number</label>
<input type="tel" id="mobile-number-571000116" name="mobile-number-571000116" data-qa="field-mobile-number-571000116-input" required>
</div>
<div class="form-group" data-qa="field-linkedin-profile-url-571000116">
<label for="linkedin-profile-url-571000116" data-qa="field-linkedin-profile-url-571000116-label">LinkedIn profile URL</label>
<input type="url" id="linkedin-profile-url-571000116" name="linkedin-profile-url-571000116" data-qa="field-linkedin-profile-url-571000116-input" >
</div>
</section>
<section data-qa="application-form-section">
<h2 data-qa="application-step-subtitle">Role questions</h2>
<div class="form-group" data-qa="field-cover-letter-571000116">
<label for="cover-letter-571000116" data-qa="field-cover-letter-571000116-label">Cover letter</label>
<textarea id="cover-letter-571000116" name="cover-letter-571000116" rows="6" data-qa="field-cover-letter-571000116-input" maxlength="1200"></textarea>
</div>
<fieldset data-qa="fieldset-are-you-willing-to-work-on-s">
<legend data-qa="application-step-subtitle">Are you willing to work on-site in London?</legend>
<label for="are-you-willing-to-work-on-s-0"><input type="radio" id="are-you-willing-to-work-on-s-0" name="are-you-willing-to-work-on-s" value="yes" data-qa="radio-are-you-willing-to-work-on-s-0"> Yes</label><label for="are-you-willing-to-work-on-s-1"><input type="radio" id="are-you-willing-to-work-on-s-1" name="are-you-willing-to-work-on-s" value="no" data-qa="radio-are-you-willing-to-work-on-s-1"> No</label><label for="are-you-willing-to-work-on-s-2"><input type="radio" id="are-you-willing-to-work-on-s-2" name="are-you-willing-to-work-on-s" value="hybrid-only" data-qa="radio-are-you-willing-to-work-on-s-2"> Hybrid only</label>
</fieldset>
<div class="form-group" data-qa="field-preferred-work-arrangement-57100">
<label for="preferred-work-arrangement-57100" data-qa="field-preferred-work-arrangement-57100-label">Preferred work arrangement</label>
<select id="preferred-work-arrangement-57100" name="preferred-work-arrangement-57100" data-qa="field-preferred-work-arrangement-57100-input">
<option value="">Please select</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="on-site">On-site</option>
</select>
</div>
<div class="form-group" data-qa="field-national-insurance-number-option">
<label for="national-insurance-number-option" data-qa="field-national-insurance-number-option-label">National Insurance number (optional)</label>
<input type="text" id="national-insurance-number-option" name="national-insurance-number-option" data-qa="field-national-insurance-number-option-input" >
</div>
<div class="form-group" data-qa="field-how-did-you-hear-about-this-job-">
<label for="how-did-you-hear-about-this-job-" data-qa="field-how-did-you-hear-about-this-job--label">How did you hear about this job?</label>
<select id="how-did-you-hear-about-this-job-" name="how-did-you-hear-about-this-job-" data-qa="field-how-did-you-hear-about-this-job--input">
<option value="">Please select</option><option value="reed-co-uk">Reed.co.uk</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="company-website">Company website</option><option value="other">Other</option>
</select>
</div>
</section>
<section data-qa="application-form-section">
<h2 data-qa="application-step-subtitle">Documents</h2>
<div class="form-group" data-qa="field-file-571000116">
<label for="file-571000116" data-qa="field-file-571000116-label">Upload CV</label>
<input type="file" id="file-571000116" name="file-571000116" accept=".pdf,.doc,.docx" data-qa="field-file-571000116-input">
</div>
<fieldset data-qa="fieldset-technologies-you-have-used-p">
<legend>Technologies you have used professionally</legend>
<label for="technologies-you-have-used-p-cb-0"><input type="checkbox" id="technologies-you-have-used-p-cb-0" name="technologies-you-have-used-p[]" value="c" data-qa="checkbox-technologies-you-have-used-p-cb-0"> C#</label><label for="technologies-you-have-used-p-cb-1"><input type="checkbox" id="technologies-you-have-used-p-cb-1" name="technologies-you-have-used-p[]" value="azure" data-qa="checkbox-technologies-you-have-used-p-cb-1"> Azure</label><label for="technologies-you-have-used-p-cb-2"><input type="checkbox" id="technologies-you-have-used-p-cb-2" name="technologies-you-have-used-p[]" value="go" data-qa="checkbox-technologies-you-have-used-p-cb-2"> Go</label><label for="technologies-you-have-used-p-cb-3"><input type="checkbox" id="technologies-you-have-used-p-cb-3" name="technologies-you-have-used-p[]" value="react" data-qa="checkbox-technologies-you-have-used-p-cb-3"> React</label><label for="technologies-you-have-used-p-cb-4"><input type="checkbox" id="technologies-you-have-used-p-cb-4" name="technologies-you-have-used-p[]" value="python" data-qa="checkbox-technologies-you-have-used-p-cb-4"> Python</label><label for="technologies-you-have-used-p-cb-5"><input type="checkbox" id="technologies-you-have-used-p-cb-5" name="technologies-you-have-used-p[]" value="sql" data-qa="checkbox-technologies-you-have-used-p-cb-5"> SQL</label>
</fieldset>
</section>

<div data-qa="application-actions"><button type="button" data-qa="continue-button" class="btn btn-primary">Continue</button> <button type="submit" data-qa="submit-button" class="btn btn-primary">Submit application</button></div>
</form></main>
<footer data-qa="pageFooter"><p>Reed synthetic corpus fixture</p></footer>
</div>
</body>
</html>
