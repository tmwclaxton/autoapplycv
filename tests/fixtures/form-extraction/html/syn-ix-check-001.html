<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Role checkbox group</title></head>
<body>
<main><h1>Role checkbox group</h1><form action="/apply" method="post">
<label for="ix-name-17">Legal name</label>
<input type="text" id="ix-name-17" name="ix-name-17">
<label for="ix-email-17">Work email</label>
<input type="email" id="ix-email-17" name="ix-email-17">
<label for="ix-phone-17">Mobile number</label>
<input type="tel" id="ix-phone-17" name="ix-phone-17">
<div role="group" id="skills-group-19" aria-labelledby="skills-group-19-lbl">
<span id="skills-group-19-lbl">Core competencies</span>
<div role="checkbox" aria-checked="false" tabindex="0">JavaScript</div>
<div role="checkbox" aria-checked="false" tabindex="-1">TypeScript</div>
<div role="checkbox" aria-checked="false" tabindex="-1">Python</div>
<div role="checkbox" aria-checked="false" tabindex="-1">Go</div>
</div></form></main>
</body>
</html>
