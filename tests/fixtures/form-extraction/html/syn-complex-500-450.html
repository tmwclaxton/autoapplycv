<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50450</title></head>
<body>
<main><h1>Mixed complex apply 50450</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50450">Full name (50450)</label>
<input type="text" id="mix-name-50450" name="mix-name-50450" autocomplete="name">
<label for="mix-email-50450">Email address (50450)</label>
<input type="email" id="mix-email-50450" name="mix-email-50450" autocomplete="email">
<label for="mix-phone-50450">Mobile number (50450)</label>
<input type="tel" id="mix-phone-50450" name="mix-phone-50450" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="why-this-role-50450-50450">Why this role? (50450)</label><textarea id="why-this-role-50450-50450" name="why-this-role-50450-50450" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50450-50450">Work location (50450)</label><select id="work-location-50450-50450" name="work-location-50450-50450"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="london">London</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Work authorization status (50450)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50450)</legend><label for="open-to-relocation-50450-0"><input type="radio" id="open-to-relocation-50450-0" name="open-to-relocation-50450" value="yes"> Yes</label><label for="open-to-relocation-50450-1"><input type="radio" id="open-to-relocation-50450-1" name="open-to-relocation-50450" value="no"> No</label><label for="open-to-relocation-50450-2"><input type="radio" id="open-to-relocation-50450-2" name="open-to-relocation-50450" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50450-50">Salary expectations (50450)</label><input type="number" id="salary-expectations-50450-50" name="salary-expectations-50450-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50450-504">When can you start? (50450)</label><input type="date" id="when-can-you-start-50450-504" name="when-can-you-start-50450-504" ></div>
<div class="field-row"><label for="application-source-50450-504">Application source (50450)</label><select id="application-source-50450-504" name="application-source-50450-504"><option value="">Choose one…</option><option value="conference">Conference</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="other">Other</option></select></div>
<fieldset><legend>Core competencies (50450)</legend><label for="core-competencies-50450--cb-0"><input type="checkbox" id="core-competencies-50450--cb-0" name="core-competencies-50450-[]" value="typescript"> TypeScript</label><label for="core-competencies-50450--cb-1"><input type="checkbox" id="core-competencies-50450--cb-1" name="core-competencies-50450-[]" value="python"> Python</label><label for="core-competencies-50450--cb-2"><input type="checkbox" id="core-competencies-50450--cb-2" name="core-competencies-50450-[]" value="laravel"> Laravel</label><label for="core-competencies-50450--cb-3"><input type="checkbox" id="core-competencies-50450--cb-3" name="core-competencies-50450-[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50450">Attach resume (50450)</label><input type="file" id="file-50450" name="file-50450" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50450-50450">Personal website (50450)</label><input type="url" id="personal-website-50450-50450" name="personal-website-50450-50450" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
