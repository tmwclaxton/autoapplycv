<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Teamtailor apply 20021</title></head>
<body>

<main class="careers-page"><h1 class="job-title">Apply — Role 20021</h1>
<form class="apply-form" action="/apply" method="post" data-teamtailor-form="application">
<section class="form-section" data-section="personal">

<div class="form-group"><label class="form-label" for="tt-name-20021">Legal name (20021)</label>
</div><input class="form-control" type="text" id="tt-name-20021" name="tt-name-20021" autocomplete="name">
<div class="form-group"><label class="form-label" for="tt-email-20021">Work email (20021)</label>
</div><input class="form-control" type="email" id="tt-email-20021" name="tt-email-20021" autocomplete="email">
<div class="form-group"><label class="form-label" for="tt-phone-20021">Telephone (20021)</label>
</div><input class="form-control" type="tel" id="tt-phone-20021" name="tt-phone-20021" autocomplete="tel">
</section>
<section class="form-section" data-section="questions">

</section>
<div class="file-row"><label for="file-20021">Attach resume (optional)</label><input type="file" id="file-20021" name="file-20021" accept=".pdf,.doc"></div>
<button type="submit" class="btn btn-primary">Submit application</button>
</form></main>
</body>
</html>
