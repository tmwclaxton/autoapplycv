<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Greenhouse-style 9418</title></head>
<body>
<main><h1>Greenhouse-style 9418</h1><form action="/apply" method="post">
<div id="application" class="application--container">

<div class="field"><label id="gh-name-9418-label" for="gh-name-9418">Legal name (9418)</label><input aria-labelledby="gh-name-9418-label" type="text" id="gh-name-9418" name="gh-name-9418" autocomplete="name">
<div class="field"><label id="gh-email-9418-label" for="gh-email-9418">Email address (9418)</label><input aria-labelledby="gh-email-9418-label" type="email" id="gh-email-9418" name="gh-email-9418" autocomplete="email">
<div class="field"><label id="gh-phone-9418-label" for="gh-phone-9418">Contact number (9418)</label><input aria-labelledby="gh-phone-9418-label" type="tel" id="gh-phone-9418" name="gh-phone-9418" autocomplete="tel">

<div class="file-row"><label for="file-upload-9418">Attach resume (optional)</label><input type="file" id="file-upload-9418" name="file-upload-9418" accept=".pdf,.doc"></div>
</div></form></main>
</body>
</html>
