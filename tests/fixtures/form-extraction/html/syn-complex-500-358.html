<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50358</title></head>
<body>
<main><h1>Mixed complex apply 50358</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50358">Preferred name (50358)</label>
<input type="text" id="mix-name-50358" name="mix-name-50358" autocomplete="name">
<label for="mix-email-50358">Email address (50358)</label>
<input type="email" id="mix-email-50358" name="mix-email-50358" autocomplete="email">
<label for="mix-phone-50358">Phone number (50358)</label>
<input type="tel" id="mix-phone-50358" name="mix-phone-50358" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="motivation-statement-50358-5">Motivation statement (50358)</label><textarea id="motivation-statement-50358-5" name="motivation-statement-50358-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50358-50358">Current city (50358)</label><select id="current-city-50358-50358" name="current-city-50358-50358"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option><option value="manchester">Manchester</option><option value="london">London</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50358)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50358)</legend><label for="open-to-relocation-50358-0"><input type="radio" id="open-to-relocation-50358-0" name="open-to-relocation-50358" value="yes"> Yes</label><label for="open-to-relocation-50358-1"><input type="radio" id="open-to-relocation-50358-1" name="open-to-relocation-50358" value="no"> No</label><label for="open-to-relocation-50358-2"><input type="radio" id="open-to-relocation-50358-2" name="open-to-relocation-50358" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50358-50">Desired base salary (50358)</label><input type="number" id="desired-base-salary-50358-50" name="desired-base-salary-50358-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50358-503">When can you start? (50358)</label><input type="date" id="when-can-you-start-50358-503" name="when-can-you-start-50358-503" ></div>
<div class="field-row"><label for="referral-source-50358-50358">Referral source (50358)</label><select id="referral-source-50358-50358" name="referral-source-50358-50358"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="other">Other</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Core competencies (50358)</legend><label for="core-competencies-50358--cb-0"><input type="checkbox" id="core-competencies-50358--cb-0" name="core-competencies-50358-[]" value="typescript"> TypeScript</label><label for="core-competencies-50358--cb-1"><input type="checkbox" id="core-competencies-50358--cb-1" name="core-competencies-50358-[]" value="javascript"> JavaScript</label><label for="core-competencies-50358--cb-2"><input type="checkbox" id="core-competencies-50358--cb-2" name="core-competencies-50358-[]" value="laravel"> Laravel</label><label for="core-competencies-50358--cb-3"><input type="checkbox" id="core-competencies-50358--cb-3" name="core-competencies-50358-[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50358">Attach resume (50358)</label><input type="file" id="file-50358" name="file-50358" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50358-5035">Work samples link (50358)</label><input type="url" id="work-samples-link-50358-5035" name="work-samples-link-50358-5035" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
