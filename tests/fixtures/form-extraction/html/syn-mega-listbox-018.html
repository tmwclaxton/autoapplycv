<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Listbox 9678</title></head>
<body>
<main><h1>Listbox 9678</h1><form action="/apply" method="post">
<label for="lb-name-9678">Applicant name (9678)</label>
<input type="text" id="lb-name-9678" name="lb-name-9678" autocomplete="name">
<label for="lb-email-9678">Application email (9678)</label>
<input type="email" id="lb-email-9678" name="lb-email-9678" autocomplete="email">
<label for="lb-phone-9678">Direct line (9678)</label>
<input type="tel" id="lb-phone-9678" name="lb-phone-9678" autocomplete="tel">
<div class="field-row">
<span id="listbox-h-9678-lbl">Current city (9678)</span>
<button type="button" class="custom-dropdown-trigger" role="combobox" aria-expanded="false" aria-controls="listbox-h-9678" aria-labelledby="listbox-h-9678-lbl" data-reveal="#listbox-h-9678">Select current city (9678)</button>
<div role="listbox" id="listbox-h-9678" aria-labelledby="listbox-h-9678-lbl" hidden style="display:none">
<div role="option" data-value="berlin">Berlin</div><div role="option" data-value="remote">Remote</div><div role="option" data-value="hybrid">Hybrid</div><div role="option" data-value="london">London</div>
</div>
</div></form></main>
</body>
</html>
