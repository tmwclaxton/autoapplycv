<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9546</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9546</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9546">Complete name (9546)</label>
<input type="text" id="sr-name-9546" name="sr-name-9546" autocomplete="name">
<label for="sr-email-9546">Contact email (9546)</label>
<input type="email" id="sr-email-9546" name="sr-email-9546" autocomplete="email">
<label for="sr-phone-9546">Phone number (9546)</label>
<input type="tel" id="sr-phone-9546" name="sr-phone-9546" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="motivation-statement-9546-95">Motivation statement (9546)</label><textarea id="motivation-statement-9546-95" name="motivation-statement-9546-95" rows="4" maxlength="500"></textarea></div>

<div role="combobox" aria-expanded="true" aria-controls="listbox-9546" aria-labelledby="listbox-9546-lbl" tabindex="0">Preferred location (9546)</div>
<div role="listbox" id="listbox-9546" aria-labelledby="listbox-9546-lbl">
<div role="option" data-value="hybrid">Hybrid</div><div role="option" data-value="remote">Remote</div><div role="option" data-value="london">London</div><div role="option" data-value="berlin">Berlin</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
