<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50046</title></head>
<body>
<main><h1>Wizard complex apply 50046</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50046">
<h2 id="wizard-contact-50046">Contact information</h2>

<label for="wiz-name-50046">Applicant name (50046)</label>
<input type="text" id="wiz-name-50046" name="wiz-name-50046" autocomplete="name">
<label for="wiz-email-50046">Work email (50046)</label>
<input type="email" id="wiz-email-50046" name="wiz-email-50046" autocomplete="email">
<label for="wiz-phone-50046">Telephone (50046)</label>
<input type="tel" id="wiz-phone-50046" name="wiz-phone-50046" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50046">
<h2 id="wizard-screen-50046">Screening questions</h2>
<div class="field-row"><label for="cover-letter-50046-50046">Cover letter (50046)</label><textarea id="cover-letter-50046-50046" name="cover-letter-50046-50046" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="preferred-location-50046-500">Preferred location (50046)</label><select id="preferred-location-50046-500" name="preferred-location-50046-500"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="london">London</option><option value="new-york">New York</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50046)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-500">Compensation requirement (50046)</label><input type="number" id="compensation-requirement-500" name="compensation-requirement-500" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50046-500">When can you start? (50046)</label><input type="date" id="when-can-you-start-50046-500" name="when-can-you-start-50046-500" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50046">
<h2 id="wizard-docs-50046">Documents and skills</h2>
<fieldset><legend>Core competencies (50046)</legend><label for="core-competencies-50046--cb-0"><input type="checkbox" id="core-competencies-50046--cb-0" name="core-competencies-50046-[]" value="typescript"> TypeScript</label><label for="core-competencies-50046--cb-1"><input type="checkbox" id="core-competencies-50046--cb-1" name="core-competencies-50046-[]" value="go"> Go</label><label for="core-competencies-50046--cb-2"><input type="checkbox" id="core-competencies-50046--cb-2" name="core-competencies-50046-[]" value="react"> React</label><label for="core-competencies-50046--cb-3"><input type="checkbox" id="core-competencies-50046--cb-3" name="core-competencies-50046-[]" value="sql"> SQL</label><label for="core-competencies-50046--cb-4"><input type="checkbox" id="core-competencies-50046--cb-4" name="core-competencies-50046-[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50046">Attach resume (50046)</label><input type="file" id="file-50046" name="file-50046" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="application-source-50046-500">Application source (50046)</label><select id="application-source-50046-500" name="application-source-50046-500"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="other">Other</option><option value="conference">Conference</option><option value="company-site">Company site</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
