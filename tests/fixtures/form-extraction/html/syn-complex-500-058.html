<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50058</title></head>
<body>
<main><h1>Mixed complex apply 50058</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50058">Preferred name (50058)</label>
<input type="text" id="mix-name-50058" name="mix-name-50058" autocomplete="name">
<label for="mix-email-50058">Work email (50058)</label>
<input type="email" id="mix-email-50058" name="mix-email-50058" autocomplete="email">
<label for="mix-phone-50058">Contact number (50058)</label>
<input type="tel" id="mix-phone-50058" name="mix-phone-50058" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50058-50058">Cover letter (50058)</label><textarea id="cover-letter-50058-50058" name="cover-letter-50058-50058" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50058-500">Preferred location (50058)</label><select id="preferred-location-50058-500" name="preferred-location-50058-500"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option><option value="london">London</option></select></div>
<fieldset><legend>Work authorization status (50058)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50058)</legend><label for="open-to-relocation-50058-0"><input type="radio" id="open-to-relocation-50058-0" name="open-to-relocation-50058" value="yes"> Yes</label><label for="open-to-relocation-50058-1"><input type="radio" id="open-to-relocation-50058-1" name="open-to-relocation-50058" value="no"> No</label><label for="open-to-relocation-50058-2"><input type="radio" id="open-to-relocation-50058-2" name="open-to-relocation-50058" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50058-50">Salary expectations (50058)</label><input type="number" id="salary-expectations-50058-50" name="salary-expectations-50058-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50058-">Start date preference (50058)</label><input type="date" id="start-date-preference-50058-" name="start-date-preference-50058-" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50058)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="conference">Conference</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="other">Other</option></select></div>
<fieldset><legend>Core competencies (50058)</legend><label for="core-competencies-50058--cb-0"><input type="checkbox" id="core-competencies-50058--cb-0" name="core-competencies-50058-[]" value="go"> Go</label><label for="core-competencies-50058--cb-1"><input type="checkbox" id="core-competencies-50058--cb-1" name="core-competencies-50058-[]" value="javascript"> JavaScript</label><label for="core-competencies-50058--cb-2"><input type="checkbox" id="core-competencies-50058--cb-2" name="core-competencies-50058-[]" value="sql"> SQL</label><label for="core-competencies-50058--cb-3"><input type="checkbox" id="core-competencies-50058--cb-3" name="core-competencies-50058-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50058">Attach resume (50058)</label><input type="file" id="file-50058" name="file-50058" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50058-50058">Portfolio URL (50058)</label><input type="url" id="portfolio-url-50058-50058" name="portfolio-url-50058-50058" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
