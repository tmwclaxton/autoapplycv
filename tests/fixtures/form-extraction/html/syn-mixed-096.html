<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed Application 7</title></head>
<body>
<main>
<h1>Mixed Application 7</h1>
<form action="/apply" method="post">
<div data-testid="input-q_legal-name" class="ia-Questions-item">
<div data-testid="input-q_legal-name-label"><span data-testid="safe-markup">Legal name</span></div>
<input data-testid="input-q_legal-name-input" type="text" name="input-q_legal-name">
</div>
<div class="field"><label id="question_email-label" for="question_email">Email</label><input type="email" id="question_email" name="question_email" aria-labelledby="question_email-label"></div>
<div class="form-group"><label for="city">City</label><select id="city" name="city"><option value="">Select…</option><option value="london">London</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Do you require visa sponsorship?</legend><label><input type="radio" name="do-you-require-visa-spon" id="do-you-require-visa-spon-0" value="yes"> Yes</label><label><input type="radio" name="do-you-require-visa-spon" id="do-you-require-visa-spon-1" value="no"> No</label></fieldset>
<div class="form-group"><label for="tell-us-about-yourself">Tell us about yourself</label><textarea id="tell-us-about-yourself" name="tell-us-about-yourself" rows="4" maxlength="600"></textarea></div>
<div class="form-group"><label for="upload-cv">Upload CV</label><input type="file" id="upload-cv" name="upload-cv" ></div>
<button type="button">Submit application</button>

</form>
</main>
</body>
</html>
