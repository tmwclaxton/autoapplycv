<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday Application 7</title></head>
<body>
<main>
<h1>Workday Application 7</h1>
<form action="/apply" method="post">
<div data-testid="input-q_legal-name" class="ia-Questions-item">
<div data-testid="input-q_legal-name-label"><span data-testid="safe-markup">Legal name</span></div>
<input data-testid="input-q_legal-name-input" type="text" name="input-q_legal-name">
</div>
<div data-testid="input-q_email" class="ia-Questions-item">
<div data-testid="input-q_email-label"><span data-testid="safe-markup">Email</span></div>
<input data-testid="input-q_email-input" type="email" name="input-q_email">
</div>
<div data-testid="input-q_tell-us-about-yo" class="ia-Questions-item">
<div data-testid="input-q_tell-us-about-yo-label"><span data-testid="safe-markup">Tell us about yourself</span></div>
<textarea data-testid="input-q_tell-us-about-yo-input" name="input-q_tell-us-about-yo" rows="4" maxlength="500"></textarea>
</div>
<div data-testid="input-q_years-of-experie" class="ia-Questions-item">
<div data-testid="input-q_years-of-experie-label"><span data-testid="safe-markup">Years of experience</span></div>
<input data-testid="input-q_years-of-experie-input" type="number" name="input-q_years-of-experie">
</div>
<button type="button">Save and continue</button>

</form>
</main>
</body>
</html>
