<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Documents - QA Engineer</title></head>
<body>
<form data-testid="indeed-apply-form">

<h1 data-testid="documents-heading">Upload your documents</h1>
<div data-testid="resume-upload">
<label for="resume-300195">Résumé / CV</label>
<input type="file" id="resume-300195" name="resume" accept=".pdf,.doc,.docx" data-testid="resume-file-input">
</div>
<div data-testid="cover-letter-upload">
<label for="cover-300195">Cover letter (optional)</label>
<input type="file" id="cover-300195" name="cover-letter" accept=".pdf,.doc,.docx" data-testid="cover-letter-file-input">
</div>
<div data-testid="input-ia-field-300195-portfolio-or-github-url">
<label for="ia-field-300195-portfolio-or-github-url" data-testid="ia-field-300195-portfolio-or-github-url-label"><span data-testid="safe-markup">Portfolio or GitHub URL</span></label>
<input type="url" id="ia-field-300195-portfolio-or-github-url" name="ia-field-300195-portfolio-or-github-url" data-testid="ia-field-300195-portfolio-or-github-url-input" >
</div>
<div data-testid="input-ia-field-300195-linkedin-profile-url">
<label for="ia-field-300195-linkedin-profile-url" data-testid="ia-field-300195-linkedin-profile-url-label"><span data-testid="safe-markup">LinkedIn profile URL</span></label>
<input type="url" id="ia-field-300195-linkedin-profile-url" name="ia-field-300195-linkedin-profile-url" data-testid="ia-field-300195-linkedin-profile-url-input" >
</div>
<div data-testid="input-ia-select-300195-how-did-you-hear-about-t">
<label for="ia-select-300195-how-did-you-hear-about-t" data-testid="ia-select-300195-how-did-you-hear-about-t-label"><span data-testid="safe-markup">How did you hear about this job?</span></label>
<select id="ia-select-300195-how-did-you-hear-about-t" name="ia-select-300195-how-did-you-hear-about-t" data-testid="ia-select-300195-how-did-you-hear-about-t-input">
<option value="">Select an option</option><option value="glassdoor">Glassdoor</option><option value="indeed">Indeed</option><option value="referral">Referral</option><option value="company-website">Company website</option><option value="other">Other</option>
</select>
</div>
<button type="button" data-testid="indeed-apply-continue"><span>Continue to review</span></button>
</form>
</body>
</html>
