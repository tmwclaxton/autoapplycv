<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50368</title></head>
<body>
<main><h1>Mixed complex apply 50368</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50368">Full name (50368)</label>
<input type="text" id="mix-name-50368" name="mix-name-50368" autocomplete="name">
<label for="mix-email-50368">Personal email (50368)</label>
<input type="email" id="mix-email-50368" name="mix-email-50368" autocomplete="email">
<label for="mix-phone-50368">Contact number (50368)</label>
<input type="tel" id="mix-phone-50368" name="mix-phone-50368" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="motivation-statement-50368-5">Motivation statement (50368)</label><textarea id="motivation-statement-50368-5" name="motivation-statement-50368-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50368-503">Preferred location (50368)</label><select id="preferred-location-50368-503" name="preferred-location-50368-503"><option value="">Choose one…</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="london">London</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50368)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50368)</legend><label for="open-to-relocation-50368-0"><input type="radio" id="open-to-relocation-50368-0" name="open-to-relocation-50368" value="yes"> Yes</label><label for="open-to-relocation-50368-1"><input type="radio" id="open-to-relocation-50368-1" name="open-to-relocation-50368" value="no"> No</label><label for="open-to-relocation-50368-2"><input type="radio" id="open-to-relocation-50368-2" name="open-to-relocation-50368" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50368-50">Desired base salary (50368)</label><input type="number" id="desired-base-salary-50368-50" name="desired-base-salary-50368-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50368-">Start date preference (50368)</label><input type="date" id="start-date-preference-50368-" name="start-date-preference-50368-" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50368)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="other">Other</option><option value="company-site">Company site</option></select></div>
<fieldset><legend>Technical skills (50368)</legend><label for="technical-skills-50368-5-cb-0"><input type="checkbox" id="technical-skills-50368-5-cb-0" name="technical-skills-50368-5[]" value="go"> Go</label><label for="technical-skills-50368-5-cb-1"><input type="checkbox" id="technical-skills-50368-5-cb-1" name="technical-skills-50368-5[]" value="react"> React</label><label for="technical-skills-50368-5-cb-2"><input type="checkbox" id="technical-skills-50368-5-cb-2" name="technical-skills-50368-5[]" value="laravel"> Laravel</label><label for="technical-skills-50368-5-cb-3"><input type="checkbox" id="technical-skills-50368-5-cb-3" name="technical-skills-50368-5[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50368">Attach resume (50368)</label><input type="file" id="file-50368" name="file-50368" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50368-50368">Portfolio URL (50368)</label><input type="url" id="portfolio-url-50368-50368" name="portfolio-url-50368-50368" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
