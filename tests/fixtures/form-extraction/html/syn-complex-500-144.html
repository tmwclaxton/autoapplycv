<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters complex apply 50144</title></head>
<body>

<main data-sr-application="true"><h1>Apply 50144</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">
<h2>Contact information</h2>

<label for="sr-name-50144">Preferred name (50144)</label>
<input type="text" id="sr-name-50144" name="sr-name-50144" autocomplete="name">
<label for="sr-email-50144">Work email (50144)</label>
<input type="email" id="sr-email-50144" name="sr-email-50144" autocomplete="email">
<label for="sr-phone-50144">Telephone (50144)</label>
<input type="tel" id="sr-phone-50144" name="sr-phone-50144" autocomplete="tel">
</section>
<section class="sr-section" data-section="experience">
<h2>Experience and motivation</h2>
<div class="field-row"><label for="personal-statement-50144-501">Personal statement (50144)</label><textarea id="personal-statement-50144-501" name="personal-statement-50144-501" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="portfolio-url-50144-50144">Portfolio URL (50144)</label><input type="url" id="portfolio-url-50144-50144" name="portfolio-url-50144-50144" ></div>
</section>
<section class="sr-section" data-section="preferences">
<h2>Preferences</h2>
<div class="field-row"><label for="office-preference-50144-5014">Office preference (50144)</label><select id="office-preference-50144-5014" name="office-preference-50144-5014"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50144)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50144-50">Desired base salary (50144)</label><input type="number" id="desired-base-salary-50144-50" name="desired-base-salary-50144-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50144-501">When can you start? (50144)</label><input type="date" id="when-can-you-start-50144-501" name="when-can-you-start-50144-501" ></div>
<fieldset><legend>Key skills (50144)</legend><label for="key-skills-50144-50144-cb-0"><input type="checkbox" id="key-skills-50144-50144-cb-0" name="key-skills-50144-50144[]" value="laravel"> Laravel</label><label for="key-skills-50144-50144-cb-1"><input type="checkbox" id="key-skills-50144-50144-cb-1" name="key-skills-50144-50144[]" value="javascript"> JavaScript</label><label for="key-skills-50144-50144-cb-2"><input type="checkbox" id="key-skills-50144-50144-cb-2" name="key-skills-50144-50144[]" value="rust"> Rust</label><label for="key-skills-50144-50144-cb-3"><input type="checkbox" id="key-skills-50144-50144-cb-3" name="key-skills-50144-50144[]" value="react"> React</label></fieldset>
</section>
<section class="sr-section" data-section="documents">
<h2>Documents</h2>
<div class="file-row"><label for="file-50144">Attach resume (50144)</label><input type="file" id="file-50144" name="file-50144" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
