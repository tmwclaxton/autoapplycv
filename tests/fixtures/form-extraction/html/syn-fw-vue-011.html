<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Vue portal apply 11</title></head>
<body>
<main><h1>Vue portal apply 11</h1><form action="/apply" method="post">
<div id="app" data-v-010>
<form data-v-010 class="v-form">
<div class="input-wrapper data-v-010"><label for="p-name">Applicant name</label><input id="p-name" name="p-name" type="text" data-v-010></div>
<div class="input-wrapper data-v-010"><label for="p-email">Contact email</label><input id="p-email" name="p-email" type="email" data-v-010></div>
<div class="input-wrapper data-v-010"><label for="p-phone">Contact number</label><input id="p-phone" name="p-phone" type="tel" data-v-010></div>
</form>
<div id="teleport-target">
<!-- Teleport-like portal markup -->
<div class="portal-actions data-v-010" role="group" aria-label="Application actions">
<button type="button">Next step</button>
</div>
</div>
<fieldset><legend>Willing to relocate?</legend><label for="willing-to-relocate-0"><input type="radio" id="willing-to-relocate-0" name="willing-to-relocate" value="yes"> Yes</label><label for="willing-to-relocate-1"><input type="radio" id="willing-to-relocate-1" name="willing-to-relocate" value="no"> No</label><label for="willing-to-relocate-2"><input type="radio" id="willing-to-relocate-2" name="willing-to-relocate" value="maybe-later"> Maybe later</label></fieldset>
</div></form></main>
</body>
</html>
