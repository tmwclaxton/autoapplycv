<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50027</title></head>
<body>
<main><h1>Conditional complex apply 50027</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50027">
<p id="step1-label-50027">Step 1 - Contact</p>

<label for="cond-name-50027">Applicant name (50027)</label>
<input type="text" id="cond-name-50027" name="cond-name-50027" autocomplete="name">
<label for="cond-email-50027">Email address (50027)</label>
<input type="email" id="cond-email-50027" name="cond-email-50027" autocomplete="email">
<label for="cond-phone-50027">Mobile number (50027)</label>
<input type="tel" id="cond-phone-50027" name="cond-phone-50027" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50027">
<p id="step2-label-50027">Step 2 - Preferences</p>
<div class="field-row"><label for="work-location-50027-50027">Work location (50027)</label><select id="work-location-50027-50027" name="work-location-50027-50027"><option value="">Choose one…</option><option value="remote">Remote</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Open to relocation? (50027)</legend><label for="open-to-relocation-50027-0"><input type="radio" id="open-to-relocation-50027-0" name="open-to-relocation-50027" value="yes"> Yes</label><label for="open-to-relocation-50027-1"><input type="radio" id="open-to-relocation-50027-1" name="open-to-relocation-50027" value="no"> No</label><label for="open-to-relocation-50027-2"><input type="radio" id="open-to-relocation-50027-2" name="open-to-relocation-50027" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="start-date-preference-50027-">Start date preference (50027)</label><input type="date" id="start-date-preference-50027-" name="start-date-preference-50027-" ></div>
<fieldset><legend>Key skills (50027)</legend><label for="key-skills-50027-50027-cb-0"><input type="checkbox" id="key-skills-50027-50027-cb-0" name="key-skills-50027-50027[]" value="python"> Python</label><label for="key-skills-50027-50027-cb-1"><input type="checkbox" id="key-skills-50027-50027-cb-1" name="key-skills-50027-50027[]" value="javascript"> JavaScript</label><label for="key-skills-50027-50027-cb-2"><input type="checkbox" id="key-skills-50027-50027-cb-2" name="key-skills-50027-50027[]" value="go"> Go</label><label for="key-skills-50027-50027-cb-3"><input type="checkbox" id="key-skills-50027-50027-cb-3" name="key-skills-50027-50027[]" value="react"> React</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50027">
<p id="step3-label-50027">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50027" data-reveal="#reveal-50027">Show follow-up questions</button>
<div id="reveal-50027" hidden style="display:none"><div class="field-row"><label for="cover-letter-50027-50027">Cover letter (50027)</label><textarea id="cover-letter-50027-50027" name="cover-letter-50027-50027" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="work-samples-link-50027-5002">Work samples link (50027)</label><input type="url" id="work-samples-link-50027-5002" name="work-samples-link-50027-5002" ></div>
<div class="field-row"><label for="expected-salary-50027-50027">Expected salary (50027)</label><input type="number" id="expected-salary-50027-50027" name="expected-salary-50027-50027" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50027">Attach resume (50027)</label><input type="file" id="file-50027" name="file-50027" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
