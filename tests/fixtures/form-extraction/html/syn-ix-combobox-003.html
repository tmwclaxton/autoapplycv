<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Vue combobox</title></head>
<body>
<main><h1>Vue combobox</h1><form action="/apply" method="post">
<label for="ix-name-7">Your name</label>
<input type="text" id="ix-name-7" name="ix-name-7">
<label for="ix-email-7">Personal email</label>
<input type="email" id="ix-email-7" name="ix-email-7">
<label for="ix-phone-7">Telephone</label>
<input type="tel" id="ix-phone-7" name="ix-phone-7">
<div id="app" data-v-app>
<div class="v-select">
<span id="vue-listbox-7-lbl">Where are you based?</span>
<button type="button" class="custom-dropdown-trigger" role="combobox" aria-expanded="false" aria-controls="vue-listbox-7" aria-labelledby="vue-listbox-7-lbl" data-reveal="#vue-listbox-7">Where are you based?</button>
<ul role="listbox" id="vue-listbox-7" aria-labelledby="vue-listbox-7-lbl" hidden style="display:none">
<li role="option">London</li>
<li role="option">Remote</li>
<li role="option">Hybrid</li>
</ul>
</div>
</div></form></main>
</body>
</html>
