<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9534</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9534</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9534">Your name (9534)</label>
<input type="text" id="sr-name-9534" name="sr-name-9534" autocomplete="name">
<label for="sr-email-9534">Application email (9534)</label>
<input type="email" id="sr-email-9534" name="sr-email-9534" autocomplete="email">
<label for="sr-phone-9534">Cell phone (9534)</label>
<input type="tel" id="sr-phone-9534" name="sr-phone-9534" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="tell-us-about-yourself-9534-">Tell us about yourself (9534)</label><textarea id="tell-us-about-yourself-9534-" name="tell-us-about-yourself-9534-" rows="4" maxlength="500"></textarea></div>

<div class="field-row">
<span id="listbox-9534-lbl">Current city (9534)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9534" aria-labelledby="listbox-9534-lbl" tabindex="0">Current city (9534)</div>
<div role="listbox" id="listbox-9534" aria-labelledby="listbox-9534-lbl">
<div role="option" data-value="berlin">Berlin</div><div role="option" data-value="dublin">Dublin</div><div role="option" data-value="manchester">Manchester</div><div role="option" data-value="hybrid">Hybrid</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
