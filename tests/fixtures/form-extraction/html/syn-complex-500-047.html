<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50047</title></head>
<body>
<main><h1>Conditional complex apply 50047</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50047">
<p id="step1-label-50047">Step 1 - Contact</p>

<label for="cond-name-50047">Your name (50047)</label>
<input type="text" id="cond-name-50047" name="cond-name-50047" autocomplete="name">
<label for="cond-email-50047">Contact email (50047)</label>
<input type="email" id="cond-email-50047" name="cond-email-50047" autocomplete="email">
<label for="cond-phone-50047">Phone number (50047)</label>
<input type="tel" id="cond-phone-50047" name="cond-phone-50047" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50047">
<p id="step2-label-50047">Step 2 - Preferences</p>
<div class="field-row"><label for="work-location-50047-50047">Work location (50047)</label><select id="work-location-50047-50047" name="work-location-50047-50047"><option value="">Choose one…</option><option value="london">London</option><option value="new-york">New York</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Willing to relocate? (50047)</legend><label for="willing-to-relocate-5004-0"><input type="radio" id="willing-to-relocate-5004-0" name="willing-to-relocate-5004" value="yes"> Yes</label><label for="willing-to-relocate-5004-1"><input type="radio" id="willing-to-relocate-5004-1" name="willing-to-relocate-5004" value="no"> No</label><label for="willing-to-relocate-5004-2"><input type="radio" id="willing-to-relocate-5004-2" name="willing-to-relocate-5004" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="earliest-start-date-50047-50">Earliest start date (50047)</label><input type="date" id="earliest-start-date-50047-50" name="earliest-start-date-50047-50" ></div>
<fieldset><legend>Technical skills (50047)</legend><label for="technical-skills-50047-5-cb-0"><input type="checkbox" id="technical-skills-50047-5-cb-0" name="technical-skills-50047-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50047-5-cb-1"><input type="checkbox" id="technical-skills-50047-5-cb-1" name="technical-skills-50047-5[]" value="rust"> Rust</label><label for="technical-skills-50047-5-cb-2"><input type="checkbox" id="technical-skills-50047-5-cb-2" name="technical-skills-50047-5[]" value="react"> React</label><label for="technical-skills-50047-5-cb-3"><input type="checkbox" id="technical-skills-50047-5-cb-3" name="technical-skills-50047-5[]" value="go"> Go</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50047">
<p id="step3-label-50047">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50047" data-reveal="#reveal-50047">Show follow-up questions</button>
<div id="reveal-50047" hidden style="display:none"><div class="field-row"><label for="cover-letter-50047-50047">Cover letter (50047)</label><textarea id="cover-letter-50047-50047" name="cover-letter-50047-50047" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="personal-website-50047-50047">Personal website (50047)</label><input type="url" id="personal-website-50047-50047" name="personal-website-50047-50047" ></div>
<div class="field-row"><label for="compensation-requirement-500">Compensation requirement (50047)</label><input type="number" id="compensation-requirement-500" name="compensation-requirement-500" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50047">Attach resume (50047)</label><input type="file" id="file-50047" name="file-50047" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
