<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50469</title></head>
<body>
<main><h1>Long complex apply 50469</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50469">Legal name (50469)</label>
<input type="text" id="long-name-50469" name="long-name-50469" autocomplete="name">
<label for="long-email-50469">Email address (50469)</label>
<input type="email" id="long-email-50469" name="long-email-50469" autocomplete="email">
<label for="long-phone-50469">Telephone (50469)</label>
<input type="tel" id="long-phone-50469" name="long-phone-50469" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50469">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50469" name="linkedin-profile-url-50469" ></div>
<div class="field-row"><label for="current-employer-50469">Current employer</label><input type="text" id="current-employer-50469" name="current-employer-50469" ></div>
<div class="field-row"><label for="current-job-title-50469">Current job title</label><input type="text" id="current-job-title-50469" name="current-job-title-50469" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="motivation-statement-50469-5">Motivation statement (50469)</label><textarea id="motivation-statement-50469-5" name="motivation-statement-50469-5" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="preferred-location-50469-504">Preferred location (50469)</label><select id="preferred-location-50469-504" name="preferred-location-50469-504"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50469)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50469)</legend><label for="willing-to-relocate-5046-0"><input type="radio" id="willing-to-relocate-5046-0" name="willing-to-relocate-5046" value="yes"> Yes</label><label for="willing-to-relocate-5046-1"><input type="radio" id="willing-to-relocate-5046-1" name="willing-to-relocate-5046" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-504">Compensation requirement (50469)</label><input type="number" id="compensation-requirement-504" name="compensation-requirement-504" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50469-504">When can you start? (50469)</label><input type="date" id="when-can-you-start-50469-504" name="when-can-you-start-50469-504" ></div>
<div class="field-row"><label for="referral-source-50469-50469">Referral source (50469)</label><select id="referral-source-50469-50469" name="referral-source-50469-50469"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Core competencies (50469)</legend><label for="core-competencies-50469--cb-0"><input type="checkbox" id="core-competencies-50469--cb-0" name="core-competencies-50469-[]" value="rust"> Rust</label><label for="core-competencies-50469--cb-1"><input type="checkbox" id="core-competencies-50469--cb-1" name="core-competencies-50469-[]" value="sql"> SQL</label><label for="core-competencies-50469--cb-2"><input type="checkbox" id="core-competencies-50469--cb-2" name="core-competencies-50469-[]" value="go"> Go</label><label for="core-competencies-50469--cb-3"><input type="checkbox" id="core-competencies-50469--cb-3" name="core-competencies-50469-[]" value="python"> Python</label><label for="core-competencies-50469--cb-4"><input type="checkbox" id="core-competencies-50469--cb-4" name="core-competencies-50469-[]" value="javascript"> JavaScript</label><label for="core-competencies-50469--cb-5"><input type="checkbox" id="core-competencies-50469--cb-5" name="core-competencies-50469-[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50469">Attach resume (50469)</label><input type="file" id="file-50469" name="file-50469" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
