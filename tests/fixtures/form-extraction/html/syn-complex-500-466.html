<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50466</title></head>
<body>
<main><h1>Wizard complex apply 50466</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50466">
<h2 id="wizard-contact-50466">Contact information</h2>

<label for="wiz-name-50466">Applicant name (50466)</label>
<input type="text" id="wiz-name-50466" name="wiz-name-50466" autocomplete="name">
<label for="wiz-email-50466">Contact email (50466)</label>
<input type="email" id="wiz-email-50466" name="wiz-email-50466" autocomplete="email">
<label for="wiz-phone-50466">Mobile number (50466)</label>
<input type="tel" id="wiz-phone-50466" name="wiz-phone-50466" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50466">
<h2 id="wizard-screen-50466">Screening questions</h2>
<div class="field-row"><label for="motivation-statement-50466-5">Motivation statement (50466)</label><textarea id="motivation-statement-50466-5" name="motivation-statement-50466-5" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="current-city-50466-50466">Current city (50466)</label><select id="current-city-50466-50466" name="current-city-50466-50466"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50466)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-504">Compensation requirement (50466)</label><input type="number" id="compensation-requirement-504" name="compensation-requirement-504" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50466-50">Earliest start date (50466)</label><input type="date" id="earliest-start-date-50466-50" name="earliest-start-date-50466-50" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50466">
<h2 id="wizard-docs-50466">Documents and skills</h2>
<fieldset><legend>Core competencies (50466)</legend><label for="core-competencies-50466--cb-0"><input type="checkbox" id="core-competencies-50466--cb-0" name="core-competencies-50466-[]" value="python"> Python</label><label for="core-competencies-50466--cb-1"><input type="checkbox" id="core-competencies-50466--cb-1" name="core-competencies-50466-[]" value="rust"> Rust</label><label for="core-competencies-50466--cb-2"><input type="checkbox" id="core-competencies-50466--cb-2" name="core-competencies-50466-[]" value="sql"> SQL</label><label for="core-competencies-50466--cb-3"><input type="checkbox" id="core-competencies-50466--cb-3" name="core-competencies-50466-[]" value="react"> React</label><label for="core-competencies-50466--cb-4"><input type="checkbox" id="core-competencies-50466--cb-4" name="core-competencies-50466-[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50466">Attach resume (50466)</label><input type="file" id="file-50466" name="file-50466" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="application-source-50466-504">Application source (50466)</label><select id="application-source-50466-504" name="application-source-50466-504"><option value="">Choose one…</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="other">Other</option><option value="job-board">Job board</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
