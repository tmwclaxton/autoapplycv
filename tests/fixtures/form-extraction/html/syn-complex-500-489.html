<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50489</title></head>
<body>
<main><h1>Long complex apply 50489</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50489">Preferred name (50489)</label>
<input type="text" id="long-name-50489" name="long-name-50489" autocomplete="name">
<label for="long-email-50489">Contact email (50489)</label>
<input type="email" id="long-email-50489" name="long-email-50489" autocomplete="email">
<label for="long-phone-50489">Contact number (50489)</label>
<input type="tel" id="long-phone-50489" name="long-phone-50489" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50489">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50489" name="linkedin-profile-url-50489" ></div>
<div class="field-row"><label for="current-employer-50489">Current employer</label><input type="text" id="current-employer-50489" name="current-employer-50489" ></div>
<div class="field-row"><label for="current-job-title-50489">Current job title</label><input type="text" id="current-job-title-50489" name="current-job-title-50489" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="motivation-statement-50489-5">Motivation statement (50489)</label><textarea id="motivation-statement-50489-5" name="motivation-statement-50489-5" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="current-city-50489-50489">Current city (50489)</label><select id="current-city-50489-50489" name="current-city-50489-50489"><option value="">Choose one…</option><option value="remote">Remote</option><option value="london">London</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50489)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50489)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50489-50">Salary expectations (50489)</label><input type="number" id="salary-expectations-50489-50" name="salary-expectations-50489-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50489-50">Earliest start date (50489)</label><input type="date" id="earliest-start-date-50489-50" name="earliest-start-date-50489-50" ></div>
<div class="field-row"><label for="referral-source-50489-50489">Referral source (50489)</label><select id="referral-source-50489-50489" name="referral-source-50489-50489"><option value="">Choose one…</option><option value="conference">Conference</option><option value="job-board">Job board</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Core competencies (50489)</legend><label for="core-competencies-50489--cb-0"><input type="checkbox" id="core-competencies-50489--cb-0" name="core-competencies-50489-[]" value="laravel"> Laravel</label><label for="core-competencies-50489--cb-1"><input type="checkbox" id="core-competencies-50489--cb-1" name="core-competencies-50489-[]" value="react"> React</label><label for="core-competencies-50489--cb-2"><input type="checkbox" id="core-competencies-50489--cb-2" name="core-competencies-50489-[]" value="python"> Python</label><label for="core-competencies-50489--cb-3"><input type="checkbox" id="core-competencies-50489--cb-3" name="core-competencies-50489-[]" value="typescript"> TypeScript</label><label for="core-competencies-50489--cb-4"><input type="checkbox" id="core-competencies-50489--cb-4" name="core-competencies-50489-[]" value="go"> Go</label><label for="core-competencies-50489--cb-5"><input type="checkbox" id="core-competencies-50489--cb-5" name="core-competencies-50489-[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50489">Attach resume (50489)</label><input type="file" id="file-50489" name="file-50489" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
