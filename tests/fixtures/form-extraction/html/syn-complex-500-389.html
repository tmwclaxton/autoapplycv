<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50389</title></head>
<body>
<main><h1>Long complex apply 50389</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50389">Full name (50389)</label>
<input type="text" id="long-name-50389" name="long-name-50389" autocomplete="name">
<label for="long-email-50389">Contact email (50389)</label>
<input type="email" id="long-email-50389" name="long-email-50389" autocomplete="email">
<label for="long-phone-50389">Telephone (50389)</label>
<input type="tel" id="long-phone-50389" name="long-phone-50389" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50389">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50389" name="linkedin-profile-url-50389" ></div>
<div class="field-row"><label for="current-employer-50389">Current employer</label><input type="text" id="current-employer-50389" name="current-employer-50389" ></div>
<div class="field-row"><label for="current-job-title-50389">Current job title</label><input type="text" id="current-job-title-50389" name="current-job-title-50389" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="why-this-role-50389-50389">Why this role? (50389)</label><textarea id="why-this-role-50389-50389" name="why-this-role-50389-50389" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="current-city-50389-50389">Current city (50389)</label><select id="current-city-50389-50389" name="current-city-50389-50389"><option value="">Choose one…</option><option value="london">London</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50389)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50389)</legend><label for="open-to-relocation-50389-0"><input type="radio" id="open-to-relocation-50389-0" name="open-to-relocation-50389" value="yes"> Yes</label><label for="open-to-relocation-50389-1"><input type="radio" id="open-to-relocation-50389-1" name="open-to-relocation-50389" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50389-50389">Expected salary (50389)</label><input type="number" id="expected-salary-50389-50389" name="expected-salary-50389-50389" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50389-503">When can you start? (50389)</label><input type="date" id="when-can-you-start-50389-503" name="when-can-you-start-50389-503" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50389)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="other">Other</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Technical skills (50389)</legend><label for="technical-skills-50389-5-cb-0"><input type="checkbox" id="technical-skills-50389-5-cb-0" name="technical-skills-50389-5[]" value="rust"> Rust</label><label for="technical-skills-50389-5-cb-1"><input type="checkbox" id="technical-skills-50389-5-cb-1" name="technical-skills-50389-5[]" value="react"> React</label><label for="technical-skills-50389-5-cb-2"><input type="checkbox" id="technical-skills-50389-5-cb-2" name="technical-skills-50389-5[]" value="sql"> SQL</label><label for="technical-skills-50389-5-cb-3"><input type="checkbox" id="technical-skills-50389-5-cb-3" name="technical-skills-50389-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50389-5-cb-4"><input type="checkbox" id="technical-skills-50389-5-cb-4" name="technical-skills-50389-5[]" value="laravel"> Laravel</label><label for="technical-skills-50389-5-cb-5"><input type="checkbox" id="technical-skills-50389-5-cb-5" name="technical-skills-50389-5[]" value="go"> Go</label></fieldset>
<div class="file-row"><label for="file-50389">Attach resume (50389)</label><input type="file" id="file-50389" name="file-50389" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
