<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50337</title></head>
<body>
<main><h1>Conditional complex apply 50337</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50337">
<p id="step1-label-50337">Step 1 - Contact</p>

<label for="cond-name-50337">Your name (50337)</label>
<input type="text" id="cond-name-50337" name="cond-name-50337" autocomplete="name">
<label for="cond-email-50337">Work email (50337)</label>
<input type="email" id="cond-email-50337" name="cond-email-50337" autocomplete="email">
<label for="cond-phone-50337">Contact number (50337)</label>
<input type="tel" id="cond-phone-50337" name="cond-phone-50337" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50337">
<p id="step2-label-50337">Step 2 - Preferences</p>
<div class="field-row"><label for="work-location-50337-50337">Work location (50337)</label><select id="work-location-50337-50337" name="work-location-50337-50337"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Relocation preference (50337)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="when-can-you-start-50337-503">When can you start? (50337)</label><input type="date" id="when-can-you-start-50337-503" name="when-can-you-start-50337-503" ></div>
<fieldset><legend>Core competencies (50337)</legend><label for="core-competencies-50337--cb-0"><input type="checkbox" id="core-competencies-50337--cb-0" name="core-competencies-50337-[]" value="python"> Python</label><label for="core-competencies-50337--cb-1"><input type="checkbox" id="core-competencies-50337--cb-1" name="core-competencies-50337-[]" value="javascript"> JavaScript</label><label for="core-competencies-50337--cb-2"><input type="checkbox" id="core-competencies-50337--cb-2" name="core-competencies-50337-[]" value="typescript"> TypeScript</label><label for="core-competencies-50337--cb-3"><input type="checkbox" id="core-competencies-50337--cb-3" name="core-competencies-50337-[]" value="go"> Go</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50337">
<p id="step3-label-50337">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50337" data-reveal="#reveal-50337">Show follow-up questions</button>
<div id="reveal-50337" hidden style="display:none"><div class="field-row"><label for="personal-statement-50337-503">Personal statement (50337)</label><textarea id="personal-statement-50337-503" name="personal-statement-50337-503" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="portfolio-url-50337-50337">Portfolio URL (50337)</label><input type="url" id="portfolio-url-50337-50337" name="portfolio-url-50337-50337" ></div>
<div class="field-row"><label for="desired-base-salary-50337-50">Desired base salary (50337)</label><input type="number" id="desired-base-salary-50337-50" name="desired-base-salary-50337-50" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50337">Attach resume (50337)</label><input type="file" id="file-50337" name="file-50337" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
