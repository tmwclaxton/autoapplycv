<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Lever-style 9460</title></head>
<body>
<main><h1>Lever-style 9460</h1><form action="/apply" method="post">
<div class="application-form">
<div class="application-field"><label class="application-label">Legal name (9460)</label><input name="lever-name-9460" type="text" id="lever-name-9460"></div>
<div class="application-field"><label class="application-label">Email address (9460)</label><input name="lever-email-9460" type="email" id="lever-email-9460"></div>
<div class="application-field"><label class="application-label">Mobile number (9460)</label><input name="lever-phone-9460" type="tel" id="lever-phone-9460"></div>
<div class="application-field"><label class="application-label">Motivation statement (9460)</label><textarea name="lever-cover-9460" id="lever-cover-9460" rows="4" maxlength="500"></textarea></div>

<button type="button">Submit application</button>
</div></form></main>
</body>
</html>
