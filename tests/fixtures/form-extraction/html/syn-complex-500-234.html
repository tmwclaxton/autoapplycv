<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters complex apply 50234</title></head>
<body>

<main data-sr-application="true"><h1>Apply 50234</h1>

<input type="email" id="sr-email-50234" name="sr-email-50234" autocomplete="email">

<div class="field-row"><label for="expected-salary-50234-50234">Expected salary (50234)</label><input type="number" id="expected-salary-50234-50234" name="expected-salary-50234-50234" min="0" step="1000" placeholder="Annual amount"></div>

</section>

</form></main>

</html>
