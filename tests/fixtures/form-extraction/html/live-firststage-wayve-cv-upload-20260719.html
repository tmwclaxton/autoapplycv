<!doctype html>
<html>
    <head>
        <title>
            Senior Software Engineer, Cloud, Simulation | Wayve | First
        </title>
    </head>
    <body>
        <div class="flex flex-col gap-5 text-center text-balance">
            <div class="font-display text-2xl">Step 1: Upload CV</div>
            <p class="lg:text-lg">
                We will use your CV to fill as much of the application form as
                possible for you.
            </p>
            <p class="opacity-70 max-lg:text-sm">
                Drag and drop or choose a .docx .pdf, .rtf, .odt or .html file
                to upload
            </p>
        </div>
        <div class="text-center">
            <input
                accept="text/plain,.txt,text/markdown,.md,text/html,.html,.htm,application/pdf,.pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,.docx,application/rtf,.rtf"
                multiple=""
                type="file"
                style="
                    border: 0;
                    clip: rect(0, 0, 0, 0);
                    clip-path: inset(50%);
                    height: 1px;
                    margin: 0 -1px -1px 0;
                    overflow: hidden;
                    padding: 0;
                    position: absolute;
                    width: 1px;
                    white-space: nowrap;
                "
                tabindex="-1"
            />
            <button type="button" class="inline-block rounded-full">
                <span>Choose file</span>
            </button>
        </div>
    </body>
</html>
