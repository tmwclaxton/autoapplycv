<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters complex apply 50204</title></head>
<body>

<main data-sr-application="true"><h1>Apply 50204</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">
<h2>Contact information</h2>

<label for="sr-name-50204">Full name (50204)</label>
<input type="text" id="sr-name-50204" name="sr-name-50204" autocomplete="name">
<label for="sr-email-50204">Email address (50204)</label>
<input type="email" id="sr-email-50204" name="sr-email-50204" autocomplete="email">
<label for="sr-phone-50204">Contact number (50204)</label>
<input type="tel" id="sr-phone-50204" name="sr-phone-50204" autocomplete="tel">
</section>
<section class="sr-section" data-section="experience">
<h2>Experience and motivation</h2>
<div class="field-row"><label for="tell-us-about-yourself-50204">Tell us about yourself (50204)</label><textarea id="tell-us-about-yourself-50204" name="tell-us-about-yourself-50204" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="portfolio-url-50204-50204">Portfolio URL (50204)</label><input type="url" id="portfolio-url-50204-50204" name="portfolio-url-50204-50204" ></div>
</section>
<section class="sr-section" data-section="preferences">
<h2>Preferences</h2>
<div class="field-row"><label for="work-location-50204-50204">Work location (50204)</label><select id="work-location-50204-50204" name="work-location-50204-50204"><option value="">Choose one…</option><option value="new-york">New York</option><option value="remote">Remote</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Work authorization status (50204)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50204-50">Desired base salary (50204)</label><input type="number" id="desired-base-salary-50204-50" name="desired-base-salary-50204-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50204-50">Earliest start date (50204)</label><input type="date" id="earliest-start-date-50204-50" name="earliest-start-date-50204-50" ></div>
<fieldset><legend>Technical skills (50204)</legend><label for="technical-skills-50204-5-cb-0"><input type="checkbox" id="technical-skills-50204-5-cb-0" name="technical-skills-50204-5[]" value="react"> React</label><label for="technical-skills-50204-5-cb-1"><input type="checkbox" id="technical-skills-50204-5-cb-1" name="technical-skills-50204-5[]" value="python"> Python</label><label for="technical-skills-50204-5-cb-2"><input type="checkbox" id="technical-skills-50204-5-cb-2" name="technical-skills-50204-5[]" value="go"> Go</label><label for="technical-skills-50204-5-cb-3"><input type="checkbox" id="technical-skills-50204-5-cb-3" name="technical-skills-50204-5[]" value="typescript"> TypeScript</label></fieldset>
</section>
<section class="sr-section" data-section="documents">
<h2>Documents</h2>
<div class="file-row"><label for="file-50204">Attach resume (50204)</label><input type="file" id="file-50204" name="file-50204" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
