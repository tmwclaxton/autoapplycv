<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Job application form</title>
<link rel="stylesheet" href="jobapplication.css"></link>
</head>
<body>
       <div class="Container">
                                                   <div class="apply_box">
                                                                                          <h1>Job Application <span class="small">(web)</span></h1> 
                                                                                     <form action="">
                                                                                                            <div class="form_container">
                                                                                                             <div class="form_control">
                                                                                                                                         <label for="first name"> First Name</label>
                                                                                                                                              <input type="text" id="first name" name="first name" placeholder="Enter your name">
                                                                                                                  
                                                                                                             </div>
                                                                                                                       
                                                                                                                   <div class="form_control">
                                                                                                                                         <label for="Last name"> Last Name</label>
                                                                                                                                              <input type="last name" id="last name" name="  last name" placeholder="Enter your Last name">
                                                                                                                  
                                                                                                             </div>
                                                                                                                                   <div class="form_control">
                                                                                                                                         <label for="Email"> Email</label>
                                                                                                                                              <input type="email" id="email" name="email" placeholder="Enter your email id">
                                                                                                                  
                                                                                                             </div>
                                                                                                               <div class="form_control">
                                                                                                                                         <label for="job role"> Job Role</label>
                                                                                                                                              <select id="job role" name="job role">
                                                                                                                                            <option value="">  Select Job Role</option>
                                                                                                                                             <option value="frontend">Frontend Developer</option>
                                                                                                                                              <option value="backend">Backend Developer</option>
                                                                                                                                               <option value="full_stack">Full Stack Developer</option>
                                                                                                                                               <option value="UI_UX">UI UX Designer</option>
                                                                                                                                              </select>
                                                                                                                  
                                                                                                             </div>
                                                                                                                        <div class="textarea_control">
                                                                                                                                         <label for="Address"> Address</label>
                                                                                                                                              <textarea   id="address" name="address" placeholder="Enter  address"></textarea>
                                                                                                                  
                                                                                                             </div>
                                                                                                                              <div class="form_control">
                                                                                                                                         <label for="city"> City</label>
                                                                                                                                              <input type="city" id="city" name="city" placeholder="Enter your city">
                                                                                                                  
                                                                                                             </div>
                                                                                                                      <div class="form_control">
                                                                                                                                         <label for="Pincode"> Pincord</label>
                                                                                                                                              <input type="number" id="pincode" name="pincode" placeholder="Enter your pincode">
                                                                                                                  
                                                                                                             </div>
                                                                                                                              <div class="form_control">
                                                                                                                                         <label for="Date"> Date</label>
                                                                                                                                              <input type="Date" id="Date" name="Date">
                                                                                                                  
                                                                                                             </div>
                                                                                                                                     <div class="form_control">
                                                                                                                                         <label for="upload"> Upload Your CV</label>
                                                                                                                                              <input type="file" id="upload" name="upload">
                                                                                                                  
                                                                                                             </div>
                                                                                                                        </div>
                                                                                        </form>
                                                                                <div class="button">
                                                                                        <button type="submit">Apply Now</button>
                                                                           </div>                                                                                                   

                                                             </div>


           </div>




</body>



</html>
