<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Lever complex apply 50132</title></head>
<body>
<main><h1>Lever complex apply 50132</h1><form action="/apply" method="post">
<div class="application-form lever-form">
<section class="application-section" data-section="contact">
<h2 class="application-heading">Contact</h2>
<div class="application-field"><label class="application-label">Applicant name (50132)</label><input name="lv-name-50132" type="text" id="lv-name-50132"></div>
<div class="application-field"><label class="application-label">Email address (50132)</label><input name="lv-email-50132" type="email" id="lv-email-50132"></div>
<div class="application-field"><label class="application-label">Contact number (50132)</label><input name="lv-phone-50132" type="tel" id="lv-phone-50132"></div>
</section>
<section class="application-section" data-section="questions">
<h2 class="application-heading">Questions</h2>
<div class="field-row"><label for="motivation-statement-50132-5">Motivation statement (50132)</label><textarea id="motivation-statement-50132-5" name="motivation-statement-50132-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50132-50132">Work location (50132)</label><select id="work-location-50132-50132" name="work-location-50132-50132"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50132)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-501">Compensation requirement (50132)</label><input type="number" id="compensation-requirement-501" name="compensation-requirement-501" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50132-50132">Available from (50132)</label><input type="date" id="available-from-50132-50132" name="available-from-50132-50132" ></div>
<fieldset><legend>Technical skills (50132)</legend><label for="technical-skills-50132-5-cb-0"><input type="checkbox" id="technical-skills-50132-5-cb-0" name="technical-skills-50132-5[]" value="sql"> SQL</label><label for="technical-skills-50132-5-cb-1"><input type="checkbox" id="technical-skills-50132-5-cb-1" name="technical-skills-50132-5[]" value="laravel"> Laravel</label><label for="technical-skills-50132-5-cb-2"><input type="checkbox" id="technical-skills-50132-5-cb-2" name="technical-skills-50132-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50132-5-cb-3"><input type="checkbox" id="technical-skills-50132-5-cb-3" name="technical-skills-50132-5[]" value="typescript"> TypeScript</label></fieldset>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50132)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="job-board">Job board</option><option value="referral">Referral</option></select></div>
</section>
<section class="application-section" data-section="documents">
<h2 class="application-heading">Documents</h2>
<div class="file-row"><label for="file-50132">Resume/CV (50132)</label><input type="file" id="file-50132" name="file-50132" accept=".pdf,.doc,.docx"></div>
<div class="file-row"><label for="file-cover-50132">Cover letter file (50132)</label><input type="file" id="file-cover-50132" name="file-cover-50132" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Submit application</button>
</div></form></main>
</body>
</html>
