<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nested fieldsets 20354</title></head>
<body>
<main><h1>Nested fieldsets 20354</h1><form action="/apply" method="post">
<fieldset><legend>Personal details</legend>
<label for="ns-name-20354">Applicant name (20354)</label>
<input type="text" id="ns-name-20354" name="ns-name-20354" autocomplete="name">
<label for="ns-email-20354">Email address (20354)</label>
<input type="email" id="ns-email-20354" name="ns-email-20354" autocomplete="email">
<label for="ns-phone-20354">Phone number (20354)</label>
<input type="tel" id="ns-phone-20354" name="ns-phone-20354" autocomplete="tel"></fieldset>
<fieldset><legend>Preferences</legend><div class="field-row"><label for="preferred-location-20354-203">Preferred location (20354)</label><select id="preferred-location-20354-203" name="preferred-location-20354-203"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="london">London</option><option value="hybrid">Hybrid</option></select></div></fieldset>
<fieldset><legend>Additional</legend><div class="field-row"><label for="motivation-statement-20354-2">Motivation statement (20354)</label><textarea id="motivation-statement-20354-2" name="motivation-statement-20354-2" rows="4" maxlength="400"></textarea></div></fieldset></form></main>
</body>
</html>
