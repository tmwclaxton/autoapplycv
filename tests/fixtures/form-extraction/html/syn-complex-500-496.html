<!DOCTYPE html>

<head><meta charset="utf-8"><title>Wizard complex apply 50496</title></head>
<body>
<main><h1>Wizard complex apply 50496</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>

</section>

</div></form></main>

</html>
