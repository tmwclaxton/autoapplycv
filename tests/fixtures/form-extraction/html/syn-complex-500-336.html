<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50336</title></head>
<body>
<main><h1>Wizard complex apply 50336</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50336">
<h2 id="wizard-contact-50336">Contact information</h2>

<label for="wiz-name-50336">Full name (50336)</label>
<input type="text" id="wiz-name-50336" name="wiz-name-50336" autocomplete="name">
<label for="wiz-email-50336">Personal email (50336)</label>
<input type="email" id="wiz-email-50336" name="wiz-email-50336" autocomplete="email">
<label for="wiz-phone-50336">Mobile number (50336)</label>
<input type="tel" id="wiz-phone-50336" name="wiz-phone-50336" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50336">
<h2 id="wizard-screen-50336">Screening questions</h2>
<div class="field-row"><label for="cover-letter-50336-50336">Cover letter (50336)</label><textarea id="cover-letter-50336-50336" name="cover-letter-50336-50336" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="preferred-location-50336-503">Preferred location (50336)</label><select id="preferred-location-50336-503" name="preferred-location-50336-503"><option value="">Choose one…</option><option value="new-york">New York</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50336)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50336-50336">Expected salary (50336)</label><input type="number" id="expected-salary-50336-50336" name="expected-salary-50336-50336" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50336-50336">Available from (50336)</label><input type="date" id="available-from-50336-50336" name="available-from-50336-50336" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50336">
<h2 id="wizard-docs-50336">Documents and skills</h2>
<fieldset><legend>Technical skills (50336)</legend><label for="technical-skills-50336-5-cb-0"><input type="checkbox" id="technical-skills-50336-5-cb-0" name="technical-skills-50336-5[]" value="go"> Go</label><label for="technical-skills-50336-5-cb-1"><input type="checkbox" id="technical-skills-50336-5-cb-1" name="technical-skills-50336-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50336-5-cb-2"><input type="checkbox" id="technical-skills-50336-5-cb-2" name="technical-skills-50336-5[]" value="laravel"> Laravel</label><label for="technical-skills-50336-5-cb-3"><input type="checkbox" id="technical-skills-50336-5-cb-3" name="technical-skills-50336-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50336-5-cb-4"><input type="checkbox" id="technical-skills-50336-5-cb-4" name="technical-skills-50336-5[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50336">Attach resume (50336)</label><input type="file" id="file-50336" name="file-50336" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="application-source-50336-503">Application source (50336)</label><select id="application-source-50336-503" name="application-source-50336-503"><option value="">Choose one…</option><option value="conference">Conference</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="referral">Referral</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
