<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50238</title></head>
<body>
<main><h1>Mixed complex apply 50238</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50238">Full name (50238)</label>
<input type="text" id="mix-name-50238" name="mix-name-50238" autocomplete="name">
<label for="mix-email-50238">Email address (50238)</label>
<input type="email" id="mix-email-50238" name="mix-email-50238" autocomplete="email">
<label for="mix-phone-50238">Contact number (50238)</label>
<input type="tel" id="mix-phone-50238" name="mix-phone-50238" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50238-50238">Cover letter (50238)</label><textarea id="cover-letter-50238-50238" name="cover-letter-50238-50238" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50238-502">Preferred location (50238)</label><select id="preferred-location-50238-502" name="preferred-location-50238-502"><option value="">Choose one…</option><option value="london">London</option><option value="new-york">New York</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50238)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50238)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50238-50">Salary expectations (50238)</label><input type="number" id="salary-expectations-50238-50" name="salary-expectations-50238-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50238-502">When can you start? (50238)</label><input type="date" id="when-can-you-start-50238-502" name="when-can-you-start-50238-502" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50238)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="other">Other</option><option value="conference">Conference</option></select></div>
<fieldset><legend>Core competencies (50238)</legend><label for="core-competencies-50238--cb-0"><input type="checkbox" id="core-competencies-50238--cb-0" name="core-competencies-50238-[]" value="javascript"> JavaScript</label><label for="core-competencies-50238--cb-1"><input type="checkbox" id="core-competencies-50238--cb-1" name="core-competencies-50238-[]" value="react"> React</label><label for="core-competencies-50238--cb-2"><input type="checkbox" id="core-competencies-50238--cb-2" name="core-competencies-50238-[]" value="python"> Python</label><label for="core-competencies-50238--cb-3"><input type="checkbox" id="core-competencies-50238--cb-3" name="core-competencies-50238-[]" value="go"> Go</label></fieldset>
<div class="file-row"><label for="file-50238">Attach resume (50238)</label><input type="file" id="file-50238" name="file-50238" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50238-5023">Work samples link (50238)</label><input type="url" id="work-samples-link-50238-5023" name="work-samples-link-50238-5023" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
