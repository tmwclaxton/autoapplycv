<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>React apply 4</title></head>
<body>
<main><h1>React apply 4</h1><form action="/apply" method="post">
<div id="root" data-reactroot="">
<div class="App">
<div class="component FormSection" role="group" aria-label="Contact details">
<div class="component Field"><label htmlFor="r-name">Your name</label><input id="r-name" name="r-name" type="text" aria-label="Your name"></div>
<div class="component Field"><label htmlFor="r-email">Personal email</label><input id="r-email" name="r-email" type="email" aria-label="Personal email"></div>
<div class="component Field"><label htmlFor="r-phone">Telephone</label><input id="r-phone" name="r-phone" type="tel" aria-label="Telephone"></div>
</div>
<div class="component Field"><div class="field-row"><label for="motivation-statement">Motivation statement</label><textarea id="motivation-statement" name="motivation-statement" rows="4" maxlength="400" ></textarea></div></div>
<button type="button">Continue</button>
</div>
</div></form></main>
</body>
</html>
