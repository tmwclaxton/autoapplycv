<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50090</title></head>
<body>
<main><h1>Mixed complex apply 50090</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50090">Applicant name (50090)</label>
<input type="text" id="mix-name-50090" name="mix-name-50090" autocomplete="name">
<label for="mix-email-50090">Contact email (50090)</label>
<input type="email" id="mix-email-50090" name="mix-email-50090" autocomplete="email">
<label for="mix-phone-50090">Mobile number (50090)</label>
<input type="tel" id="mix-phone-50090" name="mix-phone-50090" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="personal-statement-50090-500">Personal statement (50090)</label><textarea id="personal-statement-50090-500" name="personal-statement-50090-500" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50090-50090">Work location (50090)</label><select id="work-location-50090-50090" name="work-location-50090-50090"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50090)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50090)</legend><label for="willing-to-relocate-5009-0"><input type="radio" id="willing-to-relocate-5009-0" name="willing-to-relocate-5009" value="yes"> Yes</label><label for="willing-to-relocate-5009-1"><input type="radio" id="willing-to-relocate-5009-1" name="willing-to-relocate-5009" value="no"> No</label><label for="willing-to-relocate-5009-2"><input type="radio" id="willing-to-relocate-5009-2" name="willing-to-relocate-5009" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50090-50">Desired base salary (50090)</label><input type="number" id="desired-base-salary-50090-50" name="desired-base-salary-50090-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50090-">Start date preference (50090)</label><input type="date" id="start-date-preference-50090-" name="start-date-preference-50090-" ></div>
<div class="field-row"><label for="referral-source-50090-50090">Referral source (50090)</label><select id="referral-source-50090-50090" name="referral-source-50090-50090"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option><option value="referral">Referral</option><option value="other">Other</option></select></div>
<fieldset><legend>Primary expertise (50090)</legend><label for="primary-expertise-50090--cb-0"><input type="checkbox" id="primary-expertise-50090--cb-0" name="primary-expertise-50090-[]" value="python"> Python</label><label for="primary-expertise-50090--cb-1"><input type="checkbox" id="primary-expertise-50090--cb-1" name="primary-expertise-50090-[]" value="rust"> Rust</label><label for="primary-expertise-50090--cb-2"><input type="checkbox" id="primary-expertise-50090--cb-2" name="primary-expertise-50090-[]" value="laravel"> Laravel</label><label for="primary-expertise-50090--cb-3"><input type="checkbox" id="primary-expertise-50090--cb-3" name="primary-expertise-50090-[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50090">Attach resume (50090)</label><input type="file" id="file-50090" name="file-50090" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50090-5009">Work samples link (50090)</label><input type="url" id="work-samples-link-50090-5009" name="work-samples-link-50090-5009" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
