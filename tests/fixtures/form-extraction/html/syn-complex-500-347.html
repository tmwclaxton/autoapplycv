<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50347</title></head>
<body>
<main><h1>Conditional complex apply 50347</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50347">
<p id="step1-label-50347">Step 1 - Contact</p>

<label for="cond-name-50347">Full name (50347)</label>
<input type="text" id="cond-name-50347" name="cond-name-50347" autocomplete="name">
<label for="cond-email-50347">Contact email (50347)</label>
<input type="email" id="cond-email-50347" name="cond-email-50347" autocomplete="email">
<label for="cond-phone-50347">Phone number (50347)</label>
<input type="tel" id="cond-phone-50347" name="cond-phone-50347" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50347">
<p id="step2-label-50347">Step 2 - Preferences</p>
<div class="field-row"><label for="work-location-50347-50347">Work location (50347)</label><select id="work-location-50347-50347" name="work-location-50347-50347"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="london">London</option></select></div>
<fieldset><legend>Open to relocation? (50347)</legend><label for="open-to-relocation-50347-0"><input type="radio" id="open-to-relocation-50347-0" name="open-to-relocation-50347" value="yes"> Yes</label><label for="open-to-relocation-50347-1"><input type="radio" id="open-to-relocation-50347-1" name="open-to-relocation-50347" value="no"> No</label><label for="open-to-relocation-50347-2"><input type="radio" id="open-to-relocation-50347-2" name="open-to-relocation-50347" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="start-date-preference-50347-">Start date preference (50347)</label><input type="date" id="start-date-preference-50347-" name="start-date-preference-50347-" ></div>
<fieldset><legend>Core competencies (50347)</legend><label for="core-competencies-50347--cb-0"><input type="checkbox" id="core-competencies-50347--cb-0" name="core-competencies-50347-[]" value="go"> Go</label><label for="core-competencies-50347--cb-1"><input type="checkbox" id="core-competencies-50347--cb-1" name="core-competencies-50347-[]" value="laravel"> Laravel</label><label for="core-competencies-50347--cb-2"><input type="checkbox" id="core-competencies-50347--cb-2" name="core-competencies-50347-[]" value="sql"> SQL</label><label for="core-competencies-50347--cb-3"><input type="checkbox" id="core-competencies-50347--cb-3" name="core-competencies-50347-[]" value="react"> React</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50347">
<p id="step3-label-50347">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50347" data-reveal="#reveal-50347">Show follow-up questions</button>
<div id="reveal-50347" hidden style="display:none"><div class="field-row"><label for="cover-letter-50347-50347">Cover letter (50347)</label><textarea id="cover-letter-50347-50347" name="cover-letter-50347-50347" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="work-samples-link-50347-5034">Work samples link (50347)</label><input type="url" id="work-samples-link-50347-5034" name="work-samples-link-50347-5034" ></div>
<div class="field-row"><label for="expected-salary-50347-50347">Expected salary (50347)</label><input type="number" id="expected-salary-50347-50347" name="expected-salary-50347-50347" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50347">Attach resume (50347)</label><input type="file" id="file-50347" name="file-50347" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
