<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9544</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9544</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9544">Your name (9544)</label>
<input type="text" id="sr-name-9544" name="sr-name-9544" autocomplete="name">
<label for="sr-email-9544">Application email (9544)</label>
<input type="email" id="sr-email-9544" name="sr-email-9544" autocomplete="email">
<label for="sr-phone-9544">Telephone (9544)</label>
<input type="tel" id="sr-phone-9544" name="sr-phone-9544" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="motivation-statement-9544-95">Motivation statement (9544)</label><textarea id="motivation-statement-9544-95" name="motivation-statement-9544-95" rows="4" maxlength="500"></textarea></div>

<div class="field-row">
<span id="listbox-9544-lbl">Where are you based? (9544)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9544" aria-labelledby="listbox-9544-lbl" tabindex="0">Where are you based? (9544)</div>
<div role="listbox" id="listbox-9544" aria-labelledby="listbox-9544-lbl">
<div role="option" data-value="manchester">Manchester</div><div role="option" data-value="berlin">Berlin</div><div role="option" data-value="hybrid">Hybrid</div><div role="option" data-value="remote">Remote</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
