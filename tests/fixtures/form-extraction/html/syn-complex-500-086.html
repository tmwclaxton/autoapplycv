<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50086</title></head>
<body>
<main><h1>Wizard complex apply 50086</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50086">
<h2 id="wizard-contact-50086">Contact information</h2>

<label for="wiz-name-50086">Preferred name (50086)</label>
<input type="text" id="wiz-name-50086" name="wiz-name-50086" autocomplete="name">
<label for="wiz-email-50086">Email address (50086)</label>
<input type="email" id="wiz-email-50086" name="wiz-email-50086" autocomplete="email">
<label for="wiz-phone-50086">Phone number (50086)</label>
<input type="tel" id="wiz-phone-50086" name="wiz-phone-50086" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50086">
<h2 id="wizard-screen-50086">Screening questions</h2>
<div class="field-row"><label for="tell-us-about-yourself-50086">Tell us about yourself (50086)</label><textarea id="tell-us-about-yourself-50086" name="tell-us-about-yourself-50086" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="office-preference-50086-5008">Office preference (50086)</label><select id="office-preference-50086-5008" name="office-preference-50086-5008"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Work authorization status (50086)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50086-50">Desired base salary (50086)</label><input type="number" id="desired-base-salary-50086-50" name="desired-base-salary-50086-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50086-50086">Available from (50086)</label><input type="date" id="available-from-50086-50086" name="available-from-50086-50086" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50086">
<h2 id="wizard-docs-50086">Documents and skills</h2>
<fieldset><legend>Technical skills (50086)</legend><label for="technical-skills-50086-5-cb-0"><input type="checkbox" id="technical-skills-50086-5-cb-0" name="technical-skills-50086-5[]" value="rust"> Rust</label><label for="technical-skills-50086-5-cb-1"><input type="checkbox" id="technical-skills-50086-5-cb-1" name="technical-skills-50086-5[]" value="react"> React</label><label for="technical-skills-50086-5-cb-2"><input type="checkbox" id="technical-skills-50086-5-cb-2" name="technical-skills-50086-5[]" value="laravel"> Laravel</label><label for="technical-skills-50086-5-cb-3"><input type="checkbox" id="technical-skills-50086-5-cb-3" name="technical-skills-50086-5[]" value="go"> Go</label><label for="technical-skills-50086-5-cb-4"><input type="checkbox" id="technical-skills-50086-5-cb-4" name="technical-skills-50086-5[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50086">Attach resume (50086)</label><input type="file" id="file-50086" name="file-50086" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="application-source-50086-500">Application source (50086)</label><select id="application-source-50086-500" name="application-source-50086-500"><option value="">Choose one…</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
