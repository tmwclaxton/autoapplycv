<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Textarea Application 7</title></head>
<body>
<main>
<h1>Textarea Application 7</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="legal-name">Legal name</label><input type="text" id="legal-name" name="legal-name" ></div>
<div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" ></div>
<div class="form-group"><label for="tell-us-about-yourself">Tell us about yourself</label><textarea id="tell-us-about-yourself" name="tell-us-about-yourself" rows="4" maxlength="550"></textarea></div>
<div class="form-group"><label for="describe-a-challenging-p">Describe a challenging project you led</label><textarea id="describe-a-challenging-p" name="describe-a-challenging-p" rows="4" maxlength="800"></textarea></div>

</form>
</main>
</body>
</html>
