<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50128</title></head>
<body>
<main><h1>Mixed complex apply 50128</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50128">Full name (50128)</label>
<input type="text" id="mix-name-50128" name="mix-name-50128" autocomplete="name">
<label for="mix-email-50128">Contact email (50128)</label>
<input type="email" id="mix-email-50128" name="mix-email-50128" autocomplete="email">
<label for="mix-phone-50128">Mobile number (50128)</label>
<input type="tel" id="mix-phone-50128" name="mix-phone-50128" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50128-50128">Cover letter (50128)</label><textarea id="cover-letter-50128-50128" name="cover-letter-50128-50128" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-50128-5012">Office preference (50128)</label><select id="office-preference-50128-5012" name="office-preference-50128-5012"><option value="">Choose one…</option><option value="remote">Remote</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50128)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50128)</legend><label for="willing-to-relocate-5012-0"><input type="radio" id="willing-to-relocate-5012-0" name="willing-to-relocate-5012" value="yes"> Yes</label><label for="willing-to-relocate-5012-1"><input type="radio" id="willing-to-relocate-5012-1" name="willing-to-relocate-5012" value="no"> No</label><label for="willing-to-relocate-5012-2"><input type="radio" id="willing-to-relocate-5012-2" name="willing-to-relocate-5012" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-501">Compensation requirement (50128)</label><input type="number" id="compensation-requirement-501" name="compensation-requirement-501" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50128-">Start date preference (50128)</label><input type="date" id="start-date-preference-50128-" name="start-date-preference-50128-" ></div>
<div class="field-row"><label for="application-source-50128-501">Application source (50128)</label><select id="application-source-50128-501" name="application-source-50128-501"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="other">Other</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Technical skills (50128)</legend><label for="technical-skills-50128-5-cb-0"><input type="checkbox" id="technical-skills-50128-5-cb-0" name="technical-skills-50128-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50128-5-cb-1"><input type="checkbox" id="technical-skills-50128-5-cb-1" name="technical-skills-50128-5[]" value="laravel"> Laravel</label><label for="technical-skills-50128-5-cb-2"><input type="checkbox" id="technical-skills-50128-5-cb-2" name="technical-skills-50128-5[]" value="rust"> Rust</label><label for="technical-skills-50128-5-cb-3"><input type="checkbox" id="technical-skills-50128-5-cb-3" name="technical-skills-50128-5[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50128">Attach resume (50128)</label><input type="file" id="file-50128" name="file-50128" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50128-5012">Work samples link (50128)</label><input type="url" id="work-samples-link-50128-5012" name="work-samples-link-50128-5012" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
