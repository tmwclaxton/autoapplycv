<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9911</title></head>
<body>
<main><h1>Grid layout 9911</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9911">Preferred name (9911)</label><span class="helper">Required</span><input id="grid-name-9911" name="grid-name-9911" type="text"></div>
<div><label for="grid-email-9911">Work email (9911)</label><span class="helper">Required</span><input id="grid-email-9911" name="grid-email-9911" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9911">Direct line (9911)</label><input id="grid-phone-9911" name="grid-phone-9911" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="tell-us-about-yourself-9911-">Tell us about yourself (9911)</label><textarea id="tell-us-about-yourself-9911-" name="tell-us-about-yourself-9911-" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Open to relocation? (9911)</legend><label for="open-to-relocation-9911--0"><input type="radio" id="open-to-relocation-9911--0" name="open-to-relocation-9911-" value="yes"> Yes</label><label for="open-to-relocation-9911--1"><input type="radio" id="open-to-relocation-9911--1" name="open-to-relocation-9911-" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
