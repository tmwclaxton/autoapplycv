<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9912</title></head>
<body>
<main><h1>Grid layout 9912</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9912">Your name (9912)</label><span class="helper">Required</span><input id="grid-name-9912" name="grid-name-9912" type="text"></div>
<div><label for="grid-email-9912">Contact email (9912)</label><span class="helper">Required</span><input id="grid-email-9912" name="grid-email-9912" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9912">Telephone (9912)</label><input id="grid-phone-9912" name="grid-phone-9912" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="why-this-role-9912-9912">Why this role? (9912)</label><textarea id="why-this-role-9912-9912" name="why-this-role-9912-9912" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Willing to relocate? (9912)</legend><label for="willing-to-relocate-9912-0"><input type="radio" id="willing-to-relocate-9912-0" name="willing-to-relocate-9912" value="yes"> Yes</label><label for="willing-to-relocate-9912-1"><input type="radio" id="willing-to-relocate-9912-1" name="willing-to-relocate-9912" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
