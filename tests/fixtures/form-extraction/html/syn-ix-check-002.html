<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Framework checkboxes</title></head>
<body>
<main><h1>Framework checkboxes</h1><form action="/apply" method="post">
<label for="ix-name-18">Applicant name</label>
<input type="text" id="ix-name-18" name="ix-name-18">
<label for="ix-email-18">Contact email</label>
<input type="email" id="ix-email-18" name="ix-email-18">
<label for="ix-phone-18">Contact number</label>
<input type="tel" id="ix-phone-18" name="ix-phone-18">
<div role="group" aria-labelledby="fw-lbl-18">
<span id="fw-lbl-18">Framework experience</span>
<div role="checkbox" aria-checked="false">React</div>
<div role="checkbox" aria-checked="false">Vue</div>
<div role="checkbox" aria-checked="false">Angular</div>
</div></form></main>
</body>
</html>
