<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9545</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9545</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9545">Legal name (9545)</label>
<input type="text" id="sr-name-9545" name="sr-name-9545" autocomplete="name">
<label for="sr-email-9545">Application email (9545)</label>
<input type="email" id="sr-email-9545" name="sr-email-9545" autocomplete="email">
<label for="sr-phone-9545">Contact number (9545)</label>
<input type="tel" id="sr-phone-9545" name="sr-phone-9545" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="why-this-role-9545-9545">Why this role? (9545)</label><textarea id="why-this-role-9545-9545" name="why-this-role-9545-9545" rows="4" maxlength="500"></textarea></div>

<span id="listbox-9545-lbl">Office preference (9545)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9545" aria-labelledby="listbox-9545-lbl" tabindex="0">Office preference (9545)</div>
<div role="listbox" id="listbox-9545" aria-labelledby="listbox-9545-lbl">
<div role="option" data-value="dublin">Dublin</div><div role="option" data-value="manchester">Manchester</div><div role="option" data-value="remote">Remote</div><div role="option" data-value="berlin">Berlin</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
