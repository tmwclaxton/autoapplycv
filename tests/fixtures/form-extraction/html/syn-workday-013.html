<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday Application 8</title></head>
<body>
<main>
<h1>Workday Application 8</h1>
<form action="/apply" method="post">
<div data-testid="input-q_your-name" class="ia-Questions-item">
<div data-testid="input-q_your-name-label"><span data-testid="safe-markup">Your name</span></div>
<input data-testid="input-q_your-name-input" type="text" name="input-q_your-name">
</div>
<div data-testid="input-q_contact-email" class="ia-Questions-item">
<div data-testid="input-q_contact-email-label"><span data-testid="safe-markup">Contact email</span></div>
<input data-testid="input-q_contact-email-input" type="email" name="input-q_contact-email">
</div>
<div data-testid="input-q_motivation-state" class="ia-Questions-item">
<div data-testid="input-q_motivation-state-label"><span data-testid="safe-markup">Motivation statement</span></div>
<textarea data-testid="input-q_motivation-state-input" name="input-q_motivation-state" rows="4" maxlength="500"></textarea>
</div>
<div data-testid="input-q_total-years-of-p" class="ia-Questions-item">
<div data-testid="input-q_total-years-of-p-label"><span data-testid="safe-markup">Total years of professional experience</span></div>
<input data-testid="input-q_total-years-of-p-input" type="number" name="input-q_total-years-of-p">
</div>
<button type="button">Save and continue</button>

</form>
</main>
</body>
</html>
