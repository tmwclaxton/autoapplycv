<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>React apply 9130</title></head>
<body>
<main><h1>React apply 9130</h1><form action="/apply" method="post">
<div id="root" data-reactroot="">
<div class="App">
<div class="component FormSection" role="group" aria-label="Contact details">

<label for="react-name-9130">Complete name (9130)</label>
<input type="text" id="react-name-9130" name="react-name-9130" autocomplete="name">
<label for="react-email-9130">Personal email (9130)</label>
<input type="email" id="react-email-9130" name="react-email-9130" autocomplete="email">
<label for="react-phone-9130">Phone number (9130)</label>
<input type="tel" id="react-phone-9130" name="react-phone-9130" autocomplete="tel">
</div>
<div class="component Field"><div class="field-row"><label for="tell-us-about-yourself-9130-">Tell us about yourself (9130)</label><textarea id="tell-us-about-yourself-9130-" name="tell-us-about-yourself-9130-" rows="4" maxlength="400"></textarea></div></div>
<div role="radiogroup" aria-labelledby="do-you-require-visa-spon-lbl" id="do-you-require-visa-spon">
<span id="do-you-require-visa-spon-lbl">Do you require visa sponsorship? (9130)</span>
<div role="radio" tabindex="0" aria-checked="false" data-value="yes">Yes</div><div role="radio" tabindex="-1" aria-checked="false" data-value="no">No</div>
</div>
<button type="button">Continue</button>
</div>
</div></form></main>
</body>
</html>
