<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Teamtailor apply 20010</title></head>
<body>

<main class="careers-page"><h1 class="job-title">Apply — Role 20010</h1>
<form class="apply-form" action="/apply" method="post" data-teamtailor-form="application">
<section class="form-section" data-section="personal">

<div class="form-group"><label class="form-label" for="tt-name-20010">Legal name (20010)</label>
</div><input class="form-control" type="text" id="tt-name-20010" name="tt-name-20010" autocomplete="name">
<div class="form-group"><label class="form-label" for="tt-email-20010">Personal email (20010)</label>
</div><input class="form-control" type="email" id="tt-email-20010" name="tt-email-20010" autocomplete="email">
<div class="form-group"><label class="form-label" for="tt-phone-20010">Phone number (20010)</label>
</div><input class="form-control" type="tel" id="tt-phone-20010" name="tt-phone-20010" autocomplete="tel">
</section>
<section class="form-section" data-section="questions">
<div class="field-row"><label for="cover-letter-20010-20010">Cover letter (20010)</label><textarea id="cover-letter-20010-20010" name="cover-letter-20010-20010" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-20010-200">Preferred location (20010)</label><select id="preferred-location-20010-200" name="preferred-location-20010-200"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Work authorization status (20010)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
</section>
<div class="file-row"><label for="file-20010">Attach resume (optional)</label><input type="file" id="file-20010" name="file-20010" accept=".pdf,.doc"></div>
<button type="submit" class="btn btn-primary">Submit application</button>
</form></main>
</body>
</html>
