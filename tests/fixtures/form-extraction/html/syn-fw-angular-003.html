<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular material grid 3</title></head>
<body>

<main ng-controller="ApplyCtrl"><h1>Material grid 3</h1>
<form ng-submit="submit()" action="/apply" method="post">
<div class="mat-grid-list">
<div class="mat-grid-tile"><label for="grid-name">Applicant name</label><input id="grid-name" name="grid-name" type="text"></div>
<div class="mat-grid-tile"><label for="grid-email">Contact email</label><input id="grid-email" name="grid-email" type="email"></div>
<div class="mat-grid-tile"><label for="grid-phone">Contact number</label><input id="grid-phone" name="grid-phone" type="tel"></div>
<div class="mat-grid-tile"><div class="field-row"><label for="where-are-you-based">Where are you based?</label><select id="where-are-you-based" name="where-are-you-based" ><option value="">Choose one…</option><option value="office">Office</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div></div>
</div>
</form></main>
</body>
</html>
