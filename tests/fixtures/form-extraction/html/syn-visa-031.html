<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Visa Application 2</title></head>
<body>
<main>
<h1>Visa Application 2</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="legal-name">Legal name</label><input type="text" id="legal-name" name="legal-name" ></div>
<div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" ></div>
<fieldset><legend>Visa sponsorship required?</legend><label><input type="radio" name="visa-sponsorship-require" id="visa-sponsorship-require-0" value="yes"> Yes</label><label><input type="radio" name="visa-sponsorship-require" id="visa-sponsorship-require-1" value="no"> No</label><label><input type="radio" name="visa-sponsorship-require" id="visa-sponsorship-require-2" value="not-sure"> Not sure</label></fieldset>
<fieldset><legend>Work authorization</legend><label><input type="radio" name="work-authorization" id="work-authorization-0" value="yes"> Yes</label><label><input type="radio" name="work-authorization" id="work-authorization-1" value="no"> No</label></fieldset>

</form>
</main>
</body>
</html>
