<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50130</title></head>
<body>
<main><h1>Mixed complex apply 50130</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50130">Applicant name (50130)</label>
<input type="text" id="mix-name-50130" name="mix-name-50130" autocomplete="name">
<label for="mix-email-50130">Personal email (50130)</label>
<input type="email" id="mix-email-50130" name="mix-email-50130" autocomplete="email">
<label for="mix-phone-50130">Contact number (50130)</label>
<input type="tel" id="mix-phone-50130" name="mix-phone-50130" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="why-this-role-50130-50130">Why this role? (50130)</label><textarea id="why-this-role-50130-50130" name="why-this-role-50130-50130" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50130-50130">Current city (50130)</label><select id="current-city-50130-50130" name="current-city-50130-50130"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option><option value="london">London</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50130)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50130)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50130-50">Desired base salary (50130)</label><input type="number" id="desired-base-salary-50130-50" name="desired-base-salary-50130-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50130-">Start date preference (50130)</label><input type="date" id="start-date-preference-50130-" name="start-date-preference-50130-" ></div>
<div class="field-row"><label for="referral-source-50130-50130">Referral source (50130)</label><select id="referral-source-50130-50130" name="referral-source-50130-50130"><option value="">Choose one…</option><option value="conference">Conference</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="other">Other</option></select></div>
<fieldset><legend>Key skills (50130)</legend><label for="key-skills-50130-50130-cb-0"><input type="checkbox" id="key-skills-50130-50130-cb-0" name="key-skills-50130-50130[]" value="laravel"> Laravel</label><label for="key-skills-50130-50130-cb-1"><input type="checkbox" id="key-skills-50130-50130-cb-1" name="key-skills-50130-50130[]" value="rust"> Rust</label><label for="key-skills-50130-50130-cb-2"><input type="checkbox" id="key-skills-50130-50130-cb-2" name="key-skills-50130-50130[]" value="typescript"> TypeScript</label><label for="key-skills-50130-50130-cb-3"><input type="checkbox" id="key-skills-50130-50130-cb-3" name="key-skills-50130-50130[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50130">Attach resume (50130)</label><input type="file" id="file-50130" name="file-50130" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50130-50130">GitHub profile (50130)</label><input type="url" id="github-profile-50130-50130" name="github-profile-50130-50130" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
