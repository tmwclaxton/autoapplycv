<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday Application 10</title></head>
<body>
<main>
<h1>Workday Application 10</h1>
<form action="/apply" method="post">
<div data-testid="input-q_name-as-on-cv" class="ia-Questions-item">
<div data-testid="input-q_name-as-on-cv-label"><span data-testid="safe-markup">Name as on CV</span></div>
<input data-testid="input-q_name-as-on-cv-input" type="text" name="input-q_name-as-on-cv">
</div>
<div data-testid="input-q_personal-email" class="ia-Questions-item">
<div data-testid="input-q_personal-email-label"><span data-testid="safe-markup">Personal email</span></div>
<input data-testid="input-q_personal-email-input" type="email" name="input-q_personal-email">
</div>
<div data-testid="input-q_why-do-you-want-" class="ia-Questions-item">
<div data-testid="input-q_why-do-you-want--label"><span data-testid="safe-markup">Why do you want this role?</span></div>
<textarea data-testid="input-q_why-do-you-want--input" name="input-q_why-do-you-want-" rows="4" maxlength="500"></textarea>
</div>
<div data-testid="input-q_years-of-experie" class="ia-Questions-item">
<div data-testid="input-q_years-of-experie-label"><span data-testid="safe-markup">Years of experience</span></div>
<input data-testid="input-q_years-of-experie-input" type="number" name="input-q_years-of-experie">
</div>
<button type="button">Save and continue</button>

</form>
</main>
</body>
</html>
