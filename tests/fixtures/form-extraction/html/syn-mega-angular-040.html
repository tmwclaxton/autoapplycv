<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9200</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9200</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Full name (9200)</mat-label><label for="ang-name-9200">Full name (9200)</label><input matInput id="ang-name-9200" name="ang-name-9200" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Email address (9200)</mat-label><label for="ang-email-9200">Email address (9200)</label><input matInput id="ang-email-9200" name="ang-email-9200" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Cell phone (9200)</mat-label><label for="ang-phone-9200">Cell phone (9200)</label><input matInput id="ang-phone-9200" name="ang-phone-9200" type="tel"></mat-form-field>
<div class="field-row"><label for="cover-letter-9200-9200">Cover letter (9200)</label><textarea id="cover-letter-9200-9200" name="cover-letter-9200-9200" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-9200-9200">Preferred location (9200)</label><select id="preferred-location-9200-9200" name="preferred-location-9200-9200"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="london">London</option><option value="hybrid">Hybrid</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
