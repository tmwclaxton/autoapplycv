<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50260</title></head>
<body>
<main><h1>Mixed complex apply 50260</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50260">Applicant name (50260)</label>
<input type="text" id="mix-name-50260" name="mix-name-50260" autocomplete="name">
<label for="mix-email-50260">Email address (50260)</label>
<input type="email" id="mix-email-50260" name="mix-email-50260" autocomplete="email">
<label for="mix-phone-50260">Mobile number (50260)</label>
<input type="tel" id="mix-phone-50260" name="mix-phone-50260" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="motivation-statement-50260-5">Motivation statement (50260)</label><textarea id="motivation-statement-50260-5" name="motivation-statement-50260-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50260-50260">Work location (50260)</label><select id="work-location-50260-50260" name="work-location-50260-50260"><option value="">Choose one…</option><option value="remote">Remote</option><option value="dublin">Dublin</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Work authorization status (50260)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50260)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50260-50">Desired base salary (50260)</label><input type="number" id="desired-base-salary-50260-50" name="desired-base-salary-50260-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50260-50260">Available from (50260)</label><input type="date" id="available-from-50260-50260" name="available-from-50260-50260" ></div>
<div class="field-row"><label for="referral-source-50260-50260">Referral source (50260)</label><select id="referral-source-50260-50260" name="referral-source-50260-50260"><option value="">Choose one…</option><option value="conference">Conference</option><option value="other">Other</option><option value="company-site">Company site</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Core competencies (50260)</legend><label for="core-competencies-50260--cb-0"><input type="checkbox" id="core-competencies-50260--cb-0" name="core-competencies-50260-[]" value="typescript"> TypeScript</label><label for="core-competencies-50260--cb-1"><input type="checkbox" id="core-competencies-50260--cb-1" name="core-competencies-50260-[]" value="go"> Go</label><label for="core-competencies-50260--cb-2"><input type="checkbox" id="core-competencies-50260--cb-2" name="core-competencies-50260-[]" value="sql"> SQL</label><label for="core-competencies-50260--cb-3"><input type="checkbox" id="core-competencies-50260--cb-3" name="core-competencies-50260-[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50260">Attach resume (50260)</label><input type="file" id="file-50260" name="file-50260" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50260-50260">Portfolio URL (50260)</label><input type="url" id="portfolio-url-50260-50260" name="portfolio-url-50260-50260" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
