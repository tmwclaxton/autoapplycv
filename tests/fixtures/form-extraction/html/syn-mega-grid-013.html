<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9913</title></head>
<body>
<main><h1>Grid layout 9913</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9913">Legal name (9913)</label><span class="helper">Required</span><input id="grid-name-9913" name="grid-name-9913" type="text"></div>
<div><label for="grid-email-9913">Work email (9913)</label><span class="helper">Required</span><input id="grid-email-9913" name="grid-email-9913" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9913">Direct line (9913)</label><input id="grid-phone-9913" name="grid-phone-9913" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="cover-letter-9913-9913">Cover letter (9913)</label><textarea id="cover-letter-9913-9913" name="cover-letter-9913-9913" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Open to relocation? (9913)</legend><label for="open-to-relocation-9913--0"><input type="radio" id="open-to-relocation-9913--0" name="open-to-relocation-9913-" value="yes"> Yes</label><label for="open-to-relocation-9913--1"><input type="radio" id="open-to-relocation-9913--1" name="open-to-relocation-9913-" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
