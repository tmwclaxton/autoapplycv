<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50170</title></head>
<body>
<main><h1>Mixed complex apply 50170</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50170">Preferred name (50170)</label>
<input type="text" id="mix-name-50170" name="mix-name-50170" autocomplete="name">
<label for="mix-email-50170">Work email (50170)</label>
<input type="email" id="mix-email-50170" name="mix-email-50170" autocomplete="email">
<label for="mix-phone-50170">Mobile number (50170)</label>
<input type="tel" id="mix-phone-50170" name="mix-phone-50170" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50170-50170">Cover letter (50170)</label><textarea id="cover-letter-50170-50170" name="cover-letter-50170-50170" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50170-50170">Current city (50170)</label><select id="current-city-50170-50170" name="current-city-50170-50170"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50170)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50170)</legend><label for="willing-to-relocate-5017-0"><input type="radio" id="willing-to-relocate-5017-0" name="willing-to-relocate-5017" value="yes"> Yes</label><label for="willing-to-relocate-5017-1"><input type="radio" id="willing-to-relocate-5017-1" name="willing-to-relocate-5017" value="no"> No</label><label for="willing-to-relocate-5017-2"><input type="radio" id="willing-to-relocate-5017-2" name="willing-to-relocate-5017" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-501">Compensation requirement (50170)</label><input type="number" id="compensation-requirement-501" name="compensation-requirement-501" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50170-50170">Available from (50170)</label><input type="date" id="available-from-50170-50170" name="available-from-50170-50170" ></div>
<div class="field-row"><label for="application-source-50170-501">Application source (50170)</label><select id="application-source-50170-501" name="application-source-50170-501"><option value="">Choose one…</option><option value="referral">Referral</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="job-board">Job board</option></select></div>
<fieldset><legend>Key skills (50170)</legend><label for="key-skills-50170-50170-cb-0"><input type="checkbox" id="key-skills-50170-50170-cb-0" name="key-skills-50170-50170[]" value="python"> Python</label><label for="key-skills-50170-50170-cb-1"><input type="checkbox" id="key-skills-50170-50170-cb-1" name="key-skills-50170-50170[]" value="rust"> Rust</label><label for="key-skills-50170-50170-cb-2"><input type="checkbox" id="key-skills-50170-50170-cb-2" name="key-skills-50170-50170[]" value="typescript"> TypeScript</label><label for="key-skills-50170-50170-cb-3"><input type="checkbox" id="key-skills-50170-50170-cb-3" name="key-skills-50170-50170[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50170">Attach resume (50170)</label><input type="file" id="file-50170" name="file-50170" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50170-50170">Personal website (50170)</label><input type="url" id="personal-website-50170-50170" name="personal-website-50170-50170" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
