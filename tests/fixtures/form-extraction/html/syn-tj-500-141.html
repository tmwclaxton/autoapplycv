<!DOCTYPE html>
<html lang="en-GB">
<head><meta charset="utf-8"><title>Apply - Product Manager</title></head>
<body>
<div id="app-root" data-genesis-element="BASE">
<header data-testid="header-container" data-genesis-element="BASE">
<a data-testid="logo" href="/">Totaljobs</a>
</header>
<main data-genesis-element="BASE"><form data-testid="application-form" data-at="application-form" data-genesis-element="FORM" action="/job/application" method="post">
<h1 data-testid="application-step-title" data-genesis-element="TEXT">Your details</h1>

<div class="res-field" data-genesis-element="BASE" data-testid="field-first-name-60141">
<label for="first-name-60141" data-testid="field-first-name-60141-label">First name</label>
<input type="text" id="first-name-60141" name="first-name-60141" data-testid="field-first-name-60141-input" required autocomplete="given-name">
</div>
<div class="res-field" data-genesis-element="BASE" data-testid="field-last-name-60141">
<label for="last-name-60141" data-testid="field-last-name-60141-label">Last name</label>
<input type="text" id="last-name-60141" name="last-name-60141" data-testid="field-last-name-60141-input" required autocomplete="family-name">
</div>
<div class="res-field" data-genesis-element="BASE" data-testid="field-email-address-60141">
<label for="email-address-60141" data-testid="field-email-address-60141-label">Email address</label>
<input type="email" id="email-address-60141" name="email-address-60141" data-testid="field-email-address-60141-input" required autocomplete="email">
</div>
<div class="res-field" data-genesis-element="BASE" data-testid="field-phone-number-60141">
<label for="phone-number-60141" data-testid="field-phone-number-60141-label">Phone number</label>
<input type="tel" id="phone-number-60141" name="phone-number-60141" data-testid="field-phone-number-60141-input" required autocomplete="tel">
</div>
<div class="res-field" data-genesis-element="BASE" data-testid="field-postcode-60141">
<label for="postcode-60141" data-testid="field-postcode-60141-label">Postcode</label>
<input type="text" id="postcode-60141" name="postcode-60141" data-testid="field-postcode-60141-input" autocomplete="postal-code">
</div>
<div class="res-field" data-genesis-element="BASE" data-testid="field-town-or-city-60141">
<label for="town-or-city-60141" data-testid="field-town-or-city-60141-label">Town or city</label>
<input type="text" id="town-or-city-60141" name="town-or-city-60141" data-testid="field-town-or-city-60141-input" autocomplete="address-level2">
</div>
<div class="res-field" data-genesis-element="BASE" data-testid="field-country-of-residence-60141">
<label for="country-of-residence-60141">Country of residence</label>
<select id="country-of-residence-60141" name="country-of-residence-60141" data-testid="field-country-of-residence-60141-input">
<option value="">Please select</option><option value="united-kingdom">United Kingdom</option><option value="ireland">Ireland</option><option value="france">France</option><option value="germany">Germany</option><option value="other">Other</option>
</select>
</div>

<div data-at="application-actions"><button type="button" data-testid="continue-button" data-genesis-element="BUTTON">Save and continue</button></div>
</form></main>
<footer data-genesis-element="PAGE_FOOTER"><p>Totaljobs synthetic corpus fixture</p></footer>
</div>
</body>
</html>
