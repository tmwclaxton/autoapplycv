  .listbox-option:hover,.listbox-option.highlighted{background:#f0f7ff}
  .listbox-option[aria-selected=true]{background:#e8f0fe;font-weight:500}
  .meter-wrap{display:flex;align-items:center;gap:12px}
  .meter-wrap meter{flex:1;height:12px;border-radius:6px}
  .meter-wrap meter::-webkit-meter-bar{border:none;border-radius:6px;background:#e5e7eb}
  .meter-wrap meter::-webkit-meter-optimum-value{background:#2563eb;border-radius:6px}
  .meter-val{font-size:13px;color:#6b7280;min-width:32px}
  .hidden-label{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

  .checkbox-cluster input[type=checkbox]{width:16px;height:16px;accent-color:#2563eb}

  .radio-cluster label{display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer}
  .radio-cluster input[type=radio]{width:16px;height:16px;accent-color:#2563eb}

  .glued-label span{background:#f3f6fa;padding:10px 12px;font-size:13px;color:#374151;border-right:1px solid #d1d9e6;white-space:nowrap}
  .glued-label input{flex:1;border:none;padding:10px 12px;font-size:14px;outline:none}
  .glued-label input:focus{box-shadow:none}

  .reveal-content.open{display:block}
  .error-text{color:#dc2626;font-size:12px;margin-top:4px;display:none}
  .btn-apply{padding:12px 32px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
  .btn-apply:hover{background:#1d4ed8}

  iframe.ats-iframe{border:1px solid #e6eaef;border-radius:8px;width:100%;height:800px;background:#fff}
  .note{font-size:12px;color:#9ca3af;margin-top:2px}
  .flex-row{display:flex;gap:12px;align-items:flex-start}

  [role=textbox]{padding:10px 12px;border:1px solid #d1d9e6;border-radius:8px;min-height:80px;cursor:text;background:#fff;font-size:14px;line-height:1.5;color:#1a1d23}

  [role=textbox]:empty:before{content:attr(data-placeholder);color:#9ca3af}
</style>
</head>

        <script>
          document.querySelectorAll(".combobox-trigger").forEach(function(trigger){
            var listbox = trigger.nextElementSibling;
            var options = listbox.querySelectorAll(".listbox-option");
            var valueSpan = trigger.querySelector("#dept-value");
            trigger.addEventListener("click", function(){
              var expanded = trigger.getAttribute("aria-expanded") === "true";
              trigger.setAttribute("aria-expanded", !expanded);
              listbox.classList.toggle("open");
            });
            options.forEach(function(opt){
              opt.addEventListener("click", function(){
                options.forEach(function(o){o.setAttribute("aria-selected","false");});
                opt.setAttribute("aria-selected","true");
                valueSpan.textContent = opt.textContent;
                trigger.setAttribute("aria-expanded","false");
                listbox.classList.remove("open");

              if(!trigger.parentElement.contains(e.target)){
                trigger.setAttribute("aria-expanded","false");
                listbox.classList.remove("open");
              }
            });
          });
