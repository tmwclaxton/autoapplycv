<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9209</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9209</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Your name (9209)</mat-label><label for="ang-name-9209">Your name (9209)</label><input matInput id="ang-name-9209" name="ang-name-9209" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Application email (9209)</mat-label><label for="ang-email-9209">Application email (9209)</label><input matInput id="ang-email-9209" name="ang-email-9209" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Cell phone (9209)</mat-label><label for="ang-phone-9209">Cell phone (9209)</label><input matInput id="ang-phone-9209" name="ang-phone-9209" type="tel"></mat-form-field>
<div class="field-row"><label for="tell-us-about-yourself-9209-">Tell us about yourself (9209)</label><textarea id="tell-us-about-yourself-9209-" name="tell-us-about-yourself-9209-" rows="4" maxlength="500"></textarea></div>

</form></main>
</body>
</html>
