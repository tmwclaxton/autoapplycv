<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Disclosure 9964</title></head>
<body>
<main><h1>Disclosure 9964</h1><form action="/apply" method="post">
<label for="disc-name-9964">Applicant name (9964)</label>
<input type="text" id="disc-name-9964" name="disc-name-9964" autocomplete="name">
<label for="disc-email-9964">Email address (9964)</label>
<input type="email" id="disc-email-9964" name="disc-email-9964" autocomplete="email">
<label for="disc-phone-9964">Telephone (9964)</label>
<input type="tel" id="disc-phone-9964" name="disc-phone-9964" autocomplete="tel">
<button type="button" id="disclosure-9964" aria-expanded="false" aria-controls="disclosure-panel-9964" data-reveal="#disclosure-panel-9964">Show voluntary disclosures</button>
<div id="disclosure-panel-9964" hidden style="display:none">
<label for="disclosure-text-9964">Voluntary disclosure (9964)</label>
<textarea id="disclosure-text-9964" name="disclosure-text-9964" rows="3" maxlength="300"></textarea>
</div></form></main>
</body>
</html>
