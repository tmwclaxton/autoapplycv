<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9172</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9172</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Complete name (9172)</mat-label><label for="ang-name-9172">Complete name (9172)</label><input matInput id="ang-name-9172" name="ang-name-9172" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Email address (9172)</mat-label><label for="ang-email-9172">Email address (9172)</label><input matInput id="ang-email-9172" name="ang-email-9172" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Mobile number (9172)</mat-label><label for="ang-phone-9172">Mobile number (9172)</label><input matInput id="ang-phone-9172" name="ang-phone-9172" type="tel"></mat-form-field>
<div class="field-row"><label for="tell-us-about-yourself-9172-">Tell us about yourself (9172)</label><textarea id="tell-us-about-yourself-9172-" name="tell-us-about-yourself-9172-" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="where-are-you-based-9172-917">Where are you based? (9172)</label><select id="where-are-you-based-9172-917" name="where-are-you-based-9172-917"><option value="">Choose one…</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
