<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters complex apply 50214</title></head>
<body>

<main data-sr-application="true"><h1>Apply 50214</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">
<h2>Contact information</h2>

<label for="sr-name-50214">Preferred name (50214)</label>
<input type="text" id="sr-name-50214" name="sr-name-50214" autocomplete="name">
<label for="sr-email-50214">Personal email (50214)</label>
<input type="email" id="sr-email-50214" name="sr-email-50214" autocomplete="email">
<label for="sr-phone-50214">Telephone (50214)</label>
<input type="tel" id="sr-phone-50214" name="sr-phone-50214" autocomplete="tel">
</section>
<section class="sr-section" data-section="experience">
<h2>Experience and motivation</h2>
<div class="field-row"><label for="why-this-role-50214-50214">Why this role? (50214)</label><textarea id="why-this-role-50214-50214" name="why-this-role-50214-50214" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="personal-website-50214-50214">Personal website (50214)</label><input type="url" id="personal-website-50214-50214" name="personal-website-50214-50214" ></div>
</section>
<section class="sr-section" data-section="preferences">
<h2>Preferences</h2>
<div class="field-row"><label for="office-preference-50214-5021">Office preference (50214)</label><select id="office-preference-50214-5021" name="office-preference-50214-5021"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="new-york">New York</option><option value="berlin">Berlin</option><option value="london">London</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50214)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50214-50">Salary expectations (50214)</label><input type="number" id="salary-expectations-50214-50" name="salary-expectations-50214-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50214-502">When can you start? (50214)</label><input type="date" id="when-can-you-start-50214-502" name="when-can-you-start-50214-502" ></div>
<fieldset><legend>Key skills (50214)</legend><label for="key-skills-50214-50214-cb-0"><input type="checkbox" id="key-skills-50214-50214-cb-0" name="key-skills-50214-50214[]" value="sql"> SQL</label><label for="key-skills-50214-50214-cb-1"><input type="checkbox" id="key-skills-50214-50214-cb-1" name="key-skills-50214-50214[]" value="react"> React</label><label for="key-skills-50214-50214-cb-2"><input type="checkbox" id="key-skills-50214-50214-cb-2" name="key-skills-50214-50214[]" value="laravel"> Laravel</label><label for="key-skills-50214-50214-cb-3"><input type="checkbox" id="key-skills-50214-50214-cb-3" name="key-skills-50214-50214[]" value="javascript"> JavaScript</label></fieldset>
</section>
<section class="sr-section" data-section="documents">
<h2>Documents</h2>
<div class="file-row"><label for="file-50214">Attach resume (50214)</label><input type="file" id="file-50214" name="file-50214" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
