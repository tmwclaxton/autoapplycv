<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50230</title></head>
<body>
<main><h1>Mixed complex apply 50230</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50230">Preferred name (50230)</label>
<input type="text" id="mix-name-50230" name="mix-name-50230" autocomplete="name">
<label for="mix-email-50230">Contact email (50230)</label>
<input type="email" id="mix-email-50230" name="mix-email-50230" autocomplete="email">
<label for="mix-phone-50230">Mobile number (50230)</label>
<input type="tel" id="mix-phone-50230" name="mix-phone-50230" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50230">Tell us about yourself (50230)</label><textarea id="tell-us-about-yourself-50230" name="tell-us-about-yourself-50230" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50230-50230">Work location (50230)</label><select id="work-location-50230-50230" name="work-location-50230-50230"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50230)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50230)</legend><label for="open-to-relocation-50230-0"><input type="radio" id="open-to-relocation-50230-0" name="open-to-relocation-50230" value="yes"> Yes</label><label for="open-to-relocation-50230-1"><input type="radio" id="open-to-relocation-50230-1" name="open-to-relocation-50230" value="no"> No</label><label for="open-to-relocation-50230-2"><input type="radio" id="open-to-relocation-50230-2" name="open-to-relocation-50230" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50230-50230">Expected salary (50230)</label><input type="number" id="expected-salary-50230-50230" name="expected-salary-50230-50230" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50230-">Start date preference (50230)</label><input type="date" id="start-date-preference-50230-" name="start-date-preference-50230-" ></div>
<div class="field-row"><label for="referral-source-50230-50230">Referral source (50230)</label><select id="referral-source-50230-50230" name="referral-source-50230-50230"><option value="">Choose one…</option><option value="conference">Conference</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Technical skills (50230)</legend><label for="technical-skills-50230-5-cb-0"><input type="checkbox" id="technical-skills-50230-5-cb-0" name="technical-skills-50230-5[]" value="go"> Go</label><label for="technical-skills-50230-5-cb-1"><input type="checkbox" id="technical-skills-50230-5-cb-1" name="technical-skills-50230-5[]" value="sql"> SQL</label><label for="technical-skills-50230-5-cb-2"><input type="checkbox" id="technical-skills-50230-5-cb-2" name="technical-skills-50230-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50230-5-cb-3"><input type="checkbox" id="technical-skills-50230-5-cb-3" name="technical-skills-50230-5[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50230">Attach resume (50230)</label><input type="file" id="file-50230" name="file-50230" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50230-50230">GitHub profile (50230)</label><input type="url" id="github-profile-50230-50230" name="github-profile-50230-50230" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
