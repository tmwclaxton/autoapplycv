<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50429</title></head>
<body>
<main><h1>Long complex apply 50429</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50429">Legal name (50429)</label>
<input type="text" id="long-name-50429" name="long-name-50429" autocomplete="name">
<label for="long-email-50429">Personal email (50429)</label>
<input type="email" id="long-email-50429" name="long-email-50429" autocomplete="email">
<label for="long-phone-50429">Telephone (50429)</label>
<input type="tel" id="long-phone-50429" name="long-phone-50429" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50429">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50429" name="linkedin-profile-url-50429" ></div>
<div class="field-row"><label for="current-employer-50429">Current employer</label><input type="text" id="current-employer-50429" name="current-employer-50429" ></div>
<div class="field-row"><label for="current-job-title-50429">Current job title</label><input type="text" id="current-job-title-50429" name="current-job-title-50429" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="personal-statement-50429-504">Personal statement (50429)</label><textarea id="personal-statement-50429-504" name="personal-statement-50429-504" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="current-city-50429-50429">Current city (50429)</label><select id="current-city-50429-50429" name="current-city-50429-50429"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50429)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50429)</legend><label for="open-to-relocation-50429-0"><input type="radio" id="open-to-relocation-50429-0" name="open-to-relocation-50429" value="yes"> Yes</label><label for="open-to-relocation-50429-1"><input type="radio" id="open-to-relocation-50429-1" name="open-to-relocation-50429" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50429-50429">Expected salary (50429)</label><input type="number" id="expected-salary-50429-50429" name="expected-salary-50429-50429" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50429-50429">Available from (50429)</label><input type="date" id="available-from-50429-50429" name="available-from-50429-50429" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50429)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="other">Other</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option><option value="company-site">Company site</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Core competencies (50429)</legend><label for="core-competencies-50429--cb-0"><input type="checkbox" id="core-competencies-50429--cb-0" name="core-competencies-50429-[]" value="javascript"> JavaScript</label><label for="core-competencies-50429--cb-1"><input type="checkbox" id="core-competencies-50429--cb-1" name="core-competencies-50429-[]" value="rust"> Rust</label><label for="core-competencies-50429--cb-2"><input type="checkbox" id="core-competencies-50429--cb-2" name="core-competencies-50429-[]" value="typescript"> TypeScript</label><label for="core-competencies-50429--cb-3"><input type="checkbox" id="core-competencies-50429--cb-3" name="core-competencies-50429-[]" value="sql"> SQL</label><label for="core-competencies-50429--cb-4"><input type="checkbox" id="core-competencies-50429--cb-4" name="core-competencies-50429-[]" value="go"> Go</label><label for="core-competencies-50429--cb-5"><input type="checkbox" id="core-competencies-50429--cb-5" name="core-competencies-50429-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50429">Attach resume (50429)</label><input type="file" id="file-50429" name="file-50429" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
