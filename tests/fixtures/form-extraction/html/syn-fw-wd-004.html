<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday-style apply 4</title></head>
<body>
<main><h1>Workday-style apply 4</h1><form action="/apply" method="post">
<div data-automation-id="applyFlowPrimaryPage">
<div data-testid="input-q_your-name" class="ia-Questions-item">
<div data-testid="input-q_your-name-label"><span data-testid="safe-markup">Your name</span></div>
<input data-testid="input-q_your-name-input" type="text" name="input-q_your-name">
</div>
<div data-testid="input-q_personal-email" class="ia-Questions-item">
<div data-testid="input-q_personal-email-label"><span data-testid="safe-markup">Personal email</span></div>
<input data-testid="input-q_personal-email-input" type="email" name="input-q_personal-email">
</div>
<div data-testid="input-q_telephone" class="ia-Questions-item">
<div data-testid="input-q_telephone-label"><span data-testid="safe-markup">Telephone</span></div>
<input data-testid="input-q_telephone-input" type="tel" name="input-q_telephone">
</div>
<div data-testid="input-q_motivation-sta" class="ia-Questions-item">
<div data-testid="input-q_motivation-sta-label"><span data-testid="safe-markup">Motivation statement</span></div>
<textarea data-testid="input-q_motivation-sta-input" name="input-q_motivation-sta" rows="4" maxlength="600"></textarea>
</div>
<button type="button">Save and continue</button>
</div></form></main>
</body>
</html>
