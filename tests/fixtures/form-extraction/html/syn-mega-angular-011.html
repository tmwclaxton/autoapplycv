<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9171</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9171</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Complete name (9171)</mat-label><label for="ang-name-9171">Complete name (9171)</label><input matInput id="ang-name-9171" name="ang-name-9171" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Personal email (9171)</mat-label><label for="ang-email-9171">Personal email (9171)</label><input matInput id="ang-email-9171" name="ang-email-9171" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Contact number (9171)</mat-label><label for="ang-phone-9171">Contact number (9171)</label><input matInput id="ang-phone-9171" name="ang-phone-9171" type="tel"></mat-form-field>
<div class="field-row"><label for="personal-statement-9171-9171">Personal statement (9171)</label><textarea id="personal-statement-9171-9171" name="personal-statement-9171-9171" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="where-are-you-based-9171-917">Where are you based? (9171)</label><select id="where-are-you-based-9171-917" name="where-are-you-based-9171-917"><option value="">Choose one…</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option><option value="berlin">Berlin</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
