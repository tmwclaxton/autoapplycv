<!DOCTYPE html>
<html lang="en-GB">
<head><meta charset="utf-8"><title>Review application</title></head>
<body>
<div id="__next">
<nav class="navbar" data-qa="navBar"><a href="/">Reed.co.uk</a></nav>
<main><form data-qa="application-form" action="/jobs/apply/submit" method="post">
<h1 data-qa="application-step-title">Check your application</h1>

<p data-qa="application-review-summary">You are applying for <strong>Platform Engineer</strong> at <strong>Hays Recruitment</strong>.</p>
<div class="form-group" data-qa="field-confirm-email-address-571000148">
<label for="confirm-email-address-571000148" data-qa="field-confirm-email-address-571000148-label">Confirm email address</label>
<input type="email" id="confirm-email-address-571000148" name="confirm-email-address-571000148" data-qa="field-confirm-email-address-571000148-input" required>
</div>
<div class="form-group" data-qa="field-confirm-phone-number-571000148">
<label for="confirm-phone-number-571000148" data-qa="field-confirm-phone-number-571000148-label">Confirm phone number</label>
<input type="tel" id="confirm-phone-number-571000148" name="confirm-phone-number-571000148" data-qa="field-confirm-phone-number-571000148-input" required>
</div>
<div class="form-group" data-qa="field-final-comments-for-the-recruiter">
<label for="final-comments-for-the-recruiter" data-qa="field-final-comments-for-the-recruiter-label">Final comments for the recruiter (optional)</label>
<textarea id="final-comments-for-the-recruiter" name="final-comments-for-the-recruiter" rows="3" data-qa="field-final-comments-for-the-recruiter-input" maxlength="300"></textarea>
</div>
<div class="form-group" data-qa="field-preferred-contact-method-5710001">
<label for="preferred-contact-method-5710001" data-qa="field-preferred-contact-method-5710001-label">Preferred contact method</label>
<select id="preferred-contact-method-5710001" name="preferred-contact-method-5710001" data-qa="field-preferred-contact-method-5710001-input">
<option value="">Please select</option><option value="email">Email</option><option value="phone">Phone</option><option value="either">Either</option>
</select>
</div>
<fieldset data-qa="fieldset-i-agree-to-the-privacy-polic">
<legend data-qa="application-step-subtitle">I agree to the privacy policy and terms</legend>
<label for="i-agree-to-the-privacy-polic-0"><input type="radio" id="i-agree-to-the-privacy-polic-0" name="i-agree-to-the-privacy-polic" value="i-agree" data-qa="radio-i-agree-to-the-privacy-polic-0"> I agree</label>
</fieldset>

<div data-qa="application-actions"><button type="submit" data-qa="submit-button" class="btn btn-primary">Send application</button></div>
</form></main>
<footer data-qa="pageFooter"><p>Reed synthetic corpus fixture</p></footer>
</div>
</body>
</html>
