<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50426</title></head>
<body>
<main><h1>Wizard complex apply 50426</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50426">
<h2 id="wizard-contact-50426">Contact information</h2>

<label for="wiz-name-50426">Your name (50426)</label>
<input type="text" id="wiz-name-50426" name="wiz-name-50426" autocomplete="name">
<label for="wiz-email-50426">Email address (50426)</label>
<input type="email" id="wiz-email-50426" name="wiz-email-50426" autocomplete="email">
<label for="wiz-phone-50426">Contact number (50426)</label>
<input type="tel" id="wiz-phone-50426" name="wiz-phone-50426" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50426">
<h2 id="wizard-screen-50426">Screening questions</h2>
<div class="field-row"><label for="cover-letter-50426-50426">Cover letter (50426)</label><textarea id="cover-letter-50426-50426" name="cover-letter-50426-50426" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="preferred-location-50426-504">Preferred location (50426)</label><select id="preferred-location-50426-504" name="preferred-location-50426-504"><option value="">Choose one…</option><option value="remote">Remote</option><option value="london">London</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50426)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-504">Compensation requirement (50426)</label><input type="number" id="compensation-requirement-504" name="compensation-requirement-504" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50426-50">Earliest start date (50426)</label><input type="date" id="earliest-start-date-50426-50" name="earliest-start-date-50426-50" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50426">
<h2 id="wizard-docs-50426">Documents and skills</h2>
<fieldset><legend>Core competencies (50426)</legend><label for="core-competencies-50426--cb-0"><input type="checkbox" id="core-competencies-50426--cb-0" name="core-competencies-50426-[]" value="python"> Python</label><label for="core-competencies-50426--cb-1"><input type="checkbox" id="core-competencies-50426--cb-1" name="core-competencies-50426-[]" value="go"> Go</label><label for="core-competencies-50426--cb-2"><input type="checkbox" id="core-competencies-50426--cb-2" name="core-competencies-50426-[]" value="typescript"> TypeScript</label><label for="core-competencies-50426--cb-3"><input type="checkbox" id="core-competencies-50426--cb-3" name="core-competencies-50426-[]" value="laravel"> Laravel</label><label for="core-competencies-50426--cb-4"><input type="checkbox" id="core-competencies-50426--cb-4" name="core-competencies-50426-[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50426">Attach resume (50426)</label><input type="file" id="file-50426" name="file-50426" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50426)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="other">Other</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
