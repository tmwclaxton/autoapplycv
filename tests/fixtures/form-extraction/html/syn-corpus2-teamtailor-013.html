<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Teamtailor apply 20013</title></head>
<body>

<main class="careers-page"><h1 class="job-title">Apply — Role 20013</h1>
<form class="apply-form" action="/apply" method="post" data-teamtailor-form="application">
<section class="form-section" data-section="personal">

<div class="form-group"><label class="form-label" for="tt-name-20013">Your name (20013)</label>
</div><input class="form-control" type="text" id="tt-name-20013" name="tt-name-20013" autocomplete="name">
<div class="form-group"><label class="form-label" for="tt-email-20013">Email address (20013)</label>
</div><input class="form-control" type="email" id="tt-email-20013" name="tt-email-20013" autocomplete="email">
<div class="form-group"><label class="form-label" for="tt-phone-20013">Mobile number (20013)</label>
</div><input class="form-control" type="tel" id="tt-phone-20013" name="tt-phone-20013" autocomplete="tel">
</section>
<section class="form-section" data-section="questions">
<div class="field-row"><label for="tell-us-about-yourself-20013">Tell us about yourself (20013)</label><textarea id="tell-us-about-yourself-20013" name="tell-us-about-yourself-20013" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-20013-20013">Work location (20013)</label><select id="work-location-20013-20013" name="work-location-20013-20013"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (20013)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
</section>
<div class="file-row"><label for="file-20013">Attach resume (optional)</label><input type="file" id="file-20013" name="file-20013" accept=".pdf,.doc"></div>
<button type="submit" class="btn btn-primary">Submit application</button>
</form></main>
</body>
</html>
