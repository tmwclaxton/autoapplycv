<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50290</title></head>
<body>
<main><h1>Mixed complex apply 50290</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50290">Full name (50290)</label>
<input type="text" id="mix-name-50290" name="mix-name-50290" autocomplete="name">
<label for="mix-email-50290">Work email (50290)</label>
<input type="email" id="mix-email-50290" name="mix-email-50290" autocomplete="email">
<label for="mix-phone-50290">Mobile number (50290)</label>
<input type="tel" id="mix-phone-50290" name="mix-phone-50290" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="why-this-role-50290-50290">Why this role? (50290)</label><textarea id="why-this-role-50290-50290" name="why-this-role-50290-50290" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50290-50290">Work location (50290)</label><select id="work-location-50290-50290" name="work-location-50290-50290"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="london">London</option><option value="new-york">New York</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50290)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50290)</legend><label for="open-to-relocation-50290-0"><input type="radio" id="open-to-relocation-50290-0" name="open-to-relocation-50290" value="yes"> Yes</label><label for="open-to-relocation-50290-1"><input type="radio" id="open-to-relocation-50290-1" name="open-to-relocation-50290" value="no"> No</label><label for="open-to-relocation-50290-2"><input type="radio" id="open-to-relocation-50290-2" name="open-to-relocation-50290" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50290-50">Salary expectations (50290)</label><input type="number" id="salary-expectations-50290-50" name="salary-expectations-50290-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50290-50290">Available from (50290)</label><input type="date" id="available-from-50290-50290" name="available-from-50290-50290" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50290)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="other">Other</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Core competencies (50290)</legend><label for="core-competencies-50290--cb-0"><input type="checkbox" id="core-competencies-50290--cb-0" name="core-competencies-50290-[]" value="sql"> SQL</label><label for="core-competencies-50290--cb-1"><input type="checkbox" id="core-competencies-50290--cb-1" name="core-competencies-50290-[]" value="rust"> Rust</label><label for="core-competencies-50290--cb-2"><input type="checkbox" id="core-competencies-50290--cb-2" name="core-competencies-50290-[]" value="python"> Python</label><label for="core-competencies-50290--cb-3"><input type="checkbox" id="core-competencies-50290--cb-3" name="core-competencies-50290-[]" value="go"> Go</label></fieldset>
<div class="file-row"><label for="file-50290">Attach resume (50290)</label><input type="file" id="file-50290" name="file-50290" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50290-5029">Work samples link (50290)</label><input type="url" id="work-samples-link-50290-5029" name="work-samples-link-50290-5029" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
