<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50416</title></head>
<body>
<main><h1>Wizard complex apply 50416</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50416">
<h2 id="wizard-contact-50416">Contact information</h2>

<label for="wiz-name-50416">Legal name (50416)</label>
<input type="text" id="wiz-name-50416" name="wiz-name-50416" autocomplete="name">
<label for="wiz-email-50416">Email address (50416)</label>
<input type="email" id="wiz-email-50416" name="wiz-email-50416" autocomplete="email">
<label for="wiz-phone-50416">Phone number (50416)</label>
<input type="tel" id="wiz-phone-50416" name="wiz-phone-50416" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50416">
<h2 id="wizard-screen-50416">Screening questions</h2>
<div class="field-row"><label for="cover-letter-50416-50416">Cover letter (50416)</label><textarea id="cover-letter-50416-50416" name="cover-letter-50416-50416" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="preferred-location-50416-504">Preferred location (50416)</label><select id="preferred-location-50416-504" name="preferred-location-50416-504"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Work authorization status (50416)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50416-50416">Expected salary (50416)</label><input type="number" id="expected-salary-50416-50416" name="expected-salary-50416-50416" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50416-">Start date preference (50416)</label><input type="date" id="start-date-preference-50416-" name="start-date-preference-50416-" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50416">
<h2 id="wizard-docs-50416">Documents and skills</h2>
<fieldset><legend>Technical skills (50416)</legend><label for="technical-skills-50416-5-cb-0"><input type="checkbox" id="technical-skills-50416-5-cb-0" name="technical-skills-50416-5[]" value="python"> Python</label><label for="technical-skills-50416-5-cb-1"><input type="checkbox" id="technical-skills-50416-5-cb-1" name="technical-skills-50416-5[]" value="laravel"> Laravel</label><label for="technical-skills-50416-5-cb-2"><input type="checkbox" id="technical-skills-50416-5-cb-2" name="technical-skills-50416-5[]" value="sql"> SQL</label><label for="technical-skills-50416-5-cb-3"><input type="checkbox" id="technical-skills-50416-5-cb-3" name="technical-skills-50416-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50416-5-cb-4"><input type="checkbox" id="technical-skills-50416-5-cb-4" name="technical-skills-50416-5[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50416">Attach resume (50416)</label><input type="file" id="file-50416" name="file-50416" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50416)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
