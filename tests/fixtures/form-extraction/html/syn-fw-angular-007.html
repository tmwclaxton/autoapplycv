<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 7</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 7</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline">
<mat-label>Applicant name</mat-label>
<label for="ang-name">Applicant name</label>
<input matInput id="ang-name" name="ang-name" type="text" ng-model="candidate.name">
</mat-form-field>
<mat-form-field appearance="outline">
<mat-label>Contact email</mat-label>
<label for="ang-email">Contact email</label>
<input matInput id="ang-email" name="ang-email" type="email" ng-model="candidate.email">
</mat-form-field>
<mat-form-field appearance="outline">
<mat-label>Contact number</mat-label>
<label for="ang-phone">Contact number</label>
<input matInput id="ang-phone" name="ang-phone" type="tel" ng-model="candidate.phone">
</mat-form-field>
<div class="field-row"><label for="tell-us-about-yourself">Tell us about yourself</label><textarea id="tell-us-about-yourself" name="tell-us-about-yourself" rows="4" maxlength="500" ></textarea></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
