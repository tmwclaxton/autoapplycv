<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Screening - Product Manager</title></head>
<body>
<form data-testid="indeed-apply-form">

<h1 data-testid="screening-heading">Screening questions</h1>
<fieldset data-testid="input-ia-radio-300018-do-you-have-the-righ" role="radiogroup">
<legend data-testid="ia-radio-300018-do-you-have-the-righ-label"><span data-testid="safe-markup">Do you have the right to work in the UK without sponsorship?</span></legend>
<label for="ia-radio-300018-do-you-have-the-righ-0"><input type="radio" id="ia-radio-300018-do-you-have-the-righ-0" name="ia-radio-300018-do-you-have-the-righ" value="yes" data-testid="ia-radio-300018-do-you-have-the-righ-0"> Yes</label><label for="ia-radio-300018-do-you-have-the-righ-1"><input type="radio" id="ia-radio-300018-do-you-have-the-righ-1" name="ia-radio-300018-do-you-have-the-righ" value="no" data-testid="ia-radio-300018-do-you-have-the-righ-1"> No</label>
</fieldset>
<div data-testid="input-ia-select-300018-notice-period">
<label for="ia-select-300018-notice-period" data-testid="ia-select-300018-notice-period-label"><span data-testid="safe-markup">Notice period</span></label>
<select id="ia-select-300018-notice-period" name="ia-select-300018-notice-period" data-testid="ia-select-300018-notice-period-input">
<option value="">Select an option</option><option value="immediate">Immediate</option><option value="1-week">1 week</option><option value="2-weeks">2 weeks</option><option value="1-month">1 month</option><option value="2-months">2 months</option><option value="3-months">3 months</option>
</select>
</div>
<div data-testid="input-ia-field-300018-current-salary">
<label for="ia-field-300018-current-salary" data-testid="ia-field-300018-current-salary-label"><span data-testid="safe-markup">Current salary (£)</span></label>
<input type="number" id="ia-field-300018-current-salary" name="ia-field-300018-current-salary" data-testid="ia-field-300018-current-salary-input" min="0" step="1000">
</div>
<div data-testid="input-ia-field-300018-expected-salary">
<label for="ia-field-300018-expected-salary" data-testid="ia-field-300018-expected-salary-label"><span data-testid="safe-markup">Expected salary (£)</span></label>
<input type="number" id="ia-field-300018-expected-salary" name="ia-field-300018-expected-salary" data-testid="ia-field-300018-expected-salary-input" min="0" step="1000">
</div>
<div data-testid="input-ia-select-300018-years-of-experience-in-a">
<label for="ia-select-300018-years-of-experience-in-a" data-testid="ia-select-300018-years-of-experience-in-a-label"><span data-testid="safe-markup">Years of experience in a similar role</span></label>
<select id="ia-select-300018-years-of-experience-in-a" name="ia-select-300018-years-of-experience-in-a" data-testid="ia-select-300018-years-of-experience-in-a-input">
<option value="">Select an option</option><option value="0-1">0-1</option><option value="1-3">1-3</option><option value="3-5">3-5</option><option value="5-10">5-10</option><option value="10">10+</option>
</select>
</div>
<fieldset data-testid="input-ia-radio-300018-are-you-willing-to-w" role="radiogroup">
<legend data-testid="ia-radio-300018-are-you-willing-to-w-label"><span data-testid="safe-markup">Are you willing to work on-site?</span></legend>
<label for="ia-radio-300018-are-you-willing-to-w-0"><input type="radio" id="ia-radio-300018-are-you-willing-to-w-0" name="ia-radio-300018-are-you-willing-to-w" value="yes" data-testid="ia-radio-300018-are-you-willing-to-w-0"> Yes</label><label for="ia-radio-300018-are-you-willing-to-w-1"><input type="radio" id="ia-radio-300018-are-you-willing-to-w-1" name="ia-radio-300018-are-you-willing-to-w" value="no" data-testid="ia-radio-300018-are-you-willing-to-w-1"> No</label><label for="ia-radio-300018-are-you-willing-to-w-2"><input type="radio" id="ia-radio-300018-are-you-willing-to-w-2" name="ia-radio-300018-are-you-willing-to-w" value="hybrid-only" data-testid="ia-radio-300018-are-you-willing-to-w-2"> Hybrid only</label>
</fieldset>
<div data-testid="input-ia-textarea-300018-additional-information-f">
<label for="ia-textarea-300018-additional-information-f" data-testid="ia-textarea-300018-additional-information-f-label"><span data-testid="safe-markup">Additional information for the hiring team</span></label>
<textarea rows="3" id="ia-textarea-300018-additional-information-f" name="ia-textarea-300018-additional-information-f" data-testid="ia-textarea-300018-additional-information-f-input"></textarea>
</div>
<button type="button" data-testid="indeed-apply-continue"><span>Continue</span></button>
</form>
</body>
</html>
