<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50287</title></head>
<body>
<main><h1>Conditional complex apply 50287</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50287">
<p id="step1-label-50287">Step 1 - Contact</p>

<label for="cond-name-50287">Legal name (50287)</label>
<input type="text" id="cond-name-50287" name="cond-name-50287" autocomplete="name">
<label for="cond-email-50287">Email address (50287)</label>
<input type="email" id="cond-email-50287" name="cond-email-50287" autocomplete="email">
<label for="cond-phone-50287">Mobile number (50287)</label>
<input type="tel" id="cond-phone-50287" name="cond-phone-50287" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50287">
<p id="step2-label-50287">Step 2 - Preferences</p>
<div class="field-row"><label for="current-city-50287-50287">Current city (50287)</label><select id="current-city-50287-50287" name="current-city-50287-50287"><option value="">Choose one…</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="london">London</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Willing to relocate? (50287)</legend><label for="willing-to-relocate-5028-0"><input type="radio" id="willing-to-relocate-5028-0" name="willing-to-relocate-5028" value="yes"> Yes</label><label for="willing-to-relocate-5028-1"><input type="radio" id="willing-to-relocate-5028-1" name="willing-to-relocate-5028" value="no"> No</label><label for="willing-to-relocate-5028-2"><input type="radio" id="willing-to-relocate-5028-2" name="willing-to-relocate-5028" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="start-date-preference-50287-">Start date preference (50287)</label><input type="date" id="start-date-preference-50287-" name="start-date-preference-50287-" ></div>
<fieldset><legend>Key skills (50287)</legend><label for="key-skills-50287-50287-cb-0"><input type="checkbox" id="key-skills-50287-50287-cb-0" name="key-skills-50287-50287[]" value="typescript"> TypeScript</label><label for="key-skills-50287-50287-cb-1"><input type="checkbox" id="key-skills-50287-50287-cb-1" name="key-skills-50287-50287[]" value="sql"> SQL</label><label for="key-skills-50287-50287-cb-2"><input type="checkbox" id="key-skills-50287-50287-cb-2" name="key-skills-50287-50287[]" value="javascript"> JavaScript</label><label for="key-skills-50287-50287-cb-3"><input type="checkbox" id="key-skills-50287-50287-cb-3" name="key-skills-50287-50287[]" value="python"> Python</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50287">
<p id="step3-label-50287">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50287" data-reveal="#reveal-50287">Show follow-up questions</button>
<div id="reveal-50287" hidden style="display:none"><div class="field-row"><label for="cover-letter-50287-50287">Cover letter (50287)</label><textarea id="cover-letter-50287-50287" name="cover-letter-50287-50287" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="work-samples-link-50287-5028">Work samples link (50287)</label><input type="url" id="work-samples-link-50287-5028" name="work-samples-link-50287-5028" ></div>
<div class="field-row"><label for="salary-expectations-50287-50">Salary expectations (50287)</label><input type="number" id="salary-expectations-50287-50" name="salary-expectations-50287-50" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50287">Attach resume (50287)</label><input type="file" id="file-50287" name="file-50287" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
