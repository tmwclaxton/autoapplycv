<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Vue apply 7</title></head>
<body>
<main><h1>Vue apply 7</h1><form action="/apply" method="post">
<div id="app" data-v-006>
<div class="application-form data-v-006">
<div class="form-group data-v-006"><label for="vue-name" data-v-006>Applicant name</label><input data-v-006 type="text" id="vue-name" name="vue-name" v-model="form.name"></div>
<div class="form-group data-v-006"><label for="vue-email" data-v-006>Contact email</label><input data-v-006 type="email" id="vue-email" name="vue-email" v-model="form.email"></div>
<div class="form-group data-v-006"><label for="vue-phone" data-v-006>Contact number</label><input data-v-006 type="tel" id="vue-phone" name="vue-phone" v-model="form.phone"></div>
<div class="field-row"><label for="tell-us-about-yourself">Tell us about yourself</label><textarea id="tell-us-about-yourself" name="tell-us-about-yourself" rows="4" maxlength="500" data-v-006></textarea></div>
<div class="file-row"><label for="file-upload">Attach resume (optional)</label><input type="file" id="file-upload" name="file-upload" accept=".pdf,.doc"></div>
<button type="button">Save and continue</button>
</div>
</div></form></main>
</body>
</html>
