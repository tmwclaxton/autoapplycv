<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>BambooHR apply 20050</title></head>
<body>
<main><h1>BambooHR apply 20050</h1><form action="/apply" method="post">
<div class="BambooHR-ATS-Form" data-bamboohr-application="true">
<div class="field-group">
<label class="field-label" for="bb-name-20050">Preferred name (20050)</label>
<input class="field-input" type="text" id="bb-name-20050" name="bb-name-20050" autocomplete="name">
<label class="field-label" for="bb-email-20050">Personal email (20050)</label>
<input class="field-input" type="email" id="bb-email-20050" name="bb-email-20050" autocomplete="email">
<label class="field-label" for="bb-phone-20050">Contact number (20050)</label>
<input class="field-input" type="tel" id="bb-phone-20050" name="bb-phone-20050" autocomplete="tel"></div>
<div class="field-row"><label for="motivation-statement-20050-2">Motivation statement (20050)</label><textarea id="motivation-statement-20050-2" name="motivation-statement-20050-2" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="how-did-you-hear-about-us-20">How did you hear about us? (20050)</label><select id="how-did-you-hear-about-us-20" name="how-did-you-hear-about-us-20"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="job-board">Job board</option></select></div>
<div class="file-row"><label for="file-20050">Attach resume (optional)</label><input type="file" id="file-20050" name="file-20050" accept=".pdf,.doc"></div>
<button type="button" class="btn-submit">Apply now</button>
</div></form></main>
</body>
</html>
