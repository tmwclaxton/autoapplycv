<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Lever-style 9445</title></head>
<body>
<main><h1>Lever-style 9445</h1><form action="/apply" method="post">
<div class="application-form">
<div class="application-field"><label class="application-label">Applicant name (9445)</label><input name="lever-name-9445" type="text" id="lever-name-9445"></div>
<div class="application-field"><label class="application-label">Work email (9445)</label><input name="lever-email-9445" type="email" id="lever-email-9445"></div>
<div class="application-field"><label class="application-label">Cell phone (9445)</label><input name="lever-phone-9445" type="tel" id="lever-phone-9445"></div>
<div class="application-field"><label class="application-label">Personal statement (9445)</label><textarea name="lever-cover-9445" id="lever-cover-9445" rows="4" maxlength="500"></textarea></div>
<div class="file-row"><label for="file-upload-9445">Attach resume (optional)</label><input type="file" id="file-upload-9445" name="file-upload-9445" accept=".pdf,.doc"></div>
<button type="button">Submit application</button>
</div></form></main>
</body>
</html>
