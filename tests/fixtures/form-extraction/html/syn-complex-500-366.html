<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50366</title></head>
<body>
<main><h1>Wizard complex apply 50366</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">

<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50366">

<div class="field-row"><label for="available-from-50366-50366">Available from (50366)</label><input type="date" id="available-from-50366-50366" name="available-from-50366-50366" ></div>

</section>
<button type="button">Continue to review</button>
</div></form></main>

</html>
