<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Listbox 9670</title></head>
<body>
<main><h1>Listbox 9670</h1><form action="/apply" method="post">
<label for="lb-name-9670">Full name (9670)</label>
<input type="text" id="lb-name-9670" name="lb-name-9670" autocomplete="name">
<label for="lb-email-9670">Work email (9670)</label>
<input type="email" id="lb-email-9670" name="lb-email-9670" autocomplete="email">
<label for="lb-phone-9670">Contact number (9670)</label>
<input type="tel" id="lb-phone-9670" name="lb-phone-9670" autocomplete="tel">
<div class="field-row">
<span id="listbox-h-9670-lbl">Office preference (9670)</span>
<button type="button" class="custom-dropdown-trigger" role="combobox" aria-expanded="false" aria-controls="listbox-h-9670" aria-labelledby="listbox-h-9670-lbl" data-reveal="#listbox-h-9670">Select office preference (9670)</button>
<div role="listbox" id="listbox-h-9670" aria-labelledby="listbox-h-9670-lbl" hidden style="display:none">
<div role="option" data-value="hybrid">Hybrid</div><div role="option" data-value="remote">Remote</div><div role="option" data-value="manchester">Manchester</div><div role="option" data-value="london">London</div>
</div>
</div></form></main>
</body>
</html>
