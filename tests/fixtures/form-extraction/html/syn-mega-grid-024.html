<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9924</title></head>
<body>
<main><h1>Grid layout 9924</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9924">Your name (9924)</label><span class="helper">Required</span><input id="grid-name-9924" name="grid-name-9924" type="text"></div>
<div><label for="grid-email-9924">Personal email (9924)</label><span class="helper">Required</span><input id="grid-email-9924" name="grid-email-9924" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9924">Direct line (9924)</label><input id="grid-phone-9924" name="grid-phone-9924" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="personal-statement-9924-9924">Personal statement (9924)</label><textarea id="personal-statement-9924-9924" name="personal-statement-9924-9924" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Open to relocation? (9924)</legend><label for="open-to-relocation-9924--0"><input type="radio" id="open-to-relocation-9924--0" name="open-to-relocation-9924-" value="yes"> Yes</label><label for="open-to-relocation-9924--1"><input type="radio" id="open-to-relocation-9924--1" name="open-to-relocation-9924-" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
