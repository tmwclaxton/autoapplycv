<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nested fieldsets 20353</title></head>
<body>
<main><h1>Nested fieldsets 20353</h1><form action="/apply" method="post">
<fieldset><legend>Personal details</legend>
<label for="ns-name-20353">Preferred name (20353)</label>
<input type="text" id="ns-name-20353" name="ns-name-20353" autocomplete="name">
<label for="ns-email-20353">Contact email (20353)</label>
<input type="email" id="ns-email-20353" name="ns-email-20353" autocomplete="email">
<label for="ns-phone-20353">Phone number (20353)</label>
<input type="tel" id="ns-phone-20353" name="ns-phone-20353" autocomplete="tel"></fieldset>
<fieldset><legend>Preferences</legend><div class="field-row"><label for="preferred-location-20353-203">Preferred location (20353)</label><select id="preferred-location-20353-203" name="preferred-location-20353-203"><option value="">Choose one…</option><option value="london">London</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option></select></div></fieldset>
<fieldset><legend>Additional</legend><div class="field-row"><label for="cover-letter-20353-20353">Cover letter (20353)</label><textarea id="cover-letter-20353-20353" name="cover-letter-20353-20353" rows="4" maxlength="400"></textarea></div></fieldset></form></main>
</body>
</html>
