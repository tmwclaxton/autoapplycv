<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Teamtailor apply 20023</title></head>
<body>

<main class="careers-page"><h1 class="job-title">Apply — Role 20023</h1>
<form class="apply-form" action="/apply" method="post" data-teamtailor-form="application">
<section class="form-section" data-section="personal">

<div class="form-group"><label class="form-label" for="tt-name-20023">Preferred name (20023)</label>
</div><input class="form-control" type="text" id="tt-name-20023" name="tt-name-20023" autocomplete="name">
<div class="form-group"><label class="form-label" for="tt-email-20023">Personal email (20023)</label>
</div><input class="form-control" type="email" id="tt-email-20023" name="tt-email-20023" autocomplete="email">
<div class="form-group"><label class="form-label" for="tt-phone-20023">Mobile number (20023)</label>
</div><input class="form-control" type="tel" id="tt-phone-20023" name="tt-phone-20023" autocomplete="tel">
</section>
<section class="form-section" data-section="questions">
<div class="field-row"><label for="tell-us-about-yourself-20023">Tell us about yourself (20023)</label><textarea id="tell-us-about-yourself-20023" name="tell-us-about-yourself-20023" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-20023-200">Preferred location (20023)</label><select id="preferred-location-20023-200" name="preferred-location-20023-200"><option value="">Choose one…</option><option value="london">London</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Work authorization status (20023)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
</section>
<div class="file-row"><label for="file-20023">Attach resume (optional)</label><input type="file" id="file-20023" name="file-20023" accept=".pdf,.doc"></div>
<button type="submit" class="btn btn-primary">Submit application</button>
</form></main>
</body>
</html>
