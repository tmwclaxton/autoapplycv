<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50257</title></head>
<body>
<main><h1>Conditional complex apply 50257</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50257">
<p id="step1-label-50257">Step 1 - Contact</p>

<label for="cond-name-50257">Legal name (50257)</label>
<input type="text" id="cond-name-50257" name="cond-name-50257" autocomplete="name">
<label for="cond-email-50257">Contact email (50257)</label>
<input type="email" id="cond-email-50257" name="cond-email-50257" autocomplete="email">
<label for="cond-phone-50257">Phone number (50257)</label>
<input type="tel" id="cond-phone-50257" name="cond-phone-50257" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50257">
<p id="step2-label-50257">Step 2 - Preferences</p>
<div class="field-row"><label for="work-location-50257-50257">Work location (50257)</label><select id="work-location-50257-50257" name="work-location-50257-50257"><option value="">Choose one…</option><option value="london">London</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Open to relocation? (50257)</legend><label for="open-to-relocation-50257-0"><input type="radio" id="open-to-relocation-50257-0" name="open-to-relocation-50257" value="yes"> Yes</label><label for="open-to-relocation-50257-1"><input type="radio" id="open-to-relocation-50257-1" name="open-to-relocation-50257" value="no"> No</label><label for="open-to-relocation-50257-2"><input type="radio" id="open-to-relocation-50257-2" name="open-to-relocation-50257" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="available-from-50257-50257">Available from (50257)</label><input type="date" id="available-from-50257-50257" name="available-from-50257-50257" ></div>
<fieldset><legend>Core competencies (50257)</legend><label for="core-competencies-50257--cb-0"><input type="checkbox" id="core-competencies-50257--cb-0" name="core-competencies-50257-[]" value="typescript"> TypeScript</label><label for="core-competencies-50257--cb-1"><input type="checkbox" id="core-competencies-50257--cb-1" name="core-competencies-50257-[]" value="javascript"> JavaScript</label><label for="core-competencies-50257--cb-2"><input type="checkbox" id="core-competencies-50257--cb-2" name="core-competencies-50257-[]" value="python"> Python</label><label for="core-competencies-50257--cb-3"><input type="checkbox" id="core-competencies-50257--cb-3" name="core-competencies-50257-[]" value="rust"> Rust</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50257">
<p id="step3-label-50257">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50257" data-reveal="#reveal-50257">Show follow-up questions</button>
<div id="reveal-50257" hidden style="display:none"><div class="field-row"><label for="personal-statement-50257-502">Personal statement (50257)</label><textarea id="personal-statement-50257-502" name="personal-statement-50257-502" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="github-profile-50257-50257">GitHub profile (50257)</label><input type="url" id="github-profile-50257-50257" name="github-profile-50257-50257" ></div>
<div class="field-row"><label for="expected-salary-50257-50257">Expected salary (50257)</label><input type="number" id="expected-salary-50257-50257" name="expected-salary-50257-50257" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50257">Attach resume (50257)</label><input type="file" id="file-50257" name="file-50257" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
