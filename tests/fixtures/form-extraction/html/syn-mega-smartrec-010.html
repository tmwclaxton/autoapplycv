<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9540</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9540</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9540">Complete name (9540)</label>
<input type="text" id="sr-name-9540" name="sr-name-9540" autocomplete="name">
<label for="sr-email-9540">Work email (9540)</label>
<input type="email" id="sr-email-9540" name="sr-email-9540" autocomplete="email">
<label for="sr-phone-9540">Direct line (9540)</label>
<input type="tel" id="sr-phone-9540" name="sr-phone-9540" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="personal-statement-9540-9540">Personal statement (9540)</label><textarea id="personal-statement-9540-9540" name="personal-statement-9540-9540" rows="4" maxlength="500"></textarea></div>

<div class="field-row">
<span id="listbox-9540-lbl">Preferred location (9540)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9540" aria-labelledby="listbox-9540-lbl" tabindex="0">Preferred location (9540)</div>
<div role="listbox" id="listbox-9540" aria-labelledby="listbox-9540-lbl">
<div role="option" data-value="london">London</div><div role="option" data-value="manchester">Manchester</div><div role="option" data-value="berlin">Berlin</div><div role="option" data-value="remote">Remote</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
