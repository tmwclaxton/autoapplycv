<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50328</title></head>
<body>
<main><h1>Mixed complex apply 50328</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50328">Full name (50328)</label>
<input type="text" id="mix-name-50328" name="mix-name-50328" autocomplete="name">
<label for="mix-email-50328">Contact email (50328)</label>
<input type="email" id="mix-email-50328" name="mix-email-50328" autocomplete="email">
<label for="mix-phone-50328">Contact number (50328)</label>
<input type="tel" id="mix-phone-50328" name="mix-phone-50328" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50328">Tell us about yourself (50328)</label><textarea id="tell-us-about-yourself-50328" name="tell-us-about-yourself-50328" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50328-50328">Work location (50328)</label><select id="work-location-50328-50328" name="work-location-50328-50328"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option><option value="new-york">New York</option><option value="london">London</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50328)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50328)</legend><label for="willing-to-relocate-5032-0"><input type="radio" id="willing-to-relocate-5032-0" name="willing-to-relocate-5032" value="yes"> Yes</label><label for="willing-to-relocate-5032-1"><input type="radio" id="willing-to-relocate-5032-1" name="willing-to-relocate-5032" value="no"> No</label><label for="willing-to-relocate-5032-2"><input type="radio" id="willing-to-relocate-5032-2" name="willing-to-relocate-5032" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50328-50328">Expected salary (50328)</label><input type="number" id="expected-salary-50328-50328" name="expected-salary-50328-50328" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50328-503">When can you start? (50328)</label><input type="date" id="when-can-you-start-50328-503" name="when-can-you-start-50328-503" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50328)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="conference">Conference</option><option value="other">Other</option></select></div>
<fieldset><legend>Technical skills (50328)</legend><label for="technical-skills-50328-5-cb-0"><input type="checkbox" id="technical-skills-50328-5-cb-0" name="technical-skills-50328-5[]" value="python"> Python</label><label for="technical-skills-50328-5-cb-1"><input type="checkbox" id="technical-skills-50328-5-cb-1" name="technical-skills-50328-5[]" value="rust"> Rust</label><label for="technical-skills-50328-5-cb-2"><input type="checkbox" id="technical-skills-50328-5-cb-2" name="technical-skills-50328-5[]" value="go"> Go</label><label for="technical-skills-50328-5-cb-3"><input type="checkbox" id="technical-skills-50328-5-cb-3" name="technical-skills-50328-5[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50328">Attach resume (50328)</label><input type="file" id="file-50328" name="file-50328" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50328-50328">Portfolio URL (50328)</label><input type="url" id="portfolio-url-50328-50328" name="portfolio-url-50328-50328" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
