<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Vue collapsed dropdown</title></head>
<body>
<main><h1>Vue collapsed dropdown</h1><form action="/apply" method="post">
<label for="ix-name-3">Your name</label>
<input type="text" id="ix-name-3" name="ix-name-3">
<label for="ix-email-3">Personal email</label>
<input type="email" id="ix-email-3" name="ix-email-3">
<label for="ix-phone-3">Telephone</label>
<input type="tel" id="ix-phone-3" name="ix-phone-3">
<div id="app" data-v-app>
<div class="v-select">
<span id="vue-listbox-3-lbl">Where are you based?</span>
<button type="button" class="custom-dropdown-trigger" role="combobox" aria-expanded="false" aria-controls="vue-listbox-3" aria-labelledby="vue-listbox-3-lbl" data-reveal="#vue-listbox-3">Where are you based?</button>
<ul role="listbox" id="vue-listbox-3" aria-labelledby="vue-listbox-3-lbl" hidden style="display:none">
<li role="option">London</li>
<li role="option">Remote</li>
<li role="option">Hybrid</li>
</ul>
</div>
</div></form></main>
</body>
</html>
