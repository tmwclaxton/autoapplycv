<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50217</title></head>
<body>
<main><h1>Conditional complex apply 50217</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50217">
<p id="step1-label-50217">Step 1 - Contact</p>

<label for="cond-name-50217">Applicant name (50217)</label>
<input type="text" id="cond-name-50217" name="cond-name-50217" autocomplete="name">
<label for="cond-email-50217">Work email (50217)</label>
<input type="email" id="cond-email-50217" name="cond-email-50217" autocomplete="email">
<label for="cond-phone-50217">Mobile number (50217)</label>
<input type="tel" id="cond-phone-50217" name="cond-phone-50217" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50217">
<p id="step2-label-50217">Step 2 - Preferences</p>
<div class="field-row"><label for="current-city-50217-50217">Current city (50217)</label><select id="current-city-50217-50217" name="current-city-50217-50217"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="new-york">New York</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Willing to relocate? (50217)</legend><label for="willing-to-relocate-5021-0"><input type="radio" id="willing-to-relocate-5021-0" name="willing-to-relocate-5021" value="yes"> Yes</label><label for="willing-to-relocate-5021-1"><input type="radio" id="willing-to-relocate-5021-1" name="willing-to-relocate-5021" value="no"> No</label><label for="willing-to-relocate-5021-2"><input type="radio" id="willing-to-relocate-5021-2" name="willing-to-relocate-5021" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="start-date-preference-50217-">Start date preference (50217)</label><input type="date" id="start-date-preference-50217-" name="start-date-preference-50217-" ></div>
<fieldset><legend>Technical skills (50217)</legend><label for="technical-skills-50217-5-cb-0"><input type="checkbox" id="technical-skills-50217-5-cb-0" name="technical-skills-50217-5[]" value="laravel"> Laravel</label><label for="technical-skills-50217-5-cb-1"><input type="checkbox" id="technical-skills-50217-5-cb-1" name="technical-skills-50217-5[]" value="go"> Go</label><label for="technical-skills-50217-5-cb-2"><input type="checkbox" id="technical-skills-50217-5-cb-2" name="technical-skills-50217-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50217-5-cb-3"><input type="checkbox" id="technical-skills-50217-5-cb-3" name="technical-skills-50217-5[]" value="rust"> Rust</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50217">
<p id="step3-label-50217">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50217" data-reveal="#reveal-50217">Show follow-up questions</button>
<div id="reveal-50217" hidden style="display:none"><div class="field-row"><label for="tell-us-about-yourself-50217">Tell us about yourself (50217)</label><textarea id="tell-us-about-yourself-50217" name="tell-us-about-yourself-50217" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="portfolio-url-50217-50217">Portfolio URL (50217)</label><input type="url" id="portfolio-url-50217-50217" name="portfolio-url-50217-50217" ></div>
<div class="field-row"><label for="compensation-requirement-502">Compensation requirement (50217)</label><input type="number" id="compensation-requirement-502" name="compensation-requirement-502" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50217">Attach resume (50217)</label><input type="file" id="file-50217" name="file-50217" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
