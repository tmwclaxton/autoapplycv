<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50199</title></head>
<body>
<main><h1>Long complex apply 50199</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50199">Preferred name (50199)</label>
<input type="text" id="long-name-50199" name="long-name-50199" autocomplete="name">
<label for="long-email-50199">Personal email (50199)</label>
<input type="email" id="long-email-50199" name="long-email-50199" autocomplete="email">
<label for="long-phone-50199">Contact number (50199)</label>
<input type="tel" id="long-phone-50199" name="long-phone-50199" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50199">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50199" name="linkedin-profile-url-50199" ></div>
<div class="field-row"><label for="current-employer-50199">Current employer</label><input type="text" id="current-employer-50199" name="current-employer-50199" ></div>
<div class="field-row"><label for="current-job-title-50199">Current job title</label><input type="text" id="current-job-title-50199" name="current-job-title-50199" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="personal-statement-50199-501">Personal statement (50199)</label><textarea id="personal-statement-50199-501" name="personal-statement-50199-501" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="office-preference-50199-5019">Office preference (50199)</label><select id="office-preference-50199-5019" name="office-preference-50199-5019"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="manchester">Manchester</option><option value="new-york">New York</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Work authorization status (50199)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50199)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50199-50">Desired base salary (50199)</label><input type="number" id="desired-base-salary-50199-50" name="desired-base-salary-50199-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50199-50">Earliest start date (50199)</label><input type="date" id="earliest-start-date-50199-50" name="earliest-start-date-50199-50" ></div>
<div class="field-row"><label for="referral-source-50199-50199">Referral source (50199)</label><select id="referral-source-50199-50199" name="referral-source-50199-50199"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="job-board">Job board</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Technical skills (50199)</legend><label for="technical-skills-50199-5-cb-0"><input type="checkbox" id="technical-skills-50199-5-cb-0" name="technical-skills-50199-5[]" value="react"> React</label><label for="technical-skills-50199-5-cb-1"><input type="checkbox" id="technical-skills-50199-5-cb-1" name="technical-skills-50199-5[]" value="laravel"> Laravel</label><label for="technical-skills-50199-5-cb-2"><input type="checkbox" id="technical-skills-50199-5-cb-2" name="technical-skills-50199-5[]" value="go"> Go</label><label for="technical-skills-50199-5-cb-3"><input type="checkbox" id="technical-skills-50199-5-cb-3" name="technical-skills-50199-5[]" value="rust"> Rust</label><label for="technical-skills-50199-5-cb-4"><input type="checkbox" id="technical-skills-50199-5-cb-4" name="technical-skills-50199-5[]" value="python"> Python</label><label for="technical-skills-50199-5-cb-5"><input type="checkbox" id="technical-skills-50199-5-cb-5" name="technical-skills-50199-5[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50199">Attach resume (50199)</label><input type="file" id="file-50199" name="file-50199" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
