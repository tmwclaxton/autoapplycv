<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50340</title></head>
<body>
<main><h1>Mixed complex apply 50340</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50340">Full name (50340)</label>
<input type="text" id="mix-name-50340" name="mix-name-50340" autocomplete="name">
<label for="mix-email-50340">Contact email (50340)</label>
<input type="email" id="mix-email-50340" name="mix-email-50340" autocomplete="email">
<label for="mix-phone-50340">Phone number (50340)</label>
<input type="tel" id="mix-phone-50340" name="mix-phone-50340" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="personal-statement-50340-503">Personal statement (50340)</label><textarea id="personal-statement-50340-503" name="personal-statement-50340-503" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50340-503">Preferred location (50340)</label><select id="preferred-location-50340-503" name="preferred-location-50340-503"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50340)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50340)</legend><label for="open-to-relocation-50340-0"><input type="radio" id="open-to-relocation-50340-0" name="open-to-relocation-50340" value="yes"> Yes</label><label for="open-to-relocation-50340-1"><input type="radio" id="open-to-relocation-50340-1" name="open-to-relocation-50340" value="no"> No</label><label for="open-to-relocation-50340-2"><input type="radio" id="open-to-relocation-50340-2" name="open-to-relocation-50340" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50340-50">Salary expectations (50340)</label><input type="number" id="salary-expectations-50340-50" name="salary-expectations-50340-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50340-50">Earliest start date (50340)</label><input type="date" id="earliest-start-date-50340-50" name="earliest-start-date-50340-50" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50340)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="other">Other</option><option value="conference">Conference</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Core competencies (50340)</legend><label for="core-competencies-50340--cb-0"><input type="checkbox" id="core-competencies-50340--cb-0" name="core-competencies-50340-[]" value="python"> Python</label><label for="core-competencies-50340--cb-1"><input type="checkbox" id="core-competencies-50340--cb-1" name="core-competencies-50340-[]" value="sql"> SQL</label><label for="core-competencies-50340--cb-2"><input type="checkbox" id="core-competencies-50340--cb-2" name="core-competencies-50340-[]" value="typescript"> TypeScript</label><label for="core-competencies-50340--cb-3"><input type="checkbox" id="core-competencies-50340--cb-3" name="core-competencies-50340-[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50340">Attach resume (50340)</label><input type="file" id="file-50340" name="file-50340" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50340-5034">Work samples link (50340)</label><input type="url" id="work-samples-link-50340-5034" name="work-samples-link-50340-5034" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
