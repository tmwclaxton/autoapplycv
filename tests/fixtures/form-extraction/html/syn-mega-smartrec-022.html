<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9552</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9552</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9552">Complete name (9552)</label>
<input type="text" id="sr-name-9552" name="sr-name-9552" autocomplete="name">
<label for="sr-email-9552">Personal email (9552)</label>
<input type="email" id="sr-email-9552" name="sr-email-9552" autocomplete="email">
<label for="sr-phone-9552">Cell phone (9552)</label>
<input type="tel" id="sr-phone-9552" name="sr-phone-9552" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="cover-letter-9552-9552">Cover letter (9552)</label><textarea id="cover-letter-9552-9552" name="cover-letter-9552-9552" rows="4" maxlength="500"></textarea></div>

<div class="field-row">
<span id="listbox-9552-lbl">Office preference (9552)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9552" aria-labelledby="listbox-9552-lbl" tabindex="0">Office preference (9552)</div>
<div role="listbox" id="listbox-9552" aria-labelledby="listbox-9552-lbl">
<div role="option" data-value="berlin">Berlin</div><div role="option" data-value="dublin">Dublin</div><div role="option" data-value="london">London</div><div role="option" data-value="hybrid">Hybrid</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
