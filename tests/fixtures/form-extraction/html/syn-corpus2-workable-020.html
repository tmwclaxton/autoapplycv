<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workable apply 20076</title></head>
<body>

<main data-workable-application="true"><h1>Apply for position 20076</h1>
<form class="application-form workable-form" action="/apply" method="post">
<div class="section personal-details">
<label for="wk-name-20076">Full name (20076)</label>
<input type="text" id="wk-name-20076" name="wk-name-20076" autocomplete="name">
<label for="wk-email-20076">Contact email (20076)</label>
<input type="email" id="wk-email-20076" name="wk-email-20076" autocomplete="email">
<label for="wk-phone-20076">Phone number (20076)</label>
<input type="tel" id="wk-phone-20076" name="wk-phone-20076" autocomplete="tel"></div>
<div class="section additional"><div class="field-row"><label for="tell-us-about-yourself-20076">Tell us about yourself (20076)</label><textarea id="tell-us-about-yourself-20076" name="tell-us-about-yourself-20076" rows="4" maxlength="600"></textarea></div></div>
<div class="section preferences"><fieldset><legend>Open to relocation? (20076)</legend><label for="open-to-relocation-20076-0"><input type="radio" id="open-to-relocation-20076-0" name="open-to-relocation-20076" value="yes"> Yes</label><label for="open-to-relocation-20076-1"><input type="radio" id="open-to-relocation-20076-1" name="open-to-relocation-20076" value="no"> No</label><label for="open-to-relocation-20076-2"><input type="radio" id="open-to-relocation-20076-2" name="open-to-relocation-20076" value="maybe"> Maybe</label></fieldset></div>
<div class="file-row"><label for="file-20076">Attach resume (optional)</label><input type="file" id="file-20076" name="file-20076" accept=".pdf,.doc"></div>
<button type="button">Send application</button>
</form></main>
</body>
</html>
