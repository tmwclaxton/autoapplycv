<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50107</title></head>
<body>
<main><h1>Conditional complex apply 50107</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50107">
<p id="step1-label-50107">Step 1 - Contact</p>

<label for="cond-name-50107">Full name (50107)</label>
<input type="text" id="cond-name-50107" name="cond-name-50107" autocomplete="name">
<label for="cond-email-50107">Email address (50107)</label>
<input type="email" id="cond-email-50107" name="cond-email-50107" autocomplete="email">
<label for="cond-phone-50107">Contact number (50107)</label>
<input type="tel" id="cond-phone-50107" name="cond-phone-50107" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50107">
<p id="step2-label-50107">Step 2 - Preferences</p>
<div class="field-row"><label for="work-location-50107-50107">Work location (50107)</label><select id="work-location-50107-50107" name="work-location-50107-50107"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Willing to relocate? (50107)</legend><label for="willing-to-relocate-5010-0"><input type="radio" id="willing-to-relocate-5010-0" name="willing-to-relocate-5010" value="yes"> Yes</label><label for="willing-to-relocate-5010-1"><input type="radio" id="willing-to-relocate-5010-1" name="willing-to-relocate-5010" value="no"> No</label><label for="willing-to-relocate-5010-2"><input type="radio" id="willing-to-relocate-5010-2" name="willing-to-relocate-5010" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="available-from-50107-50107">Available from (50107)</label><input type="date" id="available-from-50107-50107" name="available-from-50107-50107" ></div>
<fieldset><legend>Core competencies (50107)</legend><label for="core-competencies-50107--cb-0"><input type="checkbox" id="core-competencies-50107--cb-0" name="core-competencies-50107-[]" value="python"> Python</label><label for="core-competencies-50107--cb-1"><input type="checkbox" id="core-competencies-50107--cb-1" name="core-competencies-50107-[]" value="react"> React</label><label for="core-competencies-50107--cb-2"><input type="checkbox" id="core-competencies-50107--cb-2" name="core-competencies-50107-[]" value="typescript"> TypeScript</label><label for="core-competencies-50107--cb-3"><input type="checkbox" id="core-competencies-50107--cb-3" name="core-competencies-50107-[]" value="laravel"> Laravel</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50107">
<p id="step3-label-50107">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50107" data-reveal="#reveal-50107">Show follow-up questions</button>
<div id="reveal-50107" hidden style="display:none"><div class="field-row"><label for="motivation-statement-50107-5">Motivation statement (50107)</label><textarea id="motivation-statement-50107-5" name="motivation-statement-50107-5" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="personal-website-50107-50107">Personal website (50107)</label><input type="url" id="personal-website-50107-50107" name="personal-website-50107-50107" ></div>
<div class="field-row"><label for="expected-salary-50107-50107">Expected salary (50107)</label><input type="number" id="expected-salary-50107-50107" name="expected-salary-50107-50107" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50107">Attach resume (50107)</label><input type="file" id="file-50107" name="file-50107" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
