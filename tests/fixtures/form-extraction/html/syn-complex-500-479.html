<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50479</title></head>
<body>
<main><h1>Long complex apply 50479</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50479">Applicant name (50479)</label>
<input type="text" id="long-name-50479" name="long-name-50479" autocomplete="name">
<label for="long-email-50479">Email address (50479)</label>
<input type="email" id="long-email-50479" name="long-email-50479" autocomplete="email">
<label for="long-phone-50479">Mobile number (50479)</label>
<input type="tel" id="long-phone-50479" name="long-phone-50479" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50479">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50479" name="linkedin-profile-url-50479" ></div>
<div class="field-row"><label for="current-employer-50479">Current employer</label><input type="text" id="current-employer-50479" name="current-employer-50479" ></div>
<div class="field-row"><label for="current-job-title-50479">Current job title</label><input type="text" id="current-job-title-50479" name="current-job-title-50479" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="cover-letter-50479-50479">Cover letter (50479)</label><textarea id="cover-letter-50479-50479" name="cover-letter-50479-50479" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="current-city-50479-50479">Current city (50479)</label><select id="current-city-50479-50479" name="current-city-50479-50479"><option value="">Choose one…</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50479)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50479)</legend><label for="willing-to-relocate-5047-0"><input type="radio" id="willing-to-relocate-5047-0" name="willing-to-relocate-5047" value="yes"> Yes</label><label for="willing-to-relocate-5047-1"><input type="radio" id="willing-to-relocate-5047-1" name="willing-to-relocate-5047" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50479-50">Salary expectations (50479)</label><input type="number" id="salary-expectations-50479-50" name="salary-expectations-50479-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50479-50">Earliest start date (50479)</label><input type="date" id="earliest-start-date-50479-50" name="earliest-start-date-50479-50" ></div>
<div class="field-row"><label for="referral-source-50479-50479">Referral source (50479)</label><select id="referral-source-50479-50479" name="referral-source-50479-50479"><option value="">Choose one…</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="other">Other</option><option value="job-board">Job board</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Core competencies (50479)</legend><label for="core-competencies-50479--cb-0"><input type="checkbox" id="core-competencies-50479--cb-0" name="core-competencies-50479-[]" value="python"> Python</label><label for="core-competencies-50479--cb-1"><input type="checkbox" id="core-competencies-50479--cb-1" name="core-competencies-50479-[]" value="react"> React</label><label for="core-competencies-50479--cb-2"><input type="checkbox" id="core-competencies-50479--cb-2" name="core-competencies-50479-[]" value="sql"> SQL</label><label for="core-competencies-50479--cb-3"><input type="checkbox" id="core-competencies-50479--cb-3" name="core-competencies-50479-[]" value="go"> Go</label><label for="core-competencies-50479--cb-4"><input type="checkbox" id="core-competencies-50479--cb-4" name="core-competencies-50479-[]" value="rust"> Rust</label><label for="core-competencies-50479--cb-5"><input type="checkbox" id="core-competencies-50479--cb-5" name="core-competencies-50479-[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50479">Attach resume (50479)</label><input type="file" id="file-50479" name="file-50479" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
