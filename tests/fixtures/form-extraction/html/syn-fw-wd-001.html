<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday-style apply 1</title></head>
<body>
<main><h1>Workday-style apply 1</h1><form action="/apply" method="post">
<div data-automation-id="applyFlowPrimaryPage">
<div data-testid="input-q_full-name" class="ia-Questions-item">
<div data-testid="input-q_full-name-label"><span data-testid="safe-markup">Full name</span></div>
<input data-testid="input-q_full-name-input" type="text" name="input-q_full-name">
</div>
<div data-testid="input-q_email-address" class="ia-Questions-item">
<div data-testid="input-q_email-address-label"><span data-testid="safe-markup">Email address</span></div>
<input data-testid="input-q_email-address-input" type="email" name="input-q_email-address">
</div>
<div data-testid="input-q_phone-number" class="ia-Questions-item">
<div data-testid="input-q_phone-number-label"><span data-testid="safe-markup">Phone number</span></div>
<input data-testid="input-q_phone-number-input" type="tel" name="input-q_phone-number">
</div>
<div data-testid="input-q_cover-letter" class="ia-Questions-item">
<div data-testid="input-q_cover-letter-label"><span data-testid="safe-markup">Cover letter</span></div>
<textarea data-testid="input-q_cover-letter-input" name="input-q_cover-letter" rows="4" maxlength="600"></textarea>
</div>
<button type="button">Save and continue</button>
</div></form></main>
</body>
</html>
