<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50050</title></head>
<body>
<main><h1>Mixed complex apply 50050</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50050">Preferred name (50050)</label>
<input type="text" id="mix-name-50050" name="mix-name-50050" autocomplete="name">
<label for="mix-email-50050">Email address (50050)</label>
<input type="email" id="mix-email-50050" name="mix-email-50050" autocomplete="email">
<label for="mix-phone-50050">Contact number (50050)</label>
<input type="tel" id="mix-phone-50050" name="mix-phone-50050" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="motivation-statement-50050-5">Motivation statement (50050)</label><textarea id="motivation-statement-50050-5" name="motivation-statement-50050-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50050-50050">Work location (50050)</label><select id="work-location-50050-50050" name="work-location-50050-50050"><option value="">Choose one…</option><option value="remote">Remote</option><option value="london">London</option><option value="new-york">New York</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Work authorization status (50050)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50050)</legend><label for="willing-to-relocate-5005-0"><input type="radio" id="willing-to-relocate-5005-0" name="willing-to-relocate-5005" value="yes"> Yes</label><label for="willing-to-relocate-5005-1"><input type="radio" id="willing-to-relocate-5005-1" name="willing-to-relocate-5005" value="no"> No</label><label for="willing-to-relocate-5005-2"><input type="radio" id="willing-to-relocate-5005-2" name="willing-to-relocate-5005" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50050-50050">Expected salary (50050)</label><input type="number" id="expected-salary-50050-50050" name="expected-salary-50050-50050" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50050-50">Earliest start date (50050)</label><input type="date" id="earliest-start-date-50050-50" name="earliest-start-date-50050-50" ></div>
<div class="field-row"><label for="application-source-50050-500">Application source (50050)</label><select id="application-source-50050-500" name="application-source-50050-500"><option value="">Choose one…</option><option value="conference">Conference</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option></select></div>
<fieldset><legend>Key skills (50050)</legend><label for="key-skills-50050-50050-cb-0"><input type="checkbox" id="key-skills-50050-50050-cb-0" name="key-skills-50050-50050[]" value="python"> Python</label><label for="key-skills-50050-50050-cb-1"><input type="checkbox" id="key-skills-50050-50050-cb-1" name="key-skills-50050-50050[]" value="rust"> Rust</label><label for="key-skills-50050-50050-cb-2"><input type="checkbox" id="key-skills-50050-50050-cb-2" name="key-skills-50050-50050[]" value="go"> Go</label><label for="key-skills-50050-50050-cb-3"><input type="checkbox" id="key-skills-50050-50050-cb-3" name="key-skills-50050-50050[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50050">Attach resume (50050)</label><input type="file" id="file-50050" name="file-50050" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50050-50050">GitHub profile (50050)</label><input type="url" id="github-profile-50050-50050" name="github-profile-50050-50050" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
