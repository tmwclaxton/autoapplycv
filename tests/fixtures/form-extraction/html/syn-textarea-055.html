<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Textarea Application 6</title></head>
<body>
<main>
<h1>Textarea Application 6</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="full-name">Full name</label><input type="text" id="full-name" name="full-name" ></div>
<div class="form-group"><label for="email-address">Email address</label><input type="email" id="email-address" name="email-address" ></div>
<div class="form-group"><label for="why-do-you-want-this-rol">Why do you want this role?</label><textarea id="why-do-you-want-this-rol" name="why-do-you-want-this-rol" rows="4" maxlength="500"></textarea></div>
<div class="form-group"><label for="describe-a-challenging-p">Describe a challenging project you led</label><textarea id="describe-a-challenging-p" name="describe-a-challenging-p" rows="4" maxlength="800"></textarea></div>

</form>
</main>
</body>
</html>
