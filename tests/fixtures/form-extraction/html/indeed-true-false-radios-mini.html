<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Indeed True/False radios mini</title>
</head>
<body>
  <form>
    <fieldset>
      <legend>Are you eligible to work in the UK i.e. UK citizen, settled status or holder of permanent work visa?</legend>
      <label><input type="radio" name="q_uk" id="uk-true" value="">True</label>
      <label><input type="radio" name="q_uk" id="uk-false" value="">False</label>
    </fieldset>
    <fieldset>
      <legend>Are you comfortable working in a hybrid 2 days a week in our King's Cross Office?</legend>
      <label><input type="radio" name="q_hybrid" id="hybrid-true" value="">True</label>
      <label><input type="radio" name="q_hybrid" id="hybrid-false" value="">False</label>
    </fieldset>
    <button type="button">Continue</button>
  </form>
</body>
</html>
