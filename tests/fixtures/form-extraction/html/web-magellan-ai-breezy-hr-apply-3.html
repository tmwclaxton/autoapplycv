description&quot;:&quot;<h2><strong>Who we are</strong></h2>\n<p>Magellan AI is the all-in-one platform for audio advertising intelligence, media planning, and measurement. We help advertisers, agencies, and publishers understand podcast advertising activity, discover new opportunities, and measure performance across podcasts (audio + video), streaming audio, and broadcast radio.</p>\n<p>Our measurement product connects audio ad exposure to real business outcomes using pixel-based attribution, helping advertisers and publishers prove performance and optimize campaigns across digital audio.</p>\n<p>We’re looking for a <strong>Measurement Growth Director</strong> to own revenue growth across a small number of high-impact accounts by driving adoption and usage of our measurement product.</p>\n<p></p>\n<h2><strong>Why this role is exciting</strong></h2>\n<ul><li><strong>Direct revenue impact</strong>: You’ll be responsible for growing revenue within your accounts by increasing measurement adoption and usage, with clear targets tied to overage.</li><li><strong>High-value relationships</strong>: Work closely with leading publishers and agencies across a focused set of key clients.</li><li><strong>Own the expansion motion</strong>: Shape how measurement gets adopted, used, and embedded into workflows across the audio ecosystem.</li><li><strong>Blend of sales and strategy</strong>: Combine client-facing selling with account mapping, enablement, and long-term growth planning.</li></ul>\n<p></p>\n<h2><strong>What you’ll do</strong></h2>\n<ul><li>Own revenue growth across a defined set of publisher and agency accounts by increasing measurement adoption and usage</li><li>Identify and pursue opportunities to expand measurement within existing accounts</li><li>Lead product demos and measurement conversations, and own the measurement narrative in client discussions</li><li>Lead campaign performance reviews, helping clients interpret results and communicate a strong performance story</li><li>Work directly with decision-makers and build relationships with agency stakeholders to expand adoption</li><li>Develop account maps to identify high-potential advertisers and growth opportunities</li><li>Run trainings, education sessions, and client-facing initiatives to increase platform usage</li><li>Equip client-facing teams to confidently use measurement in their sales process</li><li>Explore opportunities to integrate Magellan AI data into client workflows and systems</li><li>Prioritize time and focus on opportunities that drive the highest revenue impact</li></ul>\n<p></p>\n<h2><strong>What we’re looking for</strong></h2>\n<ul><li>Experience in sales, account management, or growth roles within media, advertising, or SaaS</li><li>Experience driving revenue growth within existing accounts (expansion, upsell, or adoption), including ownership of or contribution to revenue targets</li><li>Comfort leading client conversations, demos, and presentations</li><li>Ability to identify and pursue high-impact opportunities within complex organizations</li><li>Strong communication skills, with the ability to translate measurement data into a clear, compelling narrative</li><li>Experience working with agencies, publishers, or advertisers in digital media or audio is a plus</li><li>Self-starter who can navigate organizations, build relationships, and drive outcomes with limited direction</li><li>Strong sense of ownership and ability to prioritize time toward the highest-impact opportunities</li></ul>\n<p></p>\n<h2><strong>Location</strong></h2>\n<p>This is a <strong>remote role based in the United States</strong>.</p>\n<p></p>\n<h2><strong>Compensation</strong></h2>\n<p>Base salary of $70,000 - $110,000, with significant performance-based bonus opportunity tied to revenue growth.</p>\n<p></p>\n<h2><strong>Benefits</strong></h2>\n<p>Magellan AI offers a comprehensive benefits package including:</p>\n<ul><li>Health, dental, and vision insurance</li><li>Flexible PTO policy</li><li>Paid parental leave</li><li>Remote-first work environment</li><li>Opportunities to work closely with a small, experienced team building a fast-growing product</li></ul>\n<p></p>\n<p>Magellan AI is an equal opportunity employer; in keeping with our beliefs and goals, no employee or applicant will face discrimination or harassment based on gender, sexual orientation, race, color, ancestry, national origin, religion, age, marital domestic partner status, physical ability, gender identity, disability status, or veteran status. Above and beyond discrimination and harassment based on 'protected categories,' we also strive to prevent other, subtler forms of inappropriate behavior (e.g., stereotyping) from ever gaining a foothold in our company culture. Whether blatant or hidden, barriers to success have no place at Magellan AI.</p>\n<p></p>&quot;,&quot;salary_range&quot;:{&quot;min&quot;:&quot;70000&quot;,&quot;max&quot;:&quot;110000&quot;,&quot;currency&quot;:{&quot;name&quot;:&quot;US Dollar&quot;,&quot;symbol&quot;:&quot;$&quot;,&quot;symbolNative&quot;:&quot;$&quot;,&quot;decimalDigits&quot;:2,&quot;rounding&quot;:0,&quot;code&quot;:&quot;USD&quot;,&quot;namePlural&quot;:&quot;US dollars&quot;},&quot;period&quot;:{&quot;id&quot;:&quot;yearly&quot;,&quot;name&quot;:&quot;Yearly&quot;},&quot;display&quot;:&quot;$70,000 – $110,000 / year&quot;},&quot;candidate_type&quot;:&quot;all&quot;,&quot;experience&quot;:null,&quot;application_form&quot;:{&quot;name&quot;:&quot;required&quot;,&quot;headline&quot;:&quot;optional&quot;,&quot;summary&quot;:&quot;hidden&quot;,&quot;profile_photo&quot;:&quot;optional&quot;,&quot;address&quot;:&quot;hidden&quot;,&quot;salary&quot;:&quot;optional&quot;,&quot;email_address&quot;:&quot;required&quot;,&quot;phone_number&quot;:&quot;hidden&quot;,&quot;resume&quot;:&quot;optional&quot;,&quot;work_history&quot;:&quot;hidden&quot;,&quot;education&quot;:&quot;hidden&quot;,&quot;cover_letter&quot;:&quot;hidden&quot;,&quot;preferred_loc
