<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50207</title></head>
<body>
<main><h1>Conditional complex apply 50207</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50207">
<p id="step1-label-50207">Step 1 - Contact</p>

<label for="cond-name-50207">Legal name (50207)</label>
<input type="text" id="cond-name-50207" name="cond-name-50207" autocomplete="name">
<label for="cond-email-50207">Work email (50207)</label>
<input type="email" id="cond-email-50207" name="cond-email-50207" autocomplete="email">
<label for="cond-phone-50207">Telephone (50207)</label>
<input type="tel" id="cond-phone-50207" name="cond-phone-50207" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50207">
<p id="step2-label-50207">Step 2 - Preferences</p>
<div class="field-row"><label for="office-preference-50207-5020">Office preference (50207)</label><select id="office-preference-50207-5020" name="office-preference-50207-5020"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Open to relocation? (50207)</legend><label for="open-to-relocation-50207-0"><input type="radio" id="open-to-relocation-50207-0" name="open-to-relocation-50207" value="yes"> Yes</label><label for="open-to-relocation-50207-1"><input type="radio" id="open-to-relocation-50207-1" name="open-to-relocation-50207" value="no"> No</label><label for="open-to-relocation-50207-2"><input type="radio" id="open-to-relocation-50207-2" name="open-to-relocation-50207" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="start-date-preference-50207-">Start date preference (50207)</label><input type="date" id="start-date-preference-50207-" name="start-date-preference-50207-" ></div>
<fieldset><legend>Key skills (50207)</legend><label for="key-skills-50207-50207-cb-0"><input type="checkbox" id="key-skills-50207-50207-cb-0" name="key-skills-50207-50207[]" value="typescript"> TypeScript</label><label for="key-skills-50207-50207-cb-1"><input type="checkbox" id="key-skills-50207-50207-cb-1" name="key-skills-50207-50207[]" value="python"> Python</label><label for="key-skills-50207-50207-cb-2"><input type="checkbox" id="key-skills-50207-50207-cb-2" name="key-skills-50207-50207[]" value="javascript"> JavaScript</label><label for="key-skills-50207-50207-cb-3"><input type="checkbox" id="key-skills-50207-50207-cb-3" name="key-skills-50207-50207[]" value="react"> React</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50207">
<p id="step3-label-50207">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50207" data-reveal="#reveal-50207">Show follow-up questions</button>
<div id="reveal-50207" hidden style="display:none"><div class="field-row"><label for="tell-us-about-yourself-50207">Tell us about yourself (50207)</label><textarea id="tell-us-about-yourself-50207" name="tell-us-about-yourself-50207" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="work-samples-link-50207-5020">Work samples link (50207)</label><input type="url" id="work-samples-link-50207-5020" name="work-samples-link-50207-5020" ></div>
<div class="field-row"><label for="expected-salary-50207-50207">Expected salary (50207)</label><input type="number" id="expected-salary-50207-50207" name="expected-salary-50207-50207" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50207">Attach resume (50207)</label><input type="file" id="file-50207" name="file-50207" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
