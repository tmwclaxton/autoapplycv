<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9937</title></head>
<body>
<main><h1>Grid layout 9937</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9937">Complete name (9937)</label><span class="helper">Required</span><input id="grid-name-9937" name="grid-name-9937" type="text"></div>
<div><label for="grid-email-9937">Work email (9937)</label><span class="helper">Required</span><input id="grid-email-9937" name="grid-email-9937" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9937">Cell phone (9937)</label><input id="grid-phone-9937" name="grid-phone-9937" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="motivation-statement-9937-99">Motivation statement (9937)</label><textarea id="motivation-statement-9937-99" name="motivation-statement-9937-99" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Willing to relocate? (9937)</legend><label for="willing-to-relocate-9937-0"><input type="radio" id="willing-to-relocate-9937-0" name="willing-to-relocate-9937" value="yes"> Yes</label><label for="willing-to-relocate-9937-1"><input type="radio" id="willing-to-relocate-9937-1" name="willing-to-relocate-9937" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
