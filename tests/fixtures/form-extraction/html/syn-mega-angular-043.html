<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9203</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9203</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Applicant name (9203)</mat-label><label for="ang-name-9203">Applicant name (9203)</label><input matInput id="ang-name-9203" name="ang-name-9203" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Application email (9203)</mat-label><label for="ang-email-9203">Application email (9203)</label><input matInput id="ang-email-9203" name="ang-email-9203" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Phone number (9203)</mat-label><label for="ang-phone-9203">Phone number (9203)</label><input matInput id="ang-phone-9203" name="ang-phone-9203" type="tel"></mat-form-field>
<div class="field-row"><label for="motivation-statement-9203-92">Motivation statement (9203)</label><textarea id="motivation-statement-9203-92" name="motivation-statement-9203-92" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-9203-9203">Preferred location (9203)</label><select id="preferred-location-9203-9203" name="preferred-location-9203-9203"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="berlin">Berlin</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
