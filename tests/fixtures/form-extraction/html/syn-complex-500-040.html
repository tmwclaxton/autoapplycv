<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50040</title></head>
<body>
<main><h1>Mixed complex apply 50040</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50040">Your name (50040)</label>
<input type="text" id="mix-name-50040" name="mix-name-50040" autocomplete="name">
<label for="mix-email-50040">Contact email (50040)</label>
<input type="email" id="mix-email-50040" name="mix-email-50040" autocomplete="email">
<label for="mix-phone-50040">Telephone (50040)</label>
<input type="tel" id="mix-phone-50040" name="mix-phone-50040" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="motivation-statement-50040-5">Motivation statement (50040)</label><textarea id="motivation-statement-50040-5" name="motivation-statement-50040-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-50040-5004">Office preference (50040)</label><select id="office-preference-50040-5004" name="office-preference-50040-5004"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="remote">Remote</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50040)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50040)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50040-50">Desired base salary (50040)</label><input type="number" id="desired-base-salary-50040-50" name="desired-base-salary-50040-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50040-500">When can you start? (50040)</label><input type="date" id="when-can-you-start-50040-500" name="when-can-you-start-50040-500" ></div>
<div class="field-row"><label for="referral-source-50040-50040">Referral source (50040)</label><select id="referral-source-50040-50040" name="referral-source-50040-50040"><option value="">Choose one…</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="conference">Conference</option></select></div>
<fieldset><legend>Primary expertise (50040)</legend><label for="primary-expertise-50040--cb-0"><input type="checkbox" id="primary-expertise-50040--cb-0" name="primary-expertise-50040-[]" value="python"> Python</label><label for="primary-expertise-50040--cb-1"><input type="checkbox" id="primary-expertise-50040--cb-1" name="primary-expertise-50040-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50040--cb-2"><input type="checkbox" id="primary-expertise-50040--cb-2" name="primary-expertise-50040-[]" value="sql"> SQL</label><label for="primary-expertise-50040--cb-3"><input type="checkbox" id="primary-expertise-50040--cb-3" name="primary-expertise-50040-[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50040">Attach resume (50040)</label><input type="file" id="file-50040" name="file-50040" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50040-50040">Portfolio URL (50040)</label><input type="url" id="portfolio-url-50040-50040" name="portfolio-url-50040-50040" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
