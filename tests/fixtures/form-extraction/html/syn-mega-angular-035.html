<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9195</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9195</h1>

<mat-form-field appearance="outline"><mat-label>Preferred name (9195)</mat-label><label for="ang-name-9195">Preferred name (9195)</label><input matInput id="ang-name-9195" name="ang-name-9195" type="text"></mat-form-field>

</form></main>
</body>
</html>
