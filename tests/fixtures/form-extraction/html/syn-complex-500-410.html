<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50410</title></head>
<body>
<main><h1>Mixed complex apply 50410</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50410">Your name (50410)</label>
<input type="text" id="mix-name-50410" name="mix-name-50410" autocomplete="name">
<label for="mix-email-50410">Work email (50410)</label>
<input type="email" id="mix-email-50410" name="mix-email-50410" autocomplete="email">
<label for="mix-phone-50410">Phone number (50410)</label>
<input type="tel" id="mix-phone-50410" name="mix-phone-50410" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="personal-statement-50410-504">Personal statement (50410)</label><textarea id="personal-statement-50410-504" name="personal-statement-50410-504" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50410-504">Preferred location (50410)</label><select id="preferred-location-50410-504" name="preferred-location-50410-504"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50410)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50410)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50410-50">Salary expectations (50410)</label><input type="number" id="salary-expectations-50410-50" name="salary-expectations-50410-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50410-50">Earliest start date (50410)</label><input type="date" id="earliest-start-date-50410-50" name="earliest-start-date-50410-50" ></div>
<div class="field-row"><label for="referral-source-50410-50410">Referral source (50410)</label><select id="referral-source-50410-50410" name="referral-source-50410-50410"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Key skills (50410)</legend><label for="key-skills-50410-50410-cb-0"><input type="checkbox" id="key-skills-50410-50410-cb-0" name="key-skills-50410-50410[]" value="go"> Go</label><label for="key-skills-50410-50410-cb-1"><input type="checkbox" id="key-skills-50410-50410-cb-1" name="key-skills-50410-50410[]" value="python"> Python</label><label for="key-skills-50410-50410-cb-2"><input type="checkbox" id="key-skills-50410-50410-cb-2" name="key-skills-50410-50410[]" value="sql"> SQL</label><label for="key-skills-50410-50410-cb-3"><input type="checkbox" id="key-skills-50410-50410-cb-3" name="key-skills-50410-50410[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50410">Attach resume (50410)</label><input type="file" id="file-50410" name="file-50410" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50410-50410">Personal website (50410)</label><input type="url" id="personal-website-50410-50410" name="personal-website-50410-50410" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
