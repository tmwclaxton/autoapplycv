<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday Application 5</title></head>
<body>
<main>
<h1>Workday Application 5</h1>
<form action="/apply" method="post">
<div data-testid="input-q_name-as-on-cv" class="ia-Questions-item">
<div data-testid="input-q_name-as-on-cv-label"><span data-testid="safe-markup">Name as on CV</span></div>
<input data-testid="input-q_name-as-on-cv-input" type="text" name="input-q_name-as-on-cv">
</div>
<div data-testid="input-q_personal-email" class="ia-Questions-item">
<div data-testid="input-q_personal-email-label"><span data-testid="safe-markup">Personal email</span></div>
<input data-testid="input-q_personal-email-input" type="email" name="input-q_personal-email">
</div>
<div data-testid="input-q_cover-letter" class="ia-Questions-item">
<div data-testid="input-q_cover-letter-label"><span data-testid="safe-markup">Cover letter</span></div>
<textarea data-testid="input-q_cover-letter-input" name="input-q_cover-letter" rows="4" maxlength="500"></textarea>
</div>
<div data-testid="input-q_total-years-of-p" class="ia-Questions-item">
<div data-testid="input-q_total-years-of-p-label"><span data-testid="safe-markup">Total years of professional experience</span></div>
<input data-testid="input-q_total-years-of-p-input" type="number" name="input-q_total-years-of-p">
</div>
<button type="button">Save and continue</button>

</form>
</main>
</body>
</html>
