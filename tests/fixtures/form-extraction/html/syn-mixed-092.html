<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed Application 3</title></head>
<body>
<main>
<h1>Mixed Application 3</h1>
<form action="/apply" method="post">
<div data-testid="input-q_your-name" class="ia-Questions-item">
<div data-testid="input-q_your-name-label"><span data-testid="safe-markup">Your name</span></div>
<input data-testid="input-q_your-name-input" type="text" name="input-q_your-name">
</div>
<div class="field"><label id="question_contact-email-label" for="question_contact-email">Contact email</label><input type="email" id="question_contact-email" name="question_contact-email" aria-labelledby="question_contact-email-label"></div>
<div class="form-group"><label for="where-are-you-based">Where are you based?</label><select id="where-are-you-based" name="where-are-you-based"><option value="">Select…</option><option value="london">London</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Will you need sponsorship?</legend><label><input type="radio" name="will-you-need-sponsorshi" id="will-you-need-sponsorshi-0" value="yes"> Yes</label><label><input type="radio" name="will-you-need-sponsorshi" id="will-you-need-sponsorshi-1" value="no"> No</label></fieldset>
<div class="form-group"><label for="tell-us-about-yourself">Tell us about yourself</label><textarea id="tell-us-about-yourself" name="tell-us-about-yourself" rows="4" maxlength="600"></textarea></div>
<div class="form-group"><label for="upload-cv">Upload CV</label><input type="file" id="upload-cv" name="upload-cv" ></div>
<button type="button">Submit application</button>

</form>
</main>
</body>
</html>
