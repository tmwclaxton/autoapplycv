<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Textarea Application 4</title></head>
<body>
<main>
<h1>Textarea Application 4</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="applicant-name">Applicant name</label><input type="text" id="applicant-name" name="applicant-name" ></div>
<div class="form-group"><label for="work-email">Work email</label><input type="email" id="work-email" name="work-email" ></div>
<div class="form-group"><label for="motivation-statement">Motivation statement</label><textarea id="motivation-statement" name="motivation-statement" rows="4" maxlength="400"></textarea></div>
<div class="form-group"><label for="describe-a-challenging-p">Describe a challenging project you led</label><textarea id="describe-a-challenging-p" name="describe-a-challenging-p" rows="4" maxlength="800"></textarea></div>

</form>
</main>
</body>
</html>
