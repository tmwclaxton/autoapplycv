<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50139</title></head>
<body>
<main><h1>Long complex apply 50139</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50139">Applicant name (50139)</label>
<input type="text" id="long-name-50139" name="long-name-50139" autocomplete="name">
<label for="long-email-50139">Work email (50139)</label>
<input type="email" id="long-email-50139" name="long-email-50139" autocomplete="email">
<label for="long-phone-50139">Telephone (50139)</label>
<input type="tel" id="long-phone-50139" name="long-phone-50139" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50139">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50139" name="linkedin-profile-url-50139" ></div>
<div class="field-row"><label for="current-employer-50139">Current employer</label><input type="text" id="current-employer-50139" name="current-employer-50139" ></div>
<div class="field-row"><label for="current-job-title-50139">Current job title</label><input type="text" id="current-job-title-50139" name="current-job-title-50139" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="motivation-statement-50139-5">Motivation statement (50139)</label><textarea id="motivation-statement-50139-5" name="motivation-statement-50139-5" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="current-city-50139-50139">Current city (50139)</label><select id="current-city-50139-50139" name="current-city-50139-50139"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50139)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50139)</legend><label for="willing-to-relocate-5013-0"><input type="radio" id="willing-to-relocate-5013-0" name="willing-to-relocate-5013" value="yes"> Yes</label><label for="willing-to-relocate-5013-1"><input type="radio" id="willing-to-relocate-5013-1" name="willing-to-relocate-5013" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50139-50139">Expected salary (50139)</label><input type="number" id="expected-salary-50139-50139" name="expected-salary-50139-50139" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50139-50139">Available from (50139)</label><input type="date" id="available-from-50139-50139" name="available-from-50139-50139" ></div>
<div class="field-row"><label for="application-source-50139-501">Application source (50139)</label><select id="application-source-50139-501" name="application-source-50139-501"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="other">Other</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Primary expertise (50139)</legend><label for="primary-expertise-50139--cb-0"><input type="checkbox" id="primary-expertise-50139--cb-0" name="primary-expertise-50139-[]" value="laravel"> Laravel</label><label for="primary-expertise-50139--cb-1"><input type="checkbox" id="primary-expertise-50139--cb-1" name="primary-expertise-50139-[]" value="sql"> SQL</label><label for="primary-expertise-50139--cb-2"><input type="checkbox" id="primary-expertise-50139--cb-2" name="primary-expertise-50139-[]" value="go"> Go</label><label for="primary-expertise-50139--cb-3"><input type="checkbox" id="primary-expertise-50139--cb-3" name="primary-expertise-50139-[]" value="react"> React</label><label for="primary-expertise-50139--cb-4"><input type="checkbox" id="primary-expertise-50139--cb-4" name="primary-expertise-50139-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50139--cb-5"><input type="checkbox" id="primary-expertise-50139--cb-5" name="primary-expertise-50139-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50139">Attach resume (50139)</label><input type="file" id="file-50139" name="file-50139" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
