<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50049</title></head>
<body>
<main><h1>Long complex apply 50049</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50049">Preferred name (50049)</label>
<input type="text" id="long-name-50049" name="long-name-50049" autocomplete="name">
<label for="long-email-50049">Contact email (50049)</label>
<input type="email" id="long-email-50049" name="long-email-50049" autocomplete="email">
<label for="long-phone-50049">Phone number (50049)</label>
<input type="tel" id="long-phone-50049" name="long-phone-50049" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50049">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50049" name="linkedin-profile-url-50049" ></div>
<div class="field-row"><label for="current-employer-50049">Current employer</label><input type="text" id="current-employer-50049" name="current-employer-50049" ></div>
<div class="field-row"><label for="current-job-title-50049">Current job title</label><input type="text" id="current-job-title-50049" name="current-job-title-50049" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="motivation-statement-50049-5">Motivation statement (50049)</label><textarea id="motivation-statement-50049-5" name="motivation-statement-50049-5" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="work-location-50049-50049">Work location (50049)</label><select id="work-location-50049-50049" name="work-location-50049-50049"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="new-york">New York</option><option value="london">London</option><option value="remote">Remote</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50049)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50049)</legend><label for="willing-to-relocate-5004-0"><input type="radio" id="willing-to-relocate-5004-0" name="willing-to-relocate-5004" value="yes"> Yes</label><label for="willing-to-relocate-5004-1"><input type="radio" id="willing-to-relocate-5004-1" name="willing-to-relocate-5004" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50049-50">Desired base salary (50049)</label><input type="number" id="desired-base-salary-50049-50" name="desired-base-salary-50049-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50049-500">When can you start? (50049)</label><input type="date" id="when-can-you-start-50049-500" name="when-can-you-start-50049-500" ></div>
<div class="field-row"><label for="application-source-50049-500">Application source (50049)</label><select id="application-source-50049-500" name="application-source-50049-500"><option value="">Choose one…</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="other">Other</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Primary expertise (50049)</legend><label for="primary-expertise-50049--cb-0"><input type="checkbox" id="primary-expertise-50049--cb-0" name="primary-expertise-50049-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50049--cb-1"><input type="checkbox" id="primary-expertise-50049--cb-1" name="primary-expertise-50049-[]" value="sql"> SQL</label><label for="primary-expertise-50049--cb-2"><input type="checkbox" id="primary-expertise-50049--cb-2" name="primary-expertise-50049-[]" value="react"> React</label><label for="primary-expertise-50049--cb-3"><input type="checkbox" id="primary-expertise-50049--cb-3" name="primary-expertise-50049-[]" value="python"> Python</label><label for="primary-expertise-50049--cb-4"><input type="checkbox" id="primary-expertise-50049--cb-4" name="primary-expertise-50049-[]" value="laravel"> Laravel</label><label for="primary-expertise-50049--cb-5"><input type="checkbox" id="primary-expertise-50049--cb-5" name="primary-expertise-50049-[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50049">Attach resume (50049)</label><input type="file" id="file-50049" name="file-50049" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
