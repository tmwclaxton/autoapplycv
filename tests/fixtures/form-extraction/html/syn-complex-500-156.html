<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50156</title></head>
<body>
<main><h1>Wizard complex apply 50156</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50156">
<h2 id="wizard-contact-50156">Contact information</h2>

<label for="wiz-name-50156">Full name (50156)</label>
<input type="text" id="wiz-name-50156" name="wiz-name-50156" autocomplete="name">
<label for="wiz-email-50156">Personal email (50156)</label>
<input type="email" id="wiz-email-50156" name="wiz-email-50156" autocomplete="email">
<label for="wiz-phone-50156">Telephone (50156)</label>
<input type="tel" id="wiz-phone-50156" name="wiz-phone-50156" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50156">
<h2 id="wizard-screen-50156">Screening questions</h2>
<div class="field-row"><label for="motivation-statement-50156-5">Motivation statement (50156)</label><textarea id="motivation-statement-50156-5" name="motivation-statement-50156-5" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="work-location-50156-50156">Work location (50156)</label><select id="work-location-50156-50156" name="work-location-50156-50156"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="london">London</option><option value="remote">Remote</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50156)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50156-50156">Expected salary (50156)</label><input type="number" id="expected-salary-50156-50156" name="expected-salary-50156-50156" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50156-">Start date preference (50156)</label><input type="date" id="start-date-preference-50156-" name="start-date-preference-50156-" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50156">
<h2 id="wizard-docs-50156">Documents and skills</h2>
<fieldset><legend>Technical skills (50156)</legend><label for="technical-skills-50156-5-cb-0"><input type="checkbox" id="technical-skills-50156-5-cb-0" name="technical-skills-50156-5[]" value="rust"> Rust</label><label for="technical-skills-50156-5-cb-1"><input type="checkbox" id="technical-skills-50156-5-cb-1" name="technical-skills-50156-5[]" value="react"> React</label><label for="technical-skills-50156-5-cb-2"><input type="checkbox" id="technical-skills-50156-5-cb-2" name="technical-skills-50156-5[]" value="laravel"> Laravel</label><label for="technical-skills-50156-5-cb-3"><input type="checkbox" id="technical-skills-50156-5-cb-3" name="technical-skills-50156-5[]" value="sql"> SQL</label><label for="technical-skills-50156-5-cb-4"><input type="checkbox" id="technical-skills-50156-5-cb-4" name="technical-skills-50156-5[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50156">Attach resume (50156)</label><input type="file" id="file-50156" name="file-50156" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50156)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="conference">Conference</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="other">Other</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
