<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50150</title></head>
<body>
<main><h1>Mixed complex apply 50150</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50150">Legal name (50150)</label>
<input type="text" id="mix-name-50150" name="mix-name-50150" autocomplete="name">
<label for="mix-email-50150">Personal email (50150)</label>
<input type="email" id="mix-email-50150" name="mix-email-50150" autocomplete="email">
<label for="mix-phone-50150">Contact number (50150)</label>
<input type="tel" id="mix-phone-50150" name="mix-phone-50150" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50150">Tell us about yourself (50150)</label><textarea id="tell-us-about-yourself-50150" name="tell-us-about-yourself-50150" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50150-501">Preferred location (50150)</label><select id="preferred-location-50150-501" name="preferred-location-50150-501"><option value="">Choose one…</option><option value="london">London</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50150)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50150)</legend><label for="open-to-relocation-50150-0"><input type="radio" id="open-to-relocation-50150-0" name="open-to-relocation-50150" value="yes"> Yes</label><label for="open-to-relocation-50150-1"><input type="radio" id="open-to-relocation-50150-1" name="open-to-relocation-50150" value="no"> No</label><label for="open-to-relocation-50150-2"><input type="radio" id="open-to-relocation-50150-2" name="open-to-relocation-50150" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50150-50150">Expected salary (50150)</label><input type="number" id="expected-salary-50150-50150" name="expected-salary-50150-50150" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50150-50">Earliest start date (50150)</label><input type="date" id="earliest-start-date-50150-50" name="earliest-start-date-50150-50" ></div>
<div class="field-row"><label for="referral-source-50150-50150">Referral source (50150)</label><select id="referral-source-50150-50150" name="referral-source-50150-50150"><option value="">Choose one…</option><option value="other">Other</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="conference">Conference</option></select></div>
<fieldset><legend>Core competencies (50150)</legend><label for="core-competencies-50150--cb-0"><input type="checkbox" id="core-competencies-50150--cb-0" name="core-competencies-50150-[]" value="javascript"> JavaScript</label><label for="core-competencies-50150--cb-1"><input type="checkbox" id="core-competencies-50150--cb-1" name="core-competencies-50150-[]" value="laravel"> Laravel</label><label for="core-competencies-50150--cb-2"><input type="checkbox" id="core-competencies-50150--cb-2" name="core-competencies-50150-[]" value="sql"> SQL</label><label for="core-competencies-50150--cb-3"><input type="checkbox" id="core-competencies-50150--cb-3" name="core-competencies-50150-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50150">Attach resume (50150)</label><input type="file" id="file-50150" name="file-50150" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50150-50150">GitHub profile (50150)</label><input type="url" id="github-profile-50150-50150" name="github-profile-50150-50150" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
