<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9541</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9541</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9541">Complete name (9541)</label>
<input type="text" id="sr-name-9541" name="sr-name-9541" autocomplete="name">
<label for="sr-email-9541">Contact email (9541)</label>
<input type="email" id="sr-email-9541" name="sr-email-9541" autocomplete="email">
<label for="sr-phone-9541">Telephone (9541)</label>
<input type="tel" id="sr-phone-9541" name="sr-phone-9541" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="cover-letter-9541-9541">Cover letter (9541)</label><textarea id="cover-letter-9541-9541" name="cover-letter-9541-9541" rows="4" maxlength="500"></textarea></div>

<div class="field-row">
<span id="listbox-9541-lbl">Office preference (9541)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9541" aria-labelledby="listbox-9541-lbl" tabindex="0">Office preference (9541)</div>
<div role="listbox" id="listbox-9541" aria-labelledby="listbox-9541-lbl">
<div role="option" data-value="manchester">Manchester</div><div role="option" data-value="hybrid">Hybrid</div><div role="option" data-value="london">London</div><div role="option" data-value="berlin">Berlin</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
