<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Visa Application 1</title></head>
<body>
<main>
<h1>Visa Application 1</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="full-name">Full name</label><input type="text" id="full-name" name="full-name" ></div>
<div class="form-group"><label for="email-address">Email address</label><input type="email" id="email-address" name="email-address" ></div>
<fieldset><legend>Do you require visa sponsorship?</legend><label><input type="radio" name="do-you-require-visa-spon" id="do-you-require-visa-spon-0" value="yes"> Yes</label><label><input type="radio" name="do-you-require-visa-spon" id="do-you-require-visa-spon-1" value="no"> No</label><label><input type="radio" name="do-you-require-visa-spon" id="do-you-require-visa-spon-2" value="not-sure"> Not sure</label></fieldset>
<fieldset><legend>Are you legally authorized to work?</legend><label><input type="radio" name="are-you-legally-authoriz" id="are-you-legally-authoriz-0" value="yes"> Yes</label><label><input type="radio" name="are-you-legally-authoriz" id="are-you-legally-authoriz-1" value="no"> No</label></fieldset>

</form>
</main>
</body>
</html>
