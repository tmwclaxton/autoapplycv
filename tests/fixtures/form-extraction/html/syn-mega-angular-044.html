<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9204</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9204</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Preferred name (9204)</mat-label><label for="ang-name-9204">Preferred name (9204)</label><input matInput id="ang-name-9204" name="ang-name-9204" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Contact email (9204)</mat-label><label for="ang-email-9204">Contact email (9204)</label><input matInput id="ang-email-9204" name="ang-email-9204" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Contact number (9204)</mat-label><label for="ang-phone-9204">Contact number (9204)</label><input matInput id="ang-phone-9204" name="ang-phone-9204" type="tel"></mat-form-field>
<div class="field-row"><label for="personal-statement-9204-9204">Personal statement (9204)</label><textarea id="personal-statement-9204-9204" name="personal-statement-9204-9204" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-9204-9204">Office preference (9204)</label><select id="office-preference-9204-9204" name="office-preference-9204-9204"><option value="">Choose one…</option><option value="remote">Remote</option><option value="london">London</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
