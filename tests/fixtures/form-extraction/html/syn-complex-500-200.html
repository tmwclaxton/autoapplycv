<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50200</title></head>
<body>
<main><h1>Mixed complex apply 50200</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50200">Legal name (50200)</label>
<input type="text" id="mix-name-50200" name="mix-name-50200" autocomplete="name">
<label for="mix-email-50200">Work email (50200)</label>
<input type="email" id="mix-email-50200" name="mix-email-50200" autocomplete="email">
<label for="mix-phone-50200">Mobile number (50200)</label>
<input type="tel" id="mix-phone-50200" name="mix-phone-50200" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50200">Tell us about yourself (50200)</label><textarea id="tell-us-about-yourself-50200" name="tell-us-about-yourself-50200" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50200-502">Preferred location (50200)</label><select id="preferred-location-50200-502" name="preferred-location-50200-502"><option value="">Choose one…</option><option value="new-york">New York</option><option value="manchester">Manchester</option><option value="london">London</option><option value="remote">Remote</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50200)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50200)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50200-50">Desired base salary (50200)</label><input type="number" id="desired-base-salary-50200-50" name="desired-base-salary-50200-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50200-502">When can you start? (50200)</label><input type="date" id="when-can-you-start-50200-502" name="when-can-you-start-50200-502" ></div>
<div class="field-row"><label for="referral-source-50200-50200">Referral source (50200)</label><select id="referral-source-50200-50200" name="referral-source-50200-50200"><option value="">Choose one…</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="other">Other</option><option value="linkedin">LinkedIn</option></select></div>
<fieldset><legend>Key skills (50200)</legend><label for="key-skills-50200-50200-cb-0"><input type="checkbox" id="key-skills-50200-50200-cb-0" name="key-skills-50200-50200[]" value="react"> React</label><label for="key-skills-50200-50200-cb-1"><input type="checkbox" id="key-skills-50200-50200-cb-1" name="key-skills-50200-50200[]" value="go"> Go</label><label for="key-skills-50200-50200-cb-2"><input type="checkbox" id="key-skills-50200-50200-cb-2" name="key-skills-50200-50200[]" value="laravel"> Laravel</label><label for="key-skills-50200-50200-cb-3"><input type="checkbox" id="key-skills-50200-50200-cb-3" name="key-skills-50200-50200[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50200">Attach resume (50200)</label><input type="file" id="file-50200" name="file-50200" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50200-50200">Personal website (50200)</label><input type="url" id="personal-website-50200-50200" name="personal-website-50200-50200" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
