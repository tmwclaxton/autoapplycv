<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50126</title></head>
<body>
<main><h1>Wizard complex apply 50126</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50126">
<h2 id="wizard-contact-50126">Contact information</h2>

<label for="wiz-name-50126">Full name (50126)</label>
<input type="text" id="wiz-name-50126" name="wiz-name-50126" autocomplete="name">
<label for="wiz-email-50126">Contact email (50126)</label>
<input type="email" id="wiz-email-50126" name="wiz-email-50126" autocomplete="email">
<label for="wiz-phone-50126">Mobile number (50126)</label>
<input type="tel" id="wiz-phone-50126" name="wiz-phone-50126" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50126">
<h2 id="wizard-screen-50126">Screening questions</h2>
<div class="field-row"><label for="tell-us-about-yourself-50126">Tell us about yourself (50126)</label><textarea id="tell-us-about-yourself-50126" name="tell-us-about-yourself-50126" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="preferred-location-50126-501">Preferred location (50126)</label><select id="preferred-location-50126-501" name="preferred-location-50126-501"><option value="">Choose one…</option><option value="london">London</option><option value="new-york">New York</option><option value="remote">Remote</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Work authorization status (50126)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50126-50">Salary expectations (50126)</label><input type="number" id="salary-expectations-50126-50" name="salary-expectations-50126-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50126-">Start date preference (50126)</label><input type="date" id="start-date-preference-50126-" name="start-date-preference-50126-" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50126">
<h2 id="wizard-docs-50126">Documents and skills</h2>
<fieldset><legend>Technical skills (50126)</legend><label for="technical-skills-50126-5-cb-0"><input type="checkbox" id="technical-skills-50126-5-cb-0" name="technical-skills-50126-5[]" value="laravel"> Laravel</label><label for="technical-skills-50126-5-cb-1"><input type="checkbox" id="technical-skills-50126-5-cb-1" name="technical-skills-50126-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50126-5-cb-2"><input type="checkbox" id="technical-skills-50126-5-cb-2" name="technical-skills-50126-5[]" value="react"> React</label><label for="technical-skills-50126-5-cb-3"><input type="checkbox" id="technical-skills-50126-5-cb-3" name="technical-skills-50126-5[]" value="python"> Python</label><label for="technical-skills-50126-5-cb-4"><input type="checkbox" id="technical-skills-50126-5-cb-4" name="technical-skills-50126-5[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50126">Attach resume (50126)</label><input type="file" id="file-50126" name="file-50126" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="application-source-50126-501">Application source (50126)</label><select id="application-source-50126-501" name="application-source-50126-501"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="other">Other</option><option value="conference">Conference</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
