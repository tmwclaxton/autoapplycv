<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50188</title></head>
<body>
<main><h1>Mixed complex apply 50188</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50188">Applicant name (50188)</label>
<input type="text" id="mix-name-50188" name="mix-name-50188" autocomplete="name">
<label for="mix-email-50188">Work email (50188)</label>
<input type="email" id="mix-email-50188" name="mix-email-50188" autocomplete="email">
<label for="mix-phone-50188">Telephone (50188)</label>
<input type="tel" id="mix-phone-50188" name="mix-phone-50188" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50188">Tell us about yourself (50188)</label><textarea id="tell-us-about-yourself-50188" name="tell-us-about-yourself-50188" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50188-50188">Work location (50188)</label><select id="work-location-50188-50188" name="work-location-50188-50188"><option value="">Choose one…</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="london">London</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Work authorization status (50188)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50188)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-501">Compensation requirement (50188)</label><input type="number" id="compensation-requirement-501" name="compensation-requirement-501" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50188-50">Earliest start date (50188)</label><input type="date" id="earliest-start-date-50188-50" name="earliest-start-date-50188-50" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50188)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="other">Other</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option></select></div>
<fieldset><legend>Technical skills (50188)</legend><label for="technical-skills-50188-5-cb-0"><input type="checkbox" id="technical-skills-50188-5-cb-0" name="technical-skills-50188-5[]" value="rust"> Rust</label><label for="technical-skills-50188-5-cb-1"><input type="checkbox" id="technical-skills-50188-5-cb-1" name="technical-skills-50188-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50188-5-cb-2"><input type="checkbox" id="technical-skills-50188-5-cb-2" name="technical-skills-50188-5[]" value="go"> Go</label><label for="technical-skills-50188-5-cb-3"><input type="checkbox" id="technical-skills-50188-5-cb-3" name="technical-skills-50188-5[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50188">Attach resume (50188)</label><input type="file" id="file-50188" name="file-50188" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50188-5018">Work samples link (50188)</label><input type="url" id="work-samples-link-50188-5018" name="work-samples-link-50188-5018" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
