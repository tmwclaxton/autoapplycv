<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50346</title></head>
<body>
<main><h1>Wizard complex apply 50346</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50346">
<h2 id="wizard-contact-50346">Contact information</h2>

<label for="wiz-name-50346">Full name (50346)</label>
<input type="text" id="wiz-name-50346" name="wiz-name-50346" autocomplete="name">
<label for="wiz-email-50346">Work email (50346)</label>
<input type="email" id="wiz-email-50346" name="wiz-email-50346" autocomplete="email">
<label for="wiz-phone-50346">Contact number (50346)</label>
<input type="tel" id="wiz-phone-50346" name="wiz-phone-50346" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50346">
<h2 id="wizard-screen-50346">Screening questions</h2>
<div class="field-row"><label for="cover-letter-50346-50346">Cover letter (50346)</label><textarea id="cover-letter-50346-50346" name="cover-letter-50346-50346" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="current-city-50346-50346">Current city (50346)</label><select id="current-city-50346-50346" name="current-city-50346-50346"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option><option value="london">London</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50346)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-503">Compensation requirement (50346)</label><input type="number" id="compensation-requirement-503" name="compensation-requirement-503" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50346-50346">Available from (50346)</label><input type="date" id="available-from-50346-50346" name="available-from-50346-50346" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50346">
<h2 id="wizard-docs-50346">Documents and skills</h2>
<fieldset><legend>Key skills (50346)</legend><label for="key-skills-50346-50346-cb-0"><input type="checkbox" id="key-skills-50346-50346-cb-0" name="key-skills-50346-50346[]" value="javascript"> JavaScript</label><label for="key-skills-50346-50346-cb-1"><input type="checkbox" id="key-skills-50346-50346-cb-1" name="key-skills-50346-50346[]" value="laravel"> Laravel</label><label for="key-skills-50346-50346-cb-2"><input type="checkbox" id="key-skills-50346-50346-cb-2" name="key-skills-50346-50346[]" value="rust"> Rust</label><label for="key-skills-50346-50346-cb-3"><input type="checkbox" id="key-skills-50346-50346-cb-3" name="key-skills-50346-50346[]" value="typescript"> TypeScript</label><label for="key-skills-50346-50346-cb-4"><input type="checkbox" id="key-skills-50346-50346-cb-4" name="key-skills-50346-50346[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50346">Attach resume (50346)</label><input type="file" id="file-50346" name="file-50346" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="application-source-50346-503">Application source (50346)</label><select id="application-source-50346-503" name="application-source-50346-503"><option value="">Choose one…</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option><option value="job-board">Job board</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
