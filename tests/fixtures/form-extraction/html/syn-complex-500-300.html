<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50300</title></head>
<body>
<main><h1>Mixed complex apply 50300</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50300">Legal name (50300)</label>
<input type="text" id="mix-name-50300" name="mix-name-50300" autocomplete="name">
<label for="mix-email-50300">Personal email (50300)</label>
<input type="email" id="mix-email-50300" name="mix-email-50300" autocomplete="email">
<label for="mix-phone-50300">Phone number (50300)</label>
<input type="tel" id="mix-phone-50300" name="mix-phone-50300" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="why-this-role-50300-50300">Why this role? (50300)</label><textarea id="why-this-role-50300-50300" name="why-this-role-50300-50300" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50300-50300">Current city (50300)</label><select id="current-city-50300-50300" name="current-city-50300-50300"><option value="">Choose one…</option><option value="remote">Remote</option><option value="london">London</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Work authorization status (50300)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50300)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50300-50300">Expected salary (50300)</label><input type="number" id="expected-salary-50300-50300" name="expected-salary-50300-50300" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50300-50">Earliest start date (50300)</label><input type="date" id="earliest-start-date-50300-50" name="earliest-start-date-50300-50" ></div>
<div class="field-row"><label for="application-source-50300-503">Application source (50300)</label><select id="application-source-50300-503" name="application-source-50300-503"><option value="">Choose one…</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option><option value="company-site">Company site</option></select></div>
<fieldset><legend>Primary expertise (50300)</legend><label for="primary-expertise-50300--cb-0"><input type="checkbox" id="primary-expertise-50300--cb-0" name="primary-expertise-50300-[]" value="react"> React</label><label for="primary-expertise-50300--cb-1"><input type="checkbox" id="primary-expertise-50300--cb-1" name="primary-expertise-50300-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50300--cb-2"><input type="checkbox" id="primary-expertise-50300--cb-2" name="primary-expertise-50300-[]" value="sql"> SQL</label><label for="primary-expertise-50300--cb-3"><input type="checkbox" id="primary-expertise-50300--cb-3" name="primary-expertise-50300-[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50300">Attach resume (50300)</label><input type="file" id="file-50300" name="file-50300" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50300-50300">Portfolio URL (50300)</label><input type="url" id="portfolio-url-50300-50300" name="portfolio-url-50300-50300" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
