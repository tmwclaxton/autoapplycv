<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nested fieldsets 20346</title></head>
<body>
<main><h1>Nested fieldsets 20346</h1><form action="/apply" method="post">
<fieldset><legend>Personal details</legend>
<label for="ns-name-20346">Full name (20346)</label>
<input type="text" id="ns-name-20346" name="ns-name-20346" autocomplete="name">
<label for="ns-email-20346">Contact email (20346)</label>
<input type="email" id="ns-email-20346" name="ns-email-20346" autocomplete="email">
<label for="ns-phone-20346">Telephone (20346)</label>
<input type="tel" id="ns-phone-20346" name="ns-phone-20346" autocomplete="tel"></fieldset>
<fieldset><legend>Preferences</legend><div class="field-row"><label for="office-preference-20346-2034">Office preference (20346)</label><select id="office-preference-20346-2034" name="office-preference-20346-2034"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="london">London</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option></select></div></fieldset>
<fieldset><legend>Additional</legend><div class="field-row"><label for="tell-us-about-yourself-20346">Tell us about yourself (20346)</label><textarea id="tell-us-about-yourself-20346" name="tell-us-about-yourself-20346" rows="4" maxlength="400"></textarea></div></fieldset></form></main>
</body>
</html>
