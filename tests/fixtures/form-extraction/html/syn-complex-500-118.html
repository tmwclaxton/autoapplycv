<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50118</title></head>
<body>
<main><h1>Mixed complex apply 50118</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50118">Legal name (50118)</label>
<input type="text" id="mix-name-50118" name="mix-name-50118" autocomplete="name">
<label for="mix-email-50118">Email address (50118)</label>
<input type="email" id="mix-email-50118" name="mix-email-50118" autocomplete="email">
<label for="mix-phone-50118">Mobile number (50118)</label>
<input type="tel" id="mix-phone-50118" name="mix-phone-50118" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="personal-statement-50118-501">Personal statement (50118)</label><textarea id="personal-statement-50118-501" name="personal-statement-50118-501" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-50118-5011">Office preference (50118)</label><select id="office-preference-50118-5011" name="office-preference-50118-5011"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50118)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50118)</legend><label for="willing-to-relocate-5011-0"><input type="radio" id="willing-to-relocate-5011-0" name="willing-to-relocate-5011" value="yes"> Yes</label><label for="willing-to-relocate-5011-1"><input type="radio" id="willing-to-relocate-5011-1" name="willing-to-relocate-5011" value="no"> No</label><label for="willing-to-relocate-5011-2"><input type="radio" id="willing-to-relocate-5011-2" name="willing-to-relocate-5011" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50118-50">Desired base salary (50118)</label><input type="number" id="desired-base-salary-50118-50" name="desired-base-salary-50118-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50118-">Start date preference (50118)</label><input type="date" id="start-date-preference-50118-" name="start-date-preference-50118-" ></div>
<div class="field-row"><label for="referral-source-50118-50118">Referral source (50118)</label><select id="referral-source-50118-50118" name="referral-source-50118-50118"><option value="">Choose one…</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="other">Other</option></select></div>
<fieldset><legend>Core competencies (50118)</legend><label for="core-competencies-50118--cb-0"><input type="checkbox" id="core-competencies-50118--cb-0" name="core-competencies-50118-[]" value="typescript"> TypeScript</label><label for="core-competencies-50118--cb-1"><input type="checkbox" id="core-competencies-50118--cb-1" name="core-competencies-50118-[]" value="javascript"> JavaScript</label><label for="core-competencies-50118--cb-2"><input type="checkbox" id="core-competencies-50118--cb-2" name="core-competencies-50118-[]" value="laravel"> Laravel</label><label for="core-competencies-50118--cb-3"><input type="checkbox" id="core-competencies-50118--cb-3" name="core-competencies-50118-[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50118">Attach resume (50118)</label><input type="file" id="file-50118" name="file-50118" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50118-50118">Portfolio URL (50118)</label><input type="url" id="portfolio-url-50118-50118" name="portfolio-url-50118-50118" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
