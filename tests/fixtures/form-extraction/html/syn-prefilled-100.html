<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Prefilled Application 1</title></head>
<body>
<main>
<h1>Prefilled Application 1</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="prefilled-name">Full name</label><input type="text" id="prefilled-name" name="prefilled-name" value="Alex Morgan"></div>
<div class="form-group"><label for="email-address">Email address</label><input type="email" id="email-address" name="email-address" ></div>
<div class="form-group"><label for="phone-number">Phone number</label><input type="tel" id="phone-number" name="phone-number" ></div>
<div class="form-group"><label for="cover-letter">Cover letter</label><textarea id="cover-letter" name="cover-letter" rows="4" maxlength="400"></textarea></div>

</form>
</main>
</body>
</html>
