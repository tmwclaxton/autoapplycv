<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9908</title></head>
<body>
<main><h1>Grid layout 9908</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9908">Your name (9908)</label><span class="helper">Required</span><input id="grid-name-9908" name="grid-name-9908" type="text"></div>
<div><label for="grid-email-9908">Primary email (9908)</label><span class="helper">Required</span><input id="grid-email-9908" name="grid-email-9908" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9908">Cell phone (9908)</label><input id="grid-phone-9908" name="grid-phone-9908" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="why-this-role-9908-9908">Why this role? (9908)</label><textarea id="why-this-role-9908-9908" name="why-this-role-9908-9908" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Willing to relocate? (9908)</legend><label for="willing-to-relocate-9908-0"><input type="radio" id="willing-to-relocate-9908-0" name="willing-to-relocate-9908" value="yes"> Yes</label><label for="willing-to-relocate-9908-1"><input type="radio" id="willing-to-relocate-9908-1" name="willing-to-relocate-9908" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
