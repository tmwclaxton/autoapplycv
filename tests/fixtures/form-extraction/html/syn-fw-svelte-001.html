<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Svelte apply 1</title></head>
<body>
<main><h1>Svelte apply 1</h1><form action="/apply" method="post">
<div class="svelte-0000 application">
<div class="field svelte-0000"><label class="svelte-0000" for="sv-name">Full name</label><input class="svelte-0000" id="sv-name" name="sv-name" type="text" bind:value={name}></div>
<div class="field svelte-0000"><label class="svelte-0000" for="sv-email">Email address</label><input class="svelte-0000" id="sv-email" name="sv-email" type="email" bind:value={email}></div>
<div class="field svelte-0000"><label class="svelte-0000" for="sv-phone">Phone number</label><input class="svelte-0000" id="sv-phone" name="sv-phone" type="tel" bind:value={phone}></div>
<div class="field-row"><label for="cover-letter">Cover letter</label><textarea id="cover-letter" name="cover-letter" rows="4" maxlength="350" class="svelte-0000"></textarea></div>
<fieldset><legend>Open to relocation?</legend><label for="open-to-relocation-0"><input type="radio" id="open-to-relocation-0" name="open-to-relocation" value="yes"> Yes</label><label for="open-to-relocation-1"><input type="radio" id="open-to-relocation-1" name="open-to-relocation" value="no"> No</label></fieldset>
</div></form></main>
</body>
</html>
