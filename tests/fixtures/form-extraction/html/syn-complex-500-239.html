<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50239</title></head>
<body>
<main><h1>Long complex apply 50239</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50239">Your name (50239)</label>
<input type="text" id="long-name-50239" name="long-name-50239" autocomplete="name">
<label for="long-email-50239">Work email (50239)</label>
<input type="email" id="long-email-50239" name="long-email-50239" autocomplete="email">
<label for="long-phone-50239">Mobile number (50239)</label>
<input type="tel" id="long-phone-50239" name="long-phone-50239" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50239">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50239" name="linkedin-profile-url-50239" ></div>
<div class="field-row"><label for="current-employer-50239">Current employer</label><input type="text" id="current-employer-50239" name="current-employer-50239" ></div>
<div class="field-row"><label for="current-job-title-50239">Current job title</label><input type="text" id="current-job-title-50239" name="current-job-title-50239" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="cover-letter-50239-50239">Cover letter (50239)</label><textarea id="cover-letter-50239-50239" name="cover-letter-50239-50239" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="work-location-50239-50239">Work location (50239)</label><select id="work-location-50239-50239" name="work-location-50239-50239"><option value="">Choose one…</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50239)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50239)</legend><label for="open-to-relocation-50239-0"><input type="radio" id="open-to-relocation-50239-0" name="open-to-relocation-50239" value="yes"> Yes</label><label for="open-to-relocation-50239-1"><input type="radio" id="open-to-relocation-50239-1" name="open-to-relocation-50239" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50239-50239">Expected salary (50239)</label><input type="number" id="expected-salary-50239-50239" name="expected-salary-50239-50239" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50239-">Start date preference (50239)</label><input type="date" id="start-date-preference-50239-" name="start-date-preference-50239-" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50239)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="other">Other</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Technical skills (50239)</legend><label for="technical-skills-50239-5-cb-0"><input type="checkbox" id="technical-skills-50239-5-cb-0" name="technical-skills-50239-5[]" value="rust"> Rust</label><label for="technical-skills-50239-5-cb-1"><input type="checkbox" id="technical-skills-50239-5-cb-1" name="technical-skills-50239-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50239-5-cb-2"><input type="checkbox" id="technical-skills-50239-5-cb-2" name="technical-skills-50239-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50239-5-cb-3"><input type="checkbox" id="technical-skills-50239-5-cb-3" name="technical-skills-50239-5[]" value="python"> Python</label><label for="technical-skills-50239-5-cb-4"><input type="checkbox" id="technical-skills-50239-5-cb-4" name="technical-skills-50239-5[]" value="go"> Go</label><label for="technical-skills-50239-5-cb-5"><input type="checkbox" id="technical-skills-50239-5-cb-5" name="technical-skills-50239-5[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50239">Attach resume (50239)</label><input type="file" id="file-50239" name="file-50239" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
