<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50028</title></head>
<body>
<main><h1>Mixed complex apply 50028</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50028">Preferred name (50028)</label>
<input type="text" id="mix-name-50028" name="mix-name-50028" autocomplete="name">
<label for="mix-email-50028">Personal email (50028)</label>
<input type="email" id="mix-email-50028" name="mix-email-50028" autocomplete="email">
<label for="mix-phone-50028">Mobile number (50028)</label>
<input type="tel" id="mix-phone-50028" name="mix-phone-50028" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50028">Tell us about yourself (50028)</label><textarea id="tell-us-about-yourself-50028" name="tell-us-about-yourself-50028" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50028-50028">Current city (50028)</label><select id="current-city-50028-50028" name="current-city-50028-50028"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50028)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50028)</legend><label for="open-to-relocation-50028-0"><input type="radio" id="open-to-relocation-50028-0" name="open-to-relocation-50028" value="yes"> Yes</label><label for="open-to-relocation-50028-1"><input type="radio" id="open-to-relocation-50028-1" name="open-to-relocation-50028" value="no"> No</label><label for="open-to-relocation-50028-2"><input type="radio" id="open-to-relocation-50028-2" name="open-to-relocation-50028" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-500">Compensation requirement (50028)</label><input type="number" id="compensation-requirement-500" name="compensation-requirement-500" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50028-50028">Available from (50028)</label><input type="date" id="available-from-50028-50028" name="available-from-50028-50028" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50028)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="other">Other</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Primary expertise (50028)</legend><label for="primary-expertise-50028--cb-0"><input type="checkbox" id="primary-expertise-50028--cb-0" name="primary-expertise-50028-[]" value="laravel"> Laravel</label><label for="primary-expertise-50028--cb-1"><input type="checkbox" id="primary-expertise-50028--cb-1" name="primary-expertise-50028-[]" value="rust"> Rust</label><label for="primary-expertise-50028--cb-2"><input type="checkbox" id="primary-expertise-50028--cb-2" name="primary-expertise-50028-[]" value="sql"> SQL</label><label for="primary-expertise-50028--cb-3"><input type="checkbox" id="primary-expertise-50028--cb-3" name="primary-expertise-50028-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50028">Attach resume (50028)</label><input type="file" id="file-50028" name="file-50028" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50028-50028">Portfolio URL (50028)</label><input type="url" id="portfolio-url-50028-50028" name="portfolio-url-50028-50028" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
