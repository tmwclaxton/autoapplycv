<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9550</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9550</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9550">Applicant name (9550)</label>
<input type="text" id="sr-name-9550" name="sr-name-9550" autocomplete="name">
<label for="sr-email-9550">Contact email (9550)</label>
<input type="email" id="sr-email-9550" name="sr-email-9550" autocomplete="email">
<label for="sr-phone-9550">Mobile number (9550)</label>
<input type="tel" id="sr-phone-9550" name="sr-phone-9550" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="tell-us-about-yourself-9550-">Tell us about yourself (9550)</label><textarea id="tell-us-about-yourself-9550-" name="tell-us-about-yourself-9550-" rows="4" maxlength="500"></textarea></div>

<div class="field-row">
<span id="listbox-9550-lbl">Where are you based? (9550)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9550" aria-labelledby="listbox-9550-lbl" tabindex="0">Where are you based? (9550)</div>
<div role="listbox" id="listbox-9550" aria-labelledby="listbox-9550-lbl">
<div role="option" data-value="london">London</div><div role="option" data-value="berlin">Berlin</div><div role="option" data-value="hybrid">Hybrid</div><div role="option" data-value="remote">Remote</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
