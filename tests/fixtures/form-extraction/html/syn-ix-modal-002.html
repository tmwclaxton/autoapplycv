<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Dialog modal</title></head>
<body>
<main><h1>Dialog modal</h1><form action="/apply" method="post">
<label for="ix-name-21">Legal name</label>
<input type="text" id="ix-name-21" name="ix-name-21">
<label for="ix-email-21">Work email</label>
<input type="email" id="ix-email-21" name="ix-email-21">
<label for="ix-phone-21">Mobile number</label>
<input type="tel" id="ix-phone-21" name="ix-phone-21">
<button type="button" aria-haspopup="dialog" aria-controls="dialog-21" data-reveal="#dialog-21">Open modal</button>
<div id="dialog-21" role="dialog" hidden style="display:none">
<label for="dialog-field-21">Portfolio URL</label>
<input type="url" id="dialog-field-21" name="dialog-field-21">
</div></form></main>
</body>
</html>
