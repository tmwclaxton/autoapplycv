<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50099</title></head>
<body>
<main><h1>Long complex apply 50099</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50099">Full name (50099)</label>
<input type="text" id="long-name-50099" name="long-name-50099" autocomplete="name">
<label for="long-email-50099">Contact email (50099)</label>
<input type="email" id="long-email-50099" name="long-email-50099" autocomplete="email">
<label for="long-phone-50099">Contact number (50099)</label>
<input type="tel" id="long-phone-50099" name="long-phone-50099" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50099">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50099" name="linkedin-profile-url-50099" ></div>
<div class="field-row"><label for="current-employer-50099">Current employer</label><input type="text" id="current-employer-50099" name="current-employer-50099" ></div>
<div class="field-row"><label for="current-job-title-50099">Current job title</label><input type="text" id="current-job-title-50099" name="current-job-title-50099" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="why-this-role-50099-50099">Why this role? (50099)</label><textarea id="why-this-role-50099-50099" name="why-this-role-50099-50099" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="office-preference-50099-5009">Office preference (50099)</label><select id="office-preference-50099-5009" name="office-preference-50099-5009"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="london">London</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Work authorization status (50099)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50099)</legend><label for="open-to-relocation-50099-0"><input type="radio" id="open-to-relocation-50099-0" name="open-to-relocation-50099" value="yes"> Yes</label><label for="open-to-relocation-50099-1"><input type="radio" id="open-to-relocation-50099-1" name="open-to-relocation-50099" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50099-50099">Expected salary (50099)</label><input type="number" id="expected-salary-50099-50099" name="expected-salary-50099-50099" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50099-500">When can you start? (50099)</label><input type="date" id="when-can-you-start-50099-500" name="when-can-you-start-50099-500" ></div>
<div class="field-row"><label for="referral-source-50099-50099">Referral source (50099)</label><select id="referral-source-50099-50099" name="referral-source-50099-50099"><option value="">Choose one…</option><option value="other">Other</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Key skills (50099)</legend><label for="key-skills-50099-50099-cb-0"><input type="checkbox" id="key-skills-50099-50099-cb-0" name="key-skills-50099-50099[]" value="react"> React</label><label for="key-skills-50099-50099-cb-1"><input type="checkbox" id="key-skills-50099-50099-cb-1" name="key-skills-50099-50099[]" value="sql"> SQL</label><label for="key-skills-50099-50099-cb-2"><input type="checkbox" id="key-skills-50099-50099-cb-2" name="key-skills-50099-50099[]" value="typescript"> TypeScript</label><label for="key-skills-50099-50099-cb-3"><input type="checkbox" id="key-skills-50099-50099-cb-3" name="key-skills-50099-50099[]" value="laravel"> Laravel</label><label for="key-skills-50099-50099-cb-4"><input type="checkbox" id="key-skills-50099-50099-cb-4" name="key-skills-50099-50099[]" value="javascript"> JavaScript</label><label for="key-skills-50099-50099-cb-5"><input type="checkbox" id="key-skills-50099-50099-cb-5" name="key-skills-50099-50099[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50099">Attach resume (50099)</label><input type="file" id="file-50099" name="file-50099" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
