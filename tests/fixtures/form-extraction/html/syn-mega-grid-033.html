<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9933</title></head>
<body>
<main><h1>Grid layout 9933</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9933">Full name (9933)</label><span class="helper">Required</span><input id="grid-name-9933" name="grid-name-9933" type="text"></div>
<div><label for="grid-email-9933">Work email (9933)</label><span class="helper">Required</span><input id="grid-email-9933" name="grid-email-9933" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9933">Mobile number (9933)</label><input id="grid-phone-9933" name="grid-phone-9933" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="cover-letter-9933-9933">Cover letter (9933)</label><textarea id="cover-letter-9933-9933" name="cover-letter-9933-9933" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Relocation preference (9933)</legend><label for="relocation-preference-99-0"><input type="radio" id="relocation-preference-99-0" name="relocation-preference-99" value="yes"> Yes</label><label for="relocation-preference-99-1"><input type="radio" id="relocation-preference-99-1" name="relocation-preference-99" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
