<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Lever complex apply 50202</title></head>
<body>
<main><h1>Lever complex apply 50202</h1><form action="/apply" method="post">
<div class="application-form lever-form">
<section class="application-section" data-section="contact">
<h2 class="application-heading">Contact</h2>
<div class="application-field"><label class="application-label">Legal name (50202)</label><input name="lv-name-50202" type="text" id="lv-name-50202"></div>
<div class="application-field"><label class="application-label">Email address (50202)</label><input name="lv-email-50202" type="email" id="lv-email-50202"></div>
<div class="application-field"><label class="application-label">Telephone (50202)</label><input name="lv-phone-50202" type="tel" id="lv-phone-50202"></div>
</section>
<section class="application-section" data-section="questions">
<h2 class="application-heading">Questions</h2>
<div class="field-row"><label for="personal-statement-50202-502">Personal statement (50202)</label><textarea id="personal-statement-50202-502" name="personal-statement-50202-502" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50202-502">Preferred location (50202)</label><select id="preferred-location-50202-502" name="preferred-location-50202-502"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option><option value="london">London</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50202)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50202-50">Salary expectations (50202)</label><input type="number" id="salary-expectations-50202-50" name="salary-expectations-50202-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50202-50">Earliest start date (50202)</label><input type="date" id="earliest-start-date-50202-50" name="earliest-start-date-50202-50" ></div>
<fieldset><legend>Core competencies (50202)</legend><label for="core-competencies-50202--cb-0"><input type="checkbox" id="core-competencies-50202--cb-0" name="core-competencies-50202-[]" value="go"> Go</label><label for="core-competencies-50202--cb-1"><input type="checkbox" id="core-competencies-50202--cb-1" name="core-competencies-50202-[]" value="typescript"> TypeScript</label><label for="core-competencies-50202--cb-2"><input type="checkbox" id="core-competencies-50202--cb-2" name="core-competencies-50202-[]" value="sql"> SQL</label><label for="core-competencies-50202--cb-3"><input type="checkbox" id="core-competencies-50202--cb-3" name="core-competencies-50202-[]" value="laravel"> Laravel</label></fieldset>
<div class="field-row"><label for="application-source-50202-502">Application source (50202)</label><select id="application-source-50202-502" name="application-source-50202-502"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="other">Other</option></select></div>
</section>
<section class="application-section" data-section="documents">
<h2 class="application-heading">Documents</h2>
<div class="file-row"><label for="file-50202">Resume/CV (50202)</label><input type="file" id="file-50202" name="file-50202" accept=".pdf,.doc,.docx"></div>
<div class="file-row"><label for="file-cover-50202">Cover letter file (50202)</label><input type="file" id="file-cover-50202" name="file-cover-50202" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Submit application</button>
</div></form></main>
</body>
</html>
