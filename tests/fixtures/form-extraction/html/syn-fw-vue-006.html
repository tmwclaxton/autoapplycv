<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Vue scoped grid 6</title></head>
<body>
<main><h1>Vue scoped grid 6</h1><form action="/apply" method="post">
<div class="grid-form data-v-005" style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
<div class="col-span-2 data-v-005"><label for="g-name">Legal name</label><input id="g-name" name="g-name" type="text" data-v-005></div>
<div data-v-005><label for="g-email">Work email</label><input id="g-email" name="g-email" type="email" data-v-005></div>
<div data-v-005><label for="g-phone">Mobile number</label><input id="g-phone" name="g-phone" type="tel" data-v-005></div>
<div class="col-span-2 data-v-005"><div class="field-row"><label for="preferred-location">Preferred location</label><select id="preferred-location" name="preferred-location" ><option value="">Choose one…</option><option value="london">London</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option></select></div></div>
</div></form></main>
</body>
</html>
