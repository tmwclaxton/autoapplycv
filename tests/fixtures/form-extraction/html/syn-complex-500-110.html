<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50110</title></head>
<body>
<main><h1>Mixed complex apply 50110</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50110">Your name (50110)</label>
<input type="text" id="mix-name-50110" name="mix-name-50110" autocomplete="name">
<label for="mix-email-50110">Email address (50110)</label>
<input type="email" id="mix-email-50110" name="mix-email-50110" autocomplete="email">
<label for="mix-phone-50110">Mobile number (50110)</label>
<input type="tel" id="mix-phone-50110" name="mix-phone-50110" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50110">Tell us about yourself (50110)</label><textarea id="tell-us-about-yourself-50110" name="tell-us-about-yourself-50110" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-50110-5011">Office preference (50110)</label><select id="office-preference-50110-5011" name="office-preference-50110-5011"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="london">London</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50110)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50110)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50110-50">Salary expectations (50110)</label><input type="number" id="salary-expectations-50110-50" name="salary-expectations-50110-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50110-50110">Available from (50110)</label><input type="date" id="available-from-50110-50110" name="available-from-50110-50110" ></div>
<div class="field-row"><label for="application-source-50110-501">Application source (50110)</label><select id="application-source-50110-501" name="application-source-50110-501"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option><option value="conference">Conference</option></select></div>
<fieldset><legend>Key skills (50110)</legend><label for="key-skills-50110-50110-cb-0"><input type="checkbox" id="key-skills-50110-50110-cb-0" name="key-skills-50110-50110[]" value="python"> Python</label><label for="key-skills-50110-50110-cb-1"><input type="checkbox" id="key-skills-50110-50110-cb-1" name="key-skills-50110-50110[]" value="go"> Go</label><label for="key-skills-50110-50110-cb-2"><input type="checkbox" id="key-skills-50110-50110-cb-2" name="key-skills-50110-50110[]" value="javascript"> JavaScript</label><label for="key-skills-50110-50110-cb-3"><input type="checkbox" id="key-skills-50110-50110-cb-3" name="key-skills-50110-50110[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50110">Attach resume (50110)</label><input type="file" id="file-50110" name="file-50110" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50110-50110">Personal website (50110)</label><input type="url" id="personal-website-50110-50110" name="personal-website-50110-50110" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
