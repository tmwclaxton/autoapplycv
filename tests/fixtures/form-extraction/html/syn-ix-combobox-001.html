<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Combobox expand</title></head>
<body>
<main><h1>Combobox expand</h1><form action="/apply" method="post">
<label for="ix-name-5">Legal name</label>
<input type="text" id="ix-name-5" name="ix-name-5">
<label for="ix-email-5">Work email</label>
<input type="email" id="ix-email-5" name="ix-email-5">
<label for="ix-phone-5">Mobile number</label>
<input type="tel" id="ix-phone-5" name="ix-phone-5">
<div class="field-row">
<span id="listbox-hidden-5-lbl">Work location</span>
<button type="button" class="custom-dropdown-trigger" role="combobox" aria-expanded="false" aria-controls="listbox-hidden-5" aria-labelledby="listbox-hidden-5-lbl" data-reveal="#listbox-hidden-5">Select work location</button>
<div role="listbox" id="listbox-hidden-5" aria-labelledby="listbox-hidden-5-lbl" hidden style="display:none">
<div role="option" data-value="london">London</div>
<div role="option" data-value="remote">Remote</div>
<div role="option" data-value="hybrid">Hybrid</div>
<div role="option" data-value="berlin">Berlin</div>
</div>
</div></form></main>
</body>
</html>
