<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50270</title></head>
<body>
<main><h1>Mixed complex apply 50270</h1><form action="/apply" method="post">
<section class="mixed-contact">

<input type="text" id="mix-name-50270" name="mix-name-50270" autocomplete="name">
<label for="mix-email-50270">Work email (50270)</label>
<input type="email" id="mix-email-50270" name="mix-email-50270" autocomplete="email">

<div class="field-row"><label for="current-city-50270-50270">Current city (50270)</label><select id="current-city-50270-50270" name="current-city-50270-50270"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="london">London</option><option value="manchester">Manchester</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50270)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50270)</legend><label for="open-to-relocation-50270-0"><input type="radio" id="open-to-relocation-50270-0" name="open-to-relocation-50270" value="yes"> Yes</label><label for="open-to-relocation-50270-1"><input type="radio" id="open-to-relocation-50270-1" name="open-to-relocation-50270" value="no"> No</label><label for="open-to-relocation-50270-2"><input type="radio" id="open-to-relocation-50270-2" name="open-to-relocation-50270" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-502">Compensation requirement (50270)</label><input type="number" id="compensation-requirement-502" name="compensation-requirement-502" min="0" step="1000" placeholder="Annual amount"></div>

<div class="field-row"><label for="application-source-50270-502">Application source (50270)</label><select id="application-source-50270-502" name="application-source-50270-502"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="other">Other</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option></select></div>

<div class="file-row"><label for="file-50270">Attach resume (50270)</label><input type="file" id="file-50270" name="file-50270" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50270-50270">GitHub profile (50270)</label><input type="url" id="github-profile-50270-50270" name="github-profile-50270-50270" ></div>

<section class="mixed-consent">

</section>
</form></main>
</body>
</html>
