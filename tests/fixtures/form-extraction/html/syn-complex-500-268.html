<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50268</title></head>
<body>
<main><h1>Mixed complex apply 50268</h1><form action="/apply" method="post">

<fieldset><legend>Work authorization status (50268)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>

</section>
</form></main>

</html>
