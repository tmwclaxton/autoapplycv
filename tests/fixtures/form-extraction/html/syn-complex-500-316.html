<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50316</title></head>
<body>
<main><h1>Wizard complex apply 50316</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50316">
<h2 id="wizard-contact-50316">Contact information</h2>

<label for="wiz-name-50316">Preferred name (50316)</label>
<input type="text" id="wiz-name-50316" name="wiz-name-50316" autocomplete="name">
<label for="wiz-email-50316">Personal email (50316)</label>
<input type="email" id="wiz-email-50316" name="wiz-email-50316" autocomplete="email">
<label for="wiz-phone-50316">Mobile number (50316)</label>
<input type="tel" id="wiz-phone-50316" name="wiz-phone-50316" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50316">
<h2 id="wizard-screen-50316">Screening questions</h2>
<div class="field-row"><label for="personal-statement-50316-503">Personal statement (50316)</label><textarea id="personal-statement-50316-503" name="personal-statement-50316-503" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="current-city-50316-50316">Current city (50316)</label><select id="current-city-50316-50316" name="current-city-50316-50316"><option value="">Choose one…</option><option value="remote">Remote</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50316)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50316-50316">Expected salary (50316)</label><input type="number" id="expected-salary-50316-50316" name="expected-salary-50316-50316" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50316-">Start date preference (50316)</label><input type="date" id="start-date-preference-50316-" name="start-date-preference-50316-" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50316">
<h2 id="wizard-docs-50316">Documents and skills</h2>
<fieldset><legend>Core competencies (50316)</legend><label for="core-competencies-50316--cb-0"><input type="checkbox" id="core-competencies-50316--cb-0" name="core-competencies-50316-[]" value="go"> Go</label><label for="core-competencies-50316--cb-1"><input type="checkbox" id="core-competencies-50316--cb-1" name="core-competencies-50316-[]" value="react"> React</label><label for="core-competencies-50316--cb-2"><input type="checkbox" id="core-competencies-50316--cb-2" name="core-competencies-50316-[]" value="laravel"> Laravel</label><label for="core-competencies-50316--cb-3"><input type="checkbox" id="core-competencies-50316--cb-3" name="core-competencies-50316-[]" value="javascript"> JavaScript</label><label for="core-competencies-50316--cb-4"><input type="checkbox" id="core-competencies-50316--cb-4" name="core-competencies-50316-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50316">Attach resume (50316)</label><input type="file" id="file-50316" name="file-50316" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50316)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="conference">Conference</option><option value="other">Other</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
