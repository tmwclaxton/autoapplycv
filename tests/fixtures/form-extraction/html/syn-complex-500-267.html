<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50267</title></head>
<body>
<main><h1>Conditional complex apply 50267</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50267">
<p id="step1-label-50267">Step 1 - Contact</p>

<label for="cond-name-50267">Applicant name (50267)</label>
<input type="text" id="cond-name-50267" name="cond-name-50267" autocomplete="name">
<label for="cond-email-50267">Work email (50267)</label>
<input type="email" id="cond-email-50267" name="cond-email-50267" autocomplete="email">
<label for="cond-phone-50267">Mobile number (50267)</label>
<input type="tel" id="cond-phone-50267" name="cond-phone-50267" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50267">
<p id="step2-label-50267">Step 2 - Preferences</p>
<div class="field-row"><label for="office-preference-50267-5026">Office preference (50267)</label><select id="office-preference-50267-5026" name="office-preference-50267-5026"><option value="">Choose one…</option><option value="london">London</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Relocation preference (50267)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="start-date-preference-50267-">Start date preference (50267)</label><input type="date" id="start-date-preference-50267-" name="start-date-preference-50267-" ></div>
<fieldset><legend>Technical skills (50267)</legend><label for="technical-skills-50267-5-cb-0"><input type="checkbox" id="technical-skills-50267-5-cb-0" name="technical-skills-50267-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50267-5-cb-1"><input type="checkbox" id="technical-skills-50267-5-cb-1" name="technical-skills-50267-5[]" value="react"> React</label><label for="technical-skills-50267-5-cb-2"><input type="checkbox" id="technical-skills-50267-5-cb-2" name="technical-skills-50267-5[]" value="sql"> SQL</label><label for="technical-skills-50267-5-cb-3"><input type="checkbox" id="technical-skills-50267-5-cb-3" name="technical-skills-50267-5[]" value="rust"> Rust</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50267">
<p id="step3-label-50267">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50267" data-reveal="#reveal-50267">Show follow-up questions</button>
<div id="reveal-50267" hidden style="display:none"><div class="field-row"><label for="tell-us-about-yourself-50267">Tell us about yourself (50267)</label><textarea id="tell-us-about-yourself-50267" name="tell-us-about-yourself-50267" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="personal-website-50267-50267">Personal website (50267)</label><input type="url" id="personal-website-50267-50267" name="personal-website-50267-50267" ></div>
<div class="field-row"><label for="compensation-requirement-502">Compensation requirement (50267)</label><input type="number" id="compensation-requirement-502" name="compensation-requirement-502" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50267">Attach resume (50267)</label><input type="file" id="file-50267" name="file-50267" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
