<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50349</title></head>
<body>
<main><h1>Long complex apply 50349</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50349">Your name (50349)</label>
<input type="text" id="long-name-50349" name="long-name-50349" autocomplete="name">
<label for="long-email-50349">Work email (50349)</label>
<input type="email" id="long-email-50349" name="long-email-50349" autocomplete="email">
<label for="long-phone-50349">Telephone (50349)</label>
<input type="tel" id="long-phone-50349" name="long-phone-50349" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50349">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50349" name="linkedin-profile-url-50349" ></div>
<div class="field-row"><label for="current-employer-50349">Current employer</label><input type="text" id="current-employer-50349" name="current-employer-50349" ></div>
<div class="field-row"><label for="current-job-title-50349">Current job title</label><input type="text" id="current-job-title-50349" name="current-job-title-50349" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="motivation-statement-50349-5">Motivation statement (50349)</label><textarea id="motivation-statement-50349-5" name="motivation-statement-50349-5" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="current-city-50349-50349">Current city (50349)</label><select id="current-city-50349-50349" name="current-city-50349-50349"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Work authorization status (50349)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50349)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50349-50">Salary expectations (50349)</label><input type="number" id="salary-expectations-50349-50" name="salary-expectations-50349-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50349-503">When can you start? (50349)</label><input type="date" id="when-can-you-start-50349-503" name="when-can-you-start-50349-503" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50349)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="conference">Conference</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="company-site">Company site</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Technical skills (50349)</legend><label for="technical-skills-50349-5-cb-0"><input type="checkbox" id="technical-skills-50349-5-cb-0" name="technical-skills-50349-5[]" value="python"> Python</label><label for="technical-skills-50349-5-cb-1"><input type="checkbox" id="technical-skills-50349-5-cb-1" name="technical-skills-50349-5[]" value="sql"> SQL</label><label for="technical-skills-50349-5-cb-2"><input type="checkbox" id="technical-skills-50349-5-cb-2" name="technical-skills-50349-5[]" value="react"> React</label><label for="technical-skills-50349-5-cb-3"><input type="checkbox" id="technical-skills-50349-5-cb-3" name="technical-skills-50349-5[]" value="go"> Go</label><label for="technical-skills-50349-5-cb-4"><input type="checkbox" id="technical-skills-50349-5-cb-4" name="technical-skills-50349-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50349-5-cb-5"><input type="checkbox" id="technical-skills-50349-5-cb-5" name="technical-skills-50349-5[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50349">Attach resume (50349)</label><input type="file" id="file-50349" name="file-50349" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
