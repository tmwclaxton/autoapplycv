<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50146</title></head>
<body>
<main><h1>Wizard complex apply 50146</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50146">
<h2 id="wizard-contact-50146">Contact information</h2>

<label for="wiz-name-50146">Applicant name (50146)</label>
<input type="text" id="wiz-name-50146" name="wiz-name-50146" autocomplete="name">
<label for="wiz-email-50146">Email address (50146)</label>
<input type="email" id="wiz-email-50146" name="wiz-email-50146" autocomplete="email">
<label for="wiz-phone-50146">Contact number (50146)</label>
<input type="tel" id="wiz-phone-50146" name="wiz-phone-50146" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50146">
<h2 id="wizard-screen-50146">Screening questions</h2>
<div class="field-row"><label for="motivation-statement-50146-5">Motivation statement (50146)</label><textarea id="motivation-statement-50146-5" name="motivation-statement-50146-5" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="current-city-50146-50146">Current city (50146)</label><select id="current-city-50146-50146" name="current-city-50146-50146"><option value="">Choose one…</option><option value="remote">Remote</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Work authorization status (50146)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50146-50146">Expected salary (50146)</label><input type="number" id="expected-salary-50146-50146" name="expected-salary-50146-50146" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50146-501">When can you start? (50146)</label><input type="date" id="when-can-you-start-50146-501" name="when-can-you-start-50146-501" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50146">
<h2 id="wizard-docs-50146">Documents and skills</h2>
<fieldset><legend>Core competencies (50146)</legend><label for="core-competencies-50146--cb-0"><input type="checkbox" id="core-competencies-50146--cb-0" name="core-competencies-50146-[]" value="go"> Go</label><label for="core-competencies-50146--cb-1"><input type="checkbox" id="core-competencies-50146--cb-1" name="core-competencies-50146-[]" value="javascript"> JavaScript</label><label for="core-competencies-50146--cb-2"><input type="checkbox" id="core-competencies-50146--cb-2" name="core-competencies-50146-[]" value="react"> React</label><label for="core-competencies-50146--cb-3"><input type="checkbox" id="core-competencies-50146--cb-3" name="core-competencies-50146-[]" value="laravel"> Laravel</label><label for="core-competencies-50146--cb-4"><input type="checkbox" id="core-competencies-50146--cb-4" name="core-competencies-50146-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50146">Attach resume (50146)</label><input type="file" id="file-50146" name="file-50146" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="application-source-50146-501">Application source (50146)</label><select id="application-source-50146-501" name="application-source-50146-501"><option value="">Choose one…</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="other">Other</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
