<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50326</title></head>
<body>
<main><h1>Wizard complex apply 50326</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50326">
<h2 id="wizard-contact-50326">Contact information</h2>

<label for="wiz-name-50326">Preferred name (50326)</label>
<input type="text" id="wiz-name-50326" name="wiz-name-50326" autocomplete="name">
<label for="wiz-email-50326">Email address (50326)</label>
<input type="email" id="wiz-email-50326" name="wiz-email-50326" autocomplete="email">
<label for="wiz-phone-50326">Phone number (50326)</label>
<input type="tel" id="wiz-phone-50326" name="wiz-phone-50326" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50326">
<h2 id="wizard-screen-50326">Screening questions</h2>
<div class="field-row"><label for="personal-statement-50326-503">Personal statement (50326)</label><textarea id="personal-statement-50326-503" name="personal-statement-50326-503" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="work-location-50326-50326">Work location (50326)</label><select id="work-location-50326-50326" name="work-location-50326-50326"><option value="">Choose one…</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="london">London</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50326)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-503">Compensation requirement (50326)</label><input type="number" id="compensation-requirement-503" name="compensation-requirement-503" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50326-">Start date preference (50326)</label><input type="date" id="start-date-preference-50326-" name="start-date-preference-50326-" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50326">
<h2 id="wizard-docs-50326">Documents and skills</h2>
<fieldset><legend>Technical skills (50326)</legend><label for="technical-skills-50326-5-cb-0"><input type="checkbox" id="technical-skills-50326-5-cb-0" name="technical-skills-50326-5[]" value="react"> React</label><label for="technical-skills-50326-5-cb-1"><input type="checkbox" id="technical-skills-50326-5-cb-1" name="technical-skills-50326-5[]" value="sql"> SQL</label><label for="technical-skills-50326-5-cb-2"><input type="checkbox" id="technical-skills-50326-5-cb-2" name="technical-skills-50326-5[]" value="python"> Python</label><label for="technical-skills-50326-5-cb-3"><input type="checkbox" id="technical-skills-50326-5-cb-3" name="technical-skills-50326-5[]" value="go"> Go</label><label for="technical-skills-50326-5-cb-4"><input type="checkbox" id="technical-skills-50326-5-cb-4" name="technical-skills-50326-5[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50326">Attach resume (50326)</label><input type="file" id="file-50326" name="file-50326" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50326)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="referral">Referral</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
