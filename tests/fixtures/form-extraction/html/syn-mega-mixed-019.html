<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex 9999</title></head>
<body>
<main><h1>Mixed complex 9999</h1><form action="/apply" method="post">
<label for="mix-name-9999">Your name (9999)</label>
<input type="text" id="mix-name-9999" name="mix-name-9999" autocomplete="name">
<label for="mix-email-9999">Personal email (9999)</label>
<input type="email" id="mix-email-9999" name="mix-email-9999" autocomplete="email">
<label for="mix-phone-9999">Cell phone (9999)</label>
<input type="tel" id="mix-phone-9999" name="mix-phone-9999" autocomplete="tel">

<div class="field-row">
<span id="listbox-9999-lbl">Office preference (9999)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9999" aria-labelledby="listbox-9999-lbl" tabindex="0">Office preference (9999)</div>
<div role="listbox" id="listbox-9999" aria-labelledby="listbox-9999-lbl">
<div role="option" data-value="berlin">Berlin</div><div role="option" data-value="hybrid">Hybrid</div><div role="option" data-value="manchester">Manchester</div><div role="option" data-value="london">London</div>
</div>
</div>
<button type="button" data-reveal="#modal-9999" aria-haspopup="dialog" aria-controls="modal-9999">Add details</button>
<div id="modal-9999" role="dialog" hidden style="display:none">
<label for="modal-loc-9999">Portfolio URL (9999)</label>
<input type="url" id="modal-loc-9999" name="modal-loc-9999">
</div>
<div class="file-row"><label for="file-upload-9999">Attach resume (optional)</label><input type="file" id="file-upload-9999" name="file-upload-9999" accept=".pdf,.doc"></div></form></main>
</body>
</html>
