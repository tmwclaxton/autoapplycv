<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50299</title></head>
<body>
<main><h1>Long complex apply 50299</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50299">Full name (50299)</label>
<input type="text" id="long-name-50299" name="long-name-50299" autocomplete="name">
<label for="long-email-50299">Contact email (50299)</label>
<input type="email" id="long-email-50299" name="long-email-50299" autocomplete="email">
<label for="long-phone-50299">Contact number (50299)</label>
<input type="tel" id="long-phone-50299" name="long-phone-50299" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50299">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50299" name="linkedin-profile-url-50299" ></div>
<div class="field-row"><label for="current-employer-50299">Current employer</label><input type="text" id="current-employer-50299" name="current-employer-50299" ></div>
<div class="field-row"><label for="current-job-title-50299">Current job title</label><input type="text" id="current-job-title-50299" name="current-job-title-50299" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="why-this-role-50299-50299">Why this role? (50299)</label><textarea id="why-this-role-50299-50299" name="why-this-role-50299-50299" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="office-preference-50299-5029">Office preference (50299)</label><select id="office-preference-50299-5029" name="office-preference-50299-5029"><option value="">Choose one…</option><option value="new-york">New York</option><option value="remote">Remote</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50299)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50299)</legend><label for="open-to-relocation-50299-0"><input type="radio" id="open-to-relocation-50299-0" name="open-to-relocation-50299" value="yes"> Yes</label><label for="open-to-relocation-50299-1"><input type="radio" id="open-to-relocation-50299-1" name="open-to-relocation-50299" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50299-50">Desired base salary (50299)</label><input type="number" id="desired-base-salary-50299-50" name="desired-base-salary-50299-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50299-502">When can you start? (50299)</label><input type="date" id="when-can-you-start-50299-502" name="when-can-you-start-50299-502" ></div>
<div class="field-row"><label for="application-source-50299-502">Application source (50299)</label><select id="application-source-50299-502" name="application-source-50299-502"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="referral">Referral</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Technical skills (50299)</legend><label for="technical-skills-50299-5-cb-0"><input type="checkbox" id="technical-skills-50299-5-cb-0" name="technical-skills-50299-5[]" value="laravel"> Laravel</label><label for="technical-skills-50299-5-cb-1"><input type="checkbox" id="technical-skills-50299-5-cb-1" name="technical-skills-50299-5[]" value="go"> Go</label><label for="technical-skills-50299-5-cb-2"><input type="checkbox" id="technical-skills-50299-5-cb-2" name="technical-skills-50299-5[]" value="sql"> SQL</label><label for="technical-skills-50299-5-cb-3"><input type="checkbox" id="technical-skills-50299-5-cb-3" name="technical-skills-50299-5[]" value="python"> Python</label><label for="technical-skills-50299-5-cb-4"><input type="checkbox" id="technical-skills-50299-5-cb-4" name="technical-skills-50299-5[]" value="rust"> Rust</label><label for="technical-skills-50299-5-cb-5"><input type="checkbox" id="technical-skills-50299-5-cb-5" name="technical-skills-50299-5[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50299">Attach resume (50299)</label><input type="file" id="file-50299" name="file-50299" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
