<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Apply — Your name</title></head>
<body>
<main>
<h1>Apply — Your name</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="your-name">Your name</label><input type="text" id="your-name" name="your-name" ></div>
<div class="form-group"><label for="contact-email">Contact email</label><input type="email" id="contact-email" name="contact-email" ></div>
<div class="form-group"><label for="telephone">Telephone</label><input type="tel" id="telephone" name="telephone" ></div>
<div class="form-group"><label for="linkedin-profile">LinkedIn profile</label><input type="url" id="linkedin-profile" name="linkedin-profile" ></div>

</form>
</main>
</body>
</html>
