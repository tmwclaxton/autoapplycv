<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Teamtailor apply 20026</title></head>
<body>

<main class="careers-page"><h1 class="job-title">Apply — Role 20026</h1>
<form class="apply-form" action="/apply" method="post" data-teamtailor-form="application">
<section class="form-section" data-section="personal">

<div class="form-group"><label class="form-label" for="tt-name-20026">Legal name (20026)</label>
</div><input class="form-control" type="text" id="tt-name-20026" name="tt-name-20026" autocomplete="name">
<div class="form-group"><label class="form-label" for="tt-email-20026">Personal email (20026)</label>
</div><input class="form-control" type="email" id="tt-email-20026" name="tt-email-20026" autocomplete="email">
<div class="form-group"><label class="form-label" for="tt-phone-20026">Mobile number (20026)</label>
</div><input class="form-control" type="tel" id="tt-phone-20026" name="tt-phone-20026" autocomplete="tel">
</section>
<section class="form-section" data-section="questions">
<div class="field-row"><label for="tell-us-about-yourself-20026">Tell us about yourself (20026)</label><textarea id="tell-us-about-yourself-20026" name="tell-us-about-yourself-20026" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-20026-20026">Work location (20026)</label><select id="work-location-20026-20026" name="work-location-20026-20026"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="london">London</option></select></div>
<fieldset><legend>Work authorization status (20026)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
</section>
<div class="file-row"><label for="file-20026">Attach resume (optional)</label><input type="file" id="file-20026" name="file-20026" accept=".pdf,.doc"></div>
<button type="submit" class="btn btn-primary">Submit application</button>
</form></main>
</body>
</html>
