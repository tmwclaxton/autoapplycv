<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50357</title></head>
<body>
<main><h1>Conditional complex apply 50357</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50357">
<p id="step1-label-50357">Step 1 - Contact</p>

<label for="cond-name-50357">Full name (50357)</label>
<input type="text" id="cond-name-50357" name="cond-name-50357" autocomplete="name">
<label for="cond-email-50357">Email address (50357)</label>
<input type="email" id="cond-email-50357" name="cond-email-50357" autocomplete="email">
<label for="cond-phone-50357">Contact number (50357)</label>
<input type="tel" id="cond-phone-50357" name="cond-phone-50357" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50357">
<p id="step2-label-50357">Step 2 - Preferences</p>
<div class="field-row"><label for="preferred-location-50357-503">Preferred location (50357)</label><select id="preferred-location-50357-503" name="preferred-location-50357-503"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Open to relocation? (50357)</legend><label for="open-to-relocation-50357-0"><input type="radio" id="open-to-relocation-50357-0" name="open-to-relocation-50357" value="yes"> Yes</label><label for="open-to-relocation-50357-1"><input type="radio" id="open-to-relocation-50357-1" name="open-to-relocation-50357" value="no"> No</label><label for="open-to-relocation-50357-2"><input type="radio" id="open-to-relocation-50357-2" name="open-to-relocation-50357" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="available-from-50357-50357">Available from (50357)</label><input type="date" id="available-from-50357-50357" name="available-from-50357-50357" ></div>
<fieldset><legend>Key skills (50357)</legend><label for="key-skills-50357-50357-cb-0"><input type="checkbox" id="key-skills-50357-50357-cb-0" name="key-skills-50357-50357[]" value="javascript"> JavaScript</label><label for="key-skills-50357-50357-cb-1"><input type="checkbox" id="key-skills-50357-50357-cb-1" name="key-skills-50357-50357[]" value="go"> Go</label><label for="key-skills-50357-50357-cb-2"><input type="checkbox" id="key-skills-50357-50357-cb-2" name="key-skills-50357-50357[]" value="typescript"> TypeScript</label><label for="key-skills-50357-50357-cb-3"><input type="checkbox" id="key-skills-50357-50357-cb-3" name="key-skills-50357-50357[]" value="laravel"> Laravel</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50357">
<p id="step3-label-50357">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50357" data-reveal="#reveal-50357">Show follow-up questions</button>
<div id="reveal-50357" hidden style="display:none"><div class="field-row"><label for="motivation-statement-50357-5">Motivation statement (50357)</label><textarea id="motivation-statement-50357-5" name="motivation-statement-50357-5" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="github-profile-50357-50357">GitHub profile (50357)</label><input type="url" id="github-profile-50357-50357" name="github-profile-50357-50357" ></div>
<div class="field-row"><label for="expected-salary-50357-50357">Expected salary (50357)</label><input type="number" id="expected-salary-50357-50357" name="expected-salary-50357-50357" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50357">Attach resume (50357)</label><input type="file" id="file-50357" name="file-50357" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
