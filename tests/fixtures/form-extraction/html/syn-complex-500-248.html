<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50248</title></head>
<body>
<main><h1>Mixed complex apply 50248</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50248">Applicant name (50248)</label>
<input type="text" id="mix-name-50248" name="mix-name-50248" autocomplete="name">
<label for="mix-email-50248">Work email (50248)</label>
<input type="email" id="mix-email-50248" name="mix-email-50248" autocomplete="email">
<label for="mix-phone-50248">Telephone (50248)</label>
<input type="tel" id="mix-phone-50248" name="mix-phone-50248" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="why-this-role-50248-50248">Why this role? (50248)</label><textarea id="why-this-role-50248-50248" name="why-this-role-50248-50248" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50248-50248">Work location (50248)</label><select id="work-location-50248-50248" name="work-location-50248-50248"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="london">London</option><option value="new-york">New York</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Work authorization status (50248)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50248)</legend><label for="open-to-relocation-50248-0"><input type="radio" id="open-to-relocation-50248-0" name="open-to-relocation-50248" value="yes"> Yes</label><label for="open-to-relocation-50248-1"><input type="radio" id="open-to-relocation-50248-1" name="open-to-relocation-50248" value="no"> No</label><label for="open-to-relocation-50248-2"><input type="radio" id="open-to-relocation-50248-2" name="open-to-relocation-50248" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50248-50">Desired base salary (50248)</label><input type="number" id="desired-base-salary-50248-50" name="desired-base-salary-50248-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50248-502">When can you start? (50248)</label><input type="date" id="when-can-you-start-50248-502" name="when-can-you-start-50248-502" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50248)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="conference">Conference</option></select></div>
<fieldset><legend>Key skills (50248)</legend><label for="key-skills-50248-50248-cb-0"><input type="checkbox" id="key-skills-50248-50248-cb-0" name="key-skills-50248-50248[]" value="python"> Python</label><label for="key-skills-50248-50248-cb-1"><input type="checkbox" id="key-skills-50248-50248-cb-1" name="key-skills-50248-50248[]" value="sql"> SQL</label><label for="key-skills-50248-50248-cb-2"><input type="checkbox" id="key-skills-50248-50248-cb-2" name="key-skills-50248-50248[]" value="react"> React</label><label for="key-skills-50248-50248-cb-3"><input type="checkbox" id="key-skills-50248-50248-cb-3" name="key-skills-50248-50248[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50248">Attach resume (50248)</label><input type="file" id="file-50248" name="file-50248" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50248-50248">GitHub profile (50248)</label><input type="url" id="github-profile-50248-50248" name="github-profile-50248-50248" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
