<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50408</title></head>
<body>
<main><h1>Mixed complex apply 50408</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50408">Applicant name (50408)</label>
<input type="text" id="mix-name-50408" name="mix-name-50408" autocomplete="name">
<label for="mix-email-50408">Personal email (50408)</label>
<input type="email" id="mix-email-50408" name="mix-email-50408" autocomplete="email">
<label for="mix-phone-50408">Contact number (50408)</label>
<input type="tel" id="mix-phone-50408" name="mix-phone-50408" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="personal-statement-50408-504">Personal statement (50408)</label><textarea id="personal-statement-50408-504" name="personal-statement-50408-504" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50408-50408">Work location (50408)</label><select id="work-location-50408-50408" name="work-location-50408-50408"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50408)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50408)</legend><label for="willing-to-relocate-5040-0"><input type="radio" id="willing-to-relocate-5040-0" name="willing-to-relocate-5040" value="yes"> Yes</label><label for="willing-to-relocate-5040-1"><input type="radio" id="willing-to-relocate-5040-1" name="willing-to-relocate-5040" value="no"> No</label><label for="willing-to-relocate-5040-2"><input type="radio" id="willing-to-relocate-5040-2" name="willing-to-relocate-5040" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-504">Compensation requirement (50408)</label><input type="number" id="compensation-requirement-504" name="compensation-requirement-504" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50408-50">Earliest start date (50408)</label><input type="date" id="earliest-start-date-50408-50" name="earliest-start-date-50408-50" ></div>
<div class="field-row"><label for="application-source-50408-504">Application source (50408)</label><select id="application-source-50408-504" name="application-source-50408-504"><option value="">Choose one…</option><option value="other">Other</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Technical skills (50408)</legend><label for="technical-skills-50408-5-cb-0"><input type="checkbox" id="technical-skills-50408-5-cb-0" name="technical-skills-50408-5[]" value="rust"> Rust</label><label for="technical-skills-50408-5-cb-1"><input type="checkbox" id="technical-skills-50408-5-cb-1" name="technical-skills-50408-5[]" value="sql"> SQL</label><label for="technical-skills-50408-5-cb-2"><input type="checkbox" id="technical-skills-50408-5-cb-2" name="technical-skills-50408-5[]" value="python"> Python</label><label for="technical-skills-50408-5-cb-3"><input type="checkbox" id="technical-skills-50408-5-cb-3" name="technical-skills-50408-5[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50408">Attach resume (50408)</label><input type="file" id="file-50408" name="file-50408" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50408-50408">Portfolio URL (50408)</label><input type="url" id="portfolio-url-50408-50408" name="portfolio-url-50408-50408" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
