<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50149</title></head>
<body>
<main><h1>Long complex apply 50149</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50149">Legal name (50149)</label>
<input type="text" id="long-name-50149" name="long-name-50149" autocomplete="name">
<label for="long-email-50149">Work email (50149)</label>
<input type="email" id="long-email-50149" name="long-email-50149" autocomplete="email">
<label for="long-phone-50149">Mobile number (50149)</label>
<input type="tel" id="long-phone-50149" name="long-phone-50149" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50149">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50149" name="linkedin-profile-url-50149" ></div>
<div class="field-row"><label for="current-employer-50149">Current employer</label><input type="text" id="current-employer-50149" name="current-employer-50149" ></div>
<div class="field-row"><label for="current-job-title-50149">Current job title</label><input type="text" id="current-job-title-50149" name="current-job-title-50149" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="cover-letter-50149-50149">Cover letter (50149)</label><textarea id="cover-letter-50149-50149" name="cover-letter-50149-50149" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="office-preference-50149-5014">Office preference (50149)</label><select id="office-preference-50149-5014" name="office-preference-50149-5014"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="london">London</option><option value="manchester">Manchester</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50149)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50149)</legend><label for="open-to-relocation-50149-0"><input type="radio" id="open-to-relocation-50149-0" name="open-to-relocation-50149" value="yes"> Yes</label><label for="open-to-relocation-50149-1"><input type="radio" id="open-to-relocation-50149-1" name="open-to-relocation-50149" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-501">Compensation requirement (50149)</label><input type="number" id="compensation-requirement-501" name="compensation-requirement-501" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50149-">Start date preference (50149)</label><input type="date" id="start-date-preference-50149-" name="start-date-preference-50149-" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50149)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="referral">Referral</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Core competencies (50149)</legend><label for="core-competencies-50149--cb-0"><input type="checkbox" id="core-competencies-50149--cb-0" name="core-competencies-50149-[]" value="typescript"> TypeScript</label><label for="core-competencies-50149--cb-1"><input type="checkbox" id="core-competencies-50149--cb-1" name="core-competencies-50149-[]" value="react"> React</label><label for="core-competencies-50149--cb-2"><input type="checkbox" id="core-competencies-50149--cb-2" name="core-competencies-50149-[]" value="python"> Python</label><label for="core-competencies-50149--cb-3"><input type="checkbox" id="core-competencies-50149--cb-3" name="core-competencies-50149-[]" value="laravel"> Laravel</label><label for="core-competencies-50149--cb-4"><input type="checkbox" id="core-competencies-50149--cb-4" name="core-competencies-50149-[]" value="go"> Go</label><label for="core-competencies-50149--cb-5"><input type="checkbox" id="core-competencies-50149--cb-5" name="core-competencies-50149-[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50149">Attach resume (50149)</label><input type="file" id="file-50149" name="file-50149" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
