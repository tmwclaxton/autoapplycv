<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50209</title></head>
<body>
<main><h1>Long complex apply 50209</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50209">Legal name (50209)</label>
<input type="text" id="long-name-50209" name="long-name-50209" autocomplete="name">
<label for="long-email-50209">Email address (50209)</label>
<input type="email" id="long-email-50209" name="long-email-50209" autocomplete="email">
<label for="long-phone-50209">Phone number (50209)</label>
<input type="tel" id="long-phone-50209" name="long-phone-50209" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50209">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50209" name="linkedin-profile-url-50209" ></div>
<div class="field-row"><label for="current-employer-50209">Current employer</label><input type="text" id="current-employer-50209" name="current-employer-50209" ></div>
<div class="field-row"><label for="current-job-title-50209">Current job title</label><input type="text" id="current-job-title-50209" name="current-job-title-50209" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="motivation-statement-50209-5">Motivation statement (50209)</label><textarea id="motivation-statement-50209-5" name="motivation-statement-50209-5" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="current-city-50209-50209">Current city (50209)</label><select id="current-city-50209-50209" name="current-city-50209-50209"><option value="">Choose one…</option><option value="london">London</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Work authorization status (50209)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50209)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-502">Compensation requirement (50209)</label><input type="number" id="compensation-requirement-502" name="compensation-requirement-502" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50209-502">When can you start? (50209)</label><input type="date" id="when-can-you-start-50209-502" name="when-can-you-start-50209-502" ></div>
<div class="field-row"><label for="referral-source-50209-50209">Referral source (50209)</label><select id="referral-source-50209-50209" name="referral-source-50209-50209"><option value="">Choose one…</option><option value="other">Other</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Technical skills (50209)</legend><label for="technical-skills-50209-5-cb-0"><input type="checkbox" id="technical-skills-50209-5-cb-0" name="technical-skills-50209-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50209-5-cb-1"><input type="checkbox" id="technical-skills-50209-5-cb-1" name="technical-skills-50209-5[]" value="react"> React</label><label for="technical-skills-50209-5-cb-2"><input type="checkbox" id="technical-skills-50209-5-cb-2" name="technical-skills-50209-5[]" value="laravel"> Laravel</label><label for="technical-skills-50209-5-cb-3"><input type="checkbox" id="technical-skills-50209-5-cb-3" name="technical-skills-50209-5[]" value="rust"> Rust</label><label for="technical-skills-50209-5-cb-4"><input type="checkbox" id="technical-skills-50209-5-cb-4" name="technical-skills-50209-5[]" value="sql"> SQL</label><label for="technical-skills-50209-5-cb-5"><input type="checkbox" id="technical-skills-50209-5-cb-5" name="technical-skills-50209-5[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50209">Attach resume (50209)</label><input type="file" id="file-50209" name="file-50209" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
