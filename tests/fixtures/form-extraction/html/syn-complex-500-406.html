<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50406</title></head>
<body>
<main><h1>Wizard complex apply 50406</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50406">
<h2 id="wizard-contact-50406">Contact information</h2>

<label for="wiz-name-50406">Your name (50406)</label>
<input type="text" id="wiz-name-50406" name="wiz-name-50406" autocomplete="name">
<label for="wiz-email-50406">Personal email (50406)</label>
<input type="email" id="wiz-email-50406" name="wiz-email-50406" autocomplete="email">
<label for="wiz-phone-50406">Contact number (50406)</label>
<input type="tel" id="wiz-phone-50406" name="wiz-phone-50406" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50406">
<h2 id="wizard-screen-50406">Screening questions</h2>
<div class="field-row"><label for="cover-letter-50406-50406">Cover letter (50406)</label><textarea id="cover-letter-50406-50406" name="cover-letter-50406-50406" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="work-location-50406-50406">Work location (50406)</label><select id="work-location-50406-50406" name="work-location-50406-50406"><option value="">Choose one…</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50406)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50406-50">Desired base salary (50406)</label><input type="number" id="desired-base-salary-50406-50" name="desired-base-salary-50406-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50406-504">When can you start? (50406)</label><input type="date" id="when-can-you-start-50406-504" name="when-can-you-start-50406-504" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50406">
<h2 id="wizard-docs-50406">Documents and skills</h2>
<fieldset><legend>Core competencies (50406)</legend><label for="core-competencies-50406--cb-0"><input type="checkbox" id="core-competencies-50406--cb-0" name="core-competencies-50406-[]" value="rust"> Rust</label><label for="core-competencies-50406--cb-1"><input type="checkbox" id="core-competencies-50406--cb-1" name="core-competencies-50406-[]" value="sql"> SQL</label><label for="core-competencies-50406--cb-2"><input type="checkbox" id="core-competencies-50406--cb-2" name="core-competencies-50406-[]" value="go"> Go</label><label for="core-competencies-50406--cb-3"><input type="checkbox" id="core-competencies-50406--cb-3" name="core-competencies-50406-[]" value="laravel"> Laravel</label><label for="core-competencies-50406--cb-4"><input type="checkbox" id="core-competencies-50406--cb-4" name="core-competencies-50406-[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50406">Attach resume (50406)</label><input type="file" id="file-50406" name="file-50406" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="referral-source-50406-50406">Referral source (50406)</label><select id="referral-source-50406-50406" name="referral-source-50406-50406"><option value="">Choose one…</option><option value="other">Other</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option><option value="job-board">Job board</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
