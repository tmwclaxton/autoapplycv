<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters complex apply 50404</title></head>
<body>

<main data-sr-application="true"><h1>Apply 50404</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">
<h2>Contact information</h2>

<label for="sr-name-50404">Preferred name (50404)</label>
<input type="text" id="sr-name-50404" name="sr-name-50404" autocomplete="name">
<label for="sr-email-50404">Contact email (50404)</label>
<input type="email" id="sr-email-50404" name="sr-email-50404" autocomplete="email">
<label for="sr-phone-50404">Contact number (50404)</label>
<input type="tel" id="sr-phone-50404" name="sr-phone-50404" autocomplete="tel">
</section>
<section class="sr-section" data-section="experience">
<h2>Experience and motivation</h2>
<div class="field-row"><label for="tell-us-about-yourself-50404">Tell us about yourself (50404)</label><textarea id="tell-us-about-yourself-50404" name="tell-us-about-yourself-50404" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="personal-website-50404-50404">Personal website (50404)</label><input type="url" id="personal-website-50404-50404" name="personal-website-50404-50404" ></div>
</section>
<section class="sr-section" data-section="preferences">
<h2>Preferences</h2>
<div class="field-row"><label for="office-preference-50404-5040">Office preference (50404)</label><select id="office-preference-50404-5040" name="office-preference-50404-5040"><option value="">Choose one…</option><option value="new-york">New York</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50404)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-504">Compensation requirement (50404)</label><input type="number" id="compensation-requirement-504" name="compensation-requirement-504" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50404-">Start date preference (50404)</label><input type="date" id="start-date-preference-50404-" name="start-date-preference-50404-" ></div>
<fieldset><legend>Technical skills (50404)</legend><label for="technical-skills-50404-5-cb-0"><input type="checkbox" id="technical-skills-50404-5-cb-0" name="technical-skills-50404-5[]" value="sql"> SQL</label><label for="technical-skills-50404-5-cb-1"><input type="checkbox" id="technical-skills-50404-5-cb-1" name="technical-skills-50404-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50404-5-cb-2"><input type="checkbox" id="technical-skills-50404-5-cb-2" name="technical-skills-50404-5[]" value="react"> React</label><label for="technical-skills-50404-5-cb-3"><input type="checkbox" id="technical-skills-50404-5-cb-3" name="technical-skills-50404-5[]" value="laravel"> Laravel</label></fieldset>
</section>
<section class="sr-section" data-section="documents">
<h2>Documents</h2>
<div class="file-row"><label for="file-50404">Attach resume (50404)</label><input type="file" id="file-50404" name="file-50404" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
