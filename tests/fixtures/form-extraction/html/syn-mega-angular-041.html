<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9201</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9201</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Applicant name (9201)</mat-label><label for="ang-name-9201">Applicant name (9201)</label><input matInput id="ang-name-9201" name="ang-name-9201" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Email address (9201)</mat-label><label for="ang-email-9201">Email address (9201)</label><input matInput id="ang-email-9201" name="ang-email-9201" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Phone number (9201)</mat-label><label for="ang-phone-9201">Phone number (9201)</label><input matInput id="ang-phone-9201" name="ang-phone-9201" type="tel"></mat-form-field>
<div class="field-row"><label for="tell-us-about-yourself-9201-">Tell us about yourself (9201)</label><textarea id="tell-us-about-yourself-9201-" name="tell-us-about-yourself-9201-" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-9201-9201">Office preference (9201)</label><select id="office-preference-9201-9201" name="office-preference-9201-9201"><option value="">Choose one…</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option><option value="london">London</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
