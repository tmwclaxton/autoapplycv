<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50098</title></head>
<body>
<main><h1>Mixed complex apply 50098</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50098">Your name (50098)</label>
<input type="text" id="mix-name-50098" name="mix-name-50098" autocomplete="name">
<label for="mix-email-50098">Contact email (50098)</label>
<input type="email" id="mix-email-50098" name="mix-email-50098" autocomplete="email">
<label for="mix-phone-50098">Telephone (50098)</label>
<input type="tel" id="mix-phone-50098" name="mix-phone-50098" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50098-50098">Cover letter (50098)</label><textarea id="cover-letter-50098-50098" name="cover-letter-50098-50098" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50098-500">Preferred location (50098)</label><select id="preferred-location-50098-500" name="preferred-location-50098-500"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Work authorization status (50098)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50098)</legend><label for="willing-to-relocate-5009-0"><input type="radio" id="willing-to-relocate-5009-0" name="willing-to-relocate-5009" value="yes"> Yes</label><label for="willing-to-relocate-5009-1"><input type="radio" id="willing-to-relocate-5009-1" name="willing-to-relocate-5009" value="no"> No</label><label for="willing-to-relocate-5009-2"><input type="radio" id="willing-to-relocate-5009-2" name="willing-to-relocate-5009" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50098-50">Desired base salary (50098)</label><input type="number" id="desired-base-salary-50098-50" name="desired-base-salary-50098-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50098-50098">Available from (50098)</label><input type="date" id="available-from-50098-50098" name="available-from-50098-50098" ></div>
<div class="field-row"><label for="application-source-50098-500">Application source (50098)</label><select id="application-source-50098-500" name="application-source-50098-500"><option value="">Choose one…</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option></select></div>
<fieldset><legend>Core competencies (50098)</legend><label for="core-competencies-50098--cb-0"><input type="checkbox" id="core-competencies-50098--cb-0" name="core-competencies-50098-[]" value="typescript"> TypeScript</label><label for="core-competencies-50098--cb-1"><input type="checkbox" id="core-competencies-50098--cb-1" name="core-competencies-50098-[]" value="javascript"> JavaScript</label><label for="core-competencies-50098--cb-2"><input type="checkbox" id="core-competencies-50098--cb-2" name="core-competencies-50098-[]" value="react"> React</label><label for="core-competencies-50098--cb-3"><input type="checkbox" id="core-competencies-50098--cb-3" name="core-competencies-50098-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50098">Attach resume (50098)</label><input type="file" id="file-50098" name="file-50098" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50098-5009">Work samples link (50098)</label><input type="url" id="work-samples-link-50098-5009" name="work-samples-link-50098-5009" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
