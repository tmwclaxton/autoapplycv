<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Portal modal</title></head>
<body>
<main><h1>Portal modal</h1><form action="/apply" method="post">
<label for="ix-name-22">Applicant name</label>
<input type="text" id="ix-name-22" name="ix-name-22">
<label for="ix-email-22">Contact email</label>
<input type="email" id="ix-email-22" name="ix-email-22">
<label for="ix-phone-22">Contact number</label>
<input type="tel" id="ix-phone-22" name="ix-phone-22">
<button type="button" data-reveal="#portal-modal-22">Add work history</button>
<div id="portal-modal-22" role="dialog" hidden style="display:none" aria-label="Work history">
<label for="employer-22">Most recent employer</label>
<input type="text" id="employer-22" name="employer-22">
<label for="role-title-22">Job title</label>
<input type="text" id="role-title-22" name="role-title-22">
</div></form></main>
</body>
</html>
