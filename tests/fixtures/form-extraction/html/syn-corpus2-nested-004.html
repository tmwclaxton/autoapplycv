<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nested fieldsets 20344</title></head>
<body>
<main><h1>Nested fieldsets 20344</h1><form action="/apply" method="post">
<fieldset><legend>Personal details</legend>
<label for="ns-name-20344">Preferred name (20344)</label>
<input type="text" id="ns-name-20344" name="ns-name-20344" autocomplete="name">
<label for="ns-email-20344">Work email (20344)</label>
<input type="email" id="ns-email-20344" name="ns-email-20344" autocomplete="email">
<label for="ns-phone-20344">Phone number (20344)</label>
<input type="tel" id="ns-phone-20344" name="ns-phone-20344" autocomplete="tel"></fieldset>
<fieldset><legend>Preferences</legend><div class="field-row"><label for="current-city-20344-20344">Current city (20344)</label><select id="current-city-20344-20344" name="current-city-20344-20344"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="london">London</option><option value="berlin">Berlin</option><option value="remote">Remote</option></select></div></fieldset>
<fieldset><legend>Additional</legend><div class="field-row"><label for="tell-us-about-yourself-20344">Tell us about yourself (20344)</label><textarea id="tell-us-about-yourself-20344" name="tell-us-about-yourself-20344" rows="4" maxlength="400"></textarea></div></fieldset></form></main>
</body>
</html>
