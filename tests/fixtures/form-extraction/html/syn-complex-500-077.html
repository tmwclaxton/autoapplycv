<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50077</title></head>
<body>
<main><h1>Conditional complex apply 50077</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50077">
<p id="step1-label-50077">Step 1 - Contact</p>

<label for="cond-name-50077">Applicant name (50077)</label>
<input type="text" id="cond-name-50077" name="cond-name-50077" autocomplete="name">
<label for="cond-email-50077">Work email (50077)</label>
<input type="email" id="cond-email-50077" name="cond-email-50077" autocomplete="email">
<label for="cond-phone-50077">Contact number (50077)</label>
<input type="tel" id="cond-phone-50077" name="cond-phone-50077" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50077">
<p id="step2-label-50077">Step 2 - Preferences</p>
<div class="field-row"><label for="preferred-location-50077-500">Preferred location (50077)</label><select id="preferred-location-50077-500" name="preferred-location-50077-500"><option value="">Choose one…</option><option value="new-york">New York</option><option value="remote">Remote</option><option value="manchester">Manchester</option><option value="london">London</option></select></div>
<fieldset><legend>Willing to relocate? (50077)</legend><label for="willing-to-relocate-5007-0"><input type="radio" id="willing-to-relocate-5007-0" name="willing-to-relocate-5007" value="yes"> Yes</label><label for="willing-to-relocate-5007-1"><input type="radio" id="willing-to-relocate-5007-1" name="willing-to-relocate-5007" value="no"> No</label><label for="willing-to-relocate-5007-2"><input type="radio" id="willing-to-relocate-5007-2" name="willing-to-relocate-5007" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="start-date-preference-50077-">Start date preference (50077)</label><input type="date" id="start-date-preference-50077-" name="start-date-preference-50077-" ></div>
<fieldset><legend>Primary expertise (50077)</legend><label for="primary-expertise-50077--cb-0"><input type="checkbox" id="primary-expertise-50077--cb-0" name="primary-expertise-50077-[]" value="go"> Go</label><label for="primary-expertise-50077--cb-1"><input type="checkbox" id="primary-expertise-50077--cb-1" name="primary-expertise-50077-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50077--cb-2"><input type="checkbox" id="primary-expertise-50077--cb-2" name="primary-expertise-50077-[]" value="rust"> Rust</label><label for="primary-expertise-50077--cb-3"><input type="checkbox" id="primary-expertise-50077--cb-3" name="primary-expertise-50077-[]" value="laravel"> Laravel</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50077">
<p id="step3-label-50077">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50077" data-reveal="#reveal-50077">Show follow-up questions</button>
<div id="reveal-50077" hidden style="display:none"><div class="field-row"><label for="motivation-statement-50077-5">Motivation statement (50077)</label><textarea id="motivation-statement-50077-5" name="motivation-statement-50077-5" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="portfolio-url-50077-50077">Portfolio URL (50077)</label><input type="url" id="portfolio-url-50077-50077" name="portfolio-url-50077-50077" ></div>
<div class="field-row"><label for="compensation-requirement-500">Compensation requirement (50077)</label><input type="number" id="compensation-requirement-500" name="compensation-requirement-500" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50077">Attach resume (50077)</label><input type="file" id="file-50077" name="file-50077" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
