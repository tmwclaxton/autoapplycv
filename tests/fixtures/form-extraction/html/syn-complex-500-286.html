<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50286</title></head>
<body>
<main><h1>Wizard complex apply 50286</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50286">
<h2 id="wizard-contact-50286">Contact information</h2>

<label for="wiz-name-50286">Legal name (50286)</label>
<input type="text" id="wiz-name-50286" name="wiz-name-50286" autocomplete="name">
<label for="wiz-email-50286">Personal email (50286)</label>
<input type="email" id="wiz-email-50286" name="wiz-email-50286" autocomplete="email">
<label for="wiz-phone-50286">Mobile number (50286)</label>
<input type="tel" id="wiz-phone-50286" name="wiz-phone-50286" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50286">
<h2 id="wizard-screen-50286">Screening questions</h2>
<div class="field-row"><label for="personal-statement-50286-502">Personal statement (50286)</label><textarea id="personal-statement-50286-502" name="personal-statement-50286-502" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="work-location-50286-50286">Work location (50286)</label><select id="work-location-50286-50286" name="work-location-50286-50286"><option value="">Choose one…</option><option value="new-york">New York</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50286)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50286-50">Salary expectations (50286)</label><input type="number" id="salary-expectations-50286-50" name="salary-expectations-50286-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50286-50286">Available from (50286)</label><input type="date" id="available-from-50286-50286" name="available-from-50286-50286" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50286">
<h2 id="wizard-docs-50286">Documents and skills</h2>
<fieldset><legend>Technical skills (50286)</legend><label for="technical-skills-50286-5-cb-0"><input type="checkbox" id="technical-skills-50286-5-cb-0" name="technical-skills-50286-5[]" value="laravel"> Laravel</label><label for="technical-skills-50286-5-cb-1"><input type="checkbox" id="technical-skills-50286-5-cb-1" name="technical-skills-50286-5[]" value="sql"> SQL</label><label for="technical-skills-50286-5-cb-2"><input type="checkbox" id="technical-skills-50286-5-cb-2" name="technical-skills-50286-5[]" value="rust"> Rust</label><label for="technical-skills-50286-5-cb-3"><input type="checkbox" id="technical-skills-50286-5-cb-3" name="technical-skills-50286-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50286-5-cb-4"><input type="checkbox" id="technical-skills-50286-5-cb-4" name="technical-skills-50286-5[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50286">Attach resume (50286)</label><input type="file" id="file-50286" name="file-50286" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="referral-source-50286-50286">Referral source (50286)</label><select id="referral-source-50286-50286" name="referral-source-50286-50286"><option value="">Choose one…</option><option value="other">Other</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
