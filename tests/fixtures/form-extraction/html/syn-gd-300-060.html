<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Contact info - Software Engineer</title></head>
<body>
<form data-testid="indeed-apply-form">

<h1 data-testid="contact-info-heading">Add contact information</h1>
<div data-testid="input-ia-field-300060-first-name">
<label for="ia-field-300060-first-name" data-testid="ia-field-300060-first-name-label"><span data-testid="safe-markup">First name</span></label>
<input type="text" id="ia-field-300060-first-name" name="ia-field-300060-first-name" data-testid="ia-field-300060-first-name-input" required autocomplete="given-name">
</div>
<div data-testid="input-ia-field-300060-last-name">
<label for="ia-field-300060-last-name" data-testid="ia-field-300060-last-name-label"><span data-testid="safe-markup">Last name</span></label>
<input type="text" id="ia-field-300060-last-name" name="ia-field-300060-last-name" data-testid="ia-field-300060-last-name-input" required autocomplete="family-name">
</div>
<div data-testid="input-ia-field-300060-email-address">
<label for="ia-field-300060-email-address" data-testid="ia-field-300060-email-address-label"><span data-testid="safe-markup">Email address</span></label>
<input type="email" id="ia-field-300060-email-address" name="ia-field-300060-email-address" data-testid="ia-field-300060-email-address-input" required autocomplete="email">
</div>
<div data-testid="input-ia-field-300060-phone-number">
<label for="ia-field-300060-phone-number" data-testid="ia-field-300060-phone-number-label"><span data-testid="safe-markup">Phone number</span></label>
<input type="tel" id="ia-field-300060-phone-number" name="ia-field-300060-phone-number" data-testid="ia-field-300060-phone-number-input" required autocomplete="tel">
</div>
<div data-testid="location-fields-country">
<span data-testid="location-fields-country-label">Country</span>
<span>United Kingdom</span>
</div>
<div>
<label for="location-fields-postal-code-input-300060" data-testid="location-fields-postal-code-label">Postcode</label>
<input data-testid="location-fields-postal-code-input" id="location-fields-postal-code-input-300060" name="location-postal-code" autocomplete="postal-code">
</div>
<div>
<label for="location-fields-locality-input-300060" data-testid="location-fields-locality-label">City, county</label>
<input type="text" role="combobox" data-testid="location-fields-locality-input" id="location-fields-locality-input-300060" name="location-locality" autocomplete="address-level2">
</div>
<div>
<label for="location-fields-address-input-300060" data-testid="location-fields-address-label">Street address</label>
<input data-testid="location-fields-address-input" id="location-fields-address-input-300060" name="location-address" autocomplete="street-address">
</div>
<button type="button" data-testid="indeed-apply-continue"><span>Continue</span></button>
</form>
</body>
</html>
