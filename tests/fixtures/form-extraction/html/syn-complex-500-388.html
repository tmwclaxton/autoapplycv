<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50388</title></head>
<body>
<main><h1>Mixed complex apply 50388</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50388">Full name (50388)</label>
<input type="text" id="mix-name-50388" name="mix-name-50388" autocomplete="name">
<label for="mix-email-50388">Work email (50388)</label>
<input type="email" id="mix-email-50388" name="mix-email-50388" autocomplete="email">
<label for="mix-phone-50388">Contact number (50388)</label>
<input type="tel" id="mix-phone-50388" name="mix-phone-50388" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="motivation-statement-50388-5">Motivation statement (50388)</label><textarea id="motivation-statement-50388-5" name="motivation-statement-50388-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50388-50388">Current city (50388)</label><select id="current-city-50388-50388" name="current-city-50388-50388"><option value="">Choose one…</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="london">London</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50388)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50388)</legend><label for="willing-to-relocate-5038-0"><input type="radio" id="willing-to-relocate-5038-0" name="willing-to-relocate-5038" value="yes"> Yes</label><label for="willing-to-relocate-5038-1"><input type="radio" id="willing-to-relocate-5038-1" name="willing-to-relocate-5038" value="no"> No</label><label for="willing-to-relocate-5038-2"><input type="radio" id="willing-to-relocate-5038-2" name="willing-to-relocate-5038" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-503">Compensation requirement (50388)</label><input type="number" id="compensation-requirement-503" name="compensation-requirement-503" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50388-50">Earliest start date (50388)</label><input type="date" id="earliest-start-date-50388-50" name="earliest-start-date-50388-50" ></div>
<div class="field-row"><label for="referral-source-50388-50388">Referral source (50388)</label><select id="referral-source-50388-50388" name="referral-source-50388-50388"><option value="">Choose one…</option><option value="conference">Conference</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option></select></div>
<fieldset><legend>Primary expertise (50388)</legend><label for="primary-expertise-50388--cb-0"><input type="checkbox" id="primary-expertise-50388--cb-0" name="primary-expertise-50388-[]" value="rust"> Rust</label><label for="primary-expertise-50388--cb-1"><input type="checkbox" id="primary-expertise-50388--cb-1" name="primary-expertise-50388-[]" value="react"> React</label><label for="primary-expertise-50388--cb-2"><input type="checkbox" id="primary-expertise-50388--cb-2" name="primary-expertise-50388-[]" value="sql"> SQL</label><label for="primary-expertise-50388--cb-3"><input type="checkbox" id="primary-expertise-50388--cb-3" name="primary-expertise-50388-[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50388">Attach resume (50388)</label><input type="file" id="file-50388" name="file-50388" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50388-50388">Portfolio URL (50388)</label><input type="url" id="portfolio-url-50388-50388" name="portfolio-url-50388-50388" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
