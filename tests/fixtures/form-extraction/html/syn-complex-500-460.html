<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50460</title></head>
<body>
<main><h1>Mixed complex apply 50460</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50460">Legal name (50460)</label>
<input type="text" id="mix-name-50460" name="mix-name-50460" autocomplete="name">
<label for="mix-email-50460">Work email (50460)</label>
<input type="email" id="mix-email-50460" name="mix-email-50460" autocomplete="email">
<label for="mix-phone-50460">Phone number (50460)</label>
<input type="tel" id="mix-phone-50460" name="mix-phone-50460" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="motivation-statement-50460-5">Motivation statement (50460)</label><textarea id="motivation-statement-50460-5" name="motivation-statement-50460-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50460-504">Preferred location (50460)</label><select id="preferred-location-50460-504" name="preferred-location-50460-504"><option value="">Choose one…</option><option value="new-york">New York</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Work authorization status (50460)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50460)</legend><label for="open-to-relocation-50460-0"><input type="radio" id="open-to-relocation-50460-0" name="open-to-relocation-50460" value="yes"> Yes</label><label for="open-to-relocation-50460-1"><input type="radio" id="open-to-relocation-50460-1" name="open-to-relocation-50460" value="no"> No</label><label for="open-to-relocation-50460-2"><input type="radio" id="open-to-relocation-50460-2" name="open-to-relocation-50460" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50460-50460">Expected salary (50460)</label><input type="number" id="expected-salary-50460-50460" name="expected-salary-50460-50460" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50460-50">Earliest start date (50460)</label><input type="date" id="earliest-start-date-50460-50" name="earliest-start-date-50460-50" ></div>
<div class="field-row"><label for="referral-source-50460-50460">Referral source (50460)</label><select id="referral-source-50460-50460" name="referral-source-50460-50460"><option value="">Choose one…</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="other">Other</option><option value="job-board">Job board</option></select></div>
<fieldset><legend>Technical skills (50460)</legend><label for="technical-skills-50460-5-cb-0"><input type="checkbox" id="technical-skills-50460-5-cb-0" name="technical-skills-50460-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50460-5-cb-1"><input type="checkbox" id="technical-skills-50460-5-cb-1" name="technical-skills-50460-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50460-5-cb-2"><input type="checkbox" id="technical-skills-50460-5-cb-2" name="technical-skills-50460-5[]" value="rust"> Rust</label><label for="technical-skills-50460-5-cb-3"><input type="checkbox" id="technical-skills-50460-5-cb-3" name="technical-skills-50460-5[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50460">Attach resume (50460)</label><input type="file" id="file-50460" name="file-50460" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50460-50460">Portfolio URL (50460)</label><input type="url" id="portfolio-url-50460-50460" name="portfolio-url-50460-50460" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
