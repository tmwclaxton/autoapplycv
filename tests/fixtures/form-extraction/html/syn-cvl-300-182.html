<!DOCTYPE html>
<html lang="en-GB">
<head><meta charset="utf-8"><title>Apply - Cloud Architect</title></head>
<body>
<header><a href="/">CV-Library</a></header>
<main><form data-qa="application-form" action="/job/apply/submit" method="post">
<h1 data-qa="application-step-title">Application questions</h1>

<fieldset data-qa="fieldset-do-you-have-the-right-to-wor">
<legend data-qa="application-step-subtitle">Do you have the right to work in the UK?</legend>
<label for="do-you-have-the-right-to-wor-0"><input type="radio" id="do-you-have-the-right-to-wor-0" name="do-you-have-the-right-to-wor" value="yes"> Yes</label><label for="do-you-have-the-right-to-wor-1"><input type="radio" id="do-you-have-the-right-to-wor-1" name="do-you-have-the-right-to-wor" value="no"> No</label>
</fieldset>
<div class="form-group" data-qa="field-years-of-experience-225000182">
<label for="years-of-experience-225000182">Years of experience</label>
<select id="years-of-experience-225000182" name="years-of-experience-225000182">
<option value="">Please select</option><option value="0-1">0-1</option><option value="1-3">1-3</option><option value="3-5">3-5</option><option value="5-10">5-10</option><option value="10">10+</option>
</select>
</div>
<div class="form-group" data-qa="field-why-are-you-interested-in-this-r">
<label for="why-are-you-interested-in-this-r">Why are you interested in this role?</label>
<textarea id="why-are-you-interested-in-this-r" name="why-are-you-interested-in-this-r" rows="5"></textarea>
</div>
<div class="form-group" data-qa="field-notice-period-225000182">
<label for="notice-period-225000182">Notice period</label>
<select id="notice-period-225000182" name="notice-period-225000182">
<option value="">Please select</option><option value="immediate">Immediate</option><option value="1-week">1 week</option><option value="2-weeks">2 weeks</option><option value="1-month">1 month</option><option value="2-months">2 months</option>
</select>
</div>

<div data-qa="application-actions"><button type="button" data-qa="submit-button">Next</button></div>
</form></main>
</body>
</html>
