<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Availability date</title></head>
<body>
<main><h1>Availability date</h1><form action="/apply" method="post">
<label for="ix-name-12">Full name</label>
<input type="text" id="ix-name-12" name="ix-name-12">
<label for="ix-email-12">Email address</label>
<input type="email" id="ix-email-12" name="ix-email-12">
<label for="ix-phone-12">Phone number</label>
<input type="tel" id="ix-phone-12" name="ix-phone-12">
<button type="button" id="avail-btn-12" data-reveal="#avail-panel-12">Show availability calendar</button>
<div id="avail-panel-12" hidden style="display:none">
<label for="avail-date-12">Earliest start date</label>
<input type="date" id="avail-date-12" name="avail-date-12">
</div></form></main>
</body>
</html>
