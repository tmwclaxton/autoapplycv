<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9910</title></head>
<body>
<main><h1>Grid layout 9910</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9910">Complete name (9910)</label><span class="helper">Required</span><input id="grid-name-9910" name="grid-name-9910" type="text"></div>
<div><label for="grid-email-9910">Work email (9910)</label><span class="helper">Required</span><input id="grid-email-9910" name="grid-email-9910" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9910">Telephone (9910)</label><input id="grid-phone-9910" name="grid-phone-9910" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="personal-statement-9910-9910">Personal statement (9910)</label><textarea id="personal-statement-9910-9910" name="personal-statement-9910-9910" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Willing to relocate? (9910)</legend><label for="willing-to-relocate-9910-0"><input type="radio" id="willing-to-relocate-9910-0" name="willing-to-relocate-9910" value="yes"> Yes</label><label for="willing-to-relocate-9910-1"><input type="radio" id="willing-to-relocate-9910-1" name="willing-to-relocate-9910" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
