<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9918</title></head>
<body>
<main><h1>Grid layout 9918</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9918">Complete name (9918)</label><span class="helper">Required</span><input id="grid-name-9918" name="grid-name-9918" type="text"></div>
<div><label for="grid-email-9918">Application email (9918)</label><span class="helper">Required</span><input id="grid-email-9918" name="grid-email-9918" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9918">Contact number (9918)</label><input id="grid-phone-9918" name="grid-phone-9918" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="motivation-statement-9918-99">Motivation statement (9918)</label><textarea id="motivation-statement-9918-99" name="motivation-statement-9918-99" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Willing to relocate? (9918)</legend><label for="willing-to-relocate-9918-0"><input type="radio" id="willing-to-relocate-9918-0" name="willing-to-relocate-9918" value="yes"> Yes</label><label for="willing-to-relocate-9918-1"><input type="radio" id="willing-to-relocate-9918-1" name="willing-to-relocate-9918" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
