<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters complex apply 50244</title></head>
<body>

<main data-sr-application="true"><h1>Apply 50244</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">
<h2>Contact information</h2>

<label for="sr-name-50244">Full name (50244)</label>
<input type="text" id="sr-name-50244" name="sr-name-50244" autocomplete="name">
<label for="sr-email-50244">Contact email (50244)</label>
<input type="email" id="sr-email-50244" name="sr-email-50244" autocomplete="email">
<label for="sr-phone-50244">Mobile number (50244)</label>
<input type="tel" id="sr-phone-50244" name="sr-phone-50244" autocomplete="tel">
</section>
<section class="sr-section" data-section="experience">
<h2>Experience and motivation</h2>
<div class="field-row"><label for="motivation-statement-50244-5">Motivation statement (50244)</label><textarea id="motivation-statement-50244-5" name="motivation-statement-50244-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="personal-website-50244-50244">Personal website (50244)</label><input type="url" id="personal-website-50244-50244" name="personal-website-50244-50244" ></div>
</section>
<section class="sr-section" data-section="preferences">
<h2>Preferences</h2>
<div class="field-row"><label for="office-preference-50244-5024">Office preference (50244)</label><select id="office-preference-50244-5024" name="office-preference-50244-5024"><option value="">Choose one…</option><option value="new-york">New York</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option><option value="london">London</option></select></div>
<fieldset><legend>Work authorization status (50244)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50244-50">Desired base salary (50244)</label><input type="number" id="desired-base-salary-50244-50" name="desired-base-salary-50244-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50244-50">Earliest start date (50244)</label><input type="date" id="earliest-start-date-50244-50" name="earliest-start-date-50244-50" ></div>
<fieldset><legend>Technical skills (50244)</legend><label for="technical-skills-50244-5-cb-0"><input type="checkbox" id="technical-skills-50244-5-cb-0" name="technical-skills-50244-5[]" value="laravel"> Laravel</label><label for="technical-skills-50244-5-cb-1"><input type="checkbox" id="technical-skills-50244-5-cb-1" name="technical-skills-50244-5[]" value="rust"> Rust</label><label for="technical-skills-50244-5-cb-2"><input type="checkbox" id="technical-skills-50244-5-cb-2" name="technical-skills-50244-5[]" value="sql"> SQL</label><label for="technical-skills-50244-5-cb-3"><input type="checkbox" id="technical-skills-50244-5-cb-3" name="technical-skills-50244-5[]" value="react"> React</label></fieldset>
</section>
<section class="sr-section" data-section="documents">
<h2>Documents</h2>
<div class="file-row"><label for="file-50244">Attach resume (50244)</label><input type="file" id="file-50244" name="file-50244" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
