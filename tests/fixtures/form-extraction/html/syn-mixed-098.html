<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed Application 9</title></head>
<body>
<main>
<h1>Mixed Application 9</h1>
<form action="/apply" method="post">
<div data-testid="input-q_applicant-name" class="ia-Questions-item">
<div data-testid="input-q_applicant-name-label"><span data-testid="safe-markup">Applicant name</span></div>
<input data-testid="input-q_applicant-name-input" type="text" name="input-q_applicant-name">
</div>
<div class="field"><label id="question_work-email-label" for="question_work-email">Work email</label><input type="email" id="question_work-email" name="question_work-email" aria-labelledby="question_work-email-label"></div>
<div class="form-group"><label for="location">Location</label><select id="location" name="location"><option value="">Select…</option><option value="london">London</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Will you need sponsorship?</legend><label><input type="radio" name="will-you-need-sponsorshi" id="will-you-need-sponsorshi-0" value="yes"> Yes</label><label><input type="radio" name="will-you-need-sponsorshi" id="will-you-need-sponsorshi-1" value="no"> No</label></fieldset>
<div class="form-group"><label for="cover-letter">Cover letter</label><textarea id="cover-letter" name="cover-letter" rows="4" maxlength="600"></textarea></div>
<div class="form-group"><label for="upload-cv">Upload CV</label><input type="file" id="upload-cv" name="upload-cv" ></div>
<button type="button">Submit application</button>

</form>
</main>
</body>
</html>
