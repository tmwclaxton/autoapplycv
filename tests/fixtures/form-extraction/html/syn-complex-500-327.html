<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50327</title></head>
<body>
<main><h1>Conditional complex apply 50327</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50327">
<p id="step1-label-50327">Step 1 - Contact</p>

<label for="cond-name-50327">Preferred name (50327)</label>
<input type="text" id="cond-name-50327" name="cond-name-50327" autocomplete="name">
<label for="cond-email-50327">Contact email (50327)</label>
<input type="email" id="cond-email-50327" name="cond-email-50327" autocomplete="email">
<label for="cond-phone-50327">Telephone (50327)</label>
<input type="tel" id="cond-phone-50327" name="cond-phone-50327" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50327">
<p id="step2-label-50327">Step 2 - Preferences</p>
<div class="field-row"><label for="office-preference-50327-5032">Office preference (50327)</label><select id="office-preference-50327-5032" name="office-preference-50327-5032"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="new-york">New York</option><option value="berlin">Berlin</option><option value="london">London</option></select></div>
<fieldset><legend>Open to relocation? (50327)</legend><label for="open-to-relocation-50327-0"><input type="radio" id="open-to-relocation-50327-0" name="open-to-relocation-50327" value="yes"> Yes</label><label for="open-to-relocation-50327-1"><input type="radio" id="open-to-relocation-50327-1" name="open-to-relocation-50327" value="no"> No</label><label for="open-to-relocation-50327-2"><input type="radio" id="open-to-relocation-50327-2" name="open-to-relocation-50327" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="available-from-50327-50327">Available from (50327)</label><input type="date" id="available-from-50327-50327" name="available-from-50327-50327" ></div>
<fieldset><legend>Primary expertise (50327)</legend><label for="primary-expertise-50327--cb-0"><input type="checkbox" id="primary-expertise-50327--cb-0" name="primary-expertise-50327-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50327--cb-1"><input type="checkbox" id="primary-expertise-50327--cb-1" name="primary-expertise-50327-[]" value="rust"> Rust</label><label for="primary-expertise-50327--cb-2"><input type="checkbox" id="primary-expertise-50327--cb-2" name="primary-expertise-50327-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50327--cb-3"><input type="checkbox" id="primary-expertise-50327--cb-3" name="primary-expertise-50327-[]" value="go"> Go</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50327">
<p id="step3-label-50327">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50327" data-reveal="#reveal-50327">Show follow-up questions</button>
<div id="reveal-50327" hidden style="display:none"><div class="field-row"><label for="cover-letter-50327-50327">Cover letter (50327)</label><textarea id="cover-letter-50327-50327" name="cover-letter-50327-50327" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="portfolio-url-50327-50327">Portfolio URL (50327)</label><input type="url" id="portfolio-url-50327-50327" name="portfolio-url-50327-50327" ></div>
<div class="field-row"><label for="desired-base-salary-50327-50">Desired base salary (50327)</label><input type="number" id="desired-base-salary-50327-50" name="desired-base-salary-50327-50" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50327">Attach resume (50327)</label><input type="file" id="file-50327" name="file-50327" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
