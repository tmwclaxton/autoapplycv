<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50206</title></head>
<body>
<main><h1>Wizard complex apply 50206</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50206">
<h2 id="wizard-contact-50206">Contact information</h2>

<label for="wiz-name-50206">Full name (50206)</label>
<input type="text" id="wiz-name-50206" name="wiz-name-50206" autocomplete="name">
<label for="wiz-email-50206">Email address (50206)</label>
<input type="email" id="wiz-email-50206" name="wiz-email-50206" autocomplete="email">
<label for="wiz-phone-50206">Contact number (50206)</label>
<input type="tel" id="wiz-phone-50206" name="wiz-phone-50206" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50206">
<h2 id="wizard-screen-50206">Screening questions</h2>
<div class="field-row"><label for="cover-letter-50206-50206">Cover letter (50206)</label><textarea id="cover-letter-50206-50206" name="cover-letter-50206-50206" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="preferred-location-50206-502">Preferred location (50206)</label><select id="preferred-location-50206-502" name="preferred-location-50206-502"><option value="">Choose one…</option><option value="new-york">New York</option><option value="london">London</option><option value="remote">Remote</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50206)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50206-50206">Expected salary (50206)</label><input type="number" id="expected-salary-50206-50206" name="expected-salary-50206-50206" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50206-50206">Available from (50206)</label><input type="date" id="available-from-50206-50206" name="available-from-50206-50206" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50206">
<h2 id="wizard-docs-50206">Documents and skills</h2>
<fieldset><legend>Primary expertise (50206)</legend><label for="primary-expertise-50206--cb-0"><input type="checkbox" id="primary-expertise-50206--cb-0" name="primary-expertise-50206-[]" value="python"> Python</label><label for="primary-expertise-50206--cb-1"><input type="checkbox" id="primary-expertise-50206--cb-1" name="primary-expertise-50206-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50206--cb-2"><input type="checkbox" id="primary-expertise-50206--cb-2" name="primary-expertise-50206-[]" value="react"> React</label><label for="primary-expertise-50206--cb-3"><input type="checkbox" id="primary-expertise-50206--cb-3" name="primary-expertise-50206-[]" value="laravel"> Laravel</label><label for="primary-expertise-50206--cb-4"><input type="checkbox" id="primary-expertise-50206--cb-4" name="primary-expertise-50206-[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50206">Attach resume (50206)</label><input type="file" id="file-50206" name="file-50206" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="application-source-50206-502">Application source (50206)</label><select id="application-source-50206-502" name="application-source-50206-502"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option><option value="referral">Referral</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
