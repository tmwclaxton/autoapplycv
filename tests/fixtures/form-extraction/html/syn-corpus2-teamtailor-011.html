<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Teamtailor apply 20011</title></head>
<body>

<main class="careers-page"><h1 class="job-title">Apply — Role 20011</h1>
<form class="apply-form" action="/apply" method="post" data-teamtailor-form="application">
<section class="form-section" data-section="personal">

<div class="form-group"><label class="form-label" for="tt-name-20011">Preferred name (20011)</label>
</div><input class="form-control" type="text" id="tt-name-20011" name="tt-name-20011" autocomplete="name">
<div class="form-group"><label class="form-label" for="tt-email-20011">Contact email (20011)</label>
</div><input class="form-control" type="email" id="tt-email-20011" name="tt-email-20011" autocomplete="email">
<div class="form-group"><label class="form-label" for="tt-phone-20011">Telephone (20011)</label>
</div><input class="form-control" type="tel" id="tt-phone-20011" name="tt-phone-20011" autocomplete="tel">
</section>
<section class="form-section" data-section="questions">
<div class="field-row"><label for="tell-us-about-yourself-20011">Tell us about yourself (20011)</label><textarea id="tell-us-about-yourself-20011" name="tell-us-about-yourself-20011" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-20011-200">Preferred location (20011)</label><select id="preferred-location-20011-200" name="preferred-location-20011-200"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (20011)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
</section>
<div class="file-row"><label for="file-20011">Attach resume (optional)</label><input type="file" id="file-20011" name="file-20011" accept=".pdf,.doc"></div>
<button type="submit" class="btn btn-primary">Submit application</button>
</form></main>
</body>
</html>
