<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Personio apply 20111</title></head>
<body>

<main class="personio-application"><h1>Bewerbung 20111</h1>
<form class="application-form" action="/apply" method="post">
<div class="form-row">
<label for="pe-name-20111">Legal name (20111)</label>
<input type="text" id="pe-name-20111" name="pe-name-20111" autocomplete="name">
<label for="pe-email-20111">Contact email (20111)</label>
<input type="email" id="pe-email-20111" name="pe-email-20111" autocomplete="email">
<label for="pe-phone-20111">Mobile number (20111)</label>
<input type="tel" id="pe-phone-20111" name="pe-phone-20111" autocomplete="tel"></div>
<div class="field-row"><label for="tell-us-about-yourself-20111">Tell us about yourself (20111)</label><textarea id="tell-us-about-yourself-20111" name="tell-us-about-yourself-20111" rows="4" maxlength="400"></textarea></div>

</form></main>
</body>
</html>
