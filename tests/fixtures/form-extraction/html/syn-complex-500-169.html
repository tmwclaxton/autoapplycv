<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50169</title></head>
<body>
<main><h1>Long complex apply 50169</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50169">Full name (50169)</label>
<input type="text" id="long-name-50169" name="long-name-50169" autocomplete="name">
<label for="long-email-50169">Work email (50169)</label>
<input type="email" id="long-email-50169" name="long-email-50169" autocomplete="email">
<label for="long-phone-50169">Phone number (50169)</label>
<input type="tel" id="long-phone-50169" name="long-phone-50169" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50169">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50169" name="linkedin-profile-url-50169" ></div>
<div class="field-row"><label for="current-employer-50169">Current employer</label><input type="text" id="current-employer-50169" name="current-employer-50169" ></div>
<div class="field-row"><label for="current-job-title-50169">Current job title</label><input type="text" id="current-job-title-50169" name="current-job-title-50169" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="motivation-statement-50169-5">Motivation statement (50169)</label><textarea id="motivation-statement-50169-5" name="motivation-statement-50169-5" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="work-location-50169-50169">Work location (50169)</label><select id="work-location-50169-50169" name="work-location-50169-50169"><option value="">Choose one…</option><option value="new-york">New York</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50169)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50169)</legend><label for="open-to-relocation-50169-0"><input type="radio" id="open-to-relocation-50169-0" name="open-to-relocation-50169" value="yes"> Yes</label><label for="open-to-relocation-50169-1"><input type="radio" id="open-to-relocation-50169-1" name="open-to-relocation-50169" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50169-50">Desired base salary (50169)</label><input type="number" id="desired-base-salary-50169-50" name="desired-base-salary-50169-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50169-50">Earliest start date (50169)</label><input type="date" id="earliest-start-date-50169-50" name="earliest-start-date-50169-50" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50169)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="other">Other</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="conference">Conference</option><option value="referral">Referral</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Primary expertise (50169)</legend><label for="primary-expertise-50169--cb-0"><input type="checkbox" id="primary-expertise-50169--cb-0" name="primary-expertise-50169-[]" value="react"> React</label><label for="primary-expertise-50169--cb-1"><input type="checkbox" id="primary-expertise-50169--cb-1" name="primary-expertise-50169-[]" value="rust"> Rust</label><label for="primary-expertise-50169--cb-2"><input type="checkbox" id="primary-expertise-50169--cb-2" name="primary-expertise-50169-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50169--cb-3"><input type="checkbox" id="primary-expertise-50169--cb-3" name="primary-expertise-50169-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50169--cb-4"><input type="checkbox" id="primary-expertise-50169--cb-4" name="primary-expertise-50169-[]" value="python"> Python</label><label for="primary-expertise-50169--cb-5"><input type="checkbox" id="primary-expertise-50169--cb-5" name="primary-expertise-50169-[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50169">Attach resume (50169)</label><input type="file" id="file-50169" name="file-50169" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
