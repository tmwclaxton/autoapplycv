<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50278</title></head>
<body>
<main><h1>Mixed complex apply 50278</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50278">Legal name (50278)</label>
<input type="text" id="mix-name-50278" name="mix-name-50278" autocomplete="name">
<label for="mix-email-50278">Work email (50278)</label>
<input type="email" id="mix-email-50278" name="mix-email-50278" autocomplete="email">
<label for="mix-phone-50278">Phone number (50278)</label>
<input type="tel" id="mix-phone-50278" name="mix-phone-50278" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50278">Tell us about yourself (50278)</label><textarea id="tell-us-about-yourself-50278" name="tell-us-about-yourself-50278" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50278-502">Preferred location (50278)</label><select id="preferred-location-50278-502" name="preferred-location-50278-502"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Work authorization status (50278)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50278)</legend><label for="willing-to-relocate-5027-0"><input type="radio" id="willing-to-relocate-5027-0" name="willing-to-relocate-5027" value="yes"> Yes</label><label for="willing-to-relocate-5027-1"><input type="radio" id="willing-to-relocate-5027-1" name="willing-to-relocate-5027" value="no"> No</label><label for="willing-to-relocate-5027-2"><input type="radio" id="willing-to-relocate-5027-2" name="willing-to-relocate-5027" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50278-50">Salary expectations (50278)</label><input type="number" id="salary-expectations-50278-50" name="salary-expectations-50278-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50278-50278">Available from (50278)</label><input type="date" id="available-from-50278-50278" name="available-from-50278-50278" ></div>
<div class="field-row"><label for="application-source-50278-502">Application source (50278)</label><select id="application-source-50278-502" name="application-source-50278-502"><option value="">Choose one…</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="company-site">Company site</option></select></div>
<fieldset><legend>Core competencies (50278)</legend><label for="core-competencies-50278--cb-0"><input type="checkbox" id="core-competencies-50278--cb-0" name="core-competencies-50278-[]" value="react"> React</label><label for="core-competencies-50278--cb-1"><input type="checkbox" id="core-competencies-50278--cb-1" name="core-competencies-50278-[]" value="javascript"> JavaScript</label><label for="core-competencies-50278--cb-2"><input type="checkbox" id="core-competencies-50278--cb-2" name="core-competencies-50278-[]" value="go"> Go</label><label for="core-competencies-50278--cb-3"><input type="checkbox" id="core-competencies-50278--cb-3" name="core-competencies-50278-[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50278">Attach resume (50278)</label><input type="file" id="file-50278" name="file-50278" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50278-50278">Personal website (50278)</label><input type="url" id="personal-website-50278-50278" name="personal-website-50278-50278" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
