<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Checkbox Application 8</title></head>
<body>
<main>
<h1>Checkbox Application 8</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="your-name">Your name</label><input type="text" id="your-name" name="your-name" ></div>
<div class="form-group"><label for="contact-email">Contact email</label><input type="email" id="contact-email" name="contact-email" ></div>
<fieldset><legend>Which skills apply to you?</legend><label><input type="checkbox" name="which-skills-apply-to-yo[]" id="which-skills-apply-to-yo-0" value="javascript"> JavaScript</label><label><input type="checkbox" name="which-skills-apply-to-yo[]" id="which-skills-apply-to-yo-1" value="php"> PHP</label><label><input type="checkbox" name="which-skills-apply-to-yo[]" id="which-skills-apply-to-yo-2" value="python"> Python</label><label><input type="checkbox" name="which-skills-apply-to-yo[]" id="which-skills-apply-to-yo-3" value="sql"> SQL</label><label><input type="checkbox" name="which-skills-apply-to-yo[]" id="which-skills-apply-to-yo-4" value="aws"> AWS</label></fieldset>
<fieldset><legend>Which languages do you speak?</legend><label><input type="checkbox" name="which-languages-do-you-s[]" id="which-languages-do-you-s-0" value="english"> English</label><label><input type="checkbox" name="which-languages-do-you-s[]" id="which-languages-do-you-s-1" value="french"> French</label><label><input type="checkbox" name="which-languages-do-you-s[]" id="which-languages-do-you-s-2" value="spanish"> Spanish</label><label><input type="checkbox" name="which-languages-do-you-s[]" id="which-languages-do-you-s-3" value="german"> German</label></fieldset>

</form>
</main>
</body>
</html>
