<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50106</title></head>
<body>
<main><h1>Wizard complex apply 50106</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50106">
<h2 id="wizard-contact-50106">Contact information</h2>

<label for="wiz-name-50106">Applicant name (50106)</label>
<input type="text" id="wiz-name-50106" name="wiz-name-50106" autocomplete="name">
<label for="wiz-email-50106">Personal email (50106)</label>
<input type="email" id="wiz-email-50106" name="wiz-email-50106" autocomplete="email">
<label for="wiz-phone-50106">Telephone (50106)</label>
<input type="tel" id="wiz-phone-50106" name="wiz-phone-50106" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50106">
<h2 id="wizard-screen-50106">Screening questions</h2>
<div class="field-row"><label for="tell-us-about-yourself-50106">Tell us about yourself (50106)</label><textarea id="tell-us-about-yourself-50106" name="tell-us-about-yourself-50106" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="work-location-50106-50106">Work location (50106)</label><select id="work-location-50106-50106" name="work-location-50106-50106"><option value="">Choose one…</option><option value="new-york">New York</option><option value="dublin">Dublin</option><option value="london">London</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Work authorization status (50106)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-501">Compensation requirement (50106)</label><input type="number" id="compensation-requirement-501" name="compensation-requirement-501" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50106-501">When can you start? (50106)</label><input type="date" id="when-can-you-start-50106-501" name="when-can-you-start-50106-501" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50106">
<h2 id="wizard-docs-50106">Documents and skills</h2>
<fieldset><legend>Technical skills (50106)</legend><label for="technical-skills-50106-5-cb-0"><input type="checkbox" id="technical-skills-50106-5-cb-0" name="technical-skills-50106-5[]" value="python"> Python</label><label for="technical-skills-50106-5-cb-1"><input type="checkbox" id="technical-skills-50106-5-cb-1" name="technical-skills-50106-5[]" value="laravel"> Laravel</label><label for="technical-skills-50106-5-cb-2"><input type="checkbox" id="technical-skills-50106-5-cb-2" name="technical-skills-50106-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50106-5-cb-3"><input type="checkbox" id="technical-skills-50106-5-cb-3" name="technical-skills-50106-5[]" value="react"> React</label><label for="technical-skills-50106-5-cb-4"><input type="checkbox" id="technical-skills-50106-5-cb-4" name="technical-skills-50106-5[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50106">Attach resume (50106)</label><input type="file" id="file-50106" name="file-50106" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="referral-source-50106-50106">Referral source (50106)</label><select id="referral-source-50106-50106" name="referral-source-50106-50106"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="other">Other</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
