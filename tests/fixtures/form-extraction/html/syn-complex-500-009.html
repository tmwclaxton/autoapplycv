<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50009</title></head>
<body>
<main><h1>Long complex apply 50009</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50009">Preferred name (50009)</label>
<input type="text" id="long-name-50009" name="long-name-50009" autocomplete="name">
<label for="long-email-50009">Work email (50009)</label>
<input type="email" id="long-email-50009" name="long-email-50009" autocomplete="email">
<label for="long-phone-50009">Contact number (50009)</label>
<input type="tel" id="long-phone-50009" name="long-phone-50009" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50009">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50009" name="linkedin-profile-url-50009" ></div>
<div class="field-row"><label for="current-employer-50009">Current employer</label><input type="text" id="current-employer-50009" name="current-employer-50009" ></div>
<div class="field-row"><label for="current-job-title-50009">Current job title</label><input type="text" id="current-job-title-50009" name="current-job-title-50009" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="why-this-role-50009-50009">Why this role? (50009)</label><textarea id="why-this-role-50009-50009" name="why-this-role-50009-50009" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="preferred-location-50009-500">Preferred location (50009)</label><select id="preferred-location-50009-500" name="preferred-location-50009-500"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="london">London</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50009)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50009)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-500">Compensation requirement (50009)</label><input type="number" id="compensation-requirement-500" name="compensation-requirement-500" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50009-">Start date preference (50009)</label><input type="date" id="start-date-preference-50009-" name="start-date-preference-50009-" ></div>
<div class="field-row"><label for="application-source-50009-500">Application source (50009)</label><select id="application-source-50009-500" name="application-source-50009-500"><option value="">Choose one…</option><option value="other">Other</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Core competencies (50009)</legend><label for="core-competencies-50009--cb-0"><input type="checkbox" id="core-competencies-50009--cb-0" name="core-competencies-50009-[]" value="rust"> Rust</label><label for="core-competencies-50009--cb-1"><input type="checkbox" id="core-competencies-50009--cb-1" name="core-competencies-50009-[]" value="laravel"> Laravel</label><label for="core-competencies-50009--cb-2"><input type="checkbox" id="core-competencies-50009--cb-2" name="core-competencies-50009-[]" value="typescript"> TypeScript</label><label for="core-competencies-50009--cb-3"><input type="checkbox" id="core-competencies-50009--cb-3" name="core-competencies-50009-[]" value="python"> Python</label><label for="core-competencies-50009--cb-4"><input type="checkbox" id="core-competencies-50009--cb-4" name="core-competencies-50009-[]" value="sql"> SQL</label><label for="core-competencies-50009--cb-5"><input type="checkbox" id="core-competencies-50009--cb-5" name="core-competencies-50009-[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50009">Attach resume (50009)</label><input type="file" id="file-50009" name="file-50009" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
