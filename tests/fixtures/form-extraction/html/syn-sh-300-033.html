<!DOCTYPE html>
<html lang="en-GB">
<head><meta charset="utf-8"><title>Screening - QA Engineer</title></head>
<body>
<form data-testid="indeed-apply-form">
<h1 data-testid="screening-heading">Screening questions</h1>
<fieldset data-testid="input-ia-radio-400033-do-you-have-the-righ" role="radiogroup">
<legend data-testid="ia-radio-400033-do-you-have-the-righ-label"><span data-testid="safe-markup">Do you have the right to work in the UK without sponsorship?</span></legend>
<label for="ia-radio-400033-do-you-have-the-righ-0"><input type="radio" id="ia-radio-400033-do-you-have-the-righ-0" name="ia-radio-400033-do-you-have-the-righ" value="yes" data-testid="ia-radio-400033-do-you-have-the-righ-0"> Yes</label><label for="ia-radio-400033-do-you-have-the-righ-1"><input type="radio" id="ia-radio-400033-do-you-have-the-righ-1" name="ia-radio-400033-do-you-have-the-righ" value="no" data-testid="ia-radio-400033-do-you-have-the-righ-1"> No</label>
</fieldset>
<div data-testid="input-ia-select-400033-notice-period">
<label for="ia-select-400033-notice-period" data-testid="ia-select-400033-notice-period-label"><span data-testid="safe-markup">Notice period</span></label>
<select id="ia-select-400033-notice-period" name="ia-select-400033-notice-period" data-testid="ia-select-400033-notice-period-input">
<option value="">Select an option</option><option value="immediate">Immediate</option><option value="1-week">1 week</option><option value="2-weeks">2 weeks</option><option value="1-month">1 month</option><option value="2-months">2 months</option><option value="3-months">3 months</option>
</select>
</div>
<div data-testid="input-ia-field-400033-current-salary">
<label for="ia-field-400033-current-salary" data-testid="ia-field-400033-current-salary-label"><span data-testid="safe-markup">Current salary (£)</span></label>
<input type="number" id="ia-field-400033-current-salary" name="ia-field-400033-current-salary" data-testid="ia-field-400033-current-salary-input" min="0" step="1000">
</div>
<div data-testid="input-ia-field-400033-expected-salary">
<label for="ia-field-400033-expected-salary" data-testid="ia-field-400033-expected-salary-label"><span data-testid="safe-markup">Expected salary (£)</span></label>
<input type="number" id="ia-field-400033-expected-salary" name="ia-field-400033-expected-salary" data-testid="ia-field-400033-expected-salary-input" min="0" step="1000">
</div>
<div data-testid="input-ia-select-400033-years-of-experience-in-a">
<label for="ia-select-400033-years-of-experience-in-a" data-testid="ia-select-400033-years-of-experience-in-a-label"><span data-testid="safe-markup">Years of experience in a similar role</span></label>
<select id="ia-select-400033-years-of-experience-in-a" name="ia-select-400033-years-of-experience-in-a" data-testid="ia-select-400033-years-of-experience-in-a-input">
<option value="">Select an option</option><option value="0-1">0-1</option><option value="1-3">1-3</option><option value="3-5">3-5</option><option value="5-10">5-10</option><option value="10">10+</option>
</select>
</div>
<fieldset data-testid="input-ia-check-400033-which-skills-do-you-">
<legend data-testid="ia-check-400033-which-skills-do-you--label"><span data-testid="safe-markup">Which skills do you have?</span></legend>
<label for="ia-check-400033-which-skills-do-you--0"><input type="checkbox" id="ia-check-400033-which-skills-do-you--0" name="ia-check-400033-which-skills-do-you-" value="azure" data-testid="ia-check-400033-which-skills-do-you--0"> Azure</label><label for="ia-check-400033-which-skills-do-you--1"><input type="checkbox" id="ia-check-400033-which-skills-do-you--1" name="ia-check-400033-which-skills-do-you-" value="react" data-testid="ia-check-400033-which-skills-do-you--1"> React</label><label for="ia-check-400033-which-skills-do-you--2"><input type="checkbox" id="ia-check-400033-which-skills-do-you--2" name="ia-check-400033-which-skills-do-you-" value="javascript" data-testid="ia-check-400033-which-skills-do-you--2"> JavaScript</label><label for="ia-check-400033-which-skills-do-you--3"><input type="checkbox" id="ia-check-400033-which-skills-do-you--3" name="ia-check-400033-which-skills-do-you-" value="aws" data-testid="ia-check-400033-which-skills-do-you--3"> AWS</label><label for="ia-check-400033-which-skills-do-you--4"><input type="checkbox" id="ia-check-400033-which-skills-do-you--4" name="ia-check-400033-which-skills-do-you-" value="go" data-testid="ia-check-400033-which-skills-do-you--4"> Go</label>
</fieldset>
<button type="button" data-testid="indeed-apply-continue"><span>Continue</span></button></form>
</body>
</html>
