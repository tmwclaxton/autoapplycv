<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard apply 9601</title></head>
<body>
<main><h1>Wizard apply 9601</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Experience</li><li>Review</li></ol></nav>
<div class="wizard-panel" role="group" aria-labelledby="wizard-step1-9601">
<h2 id="wizard-step1-9601">Contact information</h2>

<label for="wiz-name-9601">Full name (9601)</label>
<input type="text" id="wiz-name-9601" name="wiz-name-9601" autocomplete="name">
<label for="wiz-email-9601">Application email (9601)</label>
<input type="email" id="wiz-email-9601" name="wiz-email-9601" autocomplete="email">
<label for="wiz-phone-9601">Contact number (9601)</label>
<input type="tel" id="wiz-phone-9601" name="wiz-phone-9601" autocomplete="tel">
</div>
<div class="wizard-panel" aria-hidden="true" style="display:none"><p>Experience step hidden</p></div>
<div class="field-row"><label for="motivation-statement-9601-96">Motivation statement (9601)</label><textarea id="motivation-statement-9601-96" name="motivation-statement-9601-96" rows="4" maxlength="400"></textarea></div>
<button type="button">Continue</button>
</div></form></main>
</body>
</html>
