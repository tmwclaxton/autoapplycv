<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50167</title></head>
<body>
<main><h1>Conditional complex apply 50167</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50167">
<p id="step1-label-50167">Step 1 - Contact</p>

<label for="cond-name-50167">Legal name (50167)</label>
<input type="text" id="cond-name-50167" name="cond-name-50167" autocomplete="name">
<label for="cond-email-50167">Personal email (50167)</label>
<input type="email" id="cond-email-50167" name="cond-email-50167" autocomplete="email">
<label for="cond-phone-50167">Telephone (50167)</label>
<input type="tel" id="cond-phone-50167" name="cond-phone-50167" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50167">
<p id="step2-label-50167">Step 2 - Preferences</p>
<div class="field-row"><label for="work-location-50167-50167">Work location (50167)</label><select id="work-location-50167-50167" name="work-location-50167-50167"><option value="">Choose one…</option><option value="new-york">New York</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Willing to relocate? (50167)</legend><label for="willing-to-relocate-5016-0"><input type="radio" id="willing-to-relocate-5016-0" name="willing-to-relocate-5016" value="yes"> Yes</label><label for="willing-to-relocate-5016-1"><input type="radio" id="willing-to-relocate-5016-1" name="willing-to-relocate-5016" value="no"> No</label><label for="willing-to-relocate-5016-2"><input type="radio" id="willing-to-relocate-5016-2" name="willing-to-relocate-5016" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="start-date-preference-50167-">Start date preference (50167)</label><input type="date" id="start-date-preference-50167-" name="start-date-preference-50167-" ></div>
<fieldset><legend>Key skills (50167)</legend><label for="key-skills-50167-50167-cb-0"><input type="checkbox" id="key-skills-50167-50167-cb-0" name="key-skills-50167-50167[]" value="go"> Go</label><label for="key-skills-50167-50167-cb-1"><input type="checkbox" id="key-skills-50167-50167-cb-1" name="key-skills-50167-50167[]" value="sql"> SQL</label><label for="key-skills-50167-50167-cb-2"><input type="checkbox" id="key-skills-50167-50167-cb-2" name="key-skills-50167-50167[]" value="javascript"> JavaScript</label><label for="key-skills-50167-50167-cb-3"><input type="checkbox" id="key-skills-50167-50167-cb-3" name="key-skills-50167-50167[]" value="rust"> Rust</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50167">
<p id="step3-label-50167">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50167" data-reveal="#reveal-50167">Show follow-up questions</button>
<div id="reveal-50167" hidden style="display:none"><div class="field-row"><label for="tell-us-about-yourself-50167">Tell us about yourself (50167)</label><textarea id="tell-us-about-yourself-50167" name="tell-us-about-yourself-50167" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="work-samples-link-50167-5016">Work samples link (50167)</label><input type="url" id="work-samples-link-50167-5016" name="work-samples-link-50167-5016" ></div>
<div class="field-row"><label for="salary-expectations-50167-50">Salary expectations (50167)</label><input type="number" id="salary-expectations-50167-50" name="salary-expectations-50167-50" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50167">Attach resume (50167)</label><input type="file" id="file-50167" name="file-50167" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
