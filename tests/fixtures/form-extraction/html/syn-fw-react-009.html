<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>React aria 9</title></head>
<body>
<main><h1>React aria 9</h1><form action="/apply" method="post">
<div data-reactroot class="application">
<input type="text" name="react-name" id="react-name" aria-label="Full name" placeholder="Full name">
<input type="email" name="react-email" id="react-email" aria-label="Email address" placeholder="Email address">
<input type="tel" name="react-phone" id="react-phone" aria-label="Phone number" placeholder="Phone number">
<div class="field-row"><label for="application-source">Application source</label><select id="application-source" name="application-source" ><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="other">Other</option></select></div>
</div></form></main>
</body>
</html>
