<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50056</title></head>
<body>
<main><h1>Wizard complex apply 50056</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50056">
<h2 id="wizard-contact-50056">Contact information</h2>

<label for="wiz-name-50056">Applicant name (50056)</label>
<input type="text" id="wiz-name-50056" name="wiz-name-50056" autocomplete="name">
<label for="wiz-email-50056">Email address (50056)</label>
<input type="email" id="wiz-email-50056" name="wiz-email-50056" autocomplete="email">
<label for="wiz-phone-50056">Telephone (50056)</label>
<input type="tel" id="wiz-phone-50056" name="wiz-phone-50056" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50056">
<h2 id="wizard-screen-50056">Screening questions</h2>
<div class="field-row"><label for="why-this-role-50056-50056">Why this role? (50056)</label><textarea id="why-this-role-50056-50056" name="why-this-role-50056-50056" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="work-location-50056-50056">Work location (50056)</label><select id="work-location-50056-50056" name="work-location-50056-50056"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="london">London</option></select></div>
<fieldset><legend>Work authorization status (50056)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50056-50">Salary expectations (50056)</label><input type="number" id="salary-expectations-50056-50" name="salary-expectations-50056-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50056-500">When can you start? (50056)</label><input type="date" id="when-can-you-start-50056-500" name="when-can-you-start-50056-500" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50056">
<h2 id="wizard-docs-50056">Documents and skills</h2>
<fieldset><legend>Core competencies (50056)</legend><label for="core-competencies-50056--cb-0"><input type="checkbox" id="core-competencies-50056--cb-0" name="core-competencies-50056-[]" value="rust"> Rust</label><label for="core-competencies-50056--cb-1"><input type="checkbox" id="core-competencies-50056--cb-1" name="core-competencies-50056-[]" value="go"> Go</label><label for="core-competencies-50056--cb-2"><input type="checkbox" id="core-competencies-50056--cb-2" name="core-competencies-50056-[]" value="laravel"> Laravel</label><label for="core-competencies-50056--cb-3"><input type="checkbox" id="core-competencies-50056--cb-3" name="core-competencies-50056-[]" value="typescript"> TypeScript</label><label for="core-competencies-50056--cb-4"><input type="checkbox" id="core-competencies-50056--cb-4" name="core-competencies-50056-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50056">Attach resume (50056)</label><input type="file" id="file-50056" name="file-50056" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="referral-source-50056-50056">Referral source (50056)</label><select id="referral-source-50056-50056" name="referral-source-50056-50056"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="other">Other</option><option value="company-site">Company site</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
