<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Prefilled Application 7</title></head>
<body>
<main>
<h1>Prefilled Application 7</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="prefilled-name">Full name</label><input type="text" id="prefilled-name" name="prefilled-name" value="Morgan Morgan"></div>
<div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" ></div>
<div class="form-group"><label for="mobile-number">Mobile number</label><input type="tel" id="mobile-number" name="mobile-number" ></div>
<div class="form-group"><label for="tell-us-about-yourself">Tell us about yourself</label><textarea id="tell-us-about-yourself" name="tell-us-about-yourself" rows="4" maxlength="400"></textarea></div>

</form>
</main>
</body>
</html>
