<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9194</title></head>
<body>

<mat-form-field appearance="outline"><mat-label>Your name (9194)</mat-label><label for="ang-name-9194">Your name (9194)</label><input matInput id="ang-name-9194" name="ang-name-9194" type="text"></mat-form-field>

</form></main>
</body>
</html>
