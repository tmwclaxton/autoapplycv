<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9165</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9165</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Applicant name (9165)</mat-label><label for="ang-name-9165">Applicant name (9165)</label><input matInput id="ang-name-9165" name="ang-name-9165" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Personal email (9165)</mat-label><label for="ang-email-9165">Personal email (9165)</label><input matInput id="ang-email-9165" name="ang-email-9165" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Direct line (9165)</mat-label><label for="ang-phone-9165">Direct line (9165)</label><input matInput id="ang-phone-9165" name="ang-phone-9165" type="tel"></mat-form-field>
<div class="field-row"><label for="cover-letter-9165-9165">Cover letter (9165)</label><textarea id="cover-letter-9165-9165" name="cover-letter-9165-9165" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-9165-9165">Work location (9165)</label><select id="work-location-9165-9165" name="work-location-9165-9165"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option><option value="london">London</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
