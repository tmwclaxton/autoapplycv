<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50439</title></head>
<body>
<main><h1>Long complex apply 50439</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50439">Applicant name (50439)</label>
<input type="text" id="long-name-50439" name="long-name-50439" autocomplete="name">
<label for="long-email-50439">Personal email (50439)</label>
<input type="email" id="long-email-50439" name="long-email-50439" autocomplete="email">
<label for="long-phone-50439">Mobile number (50439)</label>
<input type="tel" id="long-phone-50439" name="long-phone-50439" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50439">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50439" name="linkedin-profile-url-50439" ></div>
<div class="field-row"><label for="current-employer-50439">Current employer</label><input type="text" id="current-employer-50439" name="current-employer-50439" ></div>
<div class="field-row"><label for="current-job-title-50439">Current job title</label><input type="text" id="current-job-title-50439" name="current-job-title-50439" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="tell-us-about-yourself-50439">Tell us about yourself (50439)</label><textarea id="tell-us-about-yourself-50439" name="tell-us-about-yourself-50439" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="office-preference-50439-5043">Office preference (50439)</label><select id="office-preference-50439-5043" name="office-preference-50439-5043"><option value="">Choose one…</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50439)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50439)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50439-50439">Expected salary (50439)</label><input type="number" id="expected-salary-50439-50439" name="expected-salary-50439-50439" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50439-504">When can you start? (50439)</label><input type="date" id="when-can-you-start-50439-504" name="when-can-you-start-50439-504" ></div>
<div class="field-row"><label for="application-source-50439-504">Application source (50439)</label><select id="application-source-50439-504" name="application-source-50439-504"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="other">Other</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Key skills (50439)</legend><label for="key-skills-50439-50439-cb-0"><input type="checkbox" id="key-skills-50439-50439-cb-0" name="key-skills-50439-50439[]" value="typescript"> TypeScript</label><label for="key-skills-50439-50439-cb-1"><input type="checkbox" id="key-skills-50439-50439-cb-1" name="key-skills-50439-50439[]" value="sql"> SQL</label><label for="key-skills-50439-50439-cb-2"><input type="checkbox" id="key-skills-50439-50439-cb-2" name="key-skills-50439-50439[]" value="python"> Python</label><label for="key-skills-50439-50439-cb-3"><input type="checkbox" id="key-skills-50439-50439-cb-3" name="key-skills-50439-50439[]" value="react"> React</label><label for="key-skills-50439-50439-cb-4"><input type="checkbox" id="key-skills-50439-50439-cb-4" name="key-skills-50439-50439[]" value="rust"> Rust</label><label for="key-skills-50439-50439-cb-5"><input type="checkbox" id="key-skills-50439-50439-cb-5" name="key-skills-50439-50439[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50439">Attach resume (50439)</label><input type="file" id="file-50439" name="file-50439" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
