<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Personio apply 20122</title></head>
<body>

<main class="personio-application"><h1>Bewerbung 20122</h1>
<form class="application-form" action="/apply" method="post">
<div class="form-row">
<label for="pe-name-20122">Your name (20122)</label>
<input type="text" id="pe-name-20122" name="pe-name-20122" autocomplete="name">
<label for="pe-email-20122">Personal email (20122)</label>
<input type="email" id="pe-email-20122" name="pe-email-20122" autocomplete="email">
<label for="pe-phone-20122">Phone number (20122)</label>
<input type="tel" id="pe-phone-20122" name="pe-phone-20122" autocomplete="tel"></div>

</form></main>
</body>
</html>
