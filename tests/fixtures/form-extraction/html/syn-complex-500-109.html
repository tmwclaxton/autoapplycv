<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50109</title></head>
<body>
<main><h1>Long complex apply 50109</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50109">Your name (50109)</label>
<input type="text" id="long-name-50109" name="long-name-50109" autocomplete="name">
<label for="long-email-50109">Work email (50109)</label>
<input type="email" id="long-email-50109" name="long-email-50109" autocomplete="email">
<label for="long-phone-50109">Contact number (50109)</label>
<input type="tel" id="long-phone-50109" name="long-phone-50109" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50109">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50109" name="linkedin-profile-url-50109" ></div>
<div class="field-row"><label for="current-employer-50109">Current employer</label><input type="text" id="current-employer-50109" name="current-employer-50109" ></div>
<div class="field-row"><label for="current-job-title-50109">Current job title</label><input type="text" id="current-job-title-50109" name="current-job-title-50109" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="personal-statement-50109-501">Personal statement (50109)</label><textarea id="personal-statement-50109-501" name="personal-statement-50109-501" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="work-location-50109-50109">Work location (50109)</label><select id="work-location-50109-50109" name="work-location-50109-50109"><option value="">Choose one…</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50109)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50109)</legend><label for="open-to-relocation-50109-0"><input type="radio" id="open-to-relocation-50109-0" name="open-to-relocation-50109" value="yes"> Yes</label><label for="open-to-relocation-50109-1"><input type="radio" id="open-to-relocation-50109-1" name="open-to-relocation-50109" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50109-50">Desired base salary (50109)</label><input type="number" id="desired-base-salary-50109-50" name="desired-base-salary-50109-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50109-50109">Available from (50109)</label><input type="date" id="available-from-50109-50109" name="available-from-50109-50109" ></div>
<div class="field-row"><label for="referral-source-50109-50109">Referral source (50109)</label><select id="referral-source-50109-50109" name="referral-source-50109-50109"><option value="">Choose one…</option><option value="conference">Conference</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="referral">Referral</option><option value="other">Other</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Core competencies (50109)</legend><label for="core-competencies-50109--cb-0"><input type="checkbox" id="core-competencies-50109--cb-0" name="core-competencies-50109-[]" value="go"> Go</label><label for="core-competencies-50109--cb-1"><input type="checkbox" id="core-competencies-50109--cb-1" name="core-competencies-50109-[]" value="laravel"> Laravel</label><label for="core-competencies-50109--cb-2"><input type="checkbox" id="core-competencies-50109--cb-2" name="core-competencies-50109-[]" value="react"> React</label><label for="core-competencies-50109--cb-3"><input type="checkbox" id="core-competencies-50109--cb-3" name="core-competencies-50109-[]" value="sql"> SQL</label><label for="core-competencies-50109--cb-4"><input type="checkbox" id="core-competencies-50109--cb-4" name="core-competencies-50109-[]" value="python"> Python</label><label for="core-competencies-50109--cb-5"><input type="checkbox" id="core-competencies-50109--cb-5" name="core-competencies-50109-[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50109">Attach resume (50109)</label><input type="file" id="file-50109" name="file-50109" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
