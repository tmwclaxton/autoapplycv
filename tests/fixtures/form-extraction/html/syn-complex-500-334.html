<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters complex apply 50334</title></head>
<body>

<main data-sr-application="true"><h1>Apply 50334</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">
<h2>Contact information</h2>

<label for="sr-name-50334">Full name (50334)</label>
<input type="text" id="sr-name-50334" name="sr-name-50334" autocomplete="name">
<label for="sr-email-50334">Personal email (50334)</label>
<input type="email" id="sr-email-50334" name="sr-email-50334" autocomplete="email">
<label for="sr-phone-50334">Telephone (50334)</label>
<input type="tel" id="sr-phone-50334" name="sr-phone-50334" autocomplete="tel">
</section>
<section class="sr-section" data-section="experience">
<h2>Experience and motivation</h2>
<div class="field-row"><label for="motivation-statement-50334-5">Motivation statement (50334)</label><textarea id="motivation-statement-50334-5" name="motivation-statement-50334-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="portfolio-url-50334-50334">Portfolio URL (50334)</label><input type="url" id="portfolio-url-50334-50334" name="portfolio-url-50334-50334" ></div>
</section>
<section class="sr-section" data-section="preferences">
<h2>Preferences</h2>
<div class="field-row"><label for="preferred-location-50334-503">Preferred location (50334)</label><select id="preferred-location-50334-503" name="preferred-location-50334-503"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="london">London</option></select></div>
<fieldset><legend>Work authorization status (50334)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50334-50">Salary expectations (50334)</label><input type="number" id="salary-expectations-50334-50" name="salary-expectations-50334-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50334-">Start date preference (50334)</label><input type="date" id="start-date-preference-50334-" name="start-date-preference-50334-" ></div>
<fieldset><legend>Technical skills (50334)</legend><label for="technical-skills-50334-5-cb-0"><input type="checkbox" id="technical-skills-50334-5-cb-0" name="technical-skills-50334-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50334-5-cb-1"><input type="checkbox" id="technical-skills-50334-5-cb-1" name="technical-skills-50334-5[]" value="go"> Go</label><label for="technical-skills-50334-5-cb-2"><input type="checkbox" id="technical-skills-50334-5-cb-2" name="technical-skills-50334-5[]" value="rust"> Rust</label><label for="technical-skills-50334-5-cb-3"><input type="checkbox" id="technical-skills-50334-5-cb-3" name="technical-skills-50334-5[]" value="sql"> SQL</label></fieldset>
</section>
<section class="sr-section" data-section="documents">
<h2>Documents</h2>
<div class="file-row"><label for="file-50334">Attach resume (50334)</label><input type="file" id="file-50334" name="file-50334" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
