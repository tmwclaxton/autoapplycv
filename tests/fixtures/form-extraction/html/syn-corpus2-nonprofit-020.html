<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nonprofit volunteer 20451</title></head>
<body>
<main><h1>Nonprofit volunteer 20451</h1><form action="/apply" method="post">
<div class="volunteer-application">
<p class="intro">Thank you for your interest in volunteering.</p>

<label for="np-name-20451">Full name (20451)</label>
<input type="text" id="np-name-20451" name="np-name-20451" autocomplete="name">
<label for="np-email-20451">Contact email (20451)</label>
<input type="email" id="np-email-20451" name="np-email-20451" autocomplete="email">
<label for="np-phone-20451">Mobile number (20451)</label>
<input type="tel" id="np-phone-20451" name="np-phone-20451" autocomplete="tel">
<div class="field-row"><label for="current-city-20451-20451">Current city (20451)</label><select id="current-city-20451-20451" name="current-city-20451-20451"><option value="">Choose one…</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option></select></div>
<div class="field-row"><label for="motivation-statement-20451-2">Motivation statement (20451)</label><textarea id="motivation-statement-20451-2" name="motivation-statement-20451-2" rows="4" maxlength="400"></textarea></div>
<fieldset><legend>Available for weekend shifts?</legend><label for="available-for-weekend-sh-0"><input type="radio" id="available-for-weekend-sh-0" name="available-for-weekend-sh" value="yes"> Yes</label><label for="available-for-weekend-sh-1"><input type="radio" id="available-for-weekend-sh-1" name="available-for-weekend-sh" value="no"> No</label><label for="available-for-weekend-sh-2"><input type="radio" id="available-for-weekend-sh-2" name="available-for-weekend-sh" value="sometimes"> Sometimes</label></fieldset>
</div></form></main>
</body>
</html>
