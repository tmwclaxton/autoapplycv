<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50380</title></head>
<body>
<main><h1>Mixed complex apply 50380</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50380">Your name (50380)</label>
<input type="text" id="mix-name-50380" name="mix-name-50380" autocomplete="name">
<label for="mix-email-50380">Email address (50380)</label>
<input type="email" id="mix-email-50380" name="mix-email-50380" autocomplete="email">
<label for="mix-phone-50380">Telephone (50380)</label>
<input type="tel" id="mix-phone-50380" name="mix-phone-50380" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50380-50380">Cover letter (50380)</label><textarea id="cover-letter-50380-50380" name="cover-letter-50380-50380" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50380-503">Preferred location (50380)</label><select id="preferred-location-50380-503" name="preferred-location-50380-503"><option value="">Choose one…</option><option value="london">London</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50380)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50380)</legend><label for="willing-to-relocate-5038-0"><input type="radio" id="willing-to-relocate-5038-0" name="willing-to-relocate-5038" value="yes"> Yes</label><label for="willing-to-relocate-5038-1"><input type="radio" id="willing-to-relocate-5038-1" name="willing-to-relocate-5038" value="no"> No</label><label for="willing-to-relocate-5038-2"><input type="radio" id="willing-to-relocate-5038-2" name="willing-to-relocate-5038" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50380-50">Desired base salary (50380)</label><input type="number" id="desired-base-salary-50380-50" name="desired-base-salary-50380-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50380-50380">Available from (50380)</label><input type="date" id="available-from-50380-50380" name="available-from-50380-50380" ></div>
<div class="field-row"><label for="referral-source-50380-50380">Referral source (50380)</label><select id="referral-source-50380-50380" name="referral-source-50380-50380"><option value="">Choose one…</option><option value="other">Other</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option></select></div>
<fieldset><legend>Primary expertise (50380)</legend><label for="primary-expertise-50380--cb-0"><input type="checkbox" id="primary-expertise-50380--cb-0" name="primary-expertise-50380-[]" value="go"> Go</label><label for="primary-expertise-50380--cb-1"><input type="checkbox" id="primary-expertise-50380--cb-1" name="primary-expertise-50380-[]" value="sql"> SQL</label><label for="primary-expertise-50380--cb-2"><input type="checkbox" id="primary-expertise-50380--cb-2" name="primary-expertise-50380-[]" value="laravel"> Laravel</label><label for="primary-expertise-50380--cb-3"><input type="checkbox" id="primary-expertise-50380--cb-3" name="primary-expertise-50380-[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50380">Attach resume (50380)</label><input type="file" id="file-50380" name="file-50380" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50380-50380">Portfolio URL (50380)</label><input type="url" id="portfolio-url-50380-50380" name="portfolio-url-50380-50380" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
