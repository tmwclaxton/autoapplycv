<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday Application 3</title></head>
<body>
<main>
<h1>Workday Application 3</h1>
<form action="/apply" method="post">
<div data-testid="input-q_your-name" class="ia-Questions-item">
<div data-testid="input-q_your-name-label"><span data-testid="safe-markup">Your name</span></div>
<input data-testid="input-q_your-name-input" type="text" name="input-q_your-name">
</div>
<div data-testid="input-q_contact-email" class="ia-Questions-item">
<div data-testid="input-q_contact-email-label"><span data-testid="safe-markup">Contact email</span></div>
<input data-testid="input-q_contact-email-input" type="email" name="input-q_contact-email">
</div>
<div data-testid="input-q_tell-us-about-yo" class="ia-Questions-item">
<div data-testid="input-q_tell-us-about-yo-label"><span data-testid="safe-markup">Tell us about yourself</span></div>
<textarea data-testid="input-q_tell-us-about-yo-input" name="input-q_tell-us-about-yo" rows="4" maxlength="500"></textarea>
</div>
<div data-testid="input-q_years-in-this-fi" class="ia-Questions-item">
<div data-testid="input-q_years-in-this-fi-label"><span data-testid="safe-markup">Years in this field</span></div>
<input data-testid="input-q_years-in-this-fi-input" type="number" name="input-q_years-in-this-fi">
</div>
<button type="button">Save and continue</button>

</form>
</main>
</body>
</html>
