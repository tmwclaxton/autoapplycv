<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard apply 9612</title></head>
<body>
<main><h1>Wizard apply 9612</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Experience</li><li>Review</li></ol></nav>
<div class="wizard-panel" role="group" aria-labelledby="wizard-step1-9612">
<h2 id="wizard-step1-9612">Contact information</h2>

<label for="wiz-name-9612">Applicant name (9612)</label>
<input type="text" id="wiz-name-9612" name="wiz-name-9612" autocomplete="name">
<label for="wiz-email-9612">Work email (9612)</label>
<input type="email" id="wiz-email-9612" name="wiz-email-9612" autocomplete="email">
<label for="wiz-phone-9612">Mobile number (9612)</label>
<input type="tel" id="wiz-phone-9612" name="wiz-phone-9612" autocomplete="tel">
</div>
<div class="wizard-panel" aria-hidden="true" style="display:none"><p>Experience step hidden</p></div>
<div class="field-row"><label for="tell-us-about-yourself-9612-">Tell us about yourself (9612)</label><textarea id="tell-us-about-yourself-9612-" name="tell-us-about-yourself-9612-" rows="4" maxlength="400"></textarea></div>
<button type="button">Continue</button>
</div></form></main>
</body>
</html>
