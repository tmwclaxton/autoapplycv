<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50176</title></head>
<body>
<main><h1>Wizard complex apply 50176</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50176">
<h2 id="wizard-contact-50176">Contact information</h2>

<label for="wiz-name-50176">Applicant name (50176)</label>
<input type="text" id="wiz-name-50176" name="wiz-name-50176" autocomplete="name">
<label for="wiz-email-50176">Personal email (50176)</label>
<input type="email" id="wiz-email-50176" name="wiz-email-50176" autocomplete="email">
<label for="wiz-phone-50176">Telephone (50176)</label>
<input type="tel" id="wiz-phone-50176" name="wiz-phone-50176" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50176">
<h2 id="wizard-screen-50176">Screening questions</h2>
<div class="field-row"><label for="tell-us-about-yourself-50176">Tell us about yourself (50176)</label><textarea id="tell-us-about-yourself-50176" name="tell-us-about-yourself-50176" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="preferred-location-50176-501">Preferred location (50176)</label><select id="preferred-location-50176-501" name="preferred-location-50176-501"><option value="">Choose one…</option><option value="new-york">New York</option><option value="london">London</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Work authorization status (50176)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50176-50176">Expected salary (50176)</label><input type="number" id="expected-salary-50176-50176" name="expected-salary-50176-50176" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50176-50">Earliest start date (50176)</label><input type="date" id="earliest-start-date-50176-50" name="earliest-start-date-50176-50" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50176">
<h2 id="wizard-docs-50176">Documents and skills</h2>
<fieldset><legend>Key skills (50176)</legend><label for="key-skills-50176-50176-cb-0"><input type="checkbox" id="key-skills-50176-50176-cb-0" name="key-skills-50176-50176[]" value="typescript"> TypeScript</label><label for="key-skills-50176-50176-cb-1"><input type="checkbox" id="key-skills-50176-50176-cb-1" name="key-skills-50176-50176[]" value="rust"> Rust</label><label for="key-skills-50176-50176-cb-2"><input type="checkbox" id="key-skills-50176-50176-cb-2" name="key-skills-50176-50176[]" value="javascript"> JavaScript</label><label for="key-skills-50176-50176-cb-3"><input type="checkbox" id="key-skills-50176-50176-cb-3" name="key-skills-50176-50176[]" value="react"> React</label><label for="key-skills-50176-50176-cb-4"><input type="checkbox" id="key-skills-50176-50176-cb-4" name="key-skills-50176-50176[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50176">Attach resume (50176)</label><input type="file" id="file-50176" name="file-50176" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="application-source-50176-501">Application source (50176)</label><select id="application-source-50176-501" name="application-source-50176-501"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option><option value="company-site">Company site</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
