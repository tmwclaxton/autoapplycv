<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50229</title></head>
<body>
<main><h1>Long complex apply 50229</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50229">Legal name (50229)</label>
<input type="text" id="long-name-50229" name="long-name-50229" autocomplete="name">
<label for="long-email-50229">Email address (50229)</label>
<input type="email" id="long-email-50229" name="long-email-50229" autocomplete="email">
<label for="long-phone-50229">Contact number (50229)</label>
<input type="tel" id="long-phone-50229" name="long-phone-50229" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50229">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50229" name="linkedin-profile-url-50229" ></div>
<div class="field-row"><label for="current-employer-50229">Current employer</label><input type="text" id="current-employer-50229" name="current-employer-50229" ></div>
<div class="field-row"><label for="current-job-title-50229">Current job title</label><input type="text" id="current-job-title-50229" name="current-job-title-50229" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="motivation-statement-50229-5">Motivation statement (50229)</label><textarea id="motivation-statement-50229-5" name="motivation-statement-50229-5" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="current-city-50229-50229">Current city (50229)</label><select id="current-city-50229-50229" name="current-city-50229-50229"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="london">London</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50229)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50229)</legend><label for="open-to-relocation-50229-0"><input type="radio" id="open-to-relocation-50229-0" name="open-to-relocation-50229" value="yes"> Yes</label><label for="open-to-relocation-50229-1"><input type="radio" id="open-to-relocation-50229-1" name="open-to-relocation-50229" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50229-50">Desired base salary (50229)</label><input type="number" id="desired-base-salary-50229-50" name="desired-base-salary-50229-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50229-">Start date preference (50229)</label><input type="date" id="start-date-preference-50229-" name="start-date-preference-50229-" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50229)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="other">Other</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Technical skills (50229)</legend><label for="technical-skills-50229-5-cb-0"><input type="checkbox" id="technical-skills-50229-5-cb-0" name="technical-skills-50229-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50229-5-cb-1"><input type="checkbox" id="technical-skills-50229-5-cb-1" name="technical-skills-50229-5[]" value="python"> Python</label><label for="technical-skills-50229-5-cb-2"><input type="checkbox" id="technical-skills-50229-5-cb-2" name="technical-skills-50229-5[]" value="sql"> SQL</label><label for="technical-skills-50229-5-cb-3"><input type="checkbox" id="technical-skills-50229-5-cb-3" name="technical-skills-50229-5[]" value="react"> React</label><label for="technical-skills-50229-5-cb-4"><input type="checkbox" id="technical-skills-50229-5-cb-4" name="technical-skills-50229-5[]" value="go"> Go</label><label for="technical-skills-50229-5-cb-5"><input type="checkbox" id="technical-skills-50229-5-cb-5" name="technical-skills-50229-5[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50229">Attach resume (50229)</label><input type="file" id="file-50229" name="file-50229" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
