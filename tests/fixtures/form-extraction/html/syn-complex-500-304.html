<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters complex apply 50304</title></head>
<body>

<main data-sr-application="true"><h1>Apply 50304</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">
<h2>Contact information</h2>

<label for="sr-name-50304">Your name (50304)</label>
<input type="text" id="sr-name-50304" name="sr-name-50304" autocomplete="name">
<label for="sr-email-50304">Work email (50304)</label>
<input type="email" id="sr-email-50304" name="sr-email-50304" autocomplete="email">
<label for="sr-phone-50304">Contact number (50304)</label>
<input type="tel" id="sr-phone-50304" name="sr-phone-50304" autocomplete="tel">
</section>
<section class="sr-section" data-section="experience">
<h2>Experience and motivation</h2>
<div class="field-row"><label for="tell-us-about-yourself-50304">Tell us about yourself (50304)</label><textarea id="tell-us-about-yourself-50304" name="tell-us-about-yourself-50304" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="personal-website-50304-50304">Personal website (50304)</label><input type="url" id="personal-website-50304-50304" name="personal-website-50304-50304" ></div>
</section>
<section class="sr-section" data-section="preferences">
<h2>Preferences</h2>
<div class="field-row"><label for="current-city-50304-50304">Current city (50304)</label><select id="current-city-50304-50304" name="current-city-50304-50304"><option value="">Choose one…</option><option value="remote">Remote</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50304)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50304-50">Desired base salary (50304)</label><input type="number" id="desired-base-salary-50304-50" name="desired-base-salary-50304-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50304-">Start date preference (50304)</label><input type="date" id="start-date-preference-50304-" name="start-date-preference-50304-" ></div>
<fieldset><legend>Key skills (50304)</legend><label for="key-skills-50304-50304-cb-0"><input type="checkbox" id="key-skills-50304-50304-cb-0" name="key-skills-50304-50304[]" value="laravel"> Laravel</label><label for="key-skills-50304-50304-cb-1"><input type="checkbox" id="key-skills-50304-50304-cb-1" name="key-skills-50304-50304[]" value="javascript"> JavaScript</label><label for="key-skills-50304-50304-cb-2"><input type="checkbox" id="key-skills-50304-50304-cb-2" name="key-skills-50304-50304[]" value="go"> Go</label><label for="key-skills-50304-50304-cb-3"><input type="checkbox" id="key-skills-50304-50304-cb-3" name="key-skills-50304-50304[]" value="react"> React</label></fieldset>
</section>
<section class="sr-section" data-section="documents">
<h2>Documents</h2>
<div class="file-row"><label for="file-50304">Attach resume (50304)</label><input type="file" id="file-50304" name="file-50304" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
