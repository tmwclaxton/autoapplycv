<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9548</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9548</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9548">Applicant name (9548)</label>
<input type="text" id="sr-name-9548" name="sr-name-9548" autocomplete="name">
<label for="sr-email-9548">Application email (9548)</label>
<input type="email" id="sr-email-9548" name="sr-email-9548" autocomplete="email">
<label for="sr-phone-9548">Cell phone (9548)</label>
<input type="tel" id="sr-phone-9548" name="sr-phone-9548" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="personal-statement-9548-9548">Personal statement (9548)</label><textarea id="personal-statement-9548-9548" name="personal-statement-9548-9548" rows="4" maxlength="500"></textarea></div>

<div class="field-row">
<span id="listbox-9548-lbl">Preferred location (9548)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9548" aria-labelledby="listbox-9548-lbl" tabindex="0">Preferred location (9548)</div>
<div role="listbox" id="listbox-9548" aria-labelledby="listbox-9548-lbl">
<div role="option" data-value="hybrid">Hybrid</div><div role="option" data-value="dublin">Dublin</div><div role="option" data-value="remote">Remote</div><div role="option" data-value="london">London</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
