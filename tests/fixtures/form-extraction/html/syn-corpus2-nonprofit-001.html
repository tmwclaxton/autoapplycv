<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nonprofit volunteer 20432</title></head>
<body>
<main><h1>Nonprofit volunteer 20432</h1><form action="/apply" method="post">
<div class="volunteer-application">
<p class="intro">Thank you for your interest in volunteering.</p>

<label for="np-name-20432">Full name (20432)</label>
<input type="text" id="np-name-20432" name="np-name-20432" autocomplete="name">
<label for="np-email-20432">Contact email (20432)</label>
<input type="email" id="np-email-20432" name="np-email-20432" autocomplete="email">
<label for="np-phone-20432">Contact number (20432)</label>
<input type="tel" id="np-phone-20432" name="np-phone-20432" autocomplete="tel">

<div class="field-row"><label for="motivation-statement-20432-2">Motivation statement (20432)</label><textarea id="motivation-statement-20432-2" name="motivation-statement-20432-2" rows="4" maxlength="400"></textarea></div>
<fieldset><legend>Available for weekend shifts?</legend><label for="available-for-weekend-sh-0"><input type="radio" id="available-for-weekend-sh-0" name="available-for-weekend-sh" value="yes"> Yes</label><label for="available-for-weekend-sh-1"><input type="radio" id="available-for-weekend-sh-1" name="available-for-weekend-sh" value="no"> No</label><label for="available-for-weekend-sh-2"><input type="radio" id="available-for-weekend-sh-2" name="available-for-weekend-sh" value="sometimes"> Sometimes</label></fieldset>
</div></form></main>
</body>
</html>
