<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 1</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 1</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline">
<mat-label>Full name</mat-label>
<label for="ang-name">Full name</label>
<input matInput id="ang-name" name="ang-name" type="text" ng-model="candidate.name">
</mat-form-field>
<mat-form-field appearance="outline">
<mat-label>Email address</mat-label>
<label for="ang-email">Email address</label>
<input matInput id="ang-email" name="ang-email" type="email" ng-model="candidate.email">
</mat-form-field>
<mat-form-field appearance="outline">
<mat-label>Phone number</mat-label>
<label for="ang-phone">Phone number</label>
<input matInput id="ang-phone" name="ang-phone" type="tel" ng-model="candidate.phone">
</mat-form-field>
<div class="field-row"><label for="cover-letter">Cover letter</label><textarea id="cover-letter" name="cover-letter" rows="4" maxlength="500" ></textarea></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
