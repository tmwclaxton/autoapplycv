<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Prefilled Application 3</title></head>
<body>
<main>
<h1>Prefilled Application 3</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="prefilled-name">Full name</label><input type="text" id="prefilled-name" name="prefilled-name" value="Sam Morgan"></div>
<div class="form-group"><label for="contact-email">Contact email</label><input type="email" id="contact-email" name="contact-email" ></div>
<div class="form-group"><label for="telephone">Telephone</label><input type="tel" id="telephone" name="telephone" ></div>
<div class="form-group"><label for="tell-us-about-yourself">Tell us about yourself</label><textarea id="tell-us-about-yourself" name="tell-us-about-yourself" rows="4" maxlength="400"></textarea></div>

</form>
</main>
</body>
</html>
