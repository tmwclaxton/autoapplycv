<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50100</title></head>
<body>
<main><h1>Mixed complex apply 50100</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50100">Applicant name (50100)</label>
<input type="text" id="mix-name-50100" name="mix-name-50100" autocomplete="name">
<label for="mix-email-50100">Contact email (50100)</label>
<input type="email" id="mix-email-50100" name="mix-email-50100" autocomplete="email">
<label for="mix-phone-50100">Mobile number (50100)</label>
<input type="tel" id="mix-phone-50100" name="mix-phone-50100" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50100-50100">Cover letter (50100)</label><textarea id="cover-letter-50100-50100" name="cover-letter-50100-50100" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50100-501">Preferred location (50100)</label><select id="preferred-location-50100-501" name="preferred-location-50100-501"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="manchester">Manchester</option><option value="london">London</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50100)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50100)</legend><label for="open-to-relocation-50100-0"><input type="radio" id="open-to-relocation-50100-0" name="open-to-relocation-50100" value="yes"> Yes</label><label for="open-to-relocation-50100-1"><input type="radio" id="open-to-relocation-50100-1" name="open-to-relocation-50100" value="no"> No</label><label for="open-to-relocation-50100-2"><input type="radio" id="open-to-relocation-50100-2" name="open-to-relocation-50100" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50100-50">Desired base salary (50100)</label><input type="number" id="desired-base-salary-50100-50" name="desired-base-salary-50100-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50100-50100">Available from (50100)</label><input type="date" id="available-from-50100-50100" name="available-from-50100-50100" ></div>
<div class="field-row"><label for="referral-source-50100-50100">Referral source (50100)</label><select id="referral-source-50100-50100" name="referral-source-50100-50100"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="other">Other</option></select></div>
<fieldset><legend>Key skills (50100)</legend><label for="key-skills-50100-50100-cb-0"><input type="checkbox" id="key-skills-50100-50100-cb-0" name="key-skills-50100-50100[]" value="go"> Go</label><label for="key-skills-50100-50100-cb-1"><input type="checkbox" id="key-skills-50100-50100-cb-1" name="key-skills-50100-50100[]" value="rust"> Rust</label><label for="key-skills-50100-50100-cb-2"><input type="checkbox" id="key-skills-50100-50100-cb-2" name="key-skills-50100-50100[]" value="laravel"> Laravel</label><label for="key-skills-50100-50100-cb-3"><input type="checkbox" id="key-skills-50100-50100-cb-3" name="key-skills-50100-50100[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50100">Attach resume (50100)</label><input type="file" id="file-50100" name="file-50100" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50100-50100">GitHub profile (50100)</label><input type="url" id="github-profile-50100-50100" name="github-profile-50100-50100" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
