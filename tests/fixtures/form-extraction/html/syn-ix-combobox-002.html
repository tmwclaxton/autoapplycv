<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>React combobox</title></head>
<body>
<main><h1>React combobox</h1><form action="/apply" method="post">
<label for="ix-name-6">Applicant name</label>
<input type="text" id="ix-name-6" name="ix-name-6">
<label for="ix-email-6">Contact email</label>
<input type="email" id="ix-email-6" name="ix-email-6">
<label for="ix-phone-6">Contact number</label>
<input type="tel" id="ix-phone-6" name="ix-phone-6">
<div data-reactroot class="ApplicationForm">
<div class="MuiAutocomplete-root">
<label id="react-listbox-6-lbl">Office preference</label>
<div role="combobox" aria-expanded="false" aria-controls="react-listbox-6" aria-labelledby="react-listbox-6-lbl" class="custom-dropdown-trigger" tabindex="0" data-reveal="#react-listbox-6">Office preference</div>
<div role="listbox" id="react-listbox-6" aria-labelledby="react-listbox-6-lbl" hidden style="display:none">
<div role="option">Office</div>
<div role="option">Remote</div>
<div role="option">Hybrid</div>
</div>
</div>
</div></form></main>
</body>
</html>
