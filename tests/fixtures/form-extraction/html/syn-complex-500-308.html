<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50308</title></head>
<body>
<main><h1>Mixed complex apply 50308</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50308">Preferred name (50308)</label>
<input type="text" id="mix-name-50308" name="mix-name-50308" autocomplete="name">
<label for="mix-email-50308">Email address (50308)</label>
<input type="email" id="mix-email-50308" name="mix-email-50308" autocomplete="email">
<label for="mix-phone-50308">Telephone (50308)</label>
<input type="tel" id="mix-phone-50308" name="mix-phone-50308" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50308">Tell us about yourself (50308)</label><textarea id="tell-us-about-yourself-50308" name="tell-us-about-yourself-50308" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50308-503">Preferred location (50308)</label><select id="preferred-location-50308-503" name="preferred-location-50308-503"><option value="">Choose one…</option><option value="new-york">New York</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50308)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50308)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50308-50308">Expected salary (50308)</label><input type="number" id="expected-salary-50308-50308" name="expected-salary-50308-50308" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50308-503">When can you start? (50308)</label><input type="date" id="when-can-you-start-50308-503" name="when-can-you-start-50308-503" ></div>
<div class="field-row"><label for="application-source-50308-503">Application source (50308)</label><select id="application-source-50308-503" name="application-source-50308-503"><option value="">Choose one…</option><option value="conference">Conference</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="other">Other</option></select></div>
<fieldset><legend>Key skills (50308)</legend><label for="key-skills-50308-50308-cb-0"><input type="checkbox" id="key-skills-50308-50308-cb-0" name="key-skills-50308-50308[]" value="react"> React</label><label for="key-skills-50308-50308-cb-1"><input type="checkbox" id="key-skills-50308-50308-cb-1" name="key-skills-50308-50308[]" value="go"> Go</label><label for="key-skills-50308-50308-cb-2"><input type="checkbox" id="key-skills-50308-50308-cb-2" name="key-skills-50308-50308[]" value="python"> Python</label><label for="key-skills-50308-50308-cb-3"><input type="checkbox" id="key-skills-50308-50308-cb-3" name="key-skills-50308-50308[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50308">Attach resume (50308)</label><input type="file" id="file-50308" name="file-50308" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50308-50308">GitHub profile (50308)</label><input type="url" id="github-profile-50308-50308" name="github-profile-50308-50308" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
