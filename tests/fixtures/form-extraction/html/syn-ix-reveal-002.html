<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Add answer reveal</title></head>
<body>
<main><h1>Add answer reveal</h1><form action="/apply" method="post">
<label for="ix-name-24">Full name</label>
<input type="text" id="ix-name-24" name="ix-name-24">
<label for="ix-email-24">Email address</label>
<input type="email" id="ix-email-24" name="ix-email-24">
<label for="ix-phone-24">Phone number</label>
<input type="tel" id="ix-phone-24" name="ix-phone-24">
<button type="button" id="add-answer-24" data-reveal="#answer-panel-24">Add answer</button>
<div id="answer-panel-24" hidden style="display:none">
<label for="answer-24">Tell us about a recent project</label>
<textarea id="answer-24" name="answer-24" rows="5" maxlength="600"></textarea>
</div></form></main>
</body>
</html>
