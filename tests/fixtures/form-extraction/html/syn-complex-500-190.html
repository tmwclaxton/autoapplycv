<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50190</title></head>
<body>
<main><h1>Mixed complex apply 50190</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50190">Preferred name (50190)</label>
<input type="text" id="mix-name-50190" name="mix-name-50190" autocomplete="name">
<label for="mix-email-50190">Personal email (50190)</label>
<input type="email" id="mix-email-50190" name="mix-email-50190" autocomplete="email">
<label for="mix-phone-50190">Contact number (50190)</label>
<input type="tel" id="mix-phone-50190" name="mix-phone-50190" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="motivation-statement-50190-5">Motivation statement (50190)</label><textarea id="motivation-statement-50190-5" name="motivation-statement-50190-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50190-50190">Current city (50190)</label><select id="current-city-50190-50190" name="current-city-50190-50190"><option value="">Choose one…</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="remote">Remote</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50190)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50190)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50190-50190">Expected salary (50190)</label><input type="number" id="expected-salary-50190-50190" name="expected-salary-50190-50190" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50190-50">Earliest start date (50190)</label><input type="date" id="earliest-start-date-50190-50" name="earliest-start-date-50190-50" ></div>
<div class="field-row"><label for="referral-source-50190-50190">Referral source (50190)</label><select id="referral-source-50190-50190" name="referral-source-50190-50190"><option value="">Choose one…</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="other">Other</option><option value="job-board">Job board</option></select></div>
<fieldset><legend>Key skills (50190)</legend><label for="key-skills-50190-50190-cb-0"><input type="checkbox" id="key-skills-50190-50190-cb-0" name="key-skills-50190-50190[]" value="sql"> SQL</label><label for="key-skills-50190-50190-cb-1"><input type="checkbox" id="key-skills-50190-50190-cb-1" name="key-skills-50190-50190[]" value="go"> Go</label><label for="key-skills-50190-50190-cb-2"><input type="checkbox" id="key-skills-50190-50190-cb-2" name="key-skills-50190-50190[]" value="laravel"> Laravel</label><label for="key-skills-50190-50190-cb-3"><input type="checkbox" id="key-skills-50190-50190-cb-3" name="key-skills-50190-50190[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50190">Attach resume (50190)</label><input type="file" id="file-50190" name="file-50190" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50190-50190">GitHub profile (50190)</label><input type="url" id="github-profile-50190-50190" name="github-profile-50190-50190" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
