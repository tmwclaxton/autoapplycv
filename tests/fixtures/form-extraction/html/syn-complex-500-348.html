<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50348</title></head>
<body>
<main><h1>Mixed complex apply 50348</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50348">Full name (50348)</label>
<input type="text" id="mix-name-50348" name="mix-name-50348" autocomplete="name">
<label for="mix-email-50348">Work email (50348)</label>
<input type="email" id="mix-email-50348" name="mix-email-50348" autocomplete="email">
<label for="mix-phone-50348">Telephone (50348)</label>
<input type="tel" id="mix-phone-50348" name="mix-phone-50348" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="cover-letter-50348-50348">Cover letter (50348)</label><textarea id="cover-letter-50348-50348" name="cover-letter-50348-50348" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50348-50348">Current city (50348)</label><select id="current-city-50348-50348" name="current-city-50348-50348"><option value="">Choose one…</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50348)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50348)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50348-50">Salary expectations (50348)</label><input type="number" id="salary-expectations-50348-50" name="salary-expectations-50348-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50348-503">When can you start? (50348)</label><input type="date" id="when-can-you-start-50348-503" name="when-can-you-start-50348-503" ></div>
<div class="field-row"><label for="application-source-50348-503">Application source (50348)</label><select id="application-source-50348-503" name="application-source-50348-503"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="other">Other</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Key skills (50348)</legend><label for="key-skills-50348-50348-cb-0"><input type="checkbox" id="key-skills-50348-50348-cb-0" name="key-skills-50348-50348[]" value="typescript"> TypeScript</label><label for="key-skills-50348-50348-cb-1"><input type="checkbox" id="key-skills-50348-50348-cb-1" name="key-skills-50348-50348[]" value="sql"> SQL</label><label for="key-skills-50348-50348-cb-2"><input type="checkbox" id="key-skills-50348-50348-cb-2" name="key-skills-50348-50348[]" value="rust"> Rust</label><label for="key-skills-50348-50348-cb-3"><input type="checkbox" id="key-skills-50348-50348-cb-3" name="key-skills-50348-50348[]" value="go"> Go</label></fieldset>
<div class="file-row"><label for="file-50348">Attach resume (50348)</label><input type="file" id="file-50348" name="file-50348" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50348-50348">Personal website (50348)</label><input type="url" id="personal-website-50348-50348" name="personal-website-50348-50348" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
