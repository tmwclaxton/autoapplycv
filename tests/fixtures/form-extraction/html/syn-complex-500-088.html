<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50088</title></head>
<body>
<main><h1>Mixed complex apply 50088</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50088">Applicant name (50088)</label>
<input type="text" id="mix-name-50088" name="mix-name-50088" autocomplete="name">
<label for="mix-email-50088">Email address (50088)</label>
<input type="email" id="mix-email-50088" name="mix-email-50088" autocomplete="email">
<label for="mix-phone-50088">Telephone (50088)</label>
<input type="tel" id="mix-phone-50088" name="mix-phone-50088" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="personal-statement-50088-500">Personal statement (50088)</label><textarea id="personal-statement-50088-500" name="personal-statement-50088-500" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-50088-5008">Office preference (50088)</label><select id="office-preference-50088-5008" name="office-preference-50088-5008"><option value="">Choose one…</option><option value="remote">Remote</option><option value="dublin">Dublin</option><option value="london">London</option><option value="new-york">New York</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Work authorization status (50088)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50088)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-500">Compensation requirement (50088)</label><input type="number" id="compensation-requirement-500" name="compensation-requirement-500" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50088-50088">Available from (50088)</label><input type="date" id="available-from-50088-50088" name="available-from-50088-50088" ></div>
<div class="field-row"><label for="referral-source-50088-50088">Referral source (50088)</label><select id="referral-source-50088-50088" name="referral-source-50088-50088"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="other">Other</option></select></div>
<fieldset><legend>Primary expertise (50088)</legend><label for="primary-expertise-50088--cb-0"><input type="checkbox" id="primary-expertise-50088--cb-0" name="primary-expertise-50088-[]" value="python"> Python</label><label for="primary-expertise-50088--cb-1"><input type="checkbox" id="primary-expertise-50088--cb-1" name="primary-expertise-50088-[]" value="go"> Go</label><label for="primary-expertise-50088--cb-2"><input type="checkbox" id="primary-expertise-50088--cb-2" name="primary-expertise-50088-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50088--cb-3"><input type="checkbox" id="primary-expertise-50088--cb-3" name="primary-expertise-50088-[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50088">Attach resume (50088)</label><input type="file" id="file-50088" name="file-50088" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50088-5008">Work samples link (50088)</label><input type="url" id="work-samples-link-50088-5008" name="work-samples-link-50088-5008" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
