<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Svelte chips panel</title></head>
<body>
<main><h1>Svelte chips panel</h1><form action="/apply" method="post">
<label for="ix-name-14">Applicant name</label>
<input type="text" id="ix-name-14" name="ix-name-14">
<label for="ix-email-14">Contact email</label>
<input type="email" id="ix-email-14" name="ix-email-14">
<label for="ix-phone-14">Contact number</label>
<input type="tel" id="ix-phone-14" name="ix-phone-14">
<div class="svelte-app">
<button type="button" data-reveal="#svelte-chips-14">Select skills</button>
<div id="svelte-chips-14" hidden style="display:none">
<div role="group" aria-labelledby="svelte-group-14-lbl" id="svelte-group-14">
<span id="svelte-group-14-lbl">Primary expertise</span>
<span role="checkbox" aria-checked="false">Design systems</span>
<span role="checkbox" aria-checked="false">Accessibility</span>
<span role="checkbox" aria-checked="false">Performance</span>
</div>
</div>
</div></form></main>
</body>
</html>
