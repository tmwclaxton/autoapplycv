<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Apply — Full name</title></head>
<body>
<main>
<h1>Apply — Full name</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="full-name">Full name</label><input type="text" id="full-name" name="full-name" ></div>
<div class="form-group"><label for="email-address">Email address</label><input type="email" id="email-address" name="email-address" ></div>
<div class="form-group"><label for="phone-number">Phone number</label><input type="tel" id="phone-number" name="phone-number" ></div>
<div class="form-group"><label for="linkedin-profile-url">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url" name="linkedin-profile-url" ></div>

</form>
</main>
</body>
</html>
