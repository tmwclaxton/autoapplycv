<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters complex apply 50034</title></head>
<body>

<main data-sr-application="true"><h1>Apply 50034</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">
<h2>Contact information</h2>

<label for="sr-name-50034">Applicant name (50034)</label>
<input type="text" id="sr-name-50034" name="sr-name-50034" autocomplete="name">
<label for="sr-email-50034">Contact email (50034)</label>
<input type="email" id="sr-email-50034" name="sr-email-50034" autocomplete="email">
<label for="sr-phone-50034">Contact number (50034)</label>
<input type="tel" id="sr-phone-50034" name="sr-phone-50034" autocomplete="tel">
</section>
<section class="sr-section" data-section="experience">
<h2>Experience and motivation</h2>
<div class="field-row"><label for="personal-statement-50034-500">Personal statement (50034)</label><textarea id="personal-statement-50034-500" name="personal-statement-50034-500" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="portfolio-url-50034-50034">Portfolio URL (50034)</label><input type="url" id="portfolio-url-50034-50034" name="portfolio-url-50034-50034" ></div>
</section>
<section class="sr-section" data-section="preferences">
<h2>Preferences</h2>
<div class="field-row"><label for="office-preference-50034-5003">Office preference (50034)</label><select id="office-preference-50034-5003" name="office-preference-50034-5003"><option value="">Choose one…</option><option value="new-york">New York</option><option value="remote">Remote</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Work authorization status (50034)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50034-50">Desired base salary (50034)</label><input type="number" id="desired-base-salary-50034-50" name="desired-base-salary-50034-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50034-500">When can you start? (50034)</label><input type="date" id="when-can-you-start-50034-500" name="when-can-you-start-50034-500" ></div>
<fieldset><legend>Technical skills (50034)</legend><label for="technical-skills-50034-5-cb-0"><input type="checkbox" id="technical-skills-50034-5-cb-0" name="technical-skills-50034-5[]" value="react"> React</label><label for="technical-skills-50034-5-cb-1"><input type="checkbox" id="technical-skills-50034-5-cb-1" name="technical-skills-50034-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50034-5-cb-2"><input type="checkbox" id="technical-skills-50034-5-cb-2" name="technical-skills-50034-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50034-5-cb-3"><input type="checkbox" id="technical-skills-50034-5-cb-3" name="technical-skills-50034-5[]" value="sql"> SQL</label></fieldset>
</section>
<section class="sr-section" data-section="documents">
<h2>Documents</h2>
<div class="file-row"><label for="file-50034">Attach resume (50034)</label><input type="file" id="file-50034" name="file-50034" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
