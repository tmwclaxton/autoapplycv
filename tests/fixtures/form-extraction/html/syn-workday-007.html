<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workday Application 2</title></head>
<body>
<main>
<h1>Workday Application 2</h1>
<form action="/apply" method="post">
<div data-testid="input-q_legal-name" class="ia-Questions-item">
<div data-testid="input-q_legal-name-label"><span data-testid="safe-markup">Legal name</span></div>
<input data-testid="input-q_legal-name-input" type="text" name="input-q_legal-name">
</div>
<div data-testid="input-q_email" class="ia-Questions-item">
<div data-testid="input-q_email-label"><span data-testid="safe-markup">Email</span></div>
<input data-testid="input-q_email-input" type="email" name="input-q_email">
</div>
<div data-testid="input-q_why-do-you-want-" class="ia-Questions-item">
<div data-testid="input-q_why-do-you-want--label"><span data-testid="safe-markup">Why do you want this role?</span></div>
<textarea data-testid="input-q_why-do-you-want--input" name="input-q_why-do-you-want-" rows="4" maxlength="500"></textarea>
</div>
<div data-testid="input-q_total-years-of-p" class="ia-Questions-item">
<div data-testid="input-q_total-years-of-p-label"><span data-testid="safe-markup">Total years of professional experience</span></div>
<input data-testid="input-q_total-years-of-p-input" type="number" name="input-q_total-years-of-p">
</div>
<button type="button">Save and continue</button>

</form>
</main>
</body>
</html>
