<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nested fieldsets 20360</title></head>
<body>
<main><h1>Nested fieldsets 20360</h1><form action="/apply" method="post">
<fieldset><legend>Personal details</legend>
<label for="ns-name-20360">Your name (20360)</label>
<input type="text" id="ns-name-20360" name="ns-name-20360" autocomplete="name">
<label for="ns-email-20360">Personal email (20360)</label>
<input type="email" id="ns-email-20360" name="ns-email-20360" autocomplete="email">
<label for="ns-phone-20360">Mobile number (20360)</label>
<input type="tel" id="ns-phone-20360" name="ns-phone-20360" autocomplete="tel"></fieldset>
<fieldset><legend>Preferences</legend><div class="field-row"><label for="current-city-20360-20360">Current city (20360)</label><select id="current-city-20360-20360" name="current-city-20360-20360"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="london">London</option><option value="dublin">Dublin</option></select></div></fieldset>
<fieldset><legend>Additional</legend><div class="field-row"><label for="cover-letter-20360-20360">Cover letter (20360)</label><textarea id="cover-letter-20360-20360" name="cover-letter-20360-20360" rows="4" maxlength="400"></textarea></div></fieldset></form></main>
</body>
</html>
