<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Bootstrap apply 20282</title></head>
<body>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<main class="container py-4"><h1 class="h3">Apply 20282</h1>
<form class="row g-3" action="/apply" method="post">
<div class="col-12">
<label class="form-label" for="bs-name-20282">Full name (20282)</label>
<input class="form-control" type="text" id="bs-name-20282" name="bs-name-20282" autocomplete="name">
<label class="form-label" for="bs-email-20282">Contact email (20282)</label>
<input class="form-control" type="email" id="bs-email-20282" name="bs-email-20282" autocomplete="email">
<label class="form-label" for="bs-phone-20282">Mobile number (20282)</label>
<input class="form-control" type="tel" id="bs-phone-20282" name="bs-phone-20282" autocomplete="tel"></div>
<div class="col-12"><div class="mb-3"><label for="cover-letter-20282-20282">Cover letter (20282)</label><textarea id="cover-letter-20282-20282" name="cover-letter-20282-20282" rows="4" maxlength="500"></textarea></div></div>
<div class="col-md-6"><div class="mb-3"><label for="work-location-20282-20282">Work location (20282)</label><select id="work-location-20282-20282" name="work-location-20282-20282"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option></select></div></div>
<button type="submit" class="btn btn-primary">Submit</button>
</form></main>
</body>
</html>
