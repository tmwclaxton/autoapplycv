<!DOCTYPE html>
<html lang="en-GB">
<head><meta charset="utf-8"><title>Apply - Senior Developer</title></head>
<body>
<div id="__next">
<nav class="navbar" data-qa="navBar"><a href="/">Reed.co.uk</a></nav>
<main><form data-qa="application-form" action="/jobs/apply/submit" method="post">
<h1 data-qa="application-step-title">Eligibility and compliance</h1>

<fieldset data-qa="fieldset-do-you-hold-a-valid-uk-work-">
<legend data-qa="application-step-subtitle">Do you hold a valid UK work permit?</legend>
<label for="do-you-hold-a-valid-uk-work--0"><input type="radio" id="do-you-hold-a-valid-uk-work--0" name="do-you-hold-a-valid-uk-work-" value="yes" data-qa="radio-do-you-hold-a-valid-uk-work--0"> Yes</label><label for="do-you-hold-a-valid-uk-work--1"><input type="radio" id="do-you-hold-a-valid-uk-work--1" name="do-you-hold-a-valid-uk-work-" value="no" data-qa="radio-do-you-hold-a-valid-uk-work--1"> No</label>
</fieldset>
<fieldset data-qa="fieldset-have-you-ever-worked-for-thi">
<legend data-qa="application-step-subtitle">Have you ever worked for this company before?</legend>
<label for="have-you-ever-worked-for-thi-0"><input type="radio" id="have-you-ever-worked-for-thi-0" name="have-you-ever-worked-for-thi" value="yes" data-qa="radio-have-you-ever-worked-for-thi-0"> Yes</label><label for="have-you-ever-worked-for-thi-1"><input type="radio" id="have-you-ever-worked-for-thi-1" name="have-you-ever-worked-for-thi" value="no" data-qa="radio-have-you-ever-worked-for-thi-1"> No</label>
</fieldset>
<fieldset data-qa="fieldset-are-you-subject-to-any-non-c">
<legend data-qa="application-step-subtitle">Are you subject to any non-compete agreements?</legend>
<label for="are-you-subject-to-any-non-c-0"><input type="radio" id="are-you-subject-to-any-non-c-0" name="are-you-subject-to-any-non-c" value="yes" data-qa="radio-are-you-subject-to-any-non-c-0"> Yes</label><label for="are-you-subject-to-any-non-c-1"><input type="radio" id="are-you-subject-to-any-non-c-1" name="are-you-subject-to-any-non-c" value="no" data-qa="radio-are-you-subject-to-any-non-c-1"> No</label><label for="are-you-subject-to-any-non-c-2"><input type="radio" id="are-you-subject-to-any-non-c-2" name="are-you-subject-to-any-non-c" value="not-applicable" data-qa="radio-are-you-subject-to-any-non-c-2"> Not applicable</label>
</fieldset>
<div class="form-group" data-qa="field-if-you-answered-yes-to-non-compe">
<label for="if-you-answered-yes-to-non-compe" data-qa="field-if-you-answered-yes-to-non-compe-label">If you answered yes to non-compete, please explain</label>
<textarea id="if-you-answered-yes-to-non-compe" name="if-you-answered-yes-to-non-compe" rows="3" data-qa="field-if-you-answered-yes-to-non-compe-input" maxlength="400"></textarea>
</div>
<div class="form-group" data-qa="field-security-clearance-level-if-any-">
<label for="security-clearance-level-if-any-" data-qa="field-security-clearance-level-if-any--label">Security clearance level (if any)</label>
<input type="text" id="security-clearance-level-if-any-" name="security-clearance-level-if-any-" data-qa="field-security-clearance-level-if-any--input" >
</div>
<div class="form-group" data-qa="field-preferred-start-date-month-57100">
<label for="preferred-start-date-month-57100" data-qa="field-preferred-start-date-month-57100-label">Preferred start date month</label>
<select id="preferred-start-date-month-57100" name="preferred-start-date-month-57100" data-qa="field-preferred-start-date-month-57100-input">
<option value="">Please select</option><option value="january">January</option><option value="february">February</option><option value="march">March</option><option value="april">April</option><option value="may">May</option><option value="june">June</option><option value="july">July</option><option value="august">August</option><option value="september">September</option><option value="october">October</option><option value="november">November</option><option value="december">December</option>
</select>
</div>
<div class="form-group" data-qa="field-earliest-start-date-571000250">
<label for="earliest-start-date-571000250" data-qa="field-earliest-start-date-571000250-label">Earliest start date</label>
<input type="date" id="earliest-start-date-571000250" name="earliest-start-date-571000250" data-qa="field-earliest-start-date-571000250-input" >
</div>

<div data-qa="application-actions"><button type="button" data-qa="continue-button" class="btn btn-primary">Save and continue</button></div>
</form></main>
<footer data-qa="pageFooter"><p>Reed synthetic corpus fixture</p></footer>
</div>
</body>
</html>
