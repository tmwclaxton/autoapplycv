<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nested fieldsets 20341</title></head>
<body>
<main><h1>Nested fieldsets 20341</h1><form action="/apply" method="post">
<fieldset><legend>Personal details</legend>
<label for="ns-name-20341">Full name (20341)</label>
<input type="text" id="ns-name-20341" name="ns-name-20341" autocomplete="name">
<label for="ns-email-20341">Work email (20341)</label>
<input type="email" id="ns-email-20341" name="ns-email-20341" autocomplete="email">
<label for="ns-phone-20341">Phone number (20341)</label>
<input type="tel" id="ns-phone-20341" name="ns-phone-20341" autocomplete="tel"></fieldset>
<fieldset><legend>Preferences</legend><div class="field-row"><label for="office-preference-20341-2034">Office preference (20341)</label><select id="office-preference-20341-2034" name="office-preference-20341-2034"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div></fieldset>
<fieldset><legend>Additional</legend><div class="field-row"><label for="motivation-statement-20341-2">Motivation statement (20341)</label><textarea id="motivation-statement-20341-2" name="motivation-statement-20341-2" rows="4" maxlength="400"></textarea></div></fieldset></form></main>
</body>
</html>
