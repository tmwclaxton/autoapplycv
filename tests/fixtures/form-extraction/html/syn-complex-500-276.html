<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50276</title></head>
<body>
<main><h1>Wizard complex apply 50276</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50276">
<h2 id="wizard-contact-50276">Contact information</h2>

<label for="wiz-name-50276">Legal name (50276)</label>
<input type="text" id="wiz-name-50276" name="wiz-name-50276" autocomplete="name">
<label for="wiz-email-50276">Contact email (50276)</label>
<input type="email" id="wiz-email-50276" name="wiz-email-50276" autocomplete="email">
<label for="wiz-phone-50276">Mobile number (50276)</label>
<input type="tel" id="wiz-phone-50276" name="wiz-phone-50276" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50276">
<h2 id="wizard-screen-50276">Screening questions</h2>
<div class="field-row"><label for="why-this-role-50276-50276">Why this role? (50276)</label><textarea id="why-this-role-50276-50276" name="why-this-role-50276-50276" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="preferred-location-50276-502">Preferred location (50276)</label><select id="preferred-location-50276-502" name="preferred-location-50276-502"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="london">London</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Work authorization status (50276)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50276-50">Salary expectations (50276)</label><input type="number" id="salary-expectations-50276-50" name="salary-expectations-50276-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50276-50">Earliest start date (50276)</label><input type="date" id="earliest-start-date-50276-50" name="earliest-start-date-50276-50" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50276">
<h2 id="wizard-docs-50276">Documents and skills</h2>
<fieldset><legend>Technical skills (50276)</legend><label for="technical-skills-50276-5-cb-0"><input type="checkbox" id="technical-skills-50276-5-cb-0" name="technical-skills-50276-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50276-5-cb-1"><input type="checkbox" id="technical-skills-50276-5-cb-1" name="technical-skills-50276-5[]" value="go"> Go</label><label for="technical-skills-50276-5-cb-2"><input type="checkbox" id="technical-skills-50276-5-cb-2" name="technical-skills-50276-5[]" value="sql"> SQL</label><label for="technical-skills-50276-5-cb-3"><input type="checkbox" id="technical-skills-50276-5-cb-3" name="technical-skills-50276-5[]" value="laravel"> Laravel</label><label for="technical-skills-50276-5-cb-4"><input type="checkbox" id="technical-skills-50276-5-cb-4" name="technical-skills-50276-5[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50276">Attach resume (50276)</label><input type="file" id="file-50276" name="file-50276" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50276)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
