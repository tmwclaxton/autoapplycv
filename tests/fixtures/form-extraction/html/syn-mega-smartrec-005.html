<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters-style 9535</title></head>
<body>

<main data-sr-application="true"><h1>Apply 9535</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">

<label for="sr-name-9535">Preferred name (9535)</label>
<input type="text" id="sr-name-9535" name="sr-name-9535" autocomplete="name">
<label for="sr-email-9535">Email address (9535)</label>
<input type="email" id="sr-email-9535" name="sr-email-9535" autocomplete="email">
<label for="sr-phone-9535">Cell phone (9535)</label>
<input type="tel" id="sr-phone-9535" name="sr-phone-9535" autocomplete="tel">
</section>
<section class="sr-section" data-section="questions">
<div class="field-row"><label for="motivation-statement-9535-95">Motivation statement (9535)</label><textarea id="motivation-statement-9535-95" name="motivation-statement-9535-95" rows="4" maxlength="500"></textarea></div>

<div class="field-row">
<span id="listbox-9535-lbl">Preferred location (9535)</span>
<div role="combobox" aria-expanded="true" aria-controls="listbox-9535" aria-labelledby="listbox-9535-lbl" tabindex="0">Preferred location (9535)</div>
<div role="listbox" id="listbox-9535" aria-labelledby="listbox-9535-lbl">
<div role="option" data-value="hybrid">Hybrid</div><div role="option" data-value="remote">Remote</div><div role="option" data-value="london">London</div><div role="option" data-value="berlin">Berlin</div>
</div>
</div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
