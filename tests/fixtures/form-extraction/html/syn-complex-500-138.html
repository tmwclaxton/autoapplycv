<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50138</title></head>
<body>
<main><h1>Mixed complex apply 50138</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50138">Applicant name (50138)</label>
<input type="text" id="mix-name-50138" name="mix-name-50138" autocomplete="name">
<label for="mix-email-50138">Email address (50138)</label>
<input type="email" id="mix-email-50138" name="mix-email-50138" autocomplete="email">
<label for="mix-phone-50138">Phone number (50138)</label>
<input type="tel" id="mix-phone-50138" name="mix-phone-50138" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50138">Tell us about yourself (50138)</label><textarea id="tell-us-about-yourself-50138" name="tell-us-about-yourself-50138" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50138-50138">Work location (50138)</label><select id="work-location-50138-50138" name="work-location-50138-50138"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option><option value="new-york">New York</option><option value="london">London</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50138)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50138)</legend><label for="willing-to-relocate-5013-0"><input type="radio" id="willing-to-relocate-5013-0" name="willing-to-relocate-5013" value="yes"> Yes</label><label for="willing-to-relocate-5013-1"><input type="radio" id="willing-to-relocate-5013-1" name="willing-to-relocate-5013" value="no"> No</label><label for="willing-to-relocate-5013-2"><input type="radio" id="willing-to-relocate-5013-2" name="willing-to-relocate-5013" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-501">Compensation requirement (50138)</label><input type="number" id="compensation-requirement-501" name="compensation-requirement-501" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50138-">Start date preference (50138)</label><input type="date" id="start-date-preference-50138-" name="start-date-preference-50138-" ></div>
<div class="field-row"><label for="application-source-50138-501">Application source (50138)</label><select id="application-source-50138-501" name="application-source-50138-501"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="other">Other</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option></select></div>
<fieldset><legend>Primary expertise (50138)</legend><label for="primary-expertise-50138--cb-0"><input type="checkbox" id="primary-expertise-50138--cb-0" name="primary-expertise-50138-[]" value="rust"> Rust</label><label for="primary-expertise-50138--cb-1"><input type="checkbox" id="primary-expertise-50138--cb-1" name="primary-expertise-50138-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50138--cb-2"><input type="checkbox" id="primary-expertise-50138--cb-2" name="primary-expertise-50138-[]" value="sql"> SQL</label><label for="primary-expertise-50138--cb-3"><input type="checkbox" id="primary-expertise-50138--cb-3" name="primary-expertise-50138-[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50138">Attach resume (50138)</label><input type="file" id="file-50138" name="file-50138" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50138-50138">Personal website (50138)</label><input type="url" id="personal-website-50138-50138" name="personal-website-50138-50138" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
