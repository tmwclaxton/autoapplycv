<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50116</title></head>
<body>
<main><h1>Wizard complex apply 50116</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50116">
<h2 id="wizard-contact-50116">Contact information</h2>

<label for="wiz-name-50116">Legal name (50116)</label>
<input type="text" id="wiz-name-50116" name="wiz-name-50116" autocomplete="name">
<label for="wiz-email-50116">Work email (50116)</label>
<input type="email" id="wiz-email-50116" name="wiz-email-50116" autocomplete="email">
<label for="wiz-phone-50116">Contact number (50116)</label>
<input type="tel" id="wiz-phone-50116" name="wiz-phone-50116" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50116">
<h2 id="wizard-screen-50116">Screening questions</h2>
<div class="field-row"><label for="motivation-statement-50116-5">Motivation statement (50116)</label><textarea id="motivation-statement-50116-5" name="motivation-statement-50116-5" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="current-city-50116-50116">Current city (50116)</label><select id="current-city-50116-50116" name="current-city-50116-50116"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50116)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50116-50116">Expected salary (50116)</label><input type="number" id="expected-salary-50116-50116" name="expected-salary-50116-50116" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50116-50">Earliest start date (50116)</label><input type="date" id="earliest-start-date-50116-50" name="earliest-start-date-50116-50" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50116">
<h2 id="wizard-docs-50116">Documents and skills</h2>
<fieldset><legend>Core competencies (50116)</legend><label for="core-competencies-50116--cb-0"><input type="checkbox" id="core-competencies-50116--cb-0" name="core-competencies-50116-[]" value="react"> React</label><label for="core-competencies-50116--cb-1"><input type="checkbox" id="core-competencies-50116--cb-1" name="core-competencies-50116-[]" value="sql"> SQL</label><label for="core-competencies-50116--cb-2"><input type="checkbox" id="core-competencies-50116--cb-2" name="core-competencies-50116-[]" value="typescript"> TypeScript</label><label for="core-competencies-50116--cb-3"><input type="checkbox" id="core-competencies-50116--cb-3" name="core-competencies-50116-[]" value="go"> Go</label><label for="core-competencies-50116--cb-4"><input type="checkbox" id="core-competencies-50116--cb-4" name="core-competencies-50116-[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50116">Attach resume (50116)</label><input type="file" id="file-50116" name="file-50116" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="application-source-50116-501">Application source (50116)</label><select id="application-source-50116-501" name="application-source-50116-501"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="conference">Conference</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
