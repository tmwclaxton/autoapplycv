<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Add or update your address | Indeed</title></head>
<body>
  <form>
    <label for="location-fields-address-input" data-testid="location-fields-address-label">Street address</label>
    <input id="location-fields-address-input" name="location-fields-address-input" data-testid="location-fields-address-input" type="text" />

    <label for="location-fields-locality-input" data-testid="location-fields-locality-label">City, county</label>
    <input id="location-fields-locality-input" name="location-fields-locality-input" data-testid="location-fields-locality-input" type="text" />

    <label for="location-fields-postalCode-input" data-testid="location-fields-postalCode-label">Postal code</label>
    <input id="location-fields-postalCode-input" name="location-fields-postalCode-input" data-testid="location-fields-postalCode-input" type="text" />

    <button type="button">Continue</button>
  </form>
</body>
</html>
