  * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }

  .decoy-form { display: none; }
  .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; }
  .full-width { grid-column: 1 / -1; }
  .field-group { margin-bottom: 4px; }
  label, .label-text { display: block; font-size: 0.875rem; font-weight: 500; color: #1a1a2e; margin-bottom: 4px; }
  input, select, textarea, .custom-combobox-trigger { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.9rem; background: #fff; transition: 0.15s; }
  input:focus, select:focus, textarea:focus, .custom-combobox-trigger:focus-within { outline: 2px solid #2563eb; outline-offset: -1px; border-color: #2563eb; }
  .input-error { border-color: #dc2626; }
  .btn-pill-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-pill { padding: 8px 20px; border: 1px solid #cbd5e1; border-radius: 100px; background: #fff; cursor: pointer; font-size: 0.875rem; transition: all 0.1s; user-select: none; }
  .btn-pill.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .btn-pill:focus-visible { outline: 2px solid #2563eb; outline-offset: 2px; }
  .radio-hidden { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
  .combobox-wrapper { position: relative; }
  .custom-listbox { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #cbd5e1; border-top: 0; border-radius: 0 0 8px 8px; max-height: 180px; overflow-y: auto; z-index: 50; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
  .custom-listbox.open { display: block; }
  .listbox-option { padding: 8px 12px; cursor: pointer; font-size: 0.875rem; }
  .listbox-option:hover, .listbox-option.highlighted { background: #eef2ff; }
  .listbox-option[aria-selected="true"] { background: #2563eb; color: #fff; }
  .optgroup-label { font-weight: 600; padding: 6px 12px; font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; background: #f8fafc; }
  .hidden-field { display: none; }
  .disabled-decoy { opacity: 0.6; pointer-events: none; }
  .hint-text { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
  .inline-flex { display: inline-flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .glued-span-label { font-size: 0.875rem; color: #1e293b; padding: 10px 0 10px 12px; background: #f8fafc; border: 1px solid #cbd5e1; border-right: 0; border-radius: 8px 0 0 8px; white-space: nowrap; display: inline-flex; align-items: center; height: 42px; }
  .glued-input { border-radius: 0 8px 8px 0; border-left: 0; height: 42px; }
  .inline-group { display: flex; }
  .inline-group .glued-span-label { flex-shrink: 0; }
  .inline-group input { flex: 1; min-width: 0; }
  .readonly-prefill { background: #f1f5f9; color: #334155; pointer-events: none; }
  .hint { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
  .submit-btn { background: #2563eb; color: #fff; border: none; padding: 12px 32px; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 8px; }
  .submit-btn:hover { background: #1d4ed8; }
  hr { margin: 16px 0; border: 0; border-top: 1px solid #e2e8f0; }
  .inline-flex { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
</style>
</head>

      <script>
        document.querySelectorAll('.btn-pill-group[role="radiogroup"]').forEach(function(group) {
          group.querySelectorAll('.btn-pill[role="radio"]').forEach(function(btn) {
            btn.addEventListener('click', function() {
              group.querySelectorAll('.btn-pill[role="radio"]').forEach(function(b) { b.classList.remove('active'); b.setAttribute('aria-checked', 'false'); });
              btn.classList.add('active');
              btn.setAttribute('aria-checked', 'true');
              var val = btn.getAttribute('data-value');
              var hiddenRadio = group.parentElement.querySelector('input[type="radio"].radio-hidden[value="' + val + '"]');
              if (hiddenRadio) hiddenRadio.checked = true;
            });
          });
        });

        document.querySelectorAll('input[type="checkbox"].radio-hidden').forEach(function(cb) {
          cb.addEventListener('change', function() {
            var lbl = document.querySelector('label[for="' + cb.id + '"]');
            if (lbl) { lbl.classList.toggle('active', cb.checked); }
          });
        });

        var comboTrigger = document.getElementById('source-combo');
        var listbox = document.getElementById('source-listbox');
        var display = document.getElementById('source-display');
        var hiddenInput = document.getElementById('source-hidden');
        var options = listbox.querySelectorAll('.listbox-option');

        comboTrigger.addEventListener('click', function(e) {
          e.stopPropagation();
          var expanded = comboTrigger.getAttribute('aria-expanded') === 'true' ? false : true;
          comboTrigger.setAttribute('aria-expanded', expanded);
          listbox.classList.toggle('open', expanded);
        });

        options.forEach(function(opt) {
          opt.addEventListener('click', function() {
            var val = opt.getAttribute('data-value');
            display.textContent = opt.textContent;
            hiddenInput.value = val;
            comboTrigger.setAttribute('data-value', val);
            options.forEach(function(o) { o.removeAttribute('aria-selected'); });
            opt.setAttribute('aria-selected', 'true');
            comboTrigger.setAttribute('aria-expanded', 'false');
            listbox.classList.remove('open');
          });
        });

        document.addEventListener('click', function(e) {
          if (!comboTrigger.contains(e.target) && !listbox.contains(e.target)) {
            comboTrigger.setAttribute('aria-expanded', 'false');
            listbox.classList.remove('open');
          }
        });
      </script>

    </html>
  "></iframe>

  <div id="shadow-host" style="display:none;"></div>
  <script>
    if (document.getElementById('shadow-host')) {
      var shadow = document.getElementById('shadow-host').attachShadow({mode: 'open'});
      shadow.innerHTML = '<style>p{color:red}</style><p>shadow content</p>';
    }
  </script>
</div>
