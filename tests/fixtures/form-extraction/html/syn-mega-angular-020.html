<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9180</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9180</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Applicant name (9180)</mat-label><label for="ang-name-9180">Applicant name (9180)</label><input matInput id="ang-name-9180" name="ang-name-9180" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Work email (9180)</mat-label><label for="ang-email-9180">Work email (9180)</label><input matInput id="ang-email-9180" name="ang-email-9180" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Mobile number (9180)</mat-label><label for="ang-phone-9180">Mobile number (9180)</label><input matInput id="ang-phone-9180" name="ang-phone-9180" type="tel"></mat-form-field>
<div class="field-row"><label for="personal-statement-9180-9180">Personal statement (9180)</label><textarea id="personal-statement-9180-9180" name="personal-statement-9180-9180" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="where-are-you-based-9180-918">Where are you based? (9180)</label><select id="where-are-you-based-9180-918" name="where-are-you-based-9180-918"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
