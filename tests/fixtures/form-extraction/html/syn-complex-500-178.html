<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50178</title></head>
<body>
<main><h1>Mixed complex apply 50178</h1><form action="/apply" method="post">
<section class="mixed-contact">

<div class="field-row"><label for="desired-base-salary-50178-50">Desired base salary (50178)</label><input type="number" id="desired-base-salary-50178-50" name="desired-base-salary-50178-50" min="0" step="1000" placeholder="Annual amount"></div>

<fieldset><legend>Key skills (50178)</legend><label for="key-skills-50178-50178-cb-0"><input type="checkbox" id="key-skills-50178-50178-cb-0" name="key-skills-50178-50178[]" value="rust"> Rust</label><label for="key-skills-50178-50178-cb-1"><input type="checkbox" id="key-skills-50178-50178-cb-1" name="key-skills-50178-50178[]" value="go"> Go</label><label for="key-skills-50178-50178-cb-2"><input type="checkbox" id="key-skills-50178-50178-cb-2" name="key-skills-50178-50178[]" value="react"> React</label><label for="key-skills-50178-50178-cb-3"><input type="checkbox" id="key-skills-50178-50178-cb-3" name="key-skills-50178-50178[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50178">Attach resume (50178)</label><input type="file" id="file-50178" name="file-50178" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50178-50178">GitHub profile (50178)</label><input type="url" id="github-profile-50178-50178" name="github-profile-50178-50178" ></div>

<section class="mixed-consent">

</section>
</form></main>
</body>
</html>
