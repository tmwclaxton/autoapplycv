<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9929</title></head>
<body>
<main><h1>Grid layout 9929</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9929">Full name (9929)</label><span class="helper">Required</span><input id="grid-name-9929" name="grid-name-9929" type="text"></div>
<div><label for="grid-email-9929">Email address (9929)</label><span class="helper">Required</span><input id="grid-email-9929" name="grid-email-9929" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9929">Direct line (9929)</label><input id="grid-phone-9929" name="grid-phone-9929" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="motivation-statement-9929-99">Motivation statement (9929)</label><textarea id="motivation-statement-9929-99" name="motivation-statement-9929-99" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Willing to relocate? (9929)</legend><label for="willing-to-relocate-9929-0"><input type="radio" id="willing-to-relocate-9929-0" name="willing-to-relocate-9929" value="yes"> Yes</label><label for="willing-to-relocate-9929-1"><input type="radio" id="willing-to-relocate-9929-1" name="willing-to-relocate-9929" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
