<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Vue scoped grid 9</title></head>
<body>
<main><h1>Vue scoped grid 9</h1><form action="/apply" method="post">
<div class="grid-form data-v-008" style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
<div class="col-span-2 data-v-008"><label for="g-name">Full name</label><input id="g-name" name="g-name" type="text" data-v-008></div>
<div data-v-008><label for="g-email">Email address</label><input id="g-email" name="g-email" type="email" data-v-008></div>
<div data-v-008><label for="g-phone">Phone number</label><input id="g-phone" name="g-phone" type="tel" data-v-008></div>
<div class="col-span-2 data-v-008"><div class="field-row"><label for="current-city">Current city</label><select id="current-city" name="current-city" ><option value="">Choose one…</option><option value="london">London</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option></select></div></div>
</div></form></main>
</body>
</html>
