<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9902</title></head>
<body>
<main><h1>Grid layout 9902</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9902">Your name (9902)</label><span class="helper">Required</span><input id="grid-name-9902" name="grid-name-9902" type="text"></div>
<div><label for="grid-email-9902">Primary email (9902)</label><span class="helper">Required</span><input id="grid-email-9902" name="grid-email-9902" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9902">Phone number (9902)</label><input id="grid-phone-9902" name="grid-phone-9902" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="why-this-role-9902-9902">Why this role? (9902)</label><textarea id="why-this-role-9902-9902" name="why-this-role-9902-9902" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Open to relocation? (9902)</legend><label for="open-to-relocation-9902--0"><input type="radio" id="open-to-relocation-9902--0" name="open-to-relocation-9902-" value="yes"> Yes</label><label for="open-to-relocation-9902--1"><input type="radio" id="open-to-relocation-9902--1" name="open-to-relocation-9902-" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
