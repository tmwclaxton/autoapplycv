<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9182</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9182</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Legal name (9182)</mat-label><label for="ang-name-9182">Legal name (9182)</label><input matInput id="ang-name-9182" name="ang-name-9182" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Contact email (9182)</mat-label><label for="ang-email-9182">Contact email (9182)</label><input matInput id="ang-email-9182" name="ang-email-9182" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Contact number (9182)</mat-label><label for="ang-phone-9182">Contact number (9182)</label><input matInput id="ang-phone-9182" name="ang-phone-9182" type="tel"></mat-form-field>

</form></main>
</body>
</html>
