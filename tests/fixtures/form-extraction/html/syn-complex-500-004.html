<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>SmartRecruiters complex apply 50004</title></head>
<body>

<main data-sr-application="true"><h1>Apply 50004</h1>
<form class="sr-form" action="/apply" method="post">
<section class="sr-section" data-section="contact">
<h2>Contact information</h2>

<label for="sr-name-50004">Legal name (50004)</label>
<input type="text" id="sr-name-50004" name="sr-name-50004" autocomplete="name">
<label for="sr-email-50004">Work email (50004)</label>
<input type="email" id="sr-email-50004" name="sr-email-50004" autocomplete="email">
<label for="sr-phone-50004">Contact number (50004)</label>
<input type="tel" id="sr-phone-50004" name="sr-phone-50004" autocomplete="tel">
</section>
<section class="sr-section" data-section="experience">
<h2>Experience and motivation</h2>
<div class="field-row"><label for="cover-letter-50004-50004">Cover letter (50004)</label><textarea id="cover-letter-50004-50004" name="cover-letter-50004-50004" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="github-profile-50004-50004">GitHub profile (50004)</label><input type="url" id="github-profile-50004-50004" name="github-profile-50004-50004" ></div>
</section>
<section class="sr-section" data-section="preferences">
<h2>Preferences</h2>
<div class="field-row"><label for="work-location-50004-50004">Work location (50004)</label><select id="work-location-50004-50004" name="work-location-50004-50004"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="new-york">New York</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50004)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50004-50">Salary expectations (50004)</label><input type="number" id="salary-expectations-50004-50" name="salary-expectations-50004-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50004-50004">Available from (50004)</label><input type="date" id="available-from-50004-50004" name="available-from-50004-50004" ></div>
<fieldset><legend>Technical skills (50004)</legend><label for="technical-skills-50004-5-cb-0"><input type="checkbox" id="technical-skills-50004-5-cb-0" name="technical-skills-50004-5[]" value="laravel"> Laravel</label><label for="technical-skills-50004-5-cb-1"><input type="checkbox" id="technical-skills-50004-5-cb-1" name="technical-skills-50004-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50004-5-cb-2"><input type="checkbox" id="technical-skills-50004-5-cb-2" name="technical-skills-50004-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50004-5-cb-3"><input type="checkbox" id="technical-skills-50004-5-cb-3" name="technical-skills-50004-5[]" value="react"> React</label></fieldset>
</section>
<section class="sr-section" data-section="documents">
<h2>Documents</h2>
<div class="file-row"><label for="file-50004">Attach resume (50004)</label><input type="file" id="file-50004" name="file-50004" accept=".pdf,.doc,.docx"></div>
</section>
<button type="button">Continue application</button>
</form></main>
</body>
</html>
