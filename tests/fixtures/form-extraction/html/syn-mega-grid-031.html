<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9931</title></head>
<body>
<main><h1>Grid layout 9931</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9931">Legal name (9931)</label><span class="helper">Required</span><input id="grid-name-9931" name="grid-name-9931" type="text"></div>
<div><label for="grid-email-9931">Work email (9931)</label><span class="helper">Required</span><input id="grid-email-9931" name="grid-email-9931" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9931">Telephone (9931)</label><input id="grid-phone-9931" name="grid-phone-9931" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="personal-statement-9931-9931">Personal statement (9931)</label><textarea id="personal-statement-9931-9931" name="personal-statement-9931-9931" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Willing to relocate? (9931)</legend><label for="willing-to-relocate-9931-0"><input type="radio" id="willing-to-relocate-9931-0" name="willing-to-relocate-9931" value="yes"> Yes</label><label for="willing-to-relocate-9931-1"><input type="radio" id="willing-to-relocate-9931-1" name="willing-to-relocate-9931" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
