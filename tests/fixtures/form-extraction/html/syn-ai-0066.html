<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; color: #1a1a2e; }
.wrapper { display: flex; min-height: 100vh; }
.sidebar { width: 280px; background: #0d1b2a; color: #e0e1dd; padding: 24px; flex-shrink: 0; }
.sidebar h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: #778da9; margin-bottom: 16px; }
.progress-dots { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.dot { width: 12px; height: 12px; border-radius: 50%; background: #415a77; }
.dot.active { background: #00b4d8; box-shadow: 0 0 0 2px #00b4d840; }
.dot.done { background: #06d6a0; }
.main { flex: 1; padding: 32px; max-width: 900px; margin: 0 auto; }
.iframe-container { border: 1px solid #dde1e6; border-radius: 12px; background: white; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
iframe { width: 100%; height: 800px; border: 0; display: block; }
.form-content { padding: 24px; }
.section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #0d1b2a; border-bottom: 2px solid #00b4d8; padding-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.table-form { width: 100%; border-collapse: collapse; }
.table-form td { padding: 8px 12px; vertical-align: top; }
.table-form td:first-child { width: 200px; font-weight: 500; color: #2c3e50; padding-top: 14px; }
.table-form td:last-child { width: auto; }
.input-field { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: #fafbfc; transition: border 0.2s; }
.input-field:focus { border-color: #00b4d8; outline: none; box-shadow: 0 0 0 3px #00b4d820; }
select.input-field { appearance: auto; }
.split-phone { display: flex; gap: 0; }
.split-phone select { width: 140px; border-right: 0; border-radius: 6px 0 0 6px; }
.split-phone input { border-radius: 0 6px 6px 0; flex: 1; }
.label-wrap-deep { display: flex; flex-direction: column; gap: 2px; }
.label-wrap-deep > div { font-size: 12px; color: #475569; margin-bottom: 2px; }
.custom-combobox { position: relative; }
.combobox-input { width: 100%; padding: 10px 36px 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: #fafbfc; cursor: default; }
.combobox-arrow { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #64748b; }
.pill-group { display: flex; gap: 8px; flex-wrap: wrap; }
.pill-btn { padding: 8px 20px; border: 1px solid #cbd5e1; border-radius: 20px; background: white; cursor: pointer; font-size: 13px; color: #334155; transition: all 0.15s; }
.pill-btn.active { background: #00b4d8; color: white; border-color: #00b4d8; }
.pill-btn:hover { background: #f1f5f9; }
.hidden-span { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
.table-form tr:last-child td { padding-bottom: 0; }
.error-text { color: #dc2626; font-size: 12px; margin-top: 4px; display: none; }
.reveal-content { display: none; margin-top: 12px; padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px dashed #cbd5e1; }
.reveal-trigger { cursor: pointer; color: #00b4d8; font-weight: 500; }
[lang="sv"] .label-text { font-weight: 600; }
.emoji-flag { font-size: 16px; margin-right: 4px; }
@media (max-width: 768px) { .wrapper { flex-direction: column; } .sidebar { width: 100%; } }
</style>
</head>
