<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nested fieldsets 20352</title></head>
<body>
<main><h1>Nested fieldsets 20352</h1><form action="/apply" method="post">
<fieldset><legend>Personal details</legend>
<label for="ns-name-20352">Full name (20352)</label>
<input type="text" id="ns-name-20352" name="ns-name-20352" autocomplete="name">
<label for="ns-email-20352">Work email (20352)</label>
<input type="email" id="ns-email-20352" name="ns-email-20352" autocomplete="email">
<label for="ns-phone-20352">Phone number (20352)</label>
<input type="tel" id="ns-phone-20352" name="ns-phone-20352" autocomplete="tel"></fieldset>
<fieldset><legend>Preferences</legend><div class="field-row"><label for="current-city-20352-20352">Current city (20352)</label><select id="current-city-20352-20352" name="current-city-20352-20352"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="london">London</option><option value="berlin">Berlin</option><option value="remote">Remote</option></select></div></fieldset>
<fieldset><legend>Additional</legend><div class="field-row"><label for="cover-letter-20352-20352">Cover letter (20352)</label><textarea id="cover-letter-20352-20352" name="cover-letter-20352-20352" rows="4" maxlength="400"></textarea></div></fieldset></form></main>
</body>
</html>
