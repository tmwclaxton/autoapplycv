<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Web component apply 4</title></head>
<body>

<main>
<h1>Web component apply 4</h1>
<apply-form-widget data-stage="4">
<form slot="application" action="/apply" method="post">
<section class="wc-host">
<label for="wc-name-3">Your name</label>
<input id="wc-name-3" name="wc-name-3" type="text">
<label for="wc-email-3">Personal email</label>
<input id="wc-email-3" name="wc-email-3" type="email">
<label for="wc-phone-3">Telephone</label>
<input id="wc-phone-3" name="wc-phone-3" type="tel">
<fieldset><legend>Open to relocation?</legend><label for="open-to-relocation-0"><input type="radio" id="open-to-relocation-0" name="open-to-relocation" value="yes"> Yes</label><label for="open-to-relocation-1"><input type="radio" id="open-to-relocation-1" name="open-to-relocation" value="no"> No</label></fieldset>
</section>
<button type="button">Continue</button>
</form>
</apply-form-widget>
<job-application-panel>
<div class="panel-inner" role="group" aria-label="Additional questions">
<div class="field-row"><label for="how-did-you-hear-about-us">How did you hear about us?</label><select id="how-did-you-hear-about-us" name="how-did-you-hear-about-us" ><option value="">Choose one…</option><option value="website">Website</option><option value="linkedin">LinkedIn</option><option value="friend">Friend</option><option value="other">Other</option></select></div>
</div>
</job-application-panel>
</main>
</body>
</html>
