<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50006</title></head>
<body>
<main><h1>Wizard complex apply 50006</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50006">
<h2 id="wizard-contact-50006">Contact information</h2>

<label for="wiz-name-50006">Your name (50006)</label>
<input type="text" id="wiz-name-50006" name="wiz-name-50006" autocomplete="name">
<label for="wiz-email-50006">Email address (50006)</label>
<input type="email" id="wiz-email-50006" name="wiz-email-50006" autocomplete="email">
<label for="wiz-phone-50006">Mobile number (50006)</label>
<input type="tel" id="wiz-phone-50006" name="wiz-phone-50006" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50006">
<h2 id="wizard-screen-50006">Screening questions</h2>
<div class="field-row"><label for="personal-statement-50006-500">Personal statement (50006)</label><textarea id="personal-statement-50006-500" name="personal-statement-50006-500" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="preferred-location-50006-500">Preferred location (50006)</label><select id="preferred-location-50006-500" name="preferred-location-50006-500"><option value="">Choose one…</option><option value="remote">Remote</option><option value="london">London</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50006)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50006-50">Salary expectations (50006)</label><input type="number" id="salary-expectations-50006-50" name="salary-expectations-50006-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50006-50006">Available from (50006)</label><input type="date" id="available-from-50006-50006" name="available-from-50006-50006" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50006">
<h2 id="wizard-docs-50006">Documents and skills</h2>
<fieldset><legend>Technical skills (50006)</legend><label for="technical-skills-50006-5-cb-0"><input type="checkbox" id="technical-skills-50006-5-cb-0" name="technical-skills-50006-5[]" value="go"> Go</label><label for="technical-skills-50006-5-cb-1"><input type="checkbox" id="technical-skills-50006-5-cb-1" name="technical-skills-50006-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50006-5-cb-2"><input type="checkbox" id="technical-skills-50006-5-cb-2" name="technical-skills-50006-5[]" value="react"> React</label><label for="technical-skills-50006-5-cb-3"><input type="checkbox" id="technical-skills-50006-5-cb-3" name="technical-skills-50006-5[]" value="python"> Python</label><label for="technical-skills-50006-5-cb-4"><input type="checkbox" id="technical-skills-50006-5-cb-4" name="technical-skills-50006-5[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50006">Attach resume (50006)</label><input type="file" id="file-50006" name="file-50006" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="referral-source-50006-50006">Referral source (50006)</label><select id="referral-source-50006-50006" name="referral-source-50006-50006"><option value="">Choose one…</option><option value="referral">Referral</option><option value="conference">Conference</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
