<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Svelte apply 5</title></head>
<body>
<main><h1>Svelte apply 5</h1><form action="/apply" method="post">
<div class="svelte-0068 application">
<div class="field svelte-0068"><label class="svelte-0068" for="sv-name">Full name</label><input class="svelte-0068" id="sv-name" name="sv-name" type="text" bind:value={name}></div>
<div class="field svelte-0068"><label class="svelte-0068" for="sv-email">Email address</label><input class="svelte-0068" id="sv-email" name="sv-email" type="email" bind:value={email}></div>
<div class="field svelte-0068"><label class="svelte-0068" for="sv-phone">Phone number</label><input class="svelte-0068" id="sv-phone" name="sv-phone" type="tel" bind:value={phone}></div>
<div class="field-row"><label for="cover-letter">Cover letter</label><textarea id="cover-letter" name="cover-letter" rows="4" maxlength="350" class="svelte-0068"></textarea></div>
<fieldset><legend>Willing to relocate?</legend><label for="willing-to-relocate-0"><input type="radio" id="willing-to-relocate-0" name="willing-to-relocate" value="yes"> Yes</label><label for="willing-to-relocate-1"><input type="radio" id="willing-to-relocate-1" name="willing-to-relocate" value="no"> No</label></fieldset>
</div></form></main>
</body>
</html>
