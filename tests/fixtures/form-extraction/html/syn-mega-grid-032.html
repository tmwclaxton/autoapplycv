<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9932</title></head>
<body>
<main><h1>Grid layout 9932</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9932">Preferred name (9932)</label><span class="helper">Required</span><input id="grid-name-9932" name="grid-name-9932" type="text"></div>
<div><label for="grid-email-9932">Work email (9932)</label><span class="helper">Required</span><input id="grid-email-9932" name="grid-email-9932" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9932">Contact number (9932)</label><input id="grid-phone-9932" name="grid-phone-9932" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="tell-us-about-yourself-9932-">Tell us about yourself (9932)</label><textarea id="tell-us-about-yourself-9932-" name="tell-us-about-yourself-9932-" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Open to relocation? (9932)</legend><label for="open-to-relocation-9932--0"><input type="radio" id="open-to-relocation-9932--0" name="open-to-relocation-9932-" value="yes"> Yes</label><label for="open-to-relocation-9932--1"><input type="radio" id="open-to-relocation-9932--1" name="open-to-relocation-9932-" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
