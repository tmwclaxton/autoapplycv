<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50076</title></head>
<body>
<main><h1>Wizard complex apply 50076</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50076">
<h2 id="wizard-contact-50076">Contact information</h2>

<label for="wiz-name-50076">Your name (50076)</label>
<input type="text" id="wiz-name-50076" name="wiz-name-50076" autocomplete="name">
<label for="wiz-email-50076">Personal email (50076)</label>
<input type="email" id="wiz-email-50076" name="wiz-email-50076" autocomplete="email">
<label for="wiz-phone-50076">Phone number (50076)</label>
<input type="tel" id="wiz-phone-50076" name="wiz-phone-50076" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50076">
<h2 id="wizard-screen-50076">Screening questions</h2>
<div class="field-row"><label for="personal-statement-50076-500">Personal statement (50076)</label><textarea id="personal-statement-50076-500" name="personal-statement-50076-500" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="work-location-50076-50076">Work location (50076)</label><select id="work-location-50076-50076" name="work-location-50076-50076"><option value="">Choose one…</option><option value="london">London</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50076)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50076-50076">Expected salary (50076)</label><input type="number" id="expected-salary-50076-50076" name="expected-salary-50076-50076" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50076-">Start date preference (50076)</label><input type="date" id="start-date-preference-50076-" name="start-date-preference-50076-" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50076">
<h2 id="wizard-docs-50076">Documents and skills</h2>
<fieldset><legend>Primary expertise (50076)</legend><label for="primary-expertise-50076--cb-0"><input type="checkbox" id="primary-expertise-50076--cb-0" name="primary-expertise-50076-[]" value="python"> Python</label><label for="primary-expertise-50076--cb-1"><input type="checkbox" id="primary-expertise-50076--cb-1" name="primary-expertise-50076-[]" value="go"> Go</label><label for="primary-expertise-50076--cb-2"><input type="checkbox" id="primary-expertise-50076--cb-2" name="primary-expertise-50076-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50076--cb-3"><input type="checkbox" id="primary-expertise-50076--cb-3" name="primary-expertise-50076-[]" value="sql"> SQL</label><label for="primary-expertise-50076--cb-4"><input type="checkbox" id="primary-expertise-50076--cb-4" name="primary-expertise-50076-[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50076">Attach resume (50076)</label><input type="file" id="file-50076" name="file-50076" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50076)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="other">Other</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="conference">Conference</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
