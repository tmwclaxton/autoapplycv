<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50458</title></head>
<body>
<main><h1>Mixed complex apply 50458</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50458">Your name (50458)</label>
<input type="text" id="mix-name-50458" name="mix-name-50458" autocomplete="name">
<label for="mix-email-50458">Work email (50458)</label>

<fieldset><legend>Do you require visa sponsorship? (50458)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50458)</legend><label for="willing-to-relocate-5045-0"><input type="radio" id="willing-to-relocate-5045-0" name="willing-to-relocate-5045" value="yes"> Yes</label><label for="willing-to-relocate-5045-1"><input type="radio" id="willing-to-relocate-5045-1" name="willing-to-relocate-5045" value="no"> No</label><label for="willing-to-relocate-5045-2"><input type="radio" id="willing-to-relocate-5045-2" name="willing-to-relocate-5045" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="compensation-requirement-504">Compensation requirement (50458)</label><input type="number" id="compensation-requirement-504" name="compensation-requirement-504" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50458-50">Earliest start date (50458)</label><input type="date" id="earliest-start-date-50458-50" name="earliest-start-date-50458-50" ></div>
<div class="field-row"><label for="referral-source-50458-50458">Referral source (50458)</label><select id="referral-source-50458-50458" name="referral-source-50458-50458"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="other">Other</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option></select></div>
<fieldset><legend>Key skills (50458)</legend><label for="key-skills-50458-50458-cb-0"><input type="checkbox" id="key-skills-50458-50458-cb-0" name="key-skills-50458-50458[]" value="react"> React</label><label for="key-skills-50458-50458-cb-1"><input type="checkbox" id="key-skills-50458-50458-cb-1" name="key-skills-50458-50458[]" value="laravel"> Laravel</label><label for="key-skills-50458-50458-cb-2"><input type="checkbox" id="key-skills-50458-50458-cb-2" name="key-skills-50458-50458[]" value="go"> Go</label><label for="key-skills-50458-50458-cb-3"><input type="checkbox" id="key-skills-50458-50458-cb-3" name="key-skills-50458-50458[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50458">Attach resume (50458)</label><input type="file" id="file-50458" name="file-50458" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50458-50458">Portfolio URL (50458)</label><input type="url" id="portfolio-url-50458-50458" name="portfolio-url-50458-50458" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>

<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
