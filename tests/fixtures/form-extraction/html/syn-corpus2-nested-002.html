<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nested fieldsets 20342</title></head>
<body>
<main><h1>Nested fieldsets 20342</h1><form action="/apply" method="post">
<fieldset><legend>Personal details</legend>
<label for="ns-name-20342">Legal name (20342)</label>
<input type="text" id="ns-name-20342" name="ns-name-20342" autocomplete="name">
<label for="ns-email-20342">Contact email (20342)</label>
<input type="email" id="ns-email-20342" name="ns-email-20342" autocomplete="email">
<label for="ns-phone-20342">Telephone (20342)</label>
<input type="tel" id="ns-phone-20342" name="ns-phone-20342" autocomplete="tel"></fieldset>
<fieldset><legend>Preferences</legend><div class="field-row"><label for="preferred-location-20342-203">Preferred location (20342)</label><select id="preferred-location-20342-203" name="preferred-location-20342-203"><option value="">Choose one…</option><option value="london">London</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="remote">Remote</option></select></div></fieldset>
<fieldset><legend>Additional</legend><div class="field-row"><label for="tell-us-about-yourself-20342">Tell us about yourself (20342)</label><textarea id="tell-us-about-yourself-20342" name="tell-us-about-yourself-20342" rows="4" maxlength="400"></textarea></div></fieldset></form></main>
</body>
</html>
