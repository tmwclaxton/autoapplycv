<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Listbox 9680</title></head>
<body>
<main><h1>Listbox 9680</h1><form action="/apply" method="post">
<label for="lb-name-9680">Complete name (9680)</label>
<input type="text" id="lb-name-9680" name="lb-name-9680" autocomplete="name">
<label for="lb-email-9680">Primary email (9680)</label>
<input type="email" id="lb-email-9680" name="lb-email-9680" autocomplete="email">
<label for="lb-phone-9680">Telephone (9680)</label>
<input type="tel" id="lb-phone-9680" name="lb-phone-9680" autocomplete="tel">
<div class="field-row">
<span id="listbox-h-9680-lbl">Work location (9680)</span>
<button type="button" class="custom-dropdown-trigger" role="combobox" aria-expanded="false" aria-controls="listbox-h-9680" aria-labelledby="listbox-h-9680-lbl" data-reveal="#listbox-h-9680">Select work location (9680)</button>
<div role="listbox" id="listbox-h-9680" aria-labelledby="listbox-h-9680-lbl" hidden style="display:none">
<div role="option" data-value="dublin">Dublin</div><div role="option" data-value="hybrid">Hybrid</div><div role="option" data-value="remote">Remote</div><div role="option" data-value="london">London</div>
</div>
</div></form></main>
</body>
</html>
