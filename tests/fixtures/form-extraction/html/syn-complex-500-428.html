<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50428</title></head>
<body>
<main><h1>Mixed complex apply 50428</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50428">Applicant name (50428)</label>
<input type="text" id="mix-name-50428" name="mix-name-50428" autocomplete="name">
<label for="mix-email-50428">Contact email (50428)</label>
<input type="email" id="mix-email-50428" name="mix-email-50428" autocomplete="email">
<label for="mix-phone-50428">Phone number (50428)</label>
<input type="tel" id="mix-phone-50428" name="mix-phone-50428" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50428">Tell us about yourself (50428)</label><textarea id="tell-us-about-yourself-50428" name="tell-us-about-yourself-50428" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50428-504">Preferred location (50428)</label><select id="preferred-location-50428-504" name="preferred-location-50428-504"><option value="">Choose one…</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Work authorization status (50428)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50428)</legend><label for="open-to-relocation-50428-0"><input type="radio" id="open-to-relocation-50428-0" name="open-to-relocation-50428" value="yes"> Yes</label><label for="open-to-relocation-50428-1"><input type="radio" id="open-to-relocation-50428-1" name="open-to-relocation-50428" value="no"> No</label><label for="open-to-relocation-50428-2"><input type="radio" id="open-to-relocation-50428-2" name="open-to-relocation-50428" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50428-50428">Expected salary (50428)</label><input type="number" id="expected-salary-50428-50428" name="expected-salary-50428-50428" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50428-">Start date preference (50428)</label><input type="date" id="start-date-preference-50428-" name="start-date-preference-50428-" ></div>
<div class="field-row"><label for="application-source-50428-504">Application source (50428)</label><select id="application-source-50428-504" name="application-source-50428-504"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option></select></div>
<fieldset><legend>Primary expertise (50428)</legend><label for="primary-expertise-50428--cb-0"><input type="checkbox" id="primary-expertise-50428--cb-0" name="primary-expertise-50428-[]" value="rust"> Rust</label><label for="primary-expertise-50428--cb-1"><input type="checkbox" id="primary-expertise-50428--cb-1" name="primary-expertise-50428-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50428--cb-2"><input type="checkbox" id="primary-expertise-50428--cb-2" name="primary-expertise-50428-[]" value="laravel"> Laravel</label><label for="primary-expertise-50428--cb-3"><input type="checkbox" id="primary-expertise-50428--cb-3" name="primary-expertise-50428-[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50428">Attach resume (50428)</label><input type="file" id="file-50428" name="file-50428" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="work-samples-link-50428-5042">Work samples link (50428)</label><input type="url" id="work-samples-link-50428-5042" name="work-samples-link-50428-5042" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
