<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Lever-style 9461</title></head>
<body>
<main><h1>Lever-style 9461</h1><form action="/apply" method="post">
<div class="application-form">
<div class="application-field"><label class="application-label">Applicant name (9461)</label><input name="lever-name-9461" type="text" id="lever-name-9461"></div>
<div class="application-field"><label class="application-label">Application email (9461)</label><input name="lever-email-9461" type="email" id="lever-email-9461"></div>
<div class="application-field"><label class="application-label">Mobile number (9461)</label><input name="lever-phone-9461" type="tel" id="lever-phone-9461"></div>
<div class="application-field"><label class="application-label">Cover letter (9461)</label><textarea name="lever-cover-9461" id="lever-cover-9461" rows="4" maxlength="500"></textarea></div>
<div class="file-row"><label for="file-upload-9461">Attach resume (optional)</label><input type="file" id="file-upload-9461" name="file-upload-9461" accept=".pdf,.doc"></div>
<button type="button">Submit application</button>
</div></form></main>
</body>
</html>
