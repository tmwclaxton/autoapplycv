<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50140</title></head>
<body>
<main><h1>Mixed complex apply 50140</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50140">Legal name (50140)</label>
<input type="text" id="mix-name-50140" name="mix-name-50140" autocomplete="name">
<label for="mix-email-50140">Work email (50140)</label>
<input type="email" id="mix-email-50140" name="mix-email-50140" autocomplete="email">
<label for="mix-phone-50140">Mobile number (50140)</label>
<input type="tel" id="mix-phone-50140" name="mix-phone-50140" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="personal-statement-50140-501">Personal statement (50140)</label><textarea id="personal-statement-50140-501" name="personal-statement-50140-501" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50140-501">Preferred location (50140)</label><select id="preferred-location-50140-501" name="preferred-location-50140-501"><option value="">Choose one…</option><option value="remote">Remote</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50140)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50140)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50140-50">Salary expectations (50140)</label><input type="number" id="salary-expectations-50140-50" name="salary-expectations-50140-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50140-50140">Available from (50140)</label><input type="date" id="available-from-50140-50140" name="available-from-50140-50140" ></div>
<div class="field-row"><label for="referral-source-50140-50140">Referral source (50140)</label><select id="referral-source-50140-50140" name="referral-source-50140-50140"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="referral">Referral</option><option value="other">Other</option></select></div>
<fieldset><legend>Key skills (50140)</legend><label for="key-skills-50140-50140-cb-0"><input type="checkbox" id="key-skills-50140-50140-cb-0" name="key-skills-50140-50140[]" value="typescript"> TypeScript</label><label for="key-skills-50140-50140-cb-1"><input type="checkbox" id="key-skills-50140-50140-cb-1" name="key-skills-50140-50140[]" value="rust"> Rust</label><label for="key-skills-50140-50140-cb-2"><input type="checkbox" id="key-skills-50140-50140-cb-2" name="key-skills-50140-50140[]" value="python"> Python</label><label for="key-skills-50140-50140-cb-3"><input type="checkbox" id="key-skills-50140-50140-cb-3" name="key-skills-50140-50140[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50140">Attach resume (50140)</label><input type="file" id="file-50140" name="file-50140" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50140-50140">GitHub profile (50140)</label><input type="url" id="github-profile-50140-50140" name="github-profile-50140-50140" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
