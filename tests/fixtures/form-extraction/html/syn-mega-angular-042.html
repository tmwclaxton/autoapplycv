<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9202</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9202</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Your name (9202)</mat-label><label for="ang-name-9202">Your name (9202)</label><input matInput id="ang-name-9202" name="ang-name-9202" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Primary email (9202)</mat-label><label for="ang-email-9202">Primary email (9202)</label><input matInput id="ang-email-9202" name="ang-email-9202" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Cell phone (9202)</mat-label><label for="ang-phone-9202">Cell phone (9202)</label><input matInput id="ang-phone-9202" name="ang-phone-9202" type="tel"></mat-form-field>
<div class="field-row"><label for="why-this-role-9202-9202">Why this role? (9202)</label><textarea id="why-this-role-9202-9202" name="why-this-role-9202-9202" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-9202-9202">Preferred location (9202)</label><select id="preferred-location-9202-9202" name="preferred-location-9202-9202"><option value="">Choose one…</option><option value="london">London</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="manchester">Manchester</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
