<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50216</title></head>
<body>
<main><h1>Wizard complex apply 50216</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50216">
<h2 id="wizard-contact-50216">Contact information</h2>

<label for="wiz-name-50216">Your name (50216)</label>
<input type="text" id="wiz-name-50216" name="wiz-name-50216" autocomplete="name">
<label for="wiz-email-50216">Personal email (50216)</label>
<input type="email" id="wiz-email-50216" name="wiz-email-50216" autocomplete="email">
<label for="wiz-phone-50216">Telephone (50216)</label>
<input type="tel" id="wiz-phone-50216" name="wiz-phone-50216" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50216">
<h2 id="wizard-screen-50216">Screening questions</h2>
<div class="field-row"><label for="why-this-role-50216-50216">Why this role? (50216)</label><textarea id="why-this-role-50216-50216" name="why-this-role-50216-50216" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="current-city-50216-50216">Current city (50216)</label><select id="current-city-50216-50216" name="current-city-50216-50216"><option value="">Choose one…</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50216)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-502">Compensation requirement (50216)</label><input type="number" id="compensation-requirement-502" name="compensation-requirement-502" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50216-50">Earliest start date (50216)</label><input type="date" id="earliest-start-date-50216-50" name="earliest-start-date-50216-50" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50216">
<h2 id="wizard-docs-50216">Documents and skills</h2>
<fieldset><legend>Core competencies (50216)</legend><label for="core-competencies-50216--cb-0"><input type="checkbox" id="core-competencies-50216--cb-0" name="core-competencies-50216-[]" value="sql"> SQL</label><label for="core-competencies-50216--cb-1"><input type="checkbox" id="core-competencies-50216--cb-1" name="core-competencies-50216-[]" value="javascript"> JavaScript</label><label for="core-competencies-50216--cb-2"><input type="checkbox" id="core-competencies-50216--cb-2" name="core-competencies-50216-[]" value="go"> Go</label><label for="core-competencies-50216--cb-3"><input type="checkbox" id="core-competencies-50216--cb-3" name="core-competencies-50216-[]" value="python"> Python</label><label for="core-competencies-50216--cb-4"><input type="checkbox" id="core-competencies-50216--cb-4" name="core-competencies-50216-[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50216">Attach resume (50216)</label><input type="file" id="file-50216" name="file-50216" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50216)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="other">Other</option><option value="conference">Conference</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
