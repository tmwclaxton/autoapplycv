<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Apply — Applicant name</title></head>
<body>
<main>
<h1>Apply — Applicant name</h1>
<form action="/apply" method="post">
<div class="form-group"><label for="applicant-name">Applicant name</label><input type="text" id="applicant-name" name="applicant-name" ></div>
<div class="form-group"><label for="work-email">Work email</label><input type="email" id="work-email" name="work-email" ></div>
<div class="form-group"><label for="contact-number">Contact number</label><input type="tel" id="contact-number" name="contact-number" ></div>
<div class="form-group"><label for="linkedin-link">LinkedIn link</label><input type="url" id="linkedin-link" name="linkedin-link" ></div>

</form>
</main>
</body>
</html>
