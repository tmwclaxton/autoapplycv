<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50117</title></head>
<body>
<main><h1>Conditional complex apply 50117</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50117">
<p id="step1-label-50117">Step 1 - Contact</p>

<label for="cond-name-50117">Applicant name (50117)</label>
<input type="text" id="cond-name-50117" name="cond-name-50117" autocomplete="name">
<label for="cond-email-50117">Contact email (50117)</label>
<input type="email" id="cond-email-50117" name="cond-email-50117" autocomplete="email">
<label for="cond-phone-50117">Phone number (50117)</label>
<input type="tel" id="cond-phone-50117" name="cond-phone-50117" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50117">
<p id="step2-label-50117">Step 2 - Preferences</p>
<div class="field-row"><label for="office-preference-50117-5011">Office preference (50117)</label><select id="office-preference-50117-5011" name="office-preference-50117-5011"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Willing to relocate? (50117)</legend><label for="willing-to-relocate-5011-0"><input type="radio" id="willing-to-relocate-5011-0" name="willing-to-relocate-5011" value="yes"> Yes</label><label for="willing-to-relocate-5011-1"><input type="radio" id="willing-to-relocate-5011-1" name="willing-to-relocate-5011" value="no"> No</label><label for="willing-to-relocate-5011-2"><input type="radio" id="willing-to-relocate-5011-2" name="willing-to-relocate-5011" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="available-from-50117-50117">Available from (50117)</label><input type="date" id="available-from-50117-50117" name="available-from-50117-50117" ></div>
<fieldset><legend>Core competencies (50117)</legend><label for="core-competencies-50117--cb-0"><input type="checkbox" id="core-competencies-50117--cb-0" name="core-competencies-50117-[]" value="javascript"> JavaScript</label><label for="core-competencies-50117--cb-1"><input type="checkbox" id="core-competencies-50117--cb-1" name="core-competencies-50117-[]" value="laravel"> Laravel</label><label for="core-competencies-50117--cb-2"><input type="checkbox" id="core-competencies-50117--cb-2" name="core-competencies-50117-[]" value="go"> Go</label><label for="core-competencies-50117--cb-3"><input type="checkbox" id="core-competencies-50117--cb-3" name="core-competencies-50117-[]" value="react"> React</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50117">
<p id="step3-label-50117">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50117" data-reveal="#reveal-50117">Show follow-up questions</button>
<div id="reveal-50117" hidden style="display:none"><div class="field-row"><label for="personal-statement-50117-501">Personal statement (50117)</label><textarea id="personal-statement-50117-501" name="personal-statement-50117-501" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="personal-website-50117-50117">Personal website (50117)</label><input type="url" id="personal-website-50117-50117" name="personal-website-50117-50117" ></div>
<div class="field-row"><label for="salary-expectations-50117-50">Salary expectations (50117)</label><input type="number" id="salary-expectations-50117-50" name="salary-expectations-50117-50" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50117">Attach resume (50117)</label><input type="file" id="file-50117" name="file-50117" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
