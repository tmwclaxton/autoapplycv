<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Expand questions</title></head>
<body>
<main><h1>Expand questions</h1><form action="/apply" method="post">
<label for="ix-name-25">Legal name</label>
<input type="text" id="ix-name-25" name="ix-name-25">
<label for="ix-email-25">Work email</label>
<input type="email" id="ix-email-25" name="ix-email-25">
<label for="ix-phone-25">Mobile number</label>
<input type="tel" id="ix-phone-25" name="ix-phone-25">
<button type="button" data-reveal="#expand-25">Expand optional questions</button>
<div id="expand-25" hidden style="display:none">
<label for="optional-link-25">LinkedIn profile</label>
<input type="url" id="optional-link-25" name="optional-link-25">
<label for="optional-site-25">Personal website</label>
<input type="url" id="optional-site-25" name="optional-site-25">
</div></form></main>
</body>
</html>
