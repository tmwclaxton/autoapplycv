<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Greenhouse-style 9401</title></head>
<body>
<main><h1>Greenhouse-style 9401</h1><form action="/apply" method="post">
<div id="application" class="application--container">

<div class="field"><label id="gh-name-9401-label" for="gh-name-9401">Preferred name (9401)</label><input aria-labelledby="gh-name-9401-label" type="text" id="gh-name-9401" name="gh-name-9401" autocomplete="name">
<div class="field"><label id="gh-email-9401-label" for="gh-email-9401">Application email (9401)</label><input aria-labelledby="gh-email-9401-label" type="email" id="gh-email-9401" name="gh-email-9401" autocomplete="email">
<div class="field"><label id="gh-phone-9401-label" for="gh-phone-9401">Mobile number (9401)</label><input aria-labelledby="gh-phone-9401-label" type="tel" id="gh-phone-9401" name="gh-phone-9401" autocomplete="tel">
<div class="field-row"><label for="personal-statement-9401-9401">Personal statement (9401)</label><textarea id="personal-statement-9401-9401" name="personal-statement-9401-9401" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="application-source-9401-9401">Application source (9401)</label><select id="application-source-9401-9401" name="application-source-9401-9401"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="other">Other</option></select></div>
<div class="file-row"><label for="file-upload-9401">Attach resume (optional)</label><input type="file" id="file-upload-9401" name="file-upload-9401" accept=".pdf,.doc"></div>
</div></form></main>
</body>
</html>
