<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50279</title></head>
<body>
<main><h1>Long complex apply 50279</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50279">Applicant name (50279)</label>
<input type="text" id="long-name-50279" name="long-name-50279" autocomplete="name">
<label for="long-email-50279">Work email (50279)</label>
<input type="email" id="long-email-50279" name="long-email-50279" autocomplete="email">
<label for="long-phone-50279">Contact number (50279)</label>
<input type="tel" id="long-phone-50279" name="long-phone-50279" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50279">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50279" name="linkedin-profile-url-50279" ></div>
<div class="field-row"><label for="current-employer-50279">Current employer</label><input type="text" id="current-employer-50279" name="current-employer-50279" ></div>
<div class="field-row"><label for="current-job-title-50279">Current job title</label><input type="text" id="current-job-title-50279" name="current-job-title-50279" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="cover-letter-50279-50279">Cover letter (50279)</label><textarea id="cover-letter-50279-50279" name="cover-letter-50279-50279" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="work-location-50279-50279">Work location (50279)</label><select id="work-location-50279-50279" name="work-location-50279-50279"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Work authorization status (50279)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50279)</legend><label for="open-to-relocation-50279-0"><input type="radio" id="open-to-relocation-50279-0" name="open-to-relocation-50279" value="yes"> Yes</label><label for="open-to-relocation-50279-1"><input type="radio" id="open-to-relocation-50279-1" name="open-to-relocation-50279" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50279-50">Salary expectations (50279)</label><input type="number" id="salary-expectations-50279-50" name="salary-expectations-50279-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50279-502">When can you start? (50279)</label><input type="date" id="when-can-you-start-50279-502" name="when-can-you-start-50279-502" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50279)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="other">Other</option><option value="conference">Conference</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Technical skills (50279)</legend><label for="technical-skills-50279-5-cb-0"><input type="checkbox" id="technical-skills-50279-5-cb-0" name="technical-skills-50279-5[]" value="python"> Python</label><label for="technical-skills-50279-5-cb-1"><input type="checkbox" id="technical-skills-50279-5-cb-1" name="technical-skills-50279-5[]" value="laravel"> Laravel</label><label for="technical-skills-50279-5-cb-2"><input type="checkbox" id="technical-skills-50279-5-cb-2" name="technical-skills-50279-5[]" value="sql"> SQL</label><label for="technical-skills-50279-5-cb-3"><input type="checkbox" id="technical-skills-50279-5-cb-3" name="technical-skills-50279-5[]" value="typescript"> TypeScript</label><label for="technical-skills-50279-5-cb-4"><input type="checkbox" id="technical-skills-50279-5-cb-4" name="technical-skills-50279-5[]" value="javascript"> JavaScript</label><label for="technical-skills-50279-5-cb-5"><input type="checkbox" id="technical-skills-50279-5-cb-5" name="technical-skills-50279-5[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50279">Attach resume (50279)</label><input type="file" id="file-50279" name="file-50279" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
