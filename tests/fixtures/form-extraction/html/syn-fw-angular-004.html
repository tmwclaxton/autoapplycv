<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 4</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 4</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline">
<mat-label>Your name</mat-label>
<label for="ang-name">Your name</label>
<input matInput id="ang-name" name="ang-name" type="text" ng-model="candidate.name">
</mat-form-field>
<mat-form-field appearance="outline">
<mat-label>Personal email</mat-label>
<label for="ang-email">Personal email</label>
<input matInput id="ang-email" name="ang-email" type="email" ng-model="candidate.email">
</mat-form-field>
<mat-form-field appearance="outline">
<mat-label>Telephone</mat-label>
<label for="ang-phone">Telephone</label>
<input matInput id="ang-phone" name="ang-phone" type="tel" ng-model="candidate.phone">
</mat-form-field>
<div class="field-row"><label for="motivation-statement">Motivation statement</label><textarea id="motivation-statement" name="motivation-statement" rows="4" maxlength="500" ></textarea></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
