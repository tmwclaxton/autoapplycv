<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Disclosure 9966</title></head>
<body>
<main><h1>Disclosure 9966</h1><form action="/apply" method="post">
<label for="disc-name-9966">Legal name (9966)</label>
<input type="text" id="disc-name-9966" name="disc-name-9966" autocomplete="name">
<label for="disc-email-9966">Personal email (9966)</label>
<input type="email" id="disc-email-9966" name="disc-email-9966" autocomplete="email">
<label for="disc-phone-9966">Direct line (9966)</label>
<input type="tel" id="disc-phone-9966" name="disc-phone-9966" autocomplete="tel">
<button type="button" id="disclosure-9966" aria-expanded="false" aria-controls="disclosure-panel-9966" data-reveal="#disclosure-panel-9966">Show voluntary disclosures</button>
<div id="disclosure-panel-9966" hidden style="display:none">
<label for="disclosure-text-9966">Voluntary disclosure (9966)</label>
<textarea id="disclosure-text-9966" name="disclosure-text-9966" rows="3" maxlength="300"></textarea>
</div></form></main>
</body>
</html>
