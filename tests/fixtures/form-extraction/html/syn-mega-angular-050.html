<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9210</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9210</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Legal name (9210)</mat-label><label for="ang-name-9210">Legal name (9210)</label><input matInput id="ang-name-9210" name="ang-name-9210" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Email address (9210)</mat-label><label for="ang-email-9210">Email address (9210)</label><input matInput id="ang-email-9210" name="ang-email-9210" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Direct line (9210)</mat-label><label for="ang-phone-9210">Direct line (9210)</label><input matInput id="ang-phone-9210" name="ang-phone-9210" type="tel"></mat-form-field>
<div class="field-row"><label for="tell-us-about-yourself-9210-">Tell us about yourself (9210)</label><textarea id="tell-us-about-yourself-9210-" name="tell-us-about-yourself-9210-" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-9210-9210">Office preference (9210)</label><select id="office-preference-9210-9210" name="office-preference-9210-9210"><option value="">Choose one…</option><option value="london">London</option><option value="dublin">Dublin</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
