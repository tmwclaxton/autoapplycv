<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50019</title></head>
<body>
<main><h1>Long complex apply 50019</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50019">Legal name (50019)</label>
<input type="text" id="long-name-50019" name="long-name-50019" autocomplete="name">
<label for="long-email-50019">Work email (50019)</label>
<input type="email" id="long-email-50019" name="long-email-50019" autocomplete="email">
<label for="long-phone-50019">Phone number (50019)</label>
<input type="tel" id="long-phone-50019" name="long-phone-50019" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50019">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50019" name="linkedin-profile-url-50019" ></div>
<div class="field-row"><label for="current-employer-50019">Current employer</label><input type="text" id="current-employer-50019" name="current-employer-50019" ></div>
<div class="field-row"><label for="current-job-title-50019">Current job title</label><input type="text" id="current-job-title-50019" name="current-job-title-50019" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="motivation-statement-50019-5">Motivation statement (50019)</label><textarea id="motivation-statement-50019-5" name="motivation-statement-50019-5" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="preferred-location-50019-500">Preferred location (50019)</label><select id="preferred-location-50019-500" name="preferred-location-50019-500"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="london">London</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50019)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50019)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-500">Compensation requirement (50019)</label><input type="number" id="compensation-requirement-500" name="compensation-requirement-500" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50019-">Start date preference (50019)</label><input type="date" id="start-date-preference-50019-" name="start-date-preference-50019-" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50019)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="other">Other</option><option value="job-board">Job board</option><option value="conference">Conference</option><option value="referral">Referral</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Primary expertise (50019)</legend><label for="primary-expertise-50019--cb-0"><input type="checkbox" id="primary-expertise-50019--cb-0" name="primary-expertise-50019-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50019--cb-1"><input type="checkbox" id="primary-expertise-50019--cb-1" name="primary-expertise-50019-[]" value="rust"> Rust</label><label for="primary-expertise-50019--cb-2"><input type="checkbox" id="primary-expertise-50019--cb-2" name="primary-expertise-50019-[]" value="go"> Go</label><label for="primary-expertise-50019--cb-3"><input type="checkbox" id="primary-expertise-50019--cb-3" name="primary-expertise-50019-[]" value="react"> React</label><label for="primary-expertise-50019--cb-4"><input type="checkbox" id="primary-expertise-50019--cb-4" name="primary-expertise-50019-[]" value="python"> Python</label><label for="primary-expertise-50019--cb-5"><input type="checkbox" id="primary-expertise-50019--cb-5" name="primary-expertise-50019-[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50019">Attach resume (50019)</label><input type="file" id="file-50019" name="file-50019" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
