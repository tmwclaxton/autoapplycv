<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50029</title></head>
<body>
<main><h1>Long complex apply 50029</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50029">Full name (50029)</label>
<input type="text" id="long-name-50029" name="long-name-50029" autocomplete="name">
<label for="long-email-50029">Email address (50029)</label>
<input type="email" id="long-email-50029" name="long-email-50029" autocomplete="email">
<label for="long-phone-50029">Mobile number (50029)</label>
<input type="tel" id="long-phone-50029" name="long-phone-50029" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50029">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50029" name="linkedin-profile-url-50029" ></div>
<div class="field-row"><label for="current-employer-50029">Current employer</label><input type="text" id="current-employer-50029" name="current-employer-50029" ></div>
<div class="field-row"><label for="current-job-title-50029">Current job title</label><input type="text" id="current-job-title-50029" name="current-job-title-50029" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="personal-statement-50029-500">Personal statement (50029)</label><textarea id="personal-statement-50029-500" name="personal-statement-50029-500" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="work-location-50029-50029">Work location (50029)</label><select id="work-location-50029-50029" name="work-location-50029-50029"><option value="">Choose one…</option><option value="new-york">New York</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50029)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50029)</legend><label for="open-to-relocation-50029-0"><input type="radio" id="open-to-relocation-50029-0" name="open-to-relocation-50029" value="yes"> Yes</label><label for="open-to-relocation-50029-1"><input type="radio" id="open-to-relocation-50029-1" name="open-to-relocation-50029" value="no"> No</label></fieldset>
<div class="field-row"><label for="compensation-requirement-500">Compensation requirement (50029)</label><input type="number" id="compensation-requirement-500" name="compensation-requirement-500" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50029-50">Earliest start date (50029)</label><input type="date" id="earliest-start-date-50029-50" name="earliest-start-date-50029-50" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50029)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="other">Other</option><option value="conference">Conference</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Key skills (50029)</legend><label for="key-skills-50029-50029-cb-0"><input type="checkbox" id="key-skills-50029-50029-cb-0" name="key-skills-50029-50029[]" value="sql"> SQL</label><label for="key-skills-50029-50029-cb-1"><input type="checkbox" id="key-skills-50029-50029-cb-1" name="key-skills-50029-50029[]" value="go"> Go</label><label for="key-skills-50029-50029-cb-2"><input type="checkbox" id="key-skills-50029-50029-cb-2" name="key-skills-50029-50029[]" value="javascript"> JavaScript</label><label for="key-skills-50029-50029-cb-3"><input type="checkbox" id="key-skills-50029-50029-cb-3" name="key-skills-50029-50029[]" value="rust"> Rust</label><label for="key-skills-50029-50029-cb-4"><input type="checkbox" id="key-skills-50029-50029-cb-4" name="key-skills-50029-50029[]" value="python"> Python</label><label for="key-skills-50029-50029-cb-5"><input type="checkbox" id="key-skills-50029-50029-cb-5" name="key-skills-50029-50029[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50029">Attach resume (50029)</label><input type="file" id="file-50029" name="file-50029" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
