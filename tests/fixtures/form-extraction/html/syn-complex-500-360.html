<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50360</title></head>
<body>
<main><h1>Mixed complex apply 50360</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50360">Your name (50360)</label>
<input type="text" id="mix-name-50360" name="mix-name-50360" autocomplete="name">
<label for="mix-email-50360">Personal email (50360)</label>
<input type="email" id="mix-email-50360" name="mix-email-50360" autocomplete="email">
<label for="mix-phone-50360">Telephone (50360)</label>
<input type="tel" id="mix-phone-50360" name="mix-phone-50360" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50360">Tell us about yourself (50360)</label><textarea id="tell-us-about-yourself-50360" name="tell-us-about-yourself-50360" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-50360-5036">Office preference (50360)</label><select id="office-preference-50360-5036" name="office-preference-50360-5036"><option value="">Choose one…</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50360)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50360)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label><label for="relocation-preference-50-2"><input type="radio" id="relocation-preference-50-2" name="relocation-preference-50" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="expected-salary-50360-50360">Expected salary (50360)</label><input type="number" id="expected-salary-50360-50360" name="expected-salary-50360-50360" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50360-">Start date preference (50360)</label><input type="date" id="start-date-preference-50360-" name="start-date-preference-50360-" ></div>
<div class="field-row"><label for="referral-source-50360-50360">Referral source (50360)</label><select id="referral-source-50360-50360" name="referral-source-50360-50360"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="other">Other</option><option value="linkedin">LinkedIn</option><option value="conference">Conference</option></select></div>
<fieldset><legend>Primary expertise (50360)</legend><label for="primary-expertise-50360--cb-0"><input type="checkbox" id="primary-expertise-50360--cb-0" name="primary-expertise-50360-[]" value="python"> Python</label><label for="primary-expertise-50360--cb-1"><input type="checkbox" id="primary-expertise-50360--cb-1" name="primary-expertise-50360-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50360--cb-2"><input type="checkbox" id="primary-expertise-50360--cb-2" name="primary-expertise-50360-[]" value="go"> Go</label><label for="primary-expertise-50360--cb-3"><input type="checkbox" id="primary-expertise-50360--cb-3" name="primary-expertise-50360-[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50360">Attach resume (50360)</label><input type="file" id="file-50360" name="file-50360" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50360-50360">Portfolio URL (50360)</label><input type="url" id="portfolio-url-50360-50360" name="portfolio-url-50360-50360" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
