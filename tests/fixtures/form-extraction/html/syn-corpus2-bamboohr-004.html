<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>BambooHR apply 20032</title></head>
<body>
<main><h1>BambooHR apply 20032</h1><form action="/apply" method="post">
<div class="BambooHR-ATS-Form" data-bamboohr-application="true">
<div class="field-group">
<label class="field-label" for="bb-name-20032">Full name (20032)</label>
<input class="field-input" type="text" id="bb-name-20032" name="bb-name-20032" autocomplete="name">
<label class="field-label" for="bb-email-20032">Contact email (20032)</label>
<input class="field-input" type="email" id="bb-email-20032" name="bb-email-20032" autocomplete="email">
<label class="field-label" for="bb-phone-20032">Contact number (20032)</label>
<input class="field-input" type="tel" id="bb-phone-20032" name="bb-phone-20032" autocomplete="tel"></div>
<div class="field-row"><label for="motivation-statement-20032-2">Motivation statement (20032)</label><textarea id="motivation-statement-20032-2" name="motivation-statement-20032-2" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="application-source-20032-200">Application source (20032)</label><select id="application-source-20032-200" name="application-source-20032-200"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="company-site">Company site</option><option value="job-board">Job board</option></select></div>
<div class="file-row"><label for="file-20032">Attach resume (optional)</label><input type="file" id="file-20032" name="file-20032" accept=".pdf,.doc"></div>
<button type="button" class="btn-submit">Apply now</button>
</div></form></main>
</body>
</html>
