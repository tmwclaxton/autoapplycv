<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50330</title></head>
<body>
<main><h1>Mixed complex apply 50330</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50330">Legal name (50330)</label>
<input type="text" id="mix-name-50330" name="mix-name-50330" autocomplete="name">
<label for="mix-email-50330">Email address (50330)</label>
<input type="email" id="mix-email-50330" name="mix-email-50330" autocomplete="email">
<label for="mix-phone-50330">Mobile number (50330)</label>
<input type="tel" id="mix-phone-50330" name="mix-phone-50330" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="tell-us-about-yourself-50330">Tell us about yourself (50330)</label><textarea id="tell-us-about-yourself-50330" name="tell-us-about-yourself-50330" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-50330-5033">Office preference (50330)</label><select id="office-preference-50330-5033" name="office-preference-50330-5033"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="new-york">New York</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50330)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50330)</legend><label for="willing-to-relocate-5033-0"><input type="radio" id="willing-to-relocate-5033-0" name="willing-to-relocate-5033" value="yes"> Yes</label><label for="willing-to-relocate-5033-1"><input type="radio" id="willing-to-relocate-5033-1" name="willing-to-relocate-5033" value="no"> No</label><label for="willing-to-relocate-5033-2"><input type="radio" id="willing-to-relocate-5033-2" name="willing-to-relocate-5033" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50330-50">Salary expectations (50330)</label><input type="number" id="salary-expectations-50330-50" name="salary-expectations-50330-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50330-">Start date preference (50330)</label><input type="date" id="start-date-preference-50330-" name="start-date-preference-50330-" ></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50330)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="referral">Referral</option><option value="job-board">Job board</option><option value="conference">Conference</option><option value="company-site">Company site</option></select></div>
<fieldset><legend>Core competencies (50330)</legend><label for="core-competencies-50330--cb-0"><input type="checkbox" id="core-competencies-50330--cb-0" name="core-competencies-50330-[]" value="python"> Python</label><label for="core-competencies-50330--cb-1"><input type="checkbox" id="core-competencies-50330--cb-1" name="core-competencies-50330-[]" value="sql"> SQL</label><label for="core-competencies-50330--cb-2"><input type="checkbox" id="core-competencies-50330--cb-2" name="core-competencies-50330-[]" value="rust"> Rust</label><label for="core-competencies-50330--cb-3"><input type="checkbox" id="core-competencies-50330--cb-3" name="core-competencies-50330-[]" value="laravel"> Laravel</label></fieldset>
<div class="file-row"><label for="file-50330">Attach resume (50330)</label><input type="file" id="file-50330" name="file-50330" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="github-profile-50330-50330">GitHub profile (50330)</label><input type="url" id="github-profile-50330-50330" name="github-profile-50330-50330" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
