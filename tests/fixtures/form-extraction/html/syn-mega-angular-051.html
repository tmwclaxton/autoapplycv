<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Angular apply 9211</title></head>
<body>

<main ng-app="apply"><h1>Angular Application 9211</h1>
<form ngNoForm class="application-form" action="/apply" method="post" novalidate>
<mat-form-field appearance="outline"><mat-label>Applicant name (9211)</mat-label><label for="ang-name-9211">Applicant name (9211)</label><input matInput id="ang-name-9211" name="ang-name-9211" type="text"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Personal email (9211)</mat-label><label for="ang-email-9211">Personal email (9211)</label><input matInput id="ang-email-9211" name="ang-email-9211" type="email"></mat-form-field>
<mat-form-field appearance="outline"><mat-label>Contact number (9211)</mat-label><label for="ang-phone-9211">Contact number (9211)</label><input matInput id="ang-phone-9211" name="ang-phone-9211" type="tel"></mat-form-field>
<div class="field-row"><label for="tell-us-about-yourself-9211-">Tell us about yourself (9211)</label><textarea id="tell-us-about-yourself-9211-" name="tell-us-about-yourself-9211-" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="office-preference-9211-9211">Office preference (9211)</label><select id="office-preference-9211-9211" name="office-preference-9211-9211"><option value="">Choose one…</option><option value="london">London</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option><option value="remote">Remote</option></select></div>
<button mat-button type="button">Continue</button>
</form></main>
</body>
</html>
