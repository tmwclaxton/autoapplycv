<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Nested fieldsets 20357</title></head>
<body>
<main><h1>Nested fieldsets 20357</h1><form action="/apply" method="post">
<fieldset><legend>Personal details</legend>
<label for="ns-name-20357">Applicant name (20357)</label>
<input type="text" id="ns-name-20357" name="ns-name-20357" autocomplete="name">
<label for="ns-email-20357">Contact email (20357)</label>
<input type="email" id="ns-email-20357" name="ns-email-20357" autocomplete="email">
<label for="ns-phone-20357">Phone number (20357)</label>
<input type="tel" id="ns-phone-20357" name="ns-phone-20357" autocomplete="tel"></fieldset>
<fieldset><legend>Preferences</legend><div class="field-row"><label for="preferred-location-20357-203">Preferred location (20357)</label><select id="preferred-location-20357-203" name="preferred-location-20357-203"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option></select></div></fieldset>
<fieldset><legend>Additional</legend><div class="field-row"><label for="tell-us-about-yourself-20357">Tell us about yourself (20357)</label><textarea id="tell-us-about-yourself-20357" name="tell-us-about-yourself-20357" rows="4" maxlength="400"></textarea></div></fieldset></form></main>
</body>
</html>
