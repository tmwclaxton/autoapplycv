<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50438</title></head>
<body>
<main><h1>Mixed complex apply 50438</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50438">Your name (50438)</label>
<input type="text" id="mix-name-50438" name="mix-name-50438" autocomplete="name">
<label for="mix-email-50438">Contact email (50438)</label>
<input type="email" id="mix-email-50438" name="mix-email-50438" autocomplete="email">
<label for="mix-phone-50438">Contact number (50438)</label>
<input type="tel" id="mix-phone-50438" name="mix-phone-50438" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="why-this-role-50438-50438">Why this role? (50438)</label><textarea id="why-this-role-50438-50438" name="why-this-role-50438-50438" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="work-location-50438-50438">Work location (50438)</label><select id="work-location-50438-50438" name="work-location-50438-50438"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option><option value="london">London</option><option value="manchester">Manchester</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50438)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50438)</legend><label for="willing-to-relocate-5043-0"><input type="radio" id="willing-to-relocate-5043-0" name="willing-to-relocate-5043" value="yes"> Yes</label><label for="willing-to-relocate-5043-1"><input type="radio" id="willing-to-relocate-5043-1" name="willing-to-relocate-5043" value="no"> No</label><label for="willing-to-relocate-5043-2"><input type="radio" id="willing-to-relocate-5043-2" name="willing-to-relocate-5043" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50438-50">Desired base salary (50438)</label><input type="number" id="desired-base-salary-50438-50" name="desired-base-salary-50438-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50438-504">When can you start? (50438)</label><input type="date" id="when-can-you-start-50438-504" name="when-can-you-start-50438-504" ></div>
<div class="field-row"><label for="application-source-50438-504">Application source (50438)</label><select id="application-source-50438-504" name="application-source-50438-504"><option value="">Choose one…</option><option value="other">Other</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="conference">Conference</option></select></div>
<fieldset><legend>Key skills (50438)</legend><label for="key-skills-50438-50438-cb-0"><input type="checkbox" id="key-skills-50438-50438-cb-0" name="key-skills-50438-50438[]" value="rust"> Rust</label><label for="key-skills-50438-50438-cb-1"><input type="checkbox" id="key-skills-50438-50438-cb-1" name="key-skills-50438-50438[]" value="typescript"> TypeScript</label><label for="key-skills-50438-50438-cb-2"><input type="checkbox" id="key-skills-50438-50438-cb-2" name="key-skills-50438-50438[]" value="python"> Python</label><label for="key-skills-50438-50438-cb-3"><input type="checkbox" id="key-skills-50438-50438-cb-3" name="key-skills-50438-50438[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50438">Attach resume (50438)</label><input type="file" id="file-50438" name="file-50438" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="portfolio-url-50438-50438">Portfolio URL (50438)</label><input type="url" id="portfolio-url-50438-50438" name="portfolio-url-50438-50438" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
