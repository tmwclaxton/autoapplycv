<!DOCTYPE html>
<html lang="en-GB">
<head><meta charset="utf-8"><title>Apply - Business Analyst</title></head>
<body>
<div id="__next">
<nav class="navbar" data-qa="navBar"><a href="/">Reed.co.uk</a></nav>
<main><form data-qa="application-form" action="/jobs/apply/submit" method="post">
<h1 data-qa="application-step-title">Screening questions</h1>

<fieldset data-qa="fieldset-do-you-have-the-right-to-wor">
<legend data-qa="application-step-subtitle">Do you have the right to work in the United Kingdom?</legend>
<label for="do-you-have-the-right-to-wor-0"><input type="radio" id="do-you-have-the-right-to-wor-0" name="do-you-have-the-right-to-wor" value="yes" data-qa="radio-do-you-have-the-right-to-wor-0"> Yes</label><label for="do-you-have-the-right-to-wor-1"><input type="radio" id="do-you-have-the-right-to-wor-1" name="do-you-have-the-right-to-wor" value="no" data-qa="radio-do-you-have-the-right-to-wor-1"> No</label>
</fieldset>
<fieldset data-qa="fieldset-will-you-require-visa-sponso">
<legend data-qa="application-step-subtitle">Will you require visa sponsorship now or in the future?</legend>
<label for="will-you-require-visa-sponso-0"><input type="radio" id="will-you-require-visa-sponso-0" name="will-you-require-visa-sponso" value="yes" data-qa="radio-will-you-require-visa-sponso-0"> Yes</label><label for="will-you-require-visa-sponso-1"><input type="radio" id="will-you-require-visa-sponso-1" name="will-you-require-visa-sponso" value="no" data-qa="radio-will-you-require-visa-sponso-1"> No</label><label for="will-you-require-visa-sponso-2"><input type="radio" id="will-you-require-visa-sponso-2" name="will-you-require-visa-sponso" value="not-sure" data-qa="radio-will-you-require-visa-sponso-2"> Not sure</label>
</fieldset>
<div class="form-group" data-qa="field-highest-level-of-education-57100">
<label for="highest-level-of-education-57100" data-qa="field-highest-level-of-education-57100-label">Highest level of education</label>
<select id="highest-level-of-education-57100" name="highest-level-of-education-57100" data-qa="field-highest-level-of-education-57100-input">
<option value="">Please select</option><option value="gcse">GCSE</option><option value="a-level">A-Level</option><option value="bachelor-s-degree">Bachelor's degree</option><option value="master-s-degree">Master's degree</option><option value="phd">PhD</option><option value="other">Other</option>
</select>
</div>
<div class="form-group" data-qa="field-notice-period-571000266">
<label for="notice-period-571000266" data-qa="field-notice-period-571000266-label">Notice period</label>
<select id="notice-period-571000266" name="notice-period-571000266" data-qa="field-notice-period-571000266-input">
<option value="">Please select</option><option value="immediate">Immediate</option><option value="1-week">1 week</option><option value="2-weeks">2 weeks</option><option value="1-month">1 month</option><option value="2-months">2 months</option><option value="3-months">3 months</option>
</select>
</div>
<div class="form-group" data-qa="field-current-salary-571000266">
<label for="current-salary-571000266" data-qa="field-current-salary-571000266-label">Current salary (£)</label>
<input type="number" id="current-salary-571000266" name="current-salary-571000266" data-qa="field-current-salary-571000266-input" min="0" step="1000">
</div>
<div class="form-group" data-qa="field-expected-salary-571000266">
<label for="expected-salary-571000266" data-qa="field-expected-salary-571000266-label">Expected salary (£)</label>
<input type="number" id="expected-salary-571000266" name="expected-salary-571000266" data-qa="field-expected-salary-571000266-input" min="0" step="1000">
</div>
<div class="form-group" data-qa="field-why-are-you-interested-in-this-b">
<label for="why-are-you-interested-in-this-b" data-qa="field-why-are-you-interested-in-this-b-label">Why are you interested in this business analyst role?</label>
<textarea id="why-are-you-interested-in-this-b" name="why-are-you-interested-in-this-b" rows="5" data-qa="field-why-are-you-interested-in-this-b-input" maxlength="800"></textarea>
</div>
<fieldset data-qa="fieldset-which-skills-do-you-have-571">
<legend>Which skills do you have?</legend>
<label for="which-skills-do-you-have-571-cb-0"><input type="checkbox" id="which-skills-do-you-have-571-cb-0" name="which-skills-do-you-have-571[]" value="go" data-qa="checkbox-which-skills-do-you-have-571-cb-0"> Go</label><label for="which-skills-do-you-have-571-cb-1"><input type="checkbox" id="which-skills-do-you-have-571-cb-1" name="which-skills-do-you-have-571[]" value="azure" data-qa="checkbox-which-skills-do-you-have-571-cb-1"> Azure</label><label for="which-skills-do-you-have-571-cb-2"><input type="checkbox" id="which-skills-do-you-have-571-cb-2" name="which-skills-do-you-have-571[]" value="python" data-qa="checkbox-which-skills-do-you-have-571-cb-2"> Python</label><label for="which-skills-do-you-have-571-cb-3"><input type="checkbox" id="which-skills-do-you-have-571-cb-3" name="which-skills-do-you-have-571[]" value="react" data-qa="checkbox-which-skills-do-you-have-571-cb-3"> React</label><label for="which-skills-do-you-have-571-cb-4"><input type="checkbox" id="which-skills-do-you-have-571-cb-4" name="which-skills-do-you-have-571[]" value="c" data-qa="checkbox-which-skills-do-you-have-571-cb-4"> C#</label>
</fieldset>

<div data-qa="application-actions"><button type="button" data-qa="continue-button" class="btn btn-primary">Continue</button></div>
</form></main>
<footer data-qa="pageFooter"><p>Reed synthetic corpus fixture</p></footer>
</div>
</body>
</html>
