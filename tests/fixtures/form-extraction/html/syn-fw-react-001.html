<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>React apply 1</title></head>
<body>
<main><h1>React apply 1</h1><form action="/apply" method="post">
<div id="root" data-reactroot="">
<div class="App">
<div class="component FormSection" role="group" aria-label="Contact details">
<div class="component Field"><label htmlFor="r-name">Full name</label><input id="r-name" name="r-name" type="text" aria-label="Full name"></div>
<div class="component Field"><label htmlFor="r-email">Email address</label><input id="r-email" name="r-email" type="email" aria-label="Email address"></div>
<div class="component Field"><label htmlFor="r-phone">Phone number</label><input id="r-phone" name="r-phone" type="tel" aria-label="Phone number"></div>
</div>
<div class="component Field"><div class="field-row"><label for="cover-letter">Cover letter</label><textarea id="cover-letter" name="cover-letter" rows="4" maxlength="400" ></textarea></div></div>
<button type="button">Continue</button>
</div>
</div></form></main>
</body>
</html>
