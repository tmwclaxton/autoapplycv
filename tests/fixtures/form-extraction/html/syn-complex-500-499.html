<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50499</title></head>
<body>
<main><h1>Long complex apply 50499</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50499">Preferred name (50499)</label>
<input type="text" id="long-name-50499" name="long-name-50499" autocomplete="name">
<label for="long-email-50499">Work email (50499)</label>
<input type="email" id="long-email-50499" name="long-email-50499" autocomplete="email">
<label for="long-phone-50499">Telephone (50499)</label>
<input type="tel" id="long-phone-50499" name="long-phone-50499" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50499">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50499" name="linkedin-profile-url-50499" ></div>
<div class="field-row"><label for="current-employer-50499">Current employer</label><input type="text" id="current-employer-50499" name="current-employer-50499" ></div>
<div class="field-row"><label for="current-job-title-50499">Current job title</label><input type="text" id="current-job-title-50499" name="current-job-title-50499" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="cover-letter-50499-50499">Cover letter (50499)</label><textarea id="cover-letter-50499-50499" name="cover-letter-50499-50499" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="preferred-location-50499-504">Preferred location (50499)</label><select id="preferred-location-50499-504" name="preferred-location-50499-504"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option><option value="london">London</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Work authorization status (50499)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50499)</legend><label for="open-to-relocation-50499-0"><input type="radio" id="open-to-relocation-50499-0" name="open-to-relocation-50499" value="yes"> Yes</label><label for="open-to-relocation-50499-1"><input type="radio" id="open-to-relocation-50499-1" name="open-to-relocation-50499" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50499-50">Salary expectations (50499)</label><input type="number" id="salary-expectations-50499-50" name="salary-expectations-50499-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50499-50">Earliest start date (50499)</label><input type="date" id="earliest-start-date-50499-50" name="earliest-start-date-50499-50" ></div>
<div class="field-row"><label for="application-source-50499-504">Application source (50499)</label><select id="application-source-50499-504" name="application-source-50499-504"><option value="">Choose one…</option><option value="conference">Conference</option><option value="company-site">Company site</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option><option value="other">Other</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Key skills (50499)</legend><label for="key-skills-50499-50499-cb-0"><input type="checkbox" id="key-skills-50499-50499-cb-0" name="key-skills-50499-50499[]" value="sql"> SQL</label><label for="key-skills-50499-50499-cb-1"><input type="checkbox" id="key-skills-50499-50499-cb-1" name="key-skills-50499-50499[]" value="laravel"> Laravel</label><label for="key-skills-50499-50499-cb-2"><input type="checkbox" id="key-skills-50499-50499-cb-2" name="key-skills-50499-50499[]" value="react"> React</label><label for="key-skills-50499-50499-cb-3"><input type="checkbox" id="key-skills-50499-50499-cb-3" name="key-skills-50499-50499[]" value="rust"> Rust</label><label for="key-skills-50499-50499-cb-4"><input type="checkbox" id="key-skills-50499-50499-cb-4" name="key-skills-50499-50499[]" value="typescript"> TypeScript</label><label for="key-skills-50499-50499-cb-5"><input type="checkbox" id="key-skills-50499-50499-cb-5" name="key-skills-50499-50499[]" value="go"> Go</label></fieldset>
<div class="file-row"><label for="file-50499">Attach resume (50499)</label><input type="file" id="file-50499" name="file-50499" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
