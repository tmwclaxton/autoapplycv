<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>React nested 2</title></head>
<body>
<main><h1>React nested 2</h1><form action="/apply" method="post">
<div data-reactroot><div><div class="jsx-form">
<div role="group" aria-labelledby="contact-heading"><h2 id="contact-heading">Contact information</h2>
<label for="jsx-name">Legal name</label><input id="jsx-name" name="jsx-name" type="text">
<label for="jsx-email">Work email</label><input id="jsx-email" name="jsx-email" type="email">
<label for="jsx-phone">Mobile number</label><input id="jsx-phone" name="jsx-phone" type="tel">
</div>
<div role="radiogroup" aria-labelledby="visa-sponsorship-needed-lbl" id="visa-sponsorship-needed">
<span id="visa-sponsorship-needed-lbl">Visa sponsorship needed?</span>
<div role="radio" tabindex="0" aria-checked="false" data-value="yes">Yes</div><div role="radio" tabindex="-1" aria-checked="false" data-value="no">No</div>
</div>
<button type="button" aria-label="Continue to next section">Continue</button>
</div></div></div></form></main>
</body>
</html>
