<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Lever-style apply 2</title></head>
<body>
<main><h1>Lever-style apply 2</h1><form action="/apply" method="post">
<div class="application-form">
<div class="application-field"><label class="application-label">Legal name</label><input name="name" type="text"></div>
<div class="application-field"><label class="application-label">Work email</label><input name="email" type="email"></div>
<div class="application-field"><label class="application-label">Mobile number</label><input name="phone" type="tel"></div>
<div class="application-field"><label class="application-label">Why this role?</label><textarea name="cover" rows="4" maxlength="500"></textarea></div>
<div class="application-field"><label class="application-label">Preferred location</label><input name="location" type="text"></div>
<div class="file-row"><label for="file-upload">Resume attachment</label><input type="file" id="file-upload" name="file-upload" accept=".pdf,.doc"></div>
<button type="button">Submit application</button>
</div></form></main>
</body>
</html>
