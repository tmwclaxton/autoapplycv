<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50490</title></head>
<body>
<main><h1>Mixed complex apply 50490</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50490">Full name (50490)</label>
<input type="text" id="mix-name-50490" name="mix-name-50490" autocomplete="name">
<label for="mix-email-50490">Contact email (50490)</label>
<input type="email" id="mix-email-50490" name="mix-email-50490" autocomplete="email">
<label for="mix-phone-50490">Contact number (50490)</label>
<input type="tel" id="mix-phone-50490" name="mix-phone-50490" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="why-this-role-50490-50490">Why this role? (50490)</label><textarea id="why-this-role-50490-50490" name="why-this-role-50490-50490" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="current-city-50490-50490">Current city (50490)</label><select id="current-city-50490-50490" name="current-city-50490-50490"><option value="">Choose one…</option><option value="london">London</option><option value="berlin">Berlin</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Work authorization status (50490)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50490)</legend><label for="open-to-relocation-50490-0"><input type="radio" id="open-to-relocation-50490-0" name="open-to-relocation-50490" value="yes"> Yes</label><label for="open-to-relocation-50490-1"><input type="radio" id="open-to-relocation-50490-1" name="open-to-relocation-50490" value="no"> No</label><label for="open-to-relocation-50490-2"><input type="radio" id="open-to-relocation-50490-2" name="open-to-relocation-50490" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50490-50">Desired base salary (50490)</label><input type="number" id="desired-base-salary-50490-50" name="desired-base-salary-50490-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50490-50490">Available from (50490)</label><input type="date" id="available-from-50490-50490" name="available-from-50490-50490" ></div>
<div class="field-row"><label for="referral-source-50490-50490">Referral source (50490)</label><select id="referral-source-50490-50490" name="referral-source-50490-50490"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="referral">Referral</option><option value="other">Other</option></select></div>
<fieldset><legend>Key skills (50490)</legend><label for="key-skills-50490-50490-cb-0"><input type="checkbox" id="key-skills-50490-50490-cb-0" name="key-skills-50490-50490[]" value="react"> React</label><label for="key-skills-50490-50490-cb-1"><input type="checkbox" id="key-skills-50490-50490-cb-1" name="key-skills-50490-50490[]" value="laravel"> Laravel</label><label for="key-skills-50490-50490-cb-2"><input type="checkbox" id="key-skills-50490-50490-cb-2" name="key-skills-50490-50490[]" value="go"> Go</label><label for="key-skills-50490-50490-cb-3"><input type="checkbox" id="key-skills-50490-50490-cb-3" name="key-skills-50490-50490[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50490">Attach resume (50490)</label><input type="file" id="file-50490" name="file-50490" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50490-50490">Personal website (50490)</label><input type="url" id="personal-website-50490-50490" name="personal-website-50490-50490" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
