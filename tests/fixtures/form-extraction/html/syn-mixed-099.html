<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed Application 10</title></head>
<body>
<main>
<h1>Mixed Application 10</h1>
<form action="/apply" method="post">
<div data-testid="input-q_name-as-on-cv" class="ia-Questions-item">
<div data-testid="input-q_name-as-on-cv-label"><span data-testid="safe-markup">Name as on CV</span></div>
<input data-testid="input-q_name-as-on-cv-input" type="text" name="input-q_name-as-on-cv">
</div>
<div class="field"><label id="question_personal-email-label" for="question_personal-email">Personal email</label><input type="email" id="question_personal-email" name="question_personal-email" aria-labelledby="question_personal-email-label"></div>
<div class="form-group"><label for="current-city">Current city</label><select id="current-city" name="current-city"><option value="">Select…</option><option value="london">London</option><option value="manchester">Manchester</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Do you require visa sponsorship?</legend><label><input type="radio" name="do-you-require-visa-spon" id="do-you-require-visa-spon-0" value="yes"> Yes</label><label><input type="radio" name="do-you-require-visa-spon" id="do-you-require-visa-spon-1" value="no"> No</label></fieldset>
<div class="form-group"><label for="why-do-you-want-this-rol">Why do you want this role?</label><textarea id="why-do-you-want-this-rol" name="why-do-you-want-this-rol" rows="4" maxlength="600"></textarea></div>
<div class="form-group"><label for="upload-cv">Upload CV</label><input type="file" id="upload-cv" name="upload-cv" ></div>
<button type="button">Submit application</button>

</form>
</main>
</body>
</html>
