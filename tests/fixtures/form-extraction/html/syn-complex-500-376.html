<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50376</title></head>
<body>
<main><h1>Wizard complex apply 50376</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50376">
<h2 id="wizard-contact-50376">Contact information</h2>

<label for="wiz-name-50376">Full name (50376)</label>
<input type="text" id="wiz-name-50376" name="wiz-name-50376" autocomplete="name">
<label for="wiz-email-50376">Email address (50376)</label>
<input type="email" id="wiz-email-50376" name="wiz-email-50376" autocomplete="email">
<label for="wiz-phone-50376">Contact number (50376)</label>
<input type="tel" id="wiz-phone-50376" name="wiz-phone-50376" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50376">
<h2 id="wizard-screen-50376">Screening questions</h2>
<div class="field-row"><label for="motivation-statement-50376-5">Motivation statement (50376)</label><textarea id="motivation-statement-50376-5" name="motivation-statement-50376-5" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="office-preference-50376-5037">Office preference (50376)</label><select id="office-preference-50376-5037" name="office-preference-50376-5037"><option value="">Choose one…</option><option value="remote">Remote</option><option value="new-york">New York</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Visa sponsorship needed? (50376)</legend><label for="visa-sponsorship-needed--0"><input type="radio" id="visa-sponsorship-needed--0" name="visa-sponsorship-needed-" value="yes"> Yes</label><label for="visa-sponsorship-needed--1"><input type="radio" id="visa-sponsorship-needed--1" name="visa-sponsorship-needed-" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50376-50">Desired base salary (50376)</label><input type="number" id="desired-base-salary-50376-50" name="desired-base-salary-50376-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="when-can-you-start-50376-503">When can you start? (50376)</label><input type="date" id="when-can-you-start-50376-503" name="when-can-you-start-50376-503" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50376">
<h2 id="wizard-docs-50376">Documents and skills</h2>
<fieldset><legend>Key skills (50376)</legend><label for="key-skills-50376-50376-cb-0"><input type="checkbox" id="key-skills-50376-50376-cb-0" name="key-skills-50376-50376[]" value="sql"> SQL</label><label for="key-skills-50376-50376-cb-1"><input type="checkbox" id="key-skills-50376-50376-cb-1" name="key-skills-50376-50376[]" value="laravel"> Laravel</label><label for="key-skills-50376-50376-cb-2"><input type="checkbox" id="key-skills-50376-50376-cb-2" name="key-skills-50376-50376[]" value="react"> React</label><label for="key-skills-50376-50376-cb-3"><input type="checkbox" id="key-skills-50376-50376-cb-3" name="key-skills-50376-50376[]" value="javascript"> JavaScript</label><label for="key-skills-50376-50376-cb-4"><input type="checkbox" id="key-skills-50376-50376-cb-4" name="key-skills-50376-50376[]" value="rust"> Rust</label></fieldset>
<div class="file-row"><label for="file-50376">Attach resume (50376)</label><input type="file" id="file-50376" name="file-50376" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50376)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="linkedin">LinkedIn</option><option value="company-site">Company site</option><option value="referral">Referral</option><option value="conference">Conference</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
