<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50026</title></head>
<body>
<main><h1>Wizard complex apply 50026</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50026">
<h2 id="wizard-contact-50026">Contact information</h2>

<label for="wiz-name-50026">Applicant name (50026)</label>
<input type="text" id="wiz-name-50026" name="wiz-name-50026" autocomplete="name">
<label for="wiz-email-50026">Work email (50026)</label>
<input type="email" id="wiz-email-50026" name="wiz-email-50026" autocomplete="email">
<label for="wiz-phone-50026">Contact number (50026)</label>
<input type="tel" id="wiz-phone-50026" name="wiz-phone-50026" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50026">
<h2 id="wizard-screen-50026">Screening questions</h2>
<div class="field-row"><label for="why-this-role-50026-50026">Why this role? (50026)</label><textarea id="why-this-role-50026-50026" name="why-this-role-50026-50026" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="work-location-50026-50026">Work location (50026)</label><select id="work-location-50026-50026" name="work-location-50026-50026"><option value="">Choose one…</option><option value="new-york">New York</option><option value="berlin">Berlin</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option></select></div>
<fieldset><legend>Work authorization status (50026)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50026-50026">Expected salary (50026)</label><input type="number" id="expected-salary-50026-50026" name="expected-salary-50026-50026" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50026-50">Earliest start date (50026)</label><input type="date" id="earliest-start-date-50026-50" name="earliest-start-date-50026-50" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50026">
<h2 id="wizard-docs-50026">Documents and skills</h2>
<fieldset><legend>Primary expertise (50026)</legend><label for="primary-expertise-50026--cb-0"><input type="checkbox" id="primary-expertise-50026--cb-0" name="primary-expertise-50026-[]" value="python"> Python</label><label for="primary-expertise-50026--cb-1"><input type="checkbox" id="primary-expertise-50026--cb-1" name="primary-expertise-50026-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50026--cb-2"><input type="checkbox" id="primary-expertise-50026--cb-2" name="primary-expertise-50026-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50026--cb-3"><input type="checkbox" id="primary-expertise-50026--cb-3" name="primary-expertise-50026-[]" value="rust"> Rust</label><label for="primary-expertise-50026--cb-4"><input type="checkbox" id="primary-expertise-50026--cb-4" name="primary-expertise-50026-[]" value="go"> Go</label></fieldset>
<div class="file-row"><label for="file-50026">Attach resume (50026)</label><input type="file" id="file-50026" name="file-50026" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50026)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="other">Other</option><option value="job-board">Job board</option><option value="referral">Referral</option><option value="company-site">Company site</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
