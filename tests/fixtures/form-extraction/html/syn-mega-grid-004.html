<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9904</title></head>
<body>
<main><h1>Grid layout 9904</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9904">Legal name (9904)</label><span class="helper">Required</span><input id="grid-name-9904" name="grid-name-9904" type="text"></div>
<div><label for="grid-email-9904">Personal email (9904)</label><span class="helper">Required</span><input id="grid-email-9904" name="grid-email-9904" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9904">Contact number (9904)</label><input id="grid-phone-9904" name="grid-phone-9904" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="tell-us-about-yourself-9904-">Tell us about yourself (9904)</label><textarea id="tell-us-about-yourself-9904-" name="tell-us-about-yourself-9904-" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Willing to relocate? (9904)</legend><label for="willing-to-relocate-9904-0"><input type="radio" id="willing-to-relocate-9904-0" name="willing-to-relocate-9904" value="yes"> Yes</label><label for="willing-to-relocate-9904-1"><input type="radio" id="willing-to-relocate-9904-1" name="willing-to-relocate-9904" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
