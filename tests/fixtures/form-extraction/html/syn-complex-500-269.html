<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50269</title></head>
<body>
<main><h1>Long complex apply 50269</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50269">Applicant name (50269)</label>
<input type="text" id="long-name-50269" name="long-name-50269" autocomplete="name">
<label for="long-email-50269">Contact email (50269)</label>
<input type="email" id="long-email-50269" name="long-email-50269" autocomplete="email">
<label for="long-phone-50269">Telephone (50269)</label>
<input type="tel" id="long-phone-50269" name="long-phone-50269" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50269">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50269" name="linkedin-profile-url-50269" ></div>
<div class="field-row"><label for="current-employer-50269">Current employer</label><input type="text" id="current-employer-50269" name="current-employer-50269" ></div>
<div class="field-row"><label for="current-job-title-50269">Current job title</label><input type="text" id="current-job-title-50269" name="current-job-title-50269" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="motivation-statement-50269-5">Motivation statement (50269)</label><textarea id="motivation-statement-50269-5" name="motivation-statement-50269-5" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="preferred-location-50269-502">Preferred location (50269)</label><select id="preferred-location-50269-502" name="preferred-location-50269-502"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option><option value="remote">Remote</option></select></div>
<fieldset><legend>Work authorization status (50269)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Open to relocation? (50269)</legend><label for="open-to-relocation-50269-0"><input type="radio" id="open-to-relocation-50269-0" name="open-to-relocation-50269" value="yes"> Yes</label><label for="open-to-relocation-50269-1"><input type="radio" id="open-to-relocation-50269-1" name="open-to-relocation-50269" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50269-50">Salary expectations (50269)</label><input type="number" id="salary-expectations-50269-50" name="salary-expectations-50269-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50269-">Start date preference (50269)</label><input type="date" id="start-date-preference-50269-" name="start-date-preference-50269-" ></div>
<div class="field-row"><label for="application-source-50269-502">Application source (50269)</label><select id="application-source-50269-502" name="application-source-50269-502"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="job-board">Job board</option><option value="conference">Conference</option><option value="linkedin">LinkedIn</option><option value="referral">Referral</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Primary expertise (50269)</legend><label for="primary-expertise-50269--cb-0"><input type="checkbox" id="primary-expertise-50269--cb-0" name="primary-expertise-50269-[]" value="react"> React</label><label for="primary-expertise-50269--cb-1"><input type="checkbox" id="primary-expertise-50269--cb-1" name="primary-expertise-50269-[]" value="javascript"> JavaScript</label><label for="primary-expertise-50269--cb-2"><input type="checkbox" id="primary-expertise-50269--cb-2" name="primary-expertise-50269-[]" value="rust"> Rust</label><label for="primary-expertise-50269--cb-3"><input type="checkbox" id="primary-expertise-50269--cb-3" name="primary-expertise-50269-[]" value="laravel"> Laravel</label><label for="primary-expertise-50269--cb-4"><input type="checkbox" id="primary-expertise-50269--cb-4" name="primary-expertise-50269-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50269--cb-5"><input type="checkbox" id="primary-expertise-50269--cb-5" name="primary-expertise-50269-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50269">Attach resume (50269)</label><input type="file" id="file-50269" name="file-50269" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
