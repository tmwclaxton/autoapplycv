<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Grid layout 9923</title></head>
<body>
<main><h1>Grid layout 9923</h1><form action="/apply" method="post">
<div class="grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
<div><label for="grid-name-9923">Full name (9923)</label><span class="helper">Required</span><input id="grid-name-9923" name="grid-name-9923" type="text"></div>
<div><label for="grid-email-9923">Personal email (9923)</label><span class="helper">Required</span><input id="grid-email-9923" name="grid-email-9923" type="email"></div>
<div style="grid-column:span 2"><label for="grid-phone-9923">Contact number (9923)</label><input id="grid-phone-9923" name="grid-phone-9923" type="tel"><small class="helper-text">Include country code</small></div>
<div style="grid-column:span 2"><div class="field-row"><label for="motivation-statement-9923-99">Motivation statement (9923)</label><textarea id="motivation-statement-9923-99" name="motivation-statement-9923-99" rows="4" maxlength="450"></textarea></div></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:8px"><fieldset><legend>Open to relocation? (9923)</legend><label for="open-to-relocation-9923--0"><input type="radio" id="open-to-relocation-9923--0" name="open-to-relocation-9923-" value="yes"> Yes</label><label for="open-to-relocation-9923--1"><input type="radio" id="open-to-relocation-9923--1" name="open-to-relocation-9923-" value="no"> No</label></fieldset></div></form></main>
</body>
</html>
