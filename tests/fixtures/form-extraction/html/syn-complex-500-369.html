<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50369</title></head>
<body>
<main><h1>Long complex apply 50369</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50369">Legal name (50369)</label>
<input type="text" id="long-name-50369" name="long-name-50369" autocomplete="name">
<label for="long-email-50369">Work email (50369)</label>
<input type="email" id="long-email-50369" name="long-email-50369" autocomplete="email">
<label for="long-phone-50369">Contact number (50369)</label>
<input type="tel" id="long-phone-50369" name="long-phone-50369" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50369">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50369" name="linkedin-profile-url-50369" ></div>
<div class="field-row"><label for="current-employer-50369">Current employer</label><input type="text" id="current-employer-50369" name="current-employer-50369" ></div>
<div class="field-row"><label for="current-job-title-50369">Current job title</label><input type="text" id="current-job-title-50369" name="current-job-title-50369" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="cover-letter-50369-50369">Cover letter (50369)</label><textarea id="cover-letter-50369-50369" name="cover-letter-50369-50369" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="preferred-location-50369-503">Preferred location (50369)</label><select id="preferred-location-50369-503" name="preferred-location-50369-503"><option value="">Choose one…</option><option value="berlin">Berlin</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Work authorization status (50369)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50369)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label></fieldset>
<div class="field-row"><label for="desired-base-salary-50369-50">Desired base salary (50369)</label><input type="number" id="desired-base-salary-50369-50" name="desired-base-salary-50369-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50369-50369">Available from (50369)</label><input type="date" id="available-from-50369-50369" name="available-from-50369-50369" ></div>
<div class="field-row"><label for="referral-source-50369-50369">Referral source (50369)</label><select id="referral-source-50369-50369" name="referral-source-50369-50369"><option value="">Choose one…</option><option value="job-board">Job board</option><option value="other">Other</option><option value="conference">Conference</option><option value="referral">Referral</option><option value="company-site">Company site</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Core competencies (50369)</legend><label for="core-competencies-50369--cb-0"><input type="checkbox" id="core-competencies-50369--cb-0" name="core-competencies-50369-[]" value="laravel"> Laravel</label><label for="core-competencies-50369--cb-1"><input type="checkbox" id="core-competencies-50369--cb-1" name="core-competencies-50369-[]" value="go"> Go</label><label for="core-competencies-50369--cb-2"><input type="checkbox" id="core-competencies-50369--cb-2" name="core-competencies-50369-[]" value="rust"> Rust</label><label for="core-competencies-50369--cb-3"><input type="checkbox" id="core-competencies-50369--cb-3" name="core-competencies-50369-[]" value="python"> Python</label><label for="core-competencies-50369--cb-4"><input type="checkbox" id="core-competencies-50369--cb-4" name="core-competencies-50369-[]" value="javascript"> JavaScript</label><label for="core-competencies-50369--cb-5"><input type="checkbox" id="core-competencies-50369--cb-5" name="core-competencies-50369-[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50369">Attach resume (50369)</label><input type="file" id="file-50369" name="file-50369" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
