<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50089</title></head>
<body>
<main><h1>Long complex apply 50089</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50089">Preferred name (50089)</label>
<input type="text" id="long-name-50089" name="long-name-50089" autocomplete="name">
<label for="long-email-50089">Contact email (50089)</label>
<input type="email" id="long-email-50089" name="long-email-50089" autocomplete="email">
<label for="long-phone-50089">Mobile number (50089)</label>
<input type="tel" id="long-phone-50089" name="long-phone-50089" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50089">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50089" name="linkedin-profile-url-50089" ></div>
<div class="field-row"><label for="current-employer-50089">Current employer</label><input type="text" id="current-employer-50089" name="current-employer-50089" ></div>
<div class="field-row"><label for="current-job-title-50089">Current job title</label><input type="text" id="current-job-title-50089" name="current-job-title-50089" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="tell-us-about-yourself-50089">Tell us about yourself (50089)</label><textarea id="tell-us-about-yourself-50089" name="tell-us-about-yourself-50089" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="preferred-location-50089-500">Preferred location (50089)</label><select id="preferred-location-50089-500" name="preferred-location-50089-500"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="new-york">New York</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50089)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50089)</legend><label for="willing-to-relocate-5008-0"><input type="radio" id="willing-to-relocate-5008-0" name="willing-to-relocate-5008" value="yes"> Yes</label><label for="willing-to-relocate-5008-1"><input type="radio" id="willing-to-relocate-5008-1" name="willing-to-relocate-5008" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50089-50">Salary expectations (50089)</label><input type="number" id="salary-expectations-50089-50" name="salary-expectations-50089-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50089-">Start date preference (50089)</label><input type="date" id="start-date-preference-50089-" name="start-date-preference-50089-" ></div>
<div class="field-row"><label for="referral-source-50089-50089">Referral source (50089)</label><select id="referral-source-50089-50089" name="referral-source-50089-50089"><option value="">Choose one…</option><option value="conference">Conference</option><option value="job-board">Job board</option><option value="company-site">Company site</option><option value="other">Other</option><option value="referral">Referral</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Core competencies (50089)</legend><label for="core-competencies-50089--cb-0"><input type="checkbox" id="core-competencies-50089--cb-0" name="core-competencies-50089-[]" value="go"> Go</label><label for="core-competencies-50089--cb-1"><input type="checkbox" id="core-competencies-50089--cb-1" name="core-competencies-50089-[]" value="python"> Python</label><label for="core-competencies-50089--cb-2"><input type="checkbox" id="core-competencies-50089--cb-2" name="core-competencies-50089-[]" value="rust"> Rust</label><label for="core-competencies-50089--cb-3"><input type="checkbox" id="core-competencies-50089--cb-3" name="core-competencies-50089-[]" value="react"> React</label><label for="core-competencies-50089--cb-4"><input type="checkbox" id="core-competencies-50089--cb-4" name="core-competencies-50089-[]" value="laravel"> Laravel</label><label for="core-competencies-50089--cb-5"><input type="checkbox" id="core-competencies-50089--cb-5" name="core-competencies-50089-[]" value="sql"> SQL</label></fieldset>
<div class="file-row"><label for="file-50089">Attach resume (50089)</label><input type="file" id="file-50089" name="file-50089" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
