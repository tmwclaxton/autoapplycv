<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>React apply 7</title></head>
<body>
<main><h1>React apply 7</h1><form action="/apply" method="post">
<div id="root" data-reactroot="">
<div class="App">
<div class="component FormSection" role="group" aria-label="Contact details">
<div class="component Field"><label htmlFor="r-name">Applicant name</label><input id="r-name" name="r-name" type="text" aria-label="Applicant name"></div>
<div class="component Field"><label htmlFor="r-email">Contact email</label><input id="r-email" name="r-email" type="email" aria-label="Contact email"></div>
<div class="component Field"><label htmlFor="r-phone">Contact number</label><input id="r-phone" name="r-phone" type="tel" aria-label="Contact number"></div>
</div>
<div class="component Field"><div class="field-row"><label for="tell-us-about-yourself">Tell us about yourself</label><textarea id="tell-us-about-yourself" name="tell-us-about-yourself" rows="4" maxlength="400" ></textarea></div></div>
<button type="button">Continue</button>
</div>
</div></form></main>
</body>
</html>
