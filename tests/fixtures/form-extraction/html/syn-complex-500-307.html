<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50307</title></head>
<body>
<main><h1>Conditional complex apply 50307</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50307">
<p id="step1-label-50307">Step 1 - Contact</p>

<label for="cond-name-50307">Full name (50307)</label>
<input type="text" id="cond-name-50307" name="cond-name-50307" autocomplete="name">
<label for="cond-email-50307">Email address (50307)</label>
<input type="email" id="cond-email-50307" name="cond-email-50307" autocomplete="email">
<label for="cond-phone-50307">Contact number (50307)</label>
<input type="tel" id="cond-phone-50307" name="cond-phone-50307" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50307">
<p id="step2-label-50307">Step 2 - Preferences</p>
<div class="field-row"><label for="work-location-50307-50307">Work location (50307)</label><select id="work-location-50307-50307" name="work-location-50307-50307"><option value="">Choose one…</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option><option value="new-york">New York</option><option value="hybrid">Hybrid</option></select></div>
<fieldset><legend>Open to relocation? (50307)</legend><label for="open-to-relocation-50307-0"><input type="radio" id="open-to-relocation-50307-0" name="open-to-relocation-50307" value="yes"> Yes</label><label for="open-to-relocation-50307-1"><input type="radio" id="open-to-relocation-50307-1" name="open-to-relocation-50307" value="no"> No</label><label for="open-to-relocation-50307-2"><input type="radio" id="open-to-relocation-50307-2" name="open-to-relocation-50307" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="start-date-preference-50307-">Start date preference (50307)</label><input type="date" id="start-date-preference-50307-" name="start-date-preference-50307-" ></div>
<fieldset><legend>Key skills (50307)</legend><label for="key-skills-50307-50307-cb-0"><input type="checkbox" id="key-skills-50307-50307-cb-0" name="key-skills-50307-50307[]" value="react"> React</label><label for="key-skills-50307-50307-cb-1"><input type="checkbox" id="key-skills-50307-50307-cb-1" name="key-skills-50307-50307[]" value="typescript"> TypeScript</label><label for="key-skills-50307-50307-cb-2"><input type="checkbox" id="key-skills-50307-50307-cb-2" name="key-skills-50307-50307[]" value="rust"> Rust</label><label for="key-skills-50307-50307-cb-3"><input type="checkbox" id="key-skills-50307-50307-cb-3" name="key-skills-50307-50307[]" value="sql"> SQL</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50307">
<p id="step3-label-50307">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50307" data-reveal="#reveal-50307">Show follow-up questions</button>
<div id="reveal-50307" hidden style="display:none"><div class="field-row"><label for="personal-statement-50307-503">Personal statement (50307)</label><textarea id="personal-statement-50307-503" name="personal-statement-50307-503" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="personal-website-50307-50307">Personal website (50307)</label><input type="url" id="personal-website-50307-50307" name="personal-website-50307-50307" ></div>
<div class="field-row"><label for="expected-salary-50307-50307">Expected salary (50307)</label><input type="number" id="expected-salary-50307-50307" name="expected-salary-50307-50307" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50307">Attach resume (50307)</label><input type="file" id="file-50307" name="file-50307" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
