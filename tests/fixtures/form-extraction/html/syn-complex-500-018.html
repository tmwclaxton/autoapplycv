<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50018</title></head>
<body>
<main><h1>Mixed complex apply 50018</h1><form action="/apply" method="post">
<section class="mixed-contact">
<label for="mix-name-50018">Full name (50018)</label>
<input type="text" id="mix-name-50018" name="mix-name-50018" autocomplete="name">
<label for="mix-email-50018">Email address (50018)</label>
<input type="email" id="mix-email-50018" name="mix-email-50018" autocomplete="email">
<label for="mix-phone-50018">Telephone (50018)</label>
<input type="tel" id="mix-phone-50018" name="mix-phone-50018" autocomplete="tel"></section>
<section class="mixed-screening">
<div class="field-row"><label for="motivation-statement-50018-5">Motivation statement (50018)</label><textarea id="motivation-statement-50018-5" name="motivation-statement-50018-5" rows="4" maxlength="500"></textarea></div>
<div class="field-row"><label for="preferred-location-50018-500">Preferred location (50018)</label><select id="preferred-location-50018-500" name="preferred-location-50018-500"><option value="">Choose one…</option><option value="remote">Remote</option><option value="manchester">Manchester</option><option value="dublin">Dublin</option><option value="hybrid">Hybrid</option><option value="berlin">Berlin</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50018)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Willing to relocate? (50018)</legend><label for="willing-to-relocate-5001-0"><input type="radio" id="willing-to-relocate-5001-0" name="willing-to-relocate-5001" value="yes"> Yes</label><label for="willing-to-relocate-5001-1"><input type="radio" id="willing-to-relocate-5001-1" name="willing-to-relocate-5001" value="no"> No</label><label for="willing-to-relocate-5001-2"><input type="radio" id="willing-to-relocate-5001-2" name="willing-to-relocate-5001" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="salary-expectations-50018-50">Salary expectations (50018)</label><input type="number" id="salary-expectations-50018-50" name="salary-expectations-50018-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="earliest-start-date-50018-50">Earliest start date (50018)</label><input type="date" id="earliest-start-date-50018-50" name="earliest-start-date-50018-50" ></div>
<div class="field-row"><label for="referral-source-50018-50018">Referral source (50018)</label><select id="referral-source-50018-50018" name="referral-source-50018-50018"><option value="">Choose one…</option><option value="conference">Conference</option><option value="job-board">Job board</option><option value="other">Other</option><option value="linkedin">LinkedIn</option></select></div>
<fieldset><legend>Core competencies (50018)</legend><label for="core-competencies-50018--cb-0"><input type="checkbox" id="core-competencies-50018--cb-0" name="core-competencies-50018-[]" value="laravel"> Laravel</label><label for="core-competencies-50018--cb-1"><input type="checkbox" id="core-competencies-50018--cb-1" name="core-competencies-50018-[]" value="react"> React</label><label for="core-competencies-50018--cb-2"><input type="checkbox" id="core-competencies-50018--cb-2" name="core-competencies-50018-[]" value="typescript"> TypeScript</label><label for="core-competencies-50018--cb-3"><input type="checkbox" id="core-competencies-50018--cb-3" name="core-competencies-50018-[]" value="python"> Python</label></fieldset>
<div class="file-row"><label for="file-50018">Attach resume (50018)</label><input type="file" id="file-50018" name="file-50018" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50018-50018">Personal website (50018)</label><input type="url" id="personal-website-50018-50018" name="personal-website-50018-50018" ></div>
<fieldset><legend>Do you have a security clearance?</legend><label for="do-you-have-a-security-c-0"><input type="radio" id="do-you-have-a-security-c-0" name="do-you-have-a-security-c" value="yes"> Yes</label><label for="do-you-have-a-security-c-1"><input type="radio" id="do-you-have-a-security-c-1" name="do-you-have-a-security-c" value="no"> No</label><label for="do-you-have-a-security-c-2"><input type="radio" id="do-you-have-a-security-c-2" name="do-you-have-a-security-c" value="in-progress"> In progress</label></fieldset>
</section>
<section class="mixed-consent">
<fieldset><legend>Which communication channels work for you?</legend><label for="which-communication-chan-cb-0"><input type="checkbox" id="which-communication-chan-cb-0" name="which-communication-chan[]" value="email"> Email</label><label for="which-communication-chan-cb-1"><input type="checkbox" id="which-communication-chan-cb-1" name="which-communication-chan[]" value="phone"> Phone</label><label for="which-communication-chan-cb-2"><input type="checkbox" id="which-communication-chan-cb-2" name="which-communication-chan[]" value="sms"> SMS</label></fieldset>
</section>
</form></main>
</body>
</html>
