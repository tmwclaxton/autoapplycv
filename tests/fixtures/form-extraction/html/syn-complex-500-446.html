<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Wizard complex apply 50446</title></head>
<body>
<main><h1>Wizard complex apply 50446</h1><form action="/apply" method="post">
<div class="wizard" data-step="1">
<nav aria-label="Application progress"><ol><li aria-current="step">Contact</li><li>Screening</li><li>Documents</li></ol></nav>
<section class="wizard-panel" role="group" aria-labelledby="wizard-contact-50446">
<h2 id="wizard-contact-50446">Contact information</h2>

<label for="wiz-name-50446">Full name (50446)</label>
<input type="text" id="wiz-name-50446" name="wiz-name-50446" autocomplete="name">
<label for="wiz-email-50446">Contact email (50446)</label>
<input type="email" id="wiz-email-50446" name="wiz-email-50446" autocomplete="email">
<label for="wiz-phone-50446">Phone number (50446)</label>
<input type="tel" id="wiz-phone-50446" name="wiz-phone-50446" autocomplete="tel">
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-screen-50446">
<h2 id="wizard-screen-50446">Screening questions</h2>
<div class="field-row"><label for="personal-statement-50446-504">Personal statement (50446)</label><textarea id="personal-statement-50446-504" name="personal-statement-50446-504" rows="4" maxlength="450"></textarea></div>
<div class="field-row"><label for="office-preference-50446-5044">Office preference (50446)</label><select id="office-preference-50446-5044" name="office-preference-50446-5044"><option value="">Choose one…</option><option value="hybrid">Hybrid</option><option value="remote">Remote</option><option value="london">London</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Work authorization status (50446)</legend><label for="work-authorization-statu-0"><input type="radio" id="work-authorization-statu-0" name="work-authorization-statu" value="yes"> Yes</label><label for="work-authorization-statu-1"><input type="radio" id="work-authorization-statu-1" name="work-authorization-statu" value="no"> No</label></fieldset>
<div class="field-row"><label for="salary-expectations-50446-50">Salary expectations (50446)</label><input type="number" id="salary-expectations-50446-50" name="salary-expectations-50446-50" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="start-date-preference-50446-">Start date preference (50446)</label><input type="date" id="start-date-preference-50446-" name="start-date-preference-50446-" ></div>
</section>
<section class="wizard-panel" role="group" aria-labelledby="wizard-docs-50446">
<h2 id="wizard-docs-50446">Documents and skills</h2>
<fieldset><legend>Key skills (50446)</legend><label for="key-skills-50446-50446-cb-0"><input type="checkbox" id="key-skills-50446-50446-cb-0" name="key-skills-50446-50446[]" value="sql"> SQL</label><label for="key-skills-50446-50446-cb-1"><input type="checkbox" id="key-skills-50446-50446-cb-1" name="key-skills-50446-50446[]" value="go"> Go</label><label for="key-skills-50446-50446-cb-2"><input type="checkbox" id="key-skills-50446-50446-cb-2" name="key-skills-50446-50446[]" value="react"> React</label><label for="key-skills-50446-50446-cb-3"><input type="checkbox" id="key-skills-50446-50446-cb-3" name="key-skills-50446-50446[]" value="rust"> Rust</label><label for="key-skills-50446-50446-cb-4"><input type="checkbox" id="key-skills-50446-50446-cb-4" name="key-skills-50446-50446[]" value="typescript"> TypeScript</label></fieldset>
<div class="file-row"><label for="file-50446">Attach resume (50446)</label><input type="file" id="file-50446" name="file-50446" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="how-did-you-hear-about-us-50">How did you hear about us? (50446)</label><select id="how-did-you-hear-about-us-50" name="how-did-you-hear-about-us-50"><option value="">Choose one…</option><option value="referral">Referral</option><option value="linkedin">LinkedIn</option><option value="job-board">Job board</option><option value="conference">Conference</option></select></div>
</section>
<button type="button">Continue to review</button>
</div></form></main>
</body>
</html>
