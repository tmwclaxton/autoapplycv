<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Conditional complex apply 50017</title></head>
<body>
<main><h1>Conditional complex apply 50017</h1><form action="/apply" method="post">
<section role="group" aria-labelledby="step1-label-50017">
<p id="step1-label-50017">Step 1 - Contact</p>

<label for="cond-name-50017">Full name (50017)</label>
<input type="text" id="cond-name-50017" name="cond-name-50017" autocomplete="name">
<label for="cond-email-50017">Email address (50017)</label>
<input type="email" id="cond-email-50017" name="cond-email-50017" autocomplete="email">
<label for="cond-phone-50017">Telephone (50017)</label>
<input type="tel" id="cond-phone-50017" name="cond-phone-50017" autocomplete="tel">
</section>
<section role="group" aria-labelledby="step2-label-50017">
<p id="step2-label-50017">Step 2 - Preferences</p>
<div class="field-row"><label for="work-location-50017-50017">Work location (50017)</label><select id="work-location-50017-50017" name="work-location-50017-50017"><option value="">Choose one…</option><option value="dublin">Dublin</option><option value="london">London</option><option value="hybrid">Hybrid</option><option value="manchester">Manchester</option></select></div>
<fieldset><legend>Open to relocation? (50017)</legend><label for="open-to-relocation-50017-0"><input type="radio" id="open-to-relocation-50017-0" name="open-to-relocation-50017" value="yes"> Yes</label><label for="open-to-relocation-50017-1"><input type="radio" id="open-to-relocation-50017-1" name="open-to-relocation-50017" value="no"> No</label><label for="open-to-relocation-50017-2"><input type="radio" id="open-to-relocation-50017-2" name="open-to-relocation-50017" value="maybe-later"> Maybe later</label></fieldset>
<div class="field-row"><label for="earliest-start-date-50017-50">Earliest start date (50017)</label><input type="date" id="earliest-start-date-50017-50" name="earliest-start-date-50017-50" ></div>
<fieldset><legend>Key skills (50017)</legend><label for="key-skills-50017-50017-cb-0"><input type="checkbox" id="key-skills-50017-50017-cb-0" name="key-skills-50017-50017[]" value="sql"> SQL</label><label for="key-skills-50017-50017-cb-1"><input type="checkbox" id="key-skills-50017-50017-cb-1" name="key-skills-50017-50017[]" value="typescript"> TypeScript</label><label for="key-skills-50017-50017-cb-2"><input type="checkbox" id="key-skills-50017-50017-cb-2" name="key-skills-50017-50017[]" value="react"> React</label><label for="key-skills-50017-50017-cb-3"><input type="checkbox" id="key-skills-50017-50017-cb-3" name="key-skills-50017-50017[]" value="python"> Python</label></fieldset>
</section>
<section role="group" aria-labelledby="step3-label-50017">
<p id="step3-label-50017">Step 3 - Optional follow-up</p>

<button type="button" id="reveal-btn-50017" data-reveal="#reveal-50017">Show follow-up questions</button>
<div id="reveal-50017" hidden style="display:none"><div class="field-row"><label for="why-this-role-50017-50017">Why this role? (50017)</label><textarea id="why-this-role-50017-50017" name="why-this-role-50017-50017" rows="4" maxlength="400"></textarea></div>
<div class="field-row"><label for="work-samples-link-50017-5001">Work samples link (50017)</label><input type="url" id="work-samples-link-50017-5001" name="work-samples-link-50017-5001" ></div>
<div class="field-row"><label for="compensation-requirement-500">Compensation requirement (50017)</label><input type="number" id="compensation-requirement-500" name="compensation-requirement-500" min="0" step="1000" placeholder="Annual amount"></div></div>
<div class="file-row"><label for="file-50017">Attach resume (50017)</label><input type="file" id="file-50017" name="file-50017" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
