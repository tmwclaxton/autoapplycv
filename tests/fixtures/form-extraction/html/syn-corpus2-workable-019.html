<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Workable apply 20075</title></head>
<body>

<main data-workable-application="true"><h1>Apply for position 20075</h1>
<form class="application-form workable-form" action="/apply" method="post">
<div class="section personal-details">
<label for="wk-name-20075">Your name (20075)</label>
<input type="text" id="wk-name-20075" name="wk-name-20075" autocomplete="name">
<label for="wk-email-20075">Work email (20075)</label>
<input type="email" id="wk-email-20075" name="wk-email-20075" autocomplete="email">
<label for="wk-phone-20075">Telephone (20075)</label>
<input type="tel" id="wk-phone-20075" name="wk-phone-20075" autocomplete="tel"></div>
<div class="section additional"><div class="field-row"><label for="cover-letter-20075-20075">Cover letter (20075)</label><textarea id="cover-letter-20075-20075" name="cover-letter-20075-20075" rows="4" maxlength="600"></textarea></div></div>
<div class="section preferences"><fieldset><legend>Open to relocation? (20075)</legend><label for="open-to-relocation-20075-0"><input type="radio" id="open-to-relocation-20075-0" name="open-to-relocation-20075" value="yes"> Yes</label><label for="open-to-relocation-20075-1"><input type="radio" id="open-to-relocation-20075-1" name="open-to-relocation-20075" value="no"> No</label><label for="open-to-relocation-20075-2"><input type="radio" id="open-to-relocation-20075-2" name="open-to-relocation-20075" value="maybe"> Maybe</label></fieldset></div>

</form></main>
</body>
</html>
