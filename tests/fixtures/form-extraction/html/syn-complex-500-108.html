<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mixed complex apply 50108</title></head>
<body>
<main><h1>Mixed complex apply 50108</h1><form action="/apply" method="post">
<section class="mixed-contact">

<div class="field-row"><label for="preferred-location-50108-501">Preferred location (50108)</label><select id="preferred-location-50108-501" name="preferred-location-50108-501"><option value="">Choose one…</option><option value="london">London</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="hybrid">Hybrid</option><option value="dublin">Dublin</option></select></div>

<div class="field-row"><label for="compensation-requirement-501">Compensation requirement (50108)</label><input type="number" id="compensation-requirement-501" name="compensation-requirement-501" min="0" step="1000" placeholder="Annual amount"></div>

<fieldset><legend>Primary expertise (50108)</legend><label for="primary-expertise-50108--cb-0"><input type="checkbox" id="primary-expertise-50108--cb-0" name="primary-expertise-50108-[]" value="python"> Python</label><label for="primary-expertise-50108--cb-1"><input type="checkbox" id="primary-expertise-50108--cb-1" name="primary-expertise-50108-[]" value="sql"> SQL</label><label for="primary-expertise-50108--cb-2"><input type="checkbox" id="primary-expertise-50108--cb-2" name="primary-expertise-50108-[]" value="typescript"> TypeScript</label><label for="primary-expertise-50108--cb-3"><input type="checkbox" id="primary-expertise-50108--cb-3" name="primary-expertise-50108-[]" value="javascript"> JavaScript</label></fieldset>
<div class="file-row"><label for="file-50108">Attach resume (50108)</label><input type="file" id="file-50108" name="file-50108" accept=".pdf,.doc,.docx"></div>
<div class="field-row"><label for="personal-website-50108-50108">Personal website (50108)</label><input type="url" id="personal-website-50108-50108" name="personal-website-50108-50108" ></div>

</section>
</form></main>

</html>
