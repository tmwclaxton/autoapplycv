<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Long complex apply 50129</title></head>
<body>
<main><h1>Long complex apply 50129</h1><form action="/apply" method="post">
<section data-section="personal">
<h2>Personal details</h2>

<label for="long-name-50129">Your name (50129)</label>
<input type="text" id="long-name-50129" name="long-name-50129" autocomplete="name">
<label for="long-email-50129">Work email (50129)</label>
<input type="email" id="long-email-50129" name="long-email-50129" autocomplete="email">
<label for="long-phone-50129">Telephone (50129)</label>
<input type="tel" id="long-phone-50129" name="long-phone-50129" autocomplete="tel">
<div class="field-row"><label for="linkedin-profile-url-50129">LinkedIn profile URL</label><input type="url" id="linkedin-profile-url-50129" name="linkedin-profile-url-50129" ></div>
<div class="field-row"><label for="current-employer-50129">Current employer</label><input type="text" id="current-employer-50129" name="current-employer-50129" ></div>
<div class="field-row"><label for="current-job-title-50129">Current job title</label><input type="text" id="current-job-title-50129" name="current-job-title-50129" ></div>
</section>
<section data-section="motivation">
<h2>Motivation</h2>
<div class="field-row"><label for="personal-statement-50129-501">Personal statement (50129)</label><textarea id="personal-statement-50129-501" name="personal-statement-50129-501" rows="4" maxlength="800"></textarea></div>
<div class="field-row"><label for="describe-a-challenging-proje">Describe a challenging project you led</label><textarea id="describe-a-challenging-proje" name="describe-a-challenging-proje" rows="4" maxlength="600"></textarea></div>
<div class="field-row"><label for="why-are-you-leaving-your-cur">Why are you leaving your current role?</label><textarea id="why-are-you-leaving-your-cur" name="why-are-you-leaving-your-cur" rows="4" maxlength="400"></textarea></div>
</section>
<section data-section="logistics">
<h2>Logistics</h2>
<div class="field-row"><label for="current-city-50129-50129">Current city (50129)</label><select id="current-city-50129-50129" name="current-city-50129-50129"><option value="">Choose one…</option><option value="london">London</option><option value="dublin">Dublin</option><option value="berlin">Berlin</option><option value="remote">Remote</option><option value="new-york">New York</option></select></div>
<fieldset><legend>Do you require visa sponsorship? (50129)</legend><label for="do-you-require-visa-spon-0"><input type="radio" id="do-you-require-visa-spon-0" name="do-you-require-visa-spon" value="yes"> Yes</label><label for="do-you-require-visa-spon-1"><input type="radio" id="do-you-require-visa-spon-1" name="do-you-require-visa-spon" value="no"> No</label></fieldset>
<fieldset><legend>Relocation preference (50129)</legend><label for="relocation-preference-50-0"><input type="radio" id="relocation-preference-50-0" name="relocation-preference-50" value="yes"> Yes</label><label for="relocation-preference-50-1"><input type="radio" id="relocation-preference-50-1" name="relocation-preference-50" value="no"> No</label></fieldset>
<div class="field-row"><label for="expected-salary-50129-50129">Expected salary (50129)</label><input type="number" id="expected-salary-50129-50129" name="expected-salary-50129-50129" min="0" step="1000" placeholder="Annual amount"></div>
<div class="field-row"><label for="available-from-50129-50129">Available from (50129)</label><input type="date" id="available-from-50129-50129" name="available-from-50129-50129" ></div>
<div class="field-row"><label for="application-source-50129-501">Application source (50129)</label><select id="application-source-50129-501" name="application-source-50129-501"><option value="">Choose one…</option><option value="company-site">Company site</option><option value="conference">Conference</option><option value="other">Other</option><option value="job-board">Job board</option><option value="linkedin">LinkedIn</option></select></div>
</section>
<section data-section="skills">
<h2>Skills and documents</h2>
<fieldset><legend>Core competencies (50129)</legend><label for="core-competencies-50129--cb-0"><input type="checkbox" id="core-competencies-50129--cb-0" name="core-competencies-50129-[]" value="go"> Go</label><label for="core-competencies-50129--cb-1"><input type="checkbox" id="core-competencies-50129--cb-1" name="core-competencies-50129-[]" value="javascript"> JavaScript</label><label for="core-competencies-50129--cb-2"><input type="checkbox" id="core-competencies-50129--cb-2" name="core-competencies-50129-[]" value="python"> Python</label><label for="core-competencies-50129--cb-3"><input type="checkbox" id="core-competencies-50129--cb-3" name="core-competencies-50129-[]" value="laravel"> Laravel</label><label for="core-competencies-50129--cb-4"><input type="checkbox" id="core-competencies-50129--cb-4" name="core-competencies-50129-[]" value="rust"> Rust</label><label for="core-competencies-50129--cb-5"><input type="checkbox" id="core-competencies-50129--cb-5" name="core-competencies-50129-[]" value="react"> React</label></fieldset>
<div class="file-row"><label for="file-50129">Attach resume (50129)</label><input type="file" id="file-50129" name="file-50129" accept=".pdf,.doc,.docx"></div>
</section>
</form></main>
</body>
</html>
