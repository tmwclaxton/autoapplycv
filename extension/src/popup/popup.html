<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoCVApply</title>
    <link rel="stylesheet" href="popup.css" />
</head>
<body>
    <div class="header">
        <div class="logo">⚡</div>
        <div>
            <div class="header-title">AutoCVApply</div>
            <div class="header-subtitle">Autofill & AI assist for job forms</div>
        </div>
    </div>

    <div id="message" class="message"></div>

    <div id="unauth-state" class="panel" style="display:none">
        <div class="status-card unauth">
            <div class="status-row"><span class="dot red"></span> Not connected</div>
        </div>
        <label class="field-label">Paste the connection copied from your dashboard</label>
        <div class="token-row">
            <input class="text-input" type="password" id="token-input" placeholder="Paste connection JSON…" />
            <button class="btn primary compact" id="save-token-btn">Connect</button>
        </div>
        <button class="btn secondary" id="open-site-btn">Get your token →</button>
    </div>

    <div id="auth-state" style="display:none">
        <div class="status-bar">
            <div>
                <div class="status-row"><span class="dot green"></span> <span id="profile-name">Connected</span></div>
                <div class="usage-meta" id="usage-meta"></div>
            </div>
            <div class="usage-count" id="usage-count">0 / 0</div>
        </div>
        <div class="usage-bar"><div class="usage-fill" id="usage-fill"></div></div>

        <div class="tabs">
            <button class="tab active" data-tab="autofill">AutoFill</button>
            <button class="tab" data-tab="settings">Settings</button>
        </div>

        <div class="tab-panel active" id="autofill-tab">
            <div class="toggle-row">
                <span>Show AutoFill button on job sites</span>
                <label class="toggle"><input type="checkbox" id="enabled-toggle" checked /><span class="slider"></span></label>
            </div>

            <section class="quick-answer-card">
                <div class="field-label">Quick Answer</div>
                <div id="focused-field-label" class="hint">Click a form field on the page, then draft an answer here.</div>
                <div class="btn-row">
                    <button class="btn primary compact" id="quick-answer-btn">Quick Answer</button>
                    <button class="btn secondary compact" id="open-side-panel-btn">Side panel</button>
                </div>
                <button class="btn secondary" id="draft-all-btn">Draft all empty fields</button>
                <div id="quick-answer-status" class="hint"></div>
            </section>

            <p class="hint">Use the side panel for ATS scoring, cover letters, and tailored resumes.</p>

            <button class="btn secondary" id="open-dashboard-btn">Open Dashboard</button>
            <button class="btn danger" id="logout-btn">Sign Out</button>
        </div>

        <div class="tab-panel" id="settings-tab">
            <label class="field-label">Phone country code</label>
            <select class="text-input" id="phoneCountryCode">
                <option value="+44">United Kingdom (+44)</option>
                <option value="+1">United States / Canada (+1)</option>
                <option value="+353">Ireland (+353)</option>
                <option value="+33">France (+33)</option>
                <option value="+49">Germany (+49)</option>
                <option value="+61">Australia (+61)</option>
            </select>

            <label class="field-label">Fallback resume (if dashboard CV unavailable)</label>
            <div class="resume-row">
                <span id="resume-file-name" class="resume-name">No file chosen</span>
                <button type="button" class="btn secondary compact" id="upload-resume-btn">Upload</button>
                <button type="button" class="btn secondary compact" id="remove-resume-btn" style="display:none">Remove</button>
            </div>
            <input type="file" id="resume-file-input" accept=".pdf,.doc,.docx" hidden />

            <label class="field-label">Years of experience</label>
            <input class="text-input" id="yearsOfExperience" type="number" min="0" max="50" value="2" />

            <label class="field-label">Expected salary (optional)</label>
            <input class="text-input" id="expectedSalary" placeholder="e.g. £45,000" />

            <label class="field-label">Visa sponsorship needed?</label>
            <select class="text-input" id="visaSponsorship"><option value="no">No</option><option value="yes">Yes</option></select>

            <label class="field-label">Legally authorized to work?</label>
            <select class="text-input" id="legallyAuthorized"><option value="yes">Yes</option><option value="no">No</option></select>

            <label class="field-label">Willing to relocate?</label>
            <select class="text-input" id="willingToRelocate"><option value="yes">Yes</option><option value="no">No</option></select>

            <label class="field-label">Valid driver's license?</label>
            <select class="text-input" id="driversLicense"><option value="yes">Yes</option><option value="no">No</option></select>

            <div id="autosave-indicator" class="autosave">Saved</div>
        </div>
    </div>

    <div class="footer"><a href="https://autocvapply.com" target="_blank">autocvapply.com</a></div>
    <script type="module" src="popup.js"></script>
</body>
</html>
