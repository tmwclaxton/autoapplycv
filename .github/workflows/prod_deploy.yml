name: "Production Deploy"

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  IMAGE: ghcr.io/tmwclaxton/autoapplycv:latest
  DEPLOY_HOST: admin.grantgunner.org
  DEPLOY_USER: autocvapply
  DEPLOY_DIR: /opt/autocvapply

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          export DOCKER_BUILDKIT=1
          docker pull ${{ env.IMAGE }} || true
          docker build \
            --file DockerfileProd \
            --cache-from ${{ env.IMAGE }} \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --tag ${{ env.IMAGE }} .

      - name: Push Docker image to GHCR
        run: docker push ${{ env.IMAGE }}

  deploy:
    name: Deploy to self-hosted server
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL --output /tmp/cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host ${{ env.DEPLOY_HOST }}
            User ${{ env.DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Copy deploy files to server
        run: |
          scp compose.prod.yaml ${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}/compose.prod.yaml
          scp scripts/deploy-production.sh ${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}/deploy-production.sh

      - name: Deploy to server
        run: |
          ssh ${{ env.DEPLOY_HOST }} "
            set -e
            cd ${{ env.DEPLOY_DIR }}
            chmod +x deploy-production.sh
            GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' GHCR_ACTOR='${{ github.actor }}' ./deploy-production.sh
          "
