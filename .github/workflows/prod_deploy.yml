name: "Production Deploy"

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  IMAGE: ghcr.io/tmwclaxton/autoapplycv:latest
  DEPLOY_HOST: admin.grantgunner.org
  DEPLOY_USER: autocvapply
  DEPLOY_DIR: /opt/autocvapply
  # 2026.6.0 regressed headless Access SSH service-token auth; pin a known-good release.
  CLOUDFLARED_VERSION: "2026.5.1"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          export DOCKER_BUILDKIT=1
          docker pull ${{ env.IMAGE }} || true
          docker build \
            --file DockerfileProd \
            --cache-from ${{ env.IMAGE }} \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --build-arg GIT_SHA=${{ github.sha }} \
            --tag ${{ env.IMAGE }} .

      - name: Push Docker image to GHCR
        run: docker push ${{ env.IMAGE }}

  deploy:
    name: Deploy to self-hosted server
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL --output /tmp/cloudflared.deb \
            "https://github.com/cloudflare/cloudflared/releases/download/${CLOUDFLARED_VERSION}/cloudflared-linux-amd64.deb"
          sudo dpkg -i /tmp/cloudflared.deb
          cloudflared --version

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host ${{ env.DEPLOY_HOST }}
            User ${{ env.DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ServerAliveInterval 15
            ServerAliveCountMax 120
            ConnectTimeout 30
            ProxyCommand cloudflared access ssh --hostname %h --service-token-id ${CF_ACCESS_CLIENT_ID} --service-token-secret ${CF_ACCESS_CLIENT_SECRET}
          EOF

      - name: Copy deploy files to server
        run: |
          set -euo pipefail
          retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              echo "Attempt ${attempt} failed; retrying in 5s..."
              sleep 5
            done
            return 1
          }

          retry scp compose.prod.yaml ${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}/compose.prod.yaml
          retry scp scripts/deploy-production.sh ${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}/deploy-production.sh

      - name: Deploy to server
        run: |
          set -euo pipefail
          retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              echo "Attempt ${attempt} failed; retrying in 5s..."
              sleep 5
            done
            return 1
          }

          retry ssh ${{ env.DEPLOY_HOST }} "
            set -e
            cd ${{ env.DEPLOY_DIR }}
            chmod +x deploy-production.sh
            GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' GHCR_ACTOR='${{ github.actor }}' ./deploy-production.sh
          "
